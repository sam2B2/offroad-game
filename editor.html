<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>越野驾驶 — 地形编辑器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#1a1a2e;font-family:'Noto Sans SC',sans-serif;color:#ccc;}

/* 顶部菜单栏 */
#topBar{position:fixed;top:0;left:0;right:0;height:40px;background:#16213e;border-bottom:1px solid #0f3460;
  display:flex;align-items:center;padding:0 12px;gap:8px;z-index:100;}
#topBar .title{font-size:14px;font-weight:600;color:#e0e0e0;margin-right:16px;}
.tb-btn{padding:5px 14px;font-size:12px;font-family:'Noto Sans SC',sans-serif;font-weight:500;
  color:#bbb;background:#1a1a3e;border:1px solid #334;border-radius:4px;cursor:pointer;transition:all 0.15s;}
.tb-btn:hover{background:#2a2a5e;color:#fff;border-color:#556;}
.tb-btn.primary{background:#1a5276;border-color:#2980b9;color:#fff;}
.tb-btn.primary:hover{background:#2471a3;}
#topBar .sep{width:1px;height:20px;background:#334;margin:0 4px;}

/* 左侧工具栏 */
#toolBar{position:fixed;left:0;top:40px;bottom:0;width:52px;background:#16213e;border-right:1px solid #0f3460;
  display:flex;flex-direction:column;padding:8px 4px;gap:4px;z-index:90;overflow-y:auto;}
.tool-group{display:flex;flex-direction:column;gap:3px;padding-bottom:6px;border-bottom:1px solid #0f3460;margin-bottom:2px;}
.tool-group:last-child{border-bottom:none;}
.tool-group-label{font-size:8px;color:#556;text-align:center;letter-spacing:1px;text-transform:uppercase;margin-bottom:2px;}
.tool-btn{width:44px;height:40px;border-radius:4px;border:1px solid transparent;background:transparent;
  cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;
  color:#888;font-size:9px;transition:all 0.1s;}
.tool-btn:hover{background:rgba(255,255,255,0.05);color:#bbb;}
.tool-btn.active{background:rgba(41,128,185,0.3);border-color:#2980b9;color:#fff;}
.tool-btn .t-icon{font-size:18px;line-height:1;}
.tool-btn .t-label{font-size:8px;opacity:0.7;}

/* 右侧属性面板 */
#propPanel{position:fixed;right:0;top:40px;bottom:0;width:200px;background:#16213e;border-left:1px solid #0f3460;
  padding:12px;z-index:90;overflow-y:auto;font-size:12px;}
.pp-section{margin-bottom:14px;}
.pp-title{font-size:11px;font-weight:600;color:#7fb3d8;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px;}
.pp-row{display:flex;align-items:center;gap:6px;margin-bottom:6px;}
.pp-label{width:60px;font-size:11px;color:#888;flex-shrink:0;}
.pp-value{font-size:11px;color:#bbb;width:36px;text-align:right;font-family:monospace;}
.pp-slider{flex:1;-webkit-appearance:none;height:4px;background:#334;border-radius:2px;outline:none;}
.pp-slider::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;background:#2980b9;border-radius:50%;cursor:pointer;}

/* 3D 视口 */
#viewport{position:fixed;left:52px;top:40px;right:200px;bottom:24px;}
#viewport canvas{display:block;width:100%;height:100%;}

/* 底部状态栏 */
#statusBar{position:fixed;left:52px;right:200px;bottom:0;height:24px;background:#16213e;border-top:1px solid #0f3460;
  display:flex;align-items:center;padding:0 12px;gap:16px;font-size:11px;color:#666;z-index:90;}
#statusBar .st-item{display:flex;gap:4px;}
#statusBar .st-val{color:#999;font-family:monospace;}

/* 鼠标光标信息 */
#cursorInfo{position:fixed;z-index:80;pointer-events:none;font-size:11px;color:#fff;background:rgba(0,0,0,0.7);
  padding:3px 8px;border-radius:4px;display:none;white-space:nowrap;}
</style>
</head>
<body>

<!-- 顶部菜单栏 -->
<div id="topBar">
  <div class="title">🗺️ 地形编辑器</div>
  <button class="tb-btn" id="btnNew">新建空白</button>
  <button class="tb-btn" id="btnLoadExisting">加载现有地形</button>
  <div class="sep"></div>
  <button class="tb-btn" id="btnLoadJSON">从文件加载</button>
  <button class="tb-btn primary" id="btnExport">导出 JSON</button>
  <div class="sep"></div>
  <button class="tb-btn" id="btnPreview3D">3D 预览</button>
  <button class="tb-btn" id="btnToggleGrid">网格线</button>
</div>

<!-- 左侧工具栏 -->
<div id="toolBar">
  <div class="tool-group">
    <div class="tool-group-label">高度</div>
    <button class="tool-btn active" data-tool="raise"><div class="t-icon">🔺</div><div class="t-label">抬高</div></button>
    <button class="tool-btn" data-tool="lower"><div class="t-icon">🔻</div><div class="t-label">降低</div></button>
    <button class="tool-btn" data-tool="flatten"><div class="t-icon">━</div><div class="t-label">平坦</div></button>
    <button class="tool-btn" data-tool="smooth"><div class="t-icon">〰</div><div class="t-label">平滑</div></button>
  </div>
  <div class="tool-group">
    <div class="tool-group-label">地形</div>
    <button class="tool-btn" data-tool="sand"><div class="t-icon">🏜</div><div class="t-label">沙地</div></button>
    <button class="tool-btn" data-tool="grass"><div class="t-icon">🌿</div><div class="t-label">草地</div></button>
    <button class="tool-btn" data-tool="snow"><div class="t-icon">❄</div><div class="t-label">雪地</div></button>
  </div>
  <div class="tool-group">
    <div class="tool-group-label">树木</div>
    <button class="tool-btn" data-tool="treeTropical"><div class="t-icon">🌴</div><div class="t-label">热带</div></button>
    <button class="tool-btn" data-tool="treePine"><div class="t-icon">🌲</div><div class="t-label">松树</div></button>
    <button class="tool-btn" data-tool="treeCoconut"><div class="t-icon">🥥</div><div class="t-label">椰树</div></button>
  </div>
  <div class="tool-group">
    <div class="tool-group-label">水系</div>
    <button class="tool-btn" data-tool="river"><div class="t-icon">🌊</div><div class="t-label">河流</div></button>
    <button class="tool-btn" data-tool="lake"><div class="t-icon">💧</div><div class="t-label">湖泊</div></button>
    <button class="tool-btn" data-tool="ocean"><div class="t-icon">🏖</div><div class="t-label">海洋</div></button>
  </div>
  <div class="tool-group">
    <div class="tool-group-label">道路</div>
    <button class="tool-btn" data-tool="road"><div class="t-icon">🛣</div><div class="t-label">道路</div></button>
  </div>
  <div class="tool-group">
    <div class="tool-group-label">放置</div>
    <button class="tool-btn" data-tool="placeStart"><div class="t-icon">🏁</div><div class="t-label">起点</div></button>
    <button class="tool-btn" data-tool="placeCheckpoint"><div class="t-icon">📍</div><div class="t-label">检查</div></button>
    <button class="tool-btn" data-tool="placeNPC"><div class="t-icon">🚗</div><div class="t-label">NPC</div></button>
    <button class="tool-btn" data-tool="placeTreasure"><div class="t-icon">📦</div><div class="t-label">宝箱</div></button>
  </div>
</div>

<!-- 右侧属性面板 -->
<div id="propPanel">
  <div class="pp-section">
    <div class="pp-title">画笔</div>
    <div class="pp-row">
      <span class="pp-label">大小</span>
      <input type="range" class="pp-slider" id="brushSize" min="5" max="80" value="25">
      <span class="pp-value" id="brushSizeVal">25</span>
    </div>
    <div class="pp-row">
      <span class="pp-label">强度</span>
      <input type="range" class="pp-slider" id="brushStrength" min="1" max="20" value="5">
      <span class="pp-value" id="brushStrengthVal">5</span>
    </div>
    <div class="pp-row">
      <span class="pp-label">树木密度</span>
      <input type="range" class="pp-slider" id="treeDensity" min="1" max="20" value="8">
      <span class="pp-value" id="treeDensityVal">8</span>
    </div>
  </div>
  <div class="pp-section">
    <div class="pp-title">海拔阶梯</div>
    <div class="pp-row">
      <span class="pp-label">阶梯1→2</span>
      <input type="range" class="pp-slider" id="tierA" min="5" max="40" value="20">
      <span class="pp-value" id="tierAVal">20m</span>
    </div>
    <div class="pp-row">
      <span class="pp-label">阶梯2→3</span>
      <input type="range" class="pp-slider" id="tierB" min="20" max="80" value="50">
      <span class="pp-value" id="tierBVal">50m</span>
    </div>
    <div class="pp-row" style="margin-top:4px;">
      <span class="pp-label" style="width:auto;font-size:10px;color:#666;">阶梯1: 沙地/草地 | 阶梯2: 沙地/草地 | 阶梯3: 雪地</span>
    </div>
  </div>
  <div class="pp-section">
    <div class="pp-title">光标信息</div>
    <div class="pp-row"><span class="pp-label">坐标</span><span class="pp-value" id="cursorPos" style="width:auto;">—</span></div>
    <div class="pp-row"><span class="pp-label">海拔</span><span class="pp-value" id="cursorAlt" style="width:auto;">—</span></div>
    <div class="pp-row"><span class="pp-label">阶梯</span><span class="pp-value" id="cursorTier" style="width:auto;">—</span></div>
    <div class="pp-row"><span class="pp-label">地形</span><span class="pp-value" id="cursorBiome" style="width:auto;">—</span></div>
  </div>
  <div class="pp-section">
    <div class="pp-title">地图信息</div>
    <div class="pp-row"><span class="pp-label">分辨率</span><span class="pp-value" id="mapRes" style="width:auto;">512×512</span></div>
    <div class="pp-row"><span class="pp-label">范围</span><span class="pp-value" id="mapRange" style="width:auto;">550m×550m</span></div>
  </div>
</div>

<!-- 底部状态栏 -->
<div id="statusBar">
  <div class="st-item">工具: <span class="st-val" id="stTool">抬高</span></div>
  <div class="st-item">FPS: <span class="st-val" id="stFPS">—</span></div>
  <div class="st-item">操作: 鼠标左键=编辑 | 中键/右键=平移 | 滚轮=缩放 | 空格=切视角</div>
</div>

<!-- 3D 视口 -->
<div id="viewport"></div>
<div id="cursorInfo"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';

// ============================================================
// CONSTANTS
// ============================================================
const HF_SIZE = 512;
const HF_WORLD = 550;
const HF_HALF = HF_WORLD / 2;
const MESH_SEG = 256; // 编辑器地形网格精度（比游戏高，看着更细腻）

// ============================================================
// MAP DATA — 核心数据结构
// ============================================================
const mapData = {
  heightMap: new Float32Array(HF_SIZE * HF_SIZE),  // 高度场
  biomeMap: new Uint8Array(HF_SIZE * HF_SIZE),      // 0=沙地,1=草地,2=雪地
  treeMap: new Uint8Array(HF_SIZE * HF_SIZE),        // 0=无,1=热带,2=松树,3=椰树
  waterMap: new Uint8Array(HF_SIZE * HF_SIZE),       // 0=无,1=河流,2=湖泊,3=海洋
  tierA: 20,  // 阶梯1→2分界海拔
  tierB: 50,  // 阶梯2→3分界海拔
  objects: [], // 放置的物体 [{type,x,z,...}]
  roads: [],   // 道路路径 [{points:[{x,z},...],width}]
};

// Biome 颜色
const BIOME_COLORS = [
  [0.85, 0.75, 0.55],  // 0=沙地
  [0.25, 0.52, 0.18],  // 1=草地
  [0.92, 0.94, 0.96],  // 2=雪地
];
const WATER_COLOR = [0.15, 0.45, 0.65];
const ICE_COLOR = [0.75, 0.88, 0.95];
const OCEAN_COLOR = [0.08, 0.25, 0.45];

// ============================================================
// NOISE — 复制自 offroad.html（确保和游戏一致）
// ============================================================
function _fade(t) { return t * t * t * (t * (t * 6 - 15) + 10); }
function _hash(px, py) { const h = px * 127.1 + py * 311.7; return (Math.sin(h) * 43758.5453123) % 1; }
function noise2D(x, y) {
  const ix = Math.floor(x), iy = Math.floor(y);
  const fx = x - ix, fy = y - iy;
  const ux = _fade(fx), uy = _fade(fy);
  const a = _hash(ix, iy), b = _hash(ix + 1, iy), c = _hash(ix, iy + 1), d = _hash(ix + 1, iy + 1);
  return ((a * (1 - ux) + b * ux) * (1 - uy) + (c * (1 - ux) + d * ux) * uy) * 2.0 - 1.0;
}
function fbm(x, y, octaves, lacunarity, gain) {
  let sum = 0, amp = 1, maxAmp = 0, px = x, py = y;
  for (let i = 0; i < octaves; i++) { sum += noise2D(px, py) * amp; maxAmp += amp; amp *= gain; px *= lacunarity; py *= lacunarity; }
  return sum / maxAmp;
}
function smoothstep(e0, e1, x) { const t = Math.max(0, Math.min(1, (x - e0) / (e1 - e0))); return t * t * (3 - 2 * t); }

// ============================================================
// GENERATE EXISTING TERRAIN — 复制offroad.html的地形生成逻辑
// ============================================================
const BIOME_TRANSITION = 0.22;
const SEA_LEVEL = -2.5;
const BIOME_SECTOR_ANGLES = { snow: -Math.PI / 2, desert: Math.PI / 4, jungle: Math.PI * 3 / 4 };
const BIOME_BASE = { desert: 0, jungle: 2, snow: 4 };

function _normAngle(a) { while (a > Math.PI) a -= Math.PI * 2; while (a < -Math.PI) a += Math.PI * 2; return a; }
function _biomeAngleNoise(angle, dist) {
  return noise2D(angle * 2.5 + 300, dist * 0.008 + 300) * 0.3 + noise2D(angle * 5.0 + 700, dist * 0.015 + 700) * 0.15;
}

const _bwResult = { snow: 0, desert: 0, jungle: 0 };
function getBiomeWeights(wx, wz) {
  const dist = Math.sqrt(wx * wx + wz * wz), angle = Math.atan2(wz, wx);
  const noiseScale = smoothstep(10, 60, dist);
  const aNoise = _biomeAngleNoise(angle, dist) * noiseScale;
  const dSnow = Math.abs(_normAngle(angle - BIOME_SECTOR_ANGLES.snow + aNoise));
  const dDesert = Math.abs(_normAngle(angle - BIOME_SECTOR_ANGLES.desert + aNoise * 0.8));
  const dJungle = Math.abs(_normAngle(angle - BIOME_SECTOR_ANGLES.jungle + aNoise * 1.1));
  const wSnow = Math.max(0, 1 - smoothstep(Math.PI/2 - BIOME_TRANSITION, Math.PI/2 + BIOME_TRANSITION, dSnow));
  const wDesert = Math.max(0, 1 - smoothstep(Math.PI/4 - BIOME_TRANSITION, Math.PI/4 + BIOME_TRANSITION, dDesert));
  const wJungle = Math.max(0, 1 - smoothstep(Math.PI/4 - BIOME_TRANSITION, Math.PI/4 + BIOME_TRANSITION, dJungle));
  const total = wSnow + wDesert + wJungle;
  if (total < 0.001) { _bwResult.snow = 0.5; _bwResult.desert = 0.25; _bwResult.jungle = 0.25; }
  else { _bwResult.snow = wSnow / total; _bwResult.desert = wDesert / total; _bwResult.jungle = wJungle / total; }
  return _bwResult;
}

// 雪丘数据（和 offroad.html 相同的种子）
const SNOW_HILLS = [];
{ let s = 777; function r() { s = (s * 16807) % 2147483647; return (s & 0x7fffffff) / 0x7fffffff; }
  const sd = BIOME_SECTOR_ANGLES.snow;
  for (let i = 0; i < 18; i++) { const a = sd + (r() - 0.5) * 1.4, d = 50 + r() * 160;
    SNOW_HILLS.push({ x: Math.cos(a)*d, z: Math.sin(a)*d, rx: 15+r()*25, rz: 15+r()*25, h: 3+r()*9, rot: r()*Math.PI });
  }
  for (const h of SNOW_HILLS) { h._boundR2 = Math.max(h.rx, h.rz)**2; h._cosR = Math.cos(h.rot); h._sinR = Math.sin(h.rot); }
}
function getSnowHillHeight(wx, wz) {
  let maxH = 0;
  for (const hill of SNOW_HILLS) {
    const dx = wx - hill.x, dz = wz - hill.z;
    if (dx * dx + dz * dz > hill._boundR2) continue;
    const lx = dx * hill._cosR + dz * hill._sinR, lz = -dx * hill._sinR + dz * hill._cosR;
    const d2 = (lx / hill.rx) ** 2 + (lz / hill.rz) ** 2;
    if (d2 >= 1) continue;
    const h = hill.h * (0.5 + 0.5 * Math.cos(Math.sqrt(d2) * Math.PI));
    if (h > maxH) maxH = h;
  }
  return maxH;
}

const ICE_CENTER_X = Math.cos(BIOME_SECTOR_ANGLES.snow) * 140;
const ICE_CENTER_Z = Math.sin(BIOME_SECTOR_ANGLES.snow) * 140;
const ICE_RADIUS = 85;

function generateExistingTerrain() {
  // 复制 offroad.html 的 _getTerrainHeightRaw 逻辑生成高度场
  for (let iz = 0; iz < HF_SIZE; iz++) {
    const wz = (iz / (HF_SIZE - 1)) * HF_WORLD - HF_HALF;
    for (let ix = 0; ix < HF_SIZE; ix++) {
      const wx = (ix / (HF_SIZE - 1)) * HF_WORLD - HF_HALF;
      const idx = iz * HF_SIZE + ix;

      const bw = getBiomeWeights(wx, wz);
      const distC = Math.sqrt(wx * wx + wz * wz);
      const flatF = Math.min(1, distC / 30);
      let h = 0;
      // 沙漠
      if (bw.desert > 0.05) {
        const beachH = BIOME_BASE.desert + Math.abs(fbm(wx*0.008, wz*0.008, 2, 2.0, 0.5)) * 1.8 + 0.3;
        const seaBedH = SEA_LEVEL - 1.5 - Math.abs(fbm(wx*0.005+200, wz*0.005+200, 2, 2.0, 0.5)) * 1.5;
        let dH;
        if (distC < 120) dH = beachH;
        else if (distC < 140) { const t = smoothstep(120, 140, distC); dH = beachH*(1-t) + (SEA_LEVEL+0.5)*t; }
        else if (distC < 200) { const t = smoothstep(140, 200, distC); dH = (SEA_LEVEL+0.5)*(1-t) + seaBedH*t; }
        else dH = seaBedH;
        h += dH * bw.desert;
      }
      // 雨林/草地
      if (bw.jungle > 0.05) {
        const n1 = Math.abs(fbm(wx*0.01-500, wz*0.01-500, 3, 2.0, 0.55)) * 5;
        const n2 = Math.abs(fbm(wx*0.04-500, wz*0.04-500, 2, 2.5, 0.4)) * 1.5;
        h += (BIOME_BASE.jungle + n1 + n2) * bw.jungle;
      }
      // 雪地
      if (bw.snow > 0.05) {
        const n1 = Math.abs(fbm(wx*0.006+500, wz*0.006+500, 3, 2.0, 0.5)) * 6;
        const n2 = Math.abs(fbm(wx*0.025+500, wz*0.025+500, 2, 2.5, 0.4)) * 2;
        let sH = BIOME_BASE.snow + n1 + n2 + getSnowHillHeight(wx, wz);
        h += sH * bw.snow;
      }
      h *= flatF;
      // 冰湖
      { const dx = wx - ICE_CENTER_X, dz = wz - ICE_CENTER_Z;
        const nx = dx / 1.4, nz = dz / 0.9, dN = Math.sqrt(nx*nx + nz*nz);
        const ia = Math.atan2(nz, nx), indent = 0.38 * Math.max(0, -Math.cos(ia)) * (1 + 0.3 * Math.sin(ia));
        const iR = ICE_RADIUS * (1 - indent), iL = BIOME_BASE.snow + 2.0;
        if (dN <= iR * 0.85) h = iL;
        else if (dN < iR * 2) { const t = smoothstep(iR * 0.85, iR * 2, dN); h = iL * (1-t) + h * t; }
      }
      mapData.heightMap[idx] = h;

      // Biome map: 主要biome → 0/1/2
      if (bw.snow >= bw.desert && bw.snow >= bw.jungle) mapData.biomeMap[idx] = 2; // 雪地
      else if (bw.jungle >= bw.desert) mapData.biomeMap[idx] = 1; // 草地
      else mapData.biomeMap[idx] = 0; // 沙地
    }
  }
}

function generateFlatTerrain() {
  mapData.heightMap.fill(0);
  mapData.biomeMap.fill(1); // 默认草地
  mapData.treeMap.fill(0);
  mapData.waterMap.fill(0);
  mapData.objects = [];
  mapData.roads = [];
}

// ============================================================
// THREE.JS SCENE — 编辑器3D场景
// ============================================================
const viewport = document.getElementById('viewport');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

// 正交相机（俯视）
const aspect = viewport.clientWidth / viewport.clientHeight;
const camSize = 300;
const camera = new THREE.OrthographicCamera(-camSize * aspect, camSize * aspect, camSize, -camSize, 0.1, 2000);
camera.position.set(0, 500, 0);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(viewport.clientWidth, viewport.clientHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
viewport.appendChild(renderer.domElement);

// 光照
const ambLight = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambLight);
const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(100, 200, 50);
scene.add(dirLight);

// 网格线
const gridHelper = new THREE.GridHelper(HF_WORLD, 20, 0x333355, 0x222244);
gridHelper.position.y = 0.05;
scene.add(gridHelper);

// 地形 mesh
const terrainGeo = new THREE.PlaneGeometry(HF_WORLD, HF_WORLD, MESH_SEG, MESH_SEG);
terrainGeo.rotateX(-Math.PI / 2);
const terrainMat = new THREE.MeshStandardMaterial({ vertexColors: true, roughness: 0.85, metalness: 0.0, side: THREE.DoubleSide });
const terrainMesh = new THREE.Mesh(terrainGeo, terrainMat);
scene.add(terrainMesh);

// 画笔预览圆
const brushGeo = new THREE.RingGeometry(0.95, 1, 64);
brushGeo.rotateX(-Math.PI / 2);
const brushMat = new THREE.MeshBasicMaterial({ color: 0x2980b9, transparent: true, opacity: 0.6, side: THREE.DoubleSide });
const brushMesh = new THREE.Mesh(brushGeo, brushMat);
brushMesh.position.y = 0.5;
brushMesh.visible = false;
scene.add(brushMesh);

// ============================================================
// TERRAIN MESH UPDATE — 从 mapData 更新顶点位置和颜色
// ============================================================
function updateTerrainMesh() {
  const pos = terrainGeo.attributes.position;
  const colors = new Float32Array(pos.count * 3);
  const segX = MESH_SEG + 1, segZ = MESH_SEG + 1;

  for (let iz = 0; iz < segZ; iz++) {
    for (let ix = 0; ix < segX; ix++) {
      const vi = iz * segX + ix;
      const wx = (ix / MESH_SEG) * HF_WORLD - HF_HALF;
      const wz = (iz / MESH_SEG) * HF_WORLD - HF_HALF;

      // 从高度场采样（双线性插值）
      const gx = (wx + HF_HALF) / HF_WORLD * (HF_SIZE - 1);
      const gz = (wz + HF_HALF) / HF_WORLD * (HF_SIZE - 1);
      const gxc = Math.max(0, Math.min(HF_SIZE - 2, gx));
      const gzc = Math.max(0, Math.min(HF_SIZE - 2, gz));
      const iix = gxc | 0, iiz = gzc | 0;
      const fx = gxc - iix, fz = gzc - iiz;
      const h00 = mapData.heightMap[iiz * HF_SIZE + iix];
      const h10 = mapData.heightMap[iiz * HF_SIZE + iix + 1];
      const h01 = mapData.heightMap[(iiz + 1) * HF_SIZE + iix];
      const h11 = mapData.heightMap[(iiz + 1) * HF_SIZE + iix + 1];
      const height = (h00 * (1-fx) + h10 * fx) * (1-fz) + (h01 * (1-fx) + h11 * fx) * fz;

      pos.setY(vi, height);

      // 颜色：从 biomeMap 采样（最近邻）
      const bix = Math.round(gxc), biz = Math.round(gzc);
      const biome = mapData.biomeMap[biz * HF_SIZE + bix];
      const water = mapData.waterMap[biz * HF_SIZE + bix];
      let r, g, b;
      if (water === 3) { // 海洋
        [r, g, b] = OCEAN_COLOR;
      } else if (water > 0) { // 河流/湖泊
        if (height >= mapData.tierB) [r, g, b] = ICE_COLOR; // 高海拔=冰面
        else [r, g, b] = WATER_COLOR;
      } else {
        [r, g, b] = BIOME_COLORS[biome] || BIOME_COLORS[0];
        // 高度明暗变化
        const bright = 0.85 + Math.min(height / 30, 0.3);
        r *= bright; g *= bright; b *= bright;
      }

      // 海拔阶梯边界线（可选）
      if (showTierLines) {
        const distA = Math.abs(height - mapData.tierA);
        const distB = Math.abs(height - mapData.tierB);
        if (distA < 0.5) { r = 1; g = 0.8; b = 0.2; }
        if (distB < 0.5) { r = 0.3; g = 0.7; b = 1; }
      }

      colors[vi * 3] = r;
      colors[vi * 3 + 1] = g;
      colors[vi * 3 + 2] = b;
    }
  }

  pos.needsUpdate = true;
  terrainGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  terrainGeo.computeVertexNormals();
}

let showTierLines = false;

// ============================================================
// EDITOR STATE
// ============================================================
let currentTool = 'raise';
let brushSizeVal = 25;
let brushStrengthVal = 5;
let isPainting = false;
let mouseWorld = new THREE.Vector3();
const raycaster = new THREE.Raycaster();
const mouseNDC = new THREE.Vector2();

// ============================================================
// CAMERA CONTROLS — 平移/缩放
// ============================================================
let camPanning = false;
let camLastX = 0, camLastY = 0;
const camTarget = new THREE.Vector3(0, 0, 0);

viewport.addEventListener('mousedown', (e) => {
  if (e.button === 0) {
    // 左键 = 编辑
    isPainting = true;
    applyBrush();
  } else if (e.button === 1 || e.button === 2) {
    // 中键/右键 = 平移
    camPanning = true;
    camLastX = e.clientX; camLastY = e.clientY;
  }
});
window.addEventListener('mouseup', (e) => {
  if (e.button === 0) isPainting = false;
  if (e.button === 1 || e.button === 2) camPanning = false;
});
viewport.addEventListener('mousemove', (e) => {
  updateMouseWorld(e);
  if (camPanning) {
    const dx = e.clientX - camLastX, dy = e.clientY - camLastY;
    const scale = (camera.right - camera.left) / viewport.clientWidth;
    camTarget.x -= dx * scale;
    camTarget.z -= dy * scale;
    camera.position.x = camTarget.x;
    camera.position.z = camTarget.z;
    camera.lookAt(camTarget);
    camLastX = e.clientX; camLastY = e.clientY;
  }
  if (isPainting) applyBrush();
});
viewport.addEventListener('wheel', (e) => {
  e.preventDefault();
  const zoomFactor = e.deltaY > 0 ? 1.1 : 0.9;
  camera.left *= zoomFactor; camera.right *= zoomFactor;
  camera.top *= zoomFactor; camera.bottom *= zoomFactor;
  camera.updateProjectionMatrix();
}, { passive: false });
viewport.addEventListener('contextmenu', (e) => e.preventDefault());

function updateMouseWorld(e) {
  const rect = viewport.getBoundingClientRect();
  mouseNDC.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  mouseNDC.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(mouseNDC, camera);
  const intersects = raycaster.intersectObject(terrainMesh);
  if (intersects.length > 0) {
    mouseWorld.copy(intersects[0].point);
    brushMesh.visible = true;
    brushMesh.position.x = mouseWorld.x;
    brushMesh.position.z = mouseWorld.z;
    brushMesh.position.y = mouseWorld.y + 0.3;
    brushMesh.scale.setScalar(brushSizeVal);
    // 更新光标信息
    document.getElementById('cursorPos').textContent = `${mouseWorld.x.toFixed(0)}, ${mouseWorld.z.toFixed(0)}`;
    document.getElementById('cursorAlt').textContent = `${mouseWorld.y.toFixed(1)}m`;
    const tier = mouseWorld.y >= mapData.tierB ? '3 (雪地)' : mouseWorld.y >= mapData.tierA ? '2 (中地)' : '1 (低地)';
    document.getElementById('cursorTier').textContent = tier;
    const bix = Math.round((mouseWorld.x + HF_HALF) / HF_WORLD * (HF_SIZE - 1));
    const biz = Math.round((mouseWorld.z + HF_HALF) / HF_WORLD * (HF_SIZE - 1));
    if (bix >= 0 && bix < HF_SIZE && biz >= 0 && biz < HF_SIZE) {
      const b = mapData.biomeMap[biz * HF_SIZE + bix];
      document.getElementById('cursorBiome').textContent = ['沙地', '草地', '雪地'][b] || '—';
    }
  } else {
    brushMesh.visible = false;
  }
}

// ============================================================
// BRUSH SYSTEM — 画笔应用
// ============================================================
function applyBrush() {
  if (!brushMesh.visible) return;
  const cx = mouseWorld.x, cz = mouseWorld.z;
  const radius = brushSizeVal;
  const strength = brushStrengthVal * 0.016; // dt ≈ 16ms

  // 计算高度场中受影响的范围
  const cellSize = HF_WORLD / (HF_SIZE - 1);
  const rCells = Math.ceil(radius / cellSize);
  const cix = Math.round((cx + HF_HALF) / cellSize);
  const ciz = Math.round((cz + HF_HALF) / cellSize);

  const tool = currentTool;

  // 高度工具
  if (tool === 'raise' || tool === 'lower' || tool === 'flatten' || tool === 'smooth') {
    const flattenH = tool === 'flatten' ? mapData.heightMap[Math.max(0, Math.min(HF_SIZE-1, ciz)) * HF_SIZE + Math.max(0, Math.min(HF_SIZE-1, cix))] : 0;

    for (let dz = -rCells; dz <= rCells; dz++) {
      for (let dx = -rCells; dx <= rCells; dx++) {
        const ix = cix + dx, iz = ciz + dz;
        if (ix < 0 || ix >= HF_SIZE || iz < 0 || iz >= HF_SIZE) continue;
        const wx = ix * cellSize - HF_HALF, wz = iz * cellSize - HF_HALF;
        const dist = Math.sqrt((wx - cx) ** 2 + (wz - cz) ** 2);
        if (dist > radius) continue;
        // 高斯衰减
        const falloff = Math.exp(-3 * (dist / radius) ** 2);
        const idx = iz * HF_SIZE + ix;

        if (tool === 'raise') mapData.heightMap[idx] += strength * falloff;
        else if (tool === 'lower') mapData.heightMap[idx] -= strength * falloff;
        else if (tool === 'flatten') mapData.heightMap[idx] += (flattenH - mapData.heightMap[idx]) * falloff * 0.3;
        else if (tool === 'smooth') {
          // 取周围4点平均
          let sum = 0, cnt = 0;
          for (const [ox, oz] of [[-1,0],[1,0],[0,-1],[0,1]]) {
            const ni = iz+oz, nj = ix+ox;
            if (ni >= 0 && ni < HF_SIZE && nj >= 0 && nj < HF_SIZE) { sum += mapData.heightMap[ni*HF_SIZE+nj]; cnt++; }
          }
          if (cnt > 0) mapData.heightMap[idx] += (sum/cnt - mapData.heightMap[idx]) * falloff * 0.5;
        }
      }
    }
    terrainDirty = true;
  }

  // Biome 画笔
  if (tool === 'sand' || tool === 'grass' || tool === 'snow') {
    const biomeVal = tool === 'sand' ? 0 : tool === 'grass' ? 1 : 2;
    for (let dz = -rCells; dz <= rCells; dz++) {
      for (let dx = -rCells; dx <= rCells; dx++) {
        const ix = cix + dx, iz = ciz + dz;
        if (ix < 0 || ix >= HF_SIZE || iz < 0 || iz >= HF_SIZE) continue;
        const wx = ix * cellSize - HF_HALF, wz = iz * cellSize - HF_HALF;
        const dist = Math.sqrt((wx - cx) ** 2 + (wz - cz) ** 2);
        if (dist > radius) continue;
        const idx = iz * HF_SIZE + ix;
        // 海拔阶梯约束
        const h = mapData.heightMap[idx];
        if (biomeVal === 2 && h < mapData.tierB) continue; // 雪地只能在阶梯3
        if (biomeVal !== 2 && h >= mapData.tierB) continue; // 阶梯3只能涂雪地
        mapData.biomeMap[idx] = biomeVal;
      }
    }
    terrainDirty = true;
  }

  // 水系画笔
  if (tool === 'lake' || tool === 'ocean') {
    const waterVal = tool === 'lake' ? 2 : 3;
    for (let dz = -rCells; dz <= rCells; dz++) {
      for (let dx = -rCells; dx <= rCells; dx++) {
        const ix = cix + dx, iz = ciz + dz;
        if (ix < 0 || ix >= HF_SIZE || iz < 0 || iz >= HF_SIZE) continue;
        const wx = ix * cellSize - HF_HALF, wz = iz * cellSize - HF_HALF;
        const dist = Math.sqrt((wx - cx) ** 2 + (wz - cz) ** 2);
        if (dist > radius) continue;
        const idx = iz * HF_SIZE + ix;
        mapData.waterMap[idx] = waterVal;
        // 海洋强制海拔0
        if (waterVal === 3) mapData.heightMap[idx] = 0;
      }
    }
    terrainDirty = true;
  }
}

let terrainDirty = true;

// ============================================================
// TOOL SELECTION
// ============================================================
const toolNames = { raise:'抬高', lower:'降低', flatten:'平坦', smooth:'平滑',
  sand:'沙地', grass:'草地', snow:'雪地',
  treeTropical:'热带树', treePine:'松树', treeCoconut:'椰树',
  river:'河流', lake:'湖泊', ocean:'海洋', road:'道路',
  placeStart:'起点', placeCheckpoint:'检查点', placeNPC:'NPC', placeTreasure:'宝箱' };

document.querySelectorAll('.tool-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTool = btn.dataset.tool;
    document.getElementById('stTool').textContent = toolNames[currentTool] || currentTool;
  });
});

// ============================================================
// UI CONTROLS
// ============================================================
document.getElementById('brushSize').addEventListener('input', (e) => {
  brushSizeVal = parseInt(e.target.value);
  document.getElementById('brushSizeVal').textContent = brushSizeVal;
});
document.getElementById('brushStrength').addEventListener('input', (e) => {
  brushStrengthVal = parseInt(e.target.value);
  document.getElementById('brushStrengthVal').textContent = brushStrengthVal;
});
document.getElementById('tierA').addEventListener('input', (e) => {
  mapData.tierA = parseInt(e.target.value);
  document.getElementById('tierAVal').textContent = mapData.tierA + 'm';
  terrainDirty = true;
});
document.getElementById('tierB').addEventListener('input', (e) => {
  mapData.tierB = parseInt(e.target.value);
  document.getElementById('tierBVal').textContent = mapData.tierB + 'm';
  terrainDirty = true;
});

// 顶部按钮
document.getElementById('btnNew').addEventListener('click', () => {
  if (confirm('创建空白地图？当前编辑内容将丢失。')) { generateFlatTerrain(); terrainDirty = true; }
});
document.getElementById('btnLoadExisting').addEventListener('click', () => {
  if (confirm('加载游戏现有地形？当前编辑内容将丢失。')) {
    console.time('generateExisting');
    generateExistingTerrain();
    console.timeEnd('generateExisting');
    terrainDirty = true;
  }
});
document.getElementById('btnToggleGrid').addEventListener('click', () => {
  showTierLines = !showTierLines;
  gridHelper.visible = !gridHelper.visible;
  terrainDirty = true;
});

// 导出 JSON
document.getElementById('btnExport').addEventListener('click', () => {
  // 将 Float32Array / Uint8Array 转为 Base64
  const encode = (arr) => btoa(String.fromCharCode(...new Uint8Array(arr.buffer)));
  const data = {
    version: 1,
    hfSize: HF_SIZE, hfWorld: HF_WORLD,
    heightMap: encode(mapData.heightMap),
    biomeMap: encode(mapData.biomeMap),
    treeMap: encode(mapData.treeMap),
    waterMap: encode(mapData.waterMap),
    tierA: mapData.tierA, tierB: mapData.tierB,
    objects: mapData.objects,
    roads: mapData.roads,
  };
  const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'map.json';
  a.click();
});

// 从文件加载 JSON
document.getElementById('btnLoadJSON').addEventListener('click', () => {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.addEventListener('change', () => {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        const decode = (b64, Type) => new Type(Uint8Array.from(atob(b64), c => c.charCodeAt(0)).buffer);
        if (data.heightMap) mapData.heightMap.set(decode(data.heightMap, Float32Array));
        if (data.biomeMap) mapData.biomeMap.set(decode(data.biomeMap, Uint8Array));
        if (data.treeMap) mapData.treeMap.set(decode(data.treeMap, Uint8Array));
        if (data.waterMap) mapData.waterMap.set(decode(data.waterMap, Uint8Array));
        if (data.tierA) { mapData.tierA = data.tierA; document.getElementById('tierA').value = data.tierA; document.getElementById('tierAVal').textContent = data.tierA + 'm'; }
        if (data.tierB) { mapData.tierB = data.tierB; document.getElementById('tierB').value = data.tierB; document.getElementById('tierBVal').textContent = data.tierB + 'm'; }
        if (data.objects) mapData.objects = data.objects;
        if (data.roads) mapData.roads = data.roads;
        terrainDirty = true;
        console.log('[Editor] 地图加载成功');
      } catch(e) { alert('加载失败: ' + e.message); }
    };
    reader.readAsText(file);
  });
  input.click();
});

// ============================================================
// RENDER LOOP
// ============================================================
let _fpsFrames = 0, _fpsLast = performance.now();

function animate() {
  requestAnimationFrame(animate);

  // FPS
  _fpsFrames++;
  const now = performance.now();
  if (now - _fpsLast > 500) {
    document.getElementById('stFPS').textContent = Math.round(_fpsFrames / ((now - _fpsLast) / 1000));
    _fpsFrames = 0; _fpsLast = now;
  }

  // 更新地形 mesh（仅在数据变脏时）
  if (terrainDirty) {
    updateTerrainMesh();
    terrainDirty = false;
  }

  renderer.render(scene, camera);
}

// 初始化：加载现有地形
console.time('init');
generateExistingTerrain();
console.timeEnd('init');
updateTerrainMesh();
terrainDirty = false;
animate();

// 窗口 resize
window.addEventListener('resize', () => {
  const w = viewport.clientWidth, h = viewport.clientHeight;
  const aspect = w / h;
  const halfH = (camera.top - camera.bottom) / 2;
  camera.left = -halfH * aspect; camera.right = halfH * aspect;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
});

</script>
