// ---- 差速锁切换 ----
let _diffLockTipTimer = 0;
function toggleDiffLock() {
  if (Math.abs(car.speed) > 0.5) {
    UI.messages.showDiffLockTip('差速锁可以提高越野能力，但需在停车时切换');
    return;
  }
  car.diffLock = !car.diffLock;
  if (car.diffLock && car.gear > 3) car.gear = 3;
  UI.diffLock.updateBtn();
}
window.toggleDiffLock = toggleDiffLock;

const keys = {};
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  resumeAudio(); // 首次按键时激活音频（浏览器要求用户交互）
  // Enter 键切换车辆
  if (e.code === 'Enter') {
    const ids = Object.keys(VEHICLES);
    const nextIdx = (ids.indexOf(currentVehicleId) + 1) % ids.length;
    switchVehicle(ids[nextIdx]);
  }
  // L 键切换差速锁
  if (e.code === 'KeyL') toggleDiffLock();
  // R 键重置（随时生效，不仅是翻车时）
  if (e.code === 'KeyR') {
    if (typeof gameOver !== 'undefined' && gameOver) {
      resetGame(); return;
    }
    // 重置车辆状态
    car.bodyRoll = 0; car.rollVel = 0;
    car.bodyPitch = 0; car.pitchVel = 0;
    car.isInFlip = false;
    car.springFL = car.springFR = car.springBL = car.springBR = 0;
    car.springVelFL = car.springVelFR = car.springVelBL = car.springVelBR = 0;
    car.loadTransferPitch = 0; car.loadTransferRoll = 0;
    car.speed = 0; car.gear = 0; car.rpm = RPM_IDLE; car.rollStoppedTime = 0;
    // 寻找附近最平坦的位置重生
    let bestX = car.pos.x, bestZ = car.pos.z, bestSlope = Infinity;
    const searchR = 15; // 搜索半径15m
    const searchStep = 3;
    for (let dx = -searchR; dx <= searchR; dx += searchStep) {
      for (let dz = -searchR; dz <= searchR; dz += searchStep) {
        const tx = car.pos.x + dx, tz = car.pos.z + dz;
        // 排除水下位置
        if (typeof getWaterDepth === 'function' && getWaterDepth(tx, tz) > 0.1) continue;
        // 计算坡度（用四点差分）
        const eps = 1.0;
        const hC = getTerrainHeight(tx, tz);
        const hL = getTerrainHeight(tx - eps, tz);
        const hR = getTerrainHeight(tx + eps, tz);
        const hF = getTerrainHeight(tx, tz - eps);
        const hB = getTerrainHeight(tx, tz + eps);
        const slopeX = Math.abs(hR - hL) / (2 * eps);
        const slopeZ = Math.abs(hB - hF) / (2 * eps);
        const slope = slopeX + slopeZ;
        if (slope < bestSlope) {
          bestSlope = slope; bestX = tx; bestZ = tz;
        }
      }
    }
    car.pos.x = bestX;
    car.pos.z = bestZ;
    // 断开拖拽绳
    if (typeof towState !== 'undefined' && towState.active) endTow(false);
  }
});
document.addEventListener('keyup', e => { keys[e.code] = false; });
// 窗口失焦时清理所有按键状态（防止按键粘住）
window.addEventListener('blur', () => { for (const k in keys) keys[k] = false; });
document.addEventListener('visibilitychange', () => { if (document.hidden) for (const k in keys) keys[k] = false; });

// ============================================================
// PHYSICS
// ============================================================
function updatePhysics(dt) {
  dt = Math.min(dt, 0.05);

  // 翻车判定
  const isFlippedInput = car.isInFlip;

  if (!isFlippedInput) {
    // 支持模拟量输入（手机摇杆）和数字输入（键盘）
    const tc = UI.touchControls;
    const joyThrottle = tc.enabled ? tc._getThrottle() : 0;
    const joyReverse = tc.enabled ? tc._getReverse() : 0;
    car.throttle = Math.max((keys['ArrowUp'] || keys['KeyW']) ? 1 : 0, joyThrottle);
    car.reverse = Math.max((keys['ArrowDown'] || keys['KeyS']) ? 1 : 0, joyReverse);
    car.handbrake = !!keys['Space'];
  } else {
    car.throttle = 0;
    car.reverse = 0;
    car.handbrake = false;
  }

  // ---- Steering ----
  let steerTarget = 0;
  if (!isFlippedInput) {
    if (keys['ArrowLeft'] || keys['KeyA']) steerTarget = 1;
    if (keys['ArrowRight'] || keys['KeyD']) steerTarget = -1;
    // 手机摇杆模拟量转向（覆盖键盘）
    const tc = UI.touchControls;
    if (tc.enabled && tc.joyActive) {
      const joySteer = tc._getSteer();
      if (Math.abs(joySteer) > 0.01) steerTarget = joySteer;
    }
  }

  const steerLerp = 15 * dt;
  car.steer += (steerTarget - car.steer) * Math.min(steerLerp, 1);
  if (steerTarget === 0) {
    car.steer *= Math.max(1 - 18 * dt, 0);
    if (Math.abs(car.steer) < 0.005) car.steer = 0;
  }
  car.steer = Math.max(-1, Math.min(1, car.steer));

  // ---- Auto transmission ----
  // 升挡基于车速而非RPM（彻底避免一帧内连升多挡的bug）
  // 每个挡位对应一个最低车速门槛，超过就升挡，低于就降挡
  // 升挡门槛拉大：1挡持续到20km/h才升2挡，逐级递增
  const GEAR_SPEED_UP   = [0, 0, 20, 40, 60, 80, 100]; // km/h
  const GEAR_SPEED_DOWN = [0, 0, 12, 28, 45, 65, 85];  // km/h 降挡（有滞后）
  const REV_SPEED_UP    = [0, 15]; // R1→R2 at 15km/h
  const REV_SPEED_DOWN  = [0, 8];  // R2→R1 at 8km/h
  const kmh = Math.abs(car.speed) * 3.6;

  // 前进挡：W键
  if (car.throttle > 0 && car.gear >= 0) {
    if (car.speed < -0.3) {
      // 车还在倒着走，不切前进挡
    } else {
      if (car.gear === 0) car.gear = 1;
      else if (car.gear < (car.diffLock ? 3 : 6) && kmh > GEAR_SPEED_UP[car.gear]) car.gear++;
      else if (car.gear > 1 && kmh < GEAR_SPEED_DOWN[car.gear]) car.gear--;
    }
  }
  // 倒挡：S键
  if (car.reverse > 0 && car.gear <= 0) {
    if (car.speed > 0.3) {
      // 车还在前进，不切倒挡
    } else {
      if (car.gear === 0) car.gear = -1;
      else if (car.gear === -1 && kmh > REV_SPEED_UP[1]) car.gear = -2;
      else if (car.gear === -2 && kmh < REV_SPEED_DOWN[1]) car.gear = -1;
    }
  }
  // 车速很低时强制回1挡/R1
  if (car.gear > 1 && kmh < 3) car.gear = 1;
  if (car.gear < -1 && kmh < 3) car.gear = -1;
  // 松开所有油门 + 车速很低 → 回N挡
  if (car.throttle === 0 && car.reverse === 0 && Math.abs(car.speed) < 0.1) car.gear = 0;
  // W键按下时如果在倒挡且车快停了 → 切前进1挡
  if (car.throttle > 0 && car.gear < 0 && car.speed > -0.3) car.gear = 1;
  // S键按下时如果在前进挡且车快停了 → 切倒R1挡
  if (car.reverse > 0 && car.gear > 0 && car.speed < 0.3) car.gear = -1;

  // ---- RPM ----
  let wheelRPS = Math.abs(car.speed) / (Math.PI * 2 * Math.max(wheelRadius, 0.3));
  let currentRatio = 0;
  if (car.gear > 0) currentRatio = GEAR_RATIOS[car.gear] * FINAL_DRIVE;
  else if (car.gear <= -1) currentRatio = REVERSE_RATIOS[Math.abs(car.gear)] * FINAL_DRIVE;

  const activeThrottle = car.gear >= 0 ? car.throttle : car.reverse;
  if (currentRatio > 0) {
    car.rpm = RPM_IDLE + wheelRPS * currentRatio * 60;
    if (activeThrottle > 0 && Math.abs(car.speed) < 2) car.rpm = Math.max(car.rpm, RPM_IDLE + activeThrottle * 1500);
  } else {
    car.rpm = RPM_IDLE + Math.max(car.throttle, car.reverse) * 1500;
  }
  car.rpm = Math.min(car.rpm, RPM_REDLINE);
  car.rpm = Math.max(car.rpm, RPM_IDLE);

  // ---- Drive force ----
  // 差速锁模式：不再放大扭矩，改为无视地面阻力
  const transferRatio = 1.0;
  let driveF = 0;
  if (car.gear > 0 && car.throttle > 0 && currentRatio > 0) {
    const torque = ENGINE_TORQUE_PEAK * engineTorqueCurve(car.rpm) * car.throttle;
    const wheelTorque = torque * currentRatio * transferRatio * 0.85;
    driveF = wheelTorque / Math.max(wheelRadius, 0.3);
  } else if (car.gear < 0 && car.reverse > 0 && currentRatio > 0) {
    const torque = ENGINE_TORQUE_PEAK * engineTorqueCurve(car.rpm) * car.reverse;
    const wheelTorque = torque * currentRatio * transferRatio * 0.85;
    driveF = -wheelTorque / Math.max(wheelRadius, 0.3);
  }

  // ---- 手刹 ----
  if (car.handbrake && Math.abs(car.speed) > 0.05) {
    driveF += -Math.sign(car.speed) * HANDBRAKE_FORCE;
  }

  // ---- 对向操作刹车：前进中按S / 倒车中按W → 当刹车用 ----
  if (car.reverse > 0 && car.speed > 0.3) {
    driveF += -BRAKE_FORCE * car.reverse;
  }
  if (car.throttle > 0 && car.speed < -0.3) {
    driveF += BRAKE_FORCE * car.throttle;
  }

  // ---- 自动刹车：不按W也不按S → 自动减速 ----
  const AUTO_BRAKE_FORCE = 10000;
  if (car.throttle === 0 && car.reverse === 0 && !car.handbrake && Math.abs(car.speed) > 0.01) {
    driveF += -Math.sign(car.speed) * AUTO_BRAKE_FORCE;
  }

  // ---- 坡度力：上坡减速，下坡加速 ----
  // 沿车头方向采样地形高度差，计算坡度分量
  const slopeEps = 0.5;
  const hFront = getTerrainHeight(
    car.pos.x + Math.sin(car.heading) * slopeEps,
    car.pos.z + Math.cos(car.heading) * slopeEps
  );
  const hBack = getTerrainHeight(
    car.pos.x - Math.sin(car.heading) * slopeEps,
    car.pos.z - Math.cos(car.heading) * slopeEps
  );
  const slopeAngle = Math.atan2(hFront - hBack, slopeEps * 2); // 正=上坡
  // 重力沿坡面分量：m*g*sin(slope)，前进时上坡为阻力
  const slopeF = -MASS * GRAVITY * Math.sin(slopeAngle);

  // ---- 地形物理：biome抓地力 + 阻力 ----
  const surface = getSurfaceProperties(car.pos.x, car.pos.z);
  car._surfaceGrip = surface.grip;
  // 差速锁模式：大幅降低地面阻力（保留15%防止坡道自动滑行）
  const rawTerrainDrag = surface.drag * Math.abs(car.speed) * MASS * 0.1;
  const terrainDragF = car.diffLock ? rawTerrainDrag * 0.15 : rawTerrainDrag;
  const gripScale = car.diffLock ? 1.0 : surface.grip;
  const effectiveDriveF = driveF * gripScale;

  const dragF = DRAG * car.speed * Math.abs(car.speed);
  const rollResistF = car.speed !== 0 ? ROLL_RESIST * Math.sign(car.speed) : 0;
  const terrainDragDir = car.speed !== 0 ? -Math.sign(car.speed) * terrainDragF : 0;
  const netF = effectiveDriveF - dragF - rollResistF + slopeF + terrainDragDir;

  // 差速锁：最高3档，靠档位自然限制速度
  const effectiveMaxSpeed = car.diffLock ? MAX_SPEED * 0.45 : MAX_SPEED;
  const effectiveMaxReverse = car.diffLock ? MAX_REVERSE * 0.5 : MAX_REVERSE;

  car.prevSpeed = car.speed;
  car.speed += (netF / DRIVE_MASS) * dt;
  if (car.speed > effectiveMaxSpeed * gripScale) car.speed = effectiveMaxSpeed * gripScale;
  if (car.speed < -effectiveMaxReverse) car.speed = -effectiveMaxReverse;

  // 低速快速停车（不踩任何油门时）
  if (car.throttle === 0 && car.reverse === 0 && Math.abs(car.speed) < 1.5) {
    car.speed *= 0.65;
    if (Math.abs(car.speed) < 0.05) car.speed = 0;
  }
  if (car.handbrake && Math.abs(car.speed) < 0.6) {
    car.speed *= 0.5;
    if (Math.abs(car.speed) < 0.05) car.speed = 0;
  }

  // 翻车时快速减速
  if (isFlippedInput) {
    car.speed *= Math.max(1 - 4 * dt, 0);
    if (Math.abs(car.speed) < 0.1) car.speed = 0;
  }

  car.accel = (car.speed - car.prevSpeed) / Math.max(dt, 0.001);

  // ---- Steering（自行车模型，受抓地力影响）----
  const wheelAngle = car.steer * MAX_STEER_ANGLE;
  const tanSteer = Math.tan(wheelAngle);
  // 抓地力影响转向响应：冰面上转方向盘但车不跟
  const steerGrip = car._surfaceGrip !== undefined ? car._surfaceGrip : 1;
  const headingRate = (car.speed * tanSteer * steerGrip) / WHEELBASE;
  car.heading += headingRate * dt;
  car.lateralAccel = headingRate * car.speed;

  // ---- 冰面漂移：速度方向角(velAngle)在冰面上慢速追向车头方向 ----
  if (car._surfaceGrip !== undefined && car._surfaceGrip < 0.6) {
    // 冰面：速度方向缓慢对齐车头，产生漂移感
    const lagFactor = car._surfaceGrip * 2.8;
    let vd = car.heading - car.velAngle;
    while (vd > Math.PI) vd -= Math.PI * 2;
    while (vd < -Math.PI) vd += Math.PI * 2;
    car.velAngle += vd * Math.min(1, lagFactor * dt);
  } else {
    car.velAngle = car.heading; // 普通路面：瞬时对齐，无漂移
  }
  car.pos.x += Math.sin(car.velAngle) * car.speed * dt;
  car.pos.z += Math.cos(car.velAngle) * car.speed * dt;

  // ================================================================
  // 硬桥悬架 — 载荷转移计算（惯性力 → 弹簧压缩位移）
  // ================================================================
  // 直接用加速度（G值）× 增益 = 弹簧压缩量（米）
  // accel > 0 = 加速 → 后轴加载(压缩) / 前轴卸载(伸展) → 车头抬
  // accel < 0 = 刹车 → 前轴加载(压缩) / 后轴卸载(伸展) → 车头沉
  const accelG = car.accel / GRAVITY; // 加速度归一化为G值
  const lateralG = car.lateralAccel / GRAVITY;

  // 目标载荷转移（直接是弹簧位移量，单位m）
  // pitch: 正值=前轴压缩（刹车时accel<0 → targetLTPitch>0 → 前轮压缩）
  const targetLTPitch = -accelG * LT_GAIN_PITCH * MAX_COMPRESS;
  // roll: 正值=右侧压缩（左转时lateralAccel>0）
  const targetLTRoll = lateralG * LT_GAIN_ROLL * MAX_COMPRESS;

  const ltSmooth = Math.min(1, LOAD_TRANSFER_SMOOTH * dt);
  car.loadTransferPitch += (targetLTPitch - car.loadTransferPitch) * ltSmooth;
  car.loadTransferRoll += (targetLTRoll - car.loadTransferRoll) * ltSmooth;

  // 翻车时物理上也保持载荷转移（但会因为速度降低自然归零）

  // ================================================================
  // ROLL + PITCH — 物理驱动 + 翻车判定（含随机前后翻）
  // ================================================================
  const criticalAngle = Math.atan2(HALF_TRACK_WIDTH, CG_HEIGHT);
  const roll = car.bodyRoll;
  const absRoll = Math.abs(roll);
  const rollSign = roll >= 0 ? 1 : -1;
  const isFlipped = car.isInFlip || absRoll > criticalAngle;

  if (!isFlipped) {
    // ====== 正常行驶：悬架侧倾物理 ======
    const lateralForceTorque = car.lateralAccel * MASS * CG_HEIGHT * Math.cos(roll);
    const d = HALF_TRACK_WIDTH * Math.cos(absRoll) - CG_HEIGHT * Math.sin(absRoll);
    const gravityTorque = -MASS * GRAVITY * d * rollSign;
    const suspTorque = -roll * SUSP_ROLL_STIFF - car.rollVel * SUSP_ROLL_DAMP;

    const totalTorque = lateralForceTorque + gravityTorque + suspTorque;
    car.rollVel += (totalTorque / ROLL_INERTIA) * dt;
    car.bodyRoll += car.rollVel * dt;

    // bodyPitch 在正常行驶时保持归零（由悬架弹簧系统驱动视觉pitch）
    car.bodyPitch *= Math.max(1 - 10 * dt, 0);
    car.pitchVel *= Math.max(1 - 10 * dt, 0);

    // 检查是否触发翻车
    if (Math.abs(car.bodyRoll) > criticalAngle) {
      car.isInFlip = true;
      // ---- 翻车触发时注入随机扰动 ----
      // 根据当前速度决定扰动强度（高速翻车更混乱）
      const speedFactor = Math.min(Math.abs(car.speed) / MAX_SPEED, 1);
      // 随机 pitch 角速度（前后翻）：速度越快越剧烈
      car.pitchVel = (Math.random() - 0.5) * 2 * FLIP_PITCH_RANDOM * (0.3 + 0.7 * speedFactor);
      // 在原有 roll 速度上叠加一点随机（让翻车方向不完全对称）
      car.rollVel += (Math.random() - 0.5) * FLIP_ROLL_RANDOM * speedFactor;
    }

    // 微抖归零
    if (Math.abs(car.bodyRoll) < 0.003 && Math.abs(car.rollVel) < 0.01) {
      car.bodyRoll = 0;
      car.rollVel = 0;
    }
  } else {
    // ====== 翻车中：roll + pitch 双轴物理 ======
    car.isInFlip = true;

    // ---- 地形采样 ----
    const slopeEps = 1.0;
    const sinHead = Math.sin(car.heading), cosHead = Math.cos(car.heading);
    const hRight = getTerrainHeight(car.pos.x + cosHead * slopeEps, car.pos.z - sinHead * slopeEps);
    const hLeft  = getTerrainHeight(car.pos.x - cosHead * slopeEps, car.pos.z + sinHead * slopeEps);
    const hFwd   = getTerrainHeight(car.pos.x + sinHead * slopeEps, car.pos.z + cosHead * slopeEps);
    const hBack  = getTerrainHeight(car.pos.x - sinHead * slopeEps, car.pos.z - cosHead * slopeEps);
    const terrainSlopeRoll = Math.atan2(hRight - hLeft, slopeEps * 2);
    const terrainSlopePitch = Math.atan2(hFwd - hBack, slopeEps * 2);

    // ---- ROLL 物理 ----
    {
      const effectiveRoll = car.bodyRoll + terrainSlopeRoll;
      const absEffective = Math.abs(effectiveRoll);
      let gravityTorque = 0;
      if (absRoll < Math.PI / 2) {
        const dd = HALF_TRACK_WIDTH * Math.cos(absEffective) - CG_HEIGHT * Math.sin(absEffective);
        gravityTorque = -MASS * GRAVITY * dd * rollSign;
      } else {
        const adj = absRoll - Math.PI / 2;
        const dd = CAR_HALF_HEIGHT * Math.cos(adj) - CAR_HALF_WIDTH * Math.sin(adj);
        gravityTorque = -MASS * GRAVITY * dd * rollSign * 0.5;
      }
      const slopeTorque = MASS * GRAVITY * Math.sin(terrainSlopeRoll) * CG_HEIGHT * 0.5;
      const frictionMul = absRoll > Math.PI / 2 ? 2.0 : 1.2;
      const frictionTorque = -car.rollVel * GROUND_FRICTION_TORQUE * frictionMul;
      // roll-pitch 耦合：pitch 运动会通过惯性耦合影响 roll（让翻滚更混乱）
      const couplingTorque = car.pitchVel * car.rollVel * ROLL_INERTIA * 0.15;

      const totalTorque = gravityTorque + slopeTorque + frictionTorque + couplingTorque;
      car.rollVel += (totalTorque / ROLL_INERTIA) * dt;
      car.bodyRoll += car.rollVel * dt;
    }

    // ---- PITCH 物理 ----
    {
      const absPitch = Math.abs(car.bodyPitch);
      const pitchSign = car.bodyPitch >= 0 ? 1 : -1;
      const halfWB = WHEELBASE / 2;

      const effectivePitch = car.bodyPitch + terrainSlopePitch;
      const absEffPitch = Math.abs(effectivePitch);

      // 重力力矩（前后方向）
      let gravityTorque = 0;
      if (absPitch < Math.PI / 2) {
        const dd = halfWB * Math.cos(absEffPitch) - CG_HEIGHT * Math.sin(absEffPitch);
        gravityTorque = -MASS * GRAVITY * dd * pitchSign;
      } else {
        const adj = absPitch - Math.PI / 2;
        const dd = CAR_HALF_HEIGHT * Math.cos(adj) - halfWB * Math.sin(adj);
        gravityTorque = -MASS * GRAVITY * dd * pitchSign * 0.5;
      }

      const slopeTorque = MASS * GRAVITY * Math.sin(terrainSlopePitch) * CG_HEIGHT * 0.5;
      const frictionMul = absPitch > Math.PI / 2 ? 2.5 : 1.5;
      const frictionTorque = -car.pitchVel * GROUND_FRICTION_TORQUE * frictionMul;
      // pitch-roll 耦合
      const couplingTorque = -car.pitchVel * car.rollVel * PITCH_INERTIA * 0.15;

      const totalTorque = gravityTorque + slopeTorque + frictionTorque + couplingTorque;
      car.pitchVel += (totalTorque / PITCH_INERTIA) * dt;
      car.bodyPitch += car.pitchVel * dt;
    }

    // 限制最大角度
    if (Math.abs(car.bodyRoll) > Math.PI) {
      car.bodyRoll = Math.sign(car.bodyRoll) * Math.PI;
      car.rollVel *= -0.15;
    }
    if (Math.abs(car.bodyPitch) > Math.PI * 0.75) {
      car.bodyPitch = Math.sign(car.bodyPitch) * Math.PI * 0.75;
      car.pitchVel *= -0.15;
    }

    // 动能耗散
    if (Math.abs(car.rollVel) < 0.12) car.rollVel *= 0.8;
    if (Math.abs(car.pitchVel) < 0.12) car.pitchVel *= 0.8;
  }

  // 翻车UI计时（roll + pitch 角速度都接近静止）
  if (car.isInFlip && Math.abs(car.rollVel) < 0.2 && Math.abs(car.pitchVel) < 0.2) {
    car.rollStoppedTime += dt;
  } else if (!car.isInFlip) {
    car.rollStoppedTime = 0;
  }
}

let currentVehicleId = 'haval_h9';
const DEBUG_LIGHTS = false; // 灯光调试模式（true时显示滑块+强制夜晚+自由视角）

// ============================================================
// MODEL
// ============================================================
let truckModel = null;
let truckGroup = null;
let wheelFL = null, wheelFR = null, wheelBL = null, wheelBR = null;
let wheelRadius = 0.4;
let modelReady = false;
let wheelPivotRestPos = {};
let modelCenterOffset = new THREE.Vector3();
let wheelSpinAxis = new THREE.Vector3(1, 0, 0); // 轮子滚动轴（默认X轴，可被车辆配置覆盖）
let wheelSpinFlip = 1; // 轮子旋转方向（1=正常，-1=翻转）
let suspensionScale = 1.0; // 悬架视觉幅度缩放

const carLights = {
  installed: false,
  lowBeam: false, highBeam: false, autoOn: false,
  headHighL: null, headHighR: null, headLowL: null, headLowR: null,
  headGlows: [], headPointL: null, headPointR: null,
  tailRunL: null, tailRunR: null, tailBrakeL: null, tailBrakeR: null,
  tailGlows: [],
  headMat: null, tailMat: null,
};

// ---- 释放当前车辆所有资源 ----
function disposeCurrentVehicle() {
  modelReady = false;
  carLights.installed = false;
  // 释放灯光引用
  carLights.headHighL = carLights.headHighR = carLights.headLowL = carLights.headLowR = null;
  carLights.headPointL = carLights.headPointR = null;
  carLights.tailRunL = carLights.tailRunR = carLights.tailBrakeL = carLights.tailBrakeR = null;
  carLights.headGlows = []; carLights.tailGlows = [];
  carLights.headMat = carLights.tailMat = null;
  carLights.lowBeam = carLights.highBeam = carLights.autoOn = false;
  // 从场景移除并递归释放
  if (truckGroup) {
    scene.remove(truckGroup);
    truckGroup.traverse(c => {
      if (c.isMesh) { c.geometry?.dispose(); if (Array.isArray(c.material)) c.material.forEach(m=>m.dispose()); else c.material?.dispose(); }
      if (c.isLight) c.dispose?.();
    });
  }
  truckModel = null; truckGroup = null;
  wheelFL = wheelFR = wheelBL = wheelBR = null;
  wheelRadius = 0.4; wheelPivotRestPos = {};
  modelCenterOffset = new THREE.Vector3();
  wheelSpinAxis.set(1, 0, 0);
  wheelSpinFlip = 1;
  suspensionScale = 1.0;
}

// ---- 通用车辆加载函数 ----
function loadVehicle(vehicleId, onComplete) {
  const config = VEHICLES[vehicleId];
  if (!config) { console.error('Unknown vehicle:', vehicleId); return; }
  currentVehicleId = vehicleId;

  // 应用物理参数
  const ph = config.physics;
  MASS = ph.mass; DRIVE_MASS = ph.driveMass;
  MAX_SPEED = ph.maxSpeed; MAX_REVERSE = ph.maxReverse;
  ENGINE_TORQUE_PEAK = ph.torque; FUEL_MAX = ph.fuelMax;

  const loader = new GLTFLoader();
  console.log('[loadVehicle] Loading:', config.path);
  loader.load(config.path, (gltf) => { try {
    console.log('[loadVehicle] GLTF loaded, processing...');
    truckModel = gltf.scene;

    // ---- 节点清理：删除配置中指定的节点 ----
    config.removeNodes.forEach(nodeName => {
      let target = null;
      truckModel.traverse(c => { if (c.name === nodeName) target = c; });
      if (target && target.parent) {
        target.parent.remove(target);
        target.traverse(c => { if (c.isMesh) { c.geometry?.dispose(); c.material?.dispose?.(); } });
      }
    });

    // 模型朝向校正（有些模型前方不是+Z，需要旋转）
    if (config.modelRotation) {
      // 在根场景下创建一个旋转容器，把所有子节点放进去
      const rotWrapper = new THREE.Group();
      rotWrapper.rotation.y = config.modelRotation;
      while (truckModel.children.length > 0) {
        rotWrapper.add(truckModel.children[0]);
      }
      truckModel.add(rotWrapper);
      truckModel.updateMatrixWorld(true);
    }

    // Scale
    const box = new THREE.Box3().setFromObject(truckModel);
    const size = box.getSize(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);
    truckModel.scale.setScalar(config.scale / maxDim);

    // Re-center
    const box2 = new THREE.Box3().setFromObject(truckModel);
    const center2 = box2.getCenter(new THREE.Vector3());
    truckModel.position.x -= center2.x;
    truckModel.position.z -= center2.z;
    truckModel.position.y -= box2.min.y;
    modelCenterOffset.copy(truckModel.position);

    // Fix materials（配置驱动）
    truckModel.traverse((child) => {
      if (child.isMesh) {
        child.castShadow = true;
        child.receiveShadow = true;
        const matName = child.material?.name || '';
        const matCfg = config.materials[matName];
        if (matCfg === null) { /* keep as-is (texture) */ }
        else if (matCfg) {
          if (matCfg.color !== undefined) child.material.color.set(matCfg.color);
          if (matCfg.metalness !== undefined) child.material.metalness = matCfg.metalness;
          if (matCfg.roughness !== undefined) child.material.roughness = matCfg.roughness;
        }
      }
    });

    // Hierarchy
    truckGroup = new THREE.Group();
    truckGroup.add(truckModel);
    scene.add(truckGroup);

    // Find wheels by config names
    const wn = config.wheelNames;
    let rawFL = null, rawFR = null, rawBL = null, rawBR = null;
    truckModel.traverse((child) => {
      if (child.name === wn.FL) rawFL = child;
      if (child.name === wn.FR) rawFR = child;
      if (child.name === wn.BL) rawBL = child;
      if (child.name === wn.BR) rawBR = child;
    });

    truckGroup.updateMatrixWorld(true);

    function createWheelPivot(wheelNode) {
      if (!wheelNode) return null;
      const wBox = new THREE.Box3().setFromObject(wheelNode);
      const wCenter = wBox.getCenter(new THREE.Vector3());
      const wSize = wBox.getSize(new THREE.Vector3());
      const parent = wheelNode.parent;
      const parentInv = new THREE.Matrix4().copy(parent.matrixWorld).invert();
      const localCenter = wCenter.clone().applyMatrix4(parentInv);
      const pivot = new THREE.Group();
      pivot.name = wheelNode.name + '_pivot';
      pivot.position.copy(localCenter);
      parent.add(pivot);
      parent.remove(wheelNode);
      pivot.add(wheelNode);
      wheelNode.position.set(-localCenter.x, -localCenter.y, -localCenter.z);
      return { pivot, size: wSize, center: wCenter, localCenter };
    }

    const flInfo = createWheelPivot(rawFL);
    const frInfo = createWheelPivot(rawFR);
    const blInfo = createWheelPivot(rawBL);
    const brInfo = createWheelPivot(rawBR);
    wheelFL = flInfo?.pivot || null;
    wheelFR = frInfo?.pivot || null;
    wheelBL = blInfo?.pivot || null;
    wheelBR = brInfo?.pivot || null;

    // 轮子尺寸调整（对pivot整体缩放，pivot原点在轮子中心不会偏移）
    if (config.wheelScale) {
      const ws = config.wheelScale;
      [wheelFL, wheelFR, wheelBL, wheelBR].forEach(pivot => {
        if (!pivot) return;
        pivot.scale.set(ws.x || 1, ws.y || 1, ws.z || 1);
      });
    }

    // 备胎节点引用（供调试缩放用）
    if (config.spareName) {
      let spareNode = null;
      truckModel.traverse(c => { if (c.name === config.spareName) spareNode = c; });
      window._spareNode = spareNode;
      if (spareNode) console.log('[Vehicle] Spare tire found:', config.spareName);
    } else {
      window._spareNode = null;
    }

    truckGroup.updateMatrixWorld(true);
    [['FL', flInfo], ['FR', frInfo], ['BL', blInfo], ['BR', brInfo]].forEach(([label, info]) => {
      if (!info) return;
      const wp = new THREE.Vector3();
      info.pivot.getWorldPosition(wp);
      wheelPivotRestPos[label] = { localPos: info.localCenter.clone(), worldY: wp.y };
    });

    if (flInfo && frInfo) {
      const flW = new THREE.Vector3(), frW = new THREE.Vector3();
      flInfo.pivot.getWorldPosition(flW); frInfo.pivot.getWorldPosition(frW);
      HALF_TRACK_WIDTH = Math.abs(flW.x - frW.x) / 2;
    }
    if (flInfo) {
      // 重新从pivot包围盒计算（包含wheelScale缩放后的实际大小）
      const wBox2 = new THREE.Box3().setFromObject(flInfo.pivot);
      const wSize2 = wBox2.getSize(new THREE.Vector3());
      const dims = [wSize2.x, wSize2.y, wSize2.z].sort((a,b) => a-b);
      wheelRadius = dims[1] / 2; // 中间值=直径（最大值可能是宽度方向）
    }
    if (flInfo && blInfo) {
      const flW = new THREE.Vector3(), blW = new THREE.Vector3();
      flInfo.pivot.getWorldPosition(flW); blInfo.pivot.getWorldPosition(blW);
      WHEELBASE = Math.sqrt((flW.x - blW.x) ** 2 + (flW.z - blW.z) ** 2);
    }

    const finalBox = new THREE.Box3().setFromObject(truckGroup);
    const carHeight = finalBox.max.y - finalBox.min.y;
    const carWidth = finalBox.max.x - finalBox.min.x;
    const carLen = finalBox.max.z - finalBox.min.z;
    CG_HEIGHT = carHeight * 0.22;
    CAR_HALF_HEIGHT = carHeight / 2;
    CAR_HALF_WIDTH = carWidth / 2;

    console.log(`[Vehicle] ${config.name} loaded: wb=${WHEELBASE.toFixed(2)}, ht=${HALF_TRACK_WIDTH.toFixed(2)}, cg=${CG_HEIGHT.toFixed(2)}, mass=${MASS}, torque=${ENGINE_TORQUE_PEAK}, fuel=${FUEL_MAX}`);

    // ---- 灯光安装（配置驱动）----
    truckGroup.updateMatrixWorld(true);
    const lt = config.lights;
    const hXL = -carWidth * lt.headX, hXR = carWidth * lt.headX;
    const hY = carHeight * lt.headY, hZ = carLen / 2 * lt.headZ;
    const hYlo = hY - 0.08, hYhi = hY + 0.08;
    const tXL = -carWidth * lt.tailX, tXR = carWidth * lt.tailX;
    const tY = carHeight * lt.tailY, tZ = -carLen / 2 * lt.tailZ;
    const tYlo = tY - 0.06, tYhi = tY + 0.06;

    function addHeadlight(x, y, z, distance, angle) {
      const light = new THREE.SpotLight(0xfff4d0, 0, distance, angle, 0.4, 1.5);
      light.position.set(x, y, z); light.castShadow = false;
      const target = new THREE.Object3D(); target.position.set(x, y-1, z+20);
      truckModel.add(target); light.target = target; truckModel.add(light);
      const glow = new THREE.Mesh(new THREE.SphereGeometry(0.06,6,6), new THREE.MeshBasicMaterial({color:0xfff8e0,transparent:true,opacity:0}));
      glow.position.set(x, y, z+0.02); truckModel.add(glow);
      carLights.headGlows.push(glow);
      return light;
    }
    carLights.headHighL = addHeadlight(hXL, hYhi, hZ, 80, Math.PI/9);
    carLights.headHighR = addHeadlight(hXR, hYhi, hZ, 80, Math.PI/9);
    carLights.headHighL.target.position.set(hXL*0.3, hYhi-0.5, hZ+40);
    carLights.headHighR.target.position.set(hXR*0.3, hYhi-0.5, hZ+40);
    carLights.headLowL = addHeadlight(hXL, hYlo, hZ, 30, Math.PI/4.5);
    carLights.headLowR = addHeadlight(hXR, hYlo, hZ, 30, Math.PI/4.5);
    carLights.headLowL.target.position.set(hXL*0.5, hYlo-2, hZ+12);
    carLights.headLowR.target.position.set(hXR*0.5, hYlo-2, hZ+12);
    carLights.headPointL = new THREE.PointLight(0xfff4d0,0,5,2); carLights.headPointL.position.set(hXL,hY,hZ+0.05); truckModel.add(carLights.headPointL);
    carLights.headPointR = new THREE.PointLight(0xfff4d0,0,5,2); carLights.headPointR.position.set(hXR,hY,hZ+0.05); truckModel.add(carLights.headPointR);

    function addTaillight(x, y, z) {
      const light = new THREE.PointLight(0xff2200,0,6,2); light.position.set(x,y,z); truckModel.add(light);
      const glow = new THREE.Mesh(new THREE.BoxGeometry(0.12,0.06,0.03), new THREE.MeshBasicMaterial({color:0xaa0000,transparent:true,opacity:0}));
      glow.position.set(x,y,z-0.01); truckModel.add(glow); carLights.tailGlows.push(glow);
      return light;
    }
    carLights.tailRunL = addTaillight(tXL, tYlo, tZ);
    carLights.tailRunR = addTaillight(tXR, tYlo, tZ);
    carLights.tailBrakeL = addTaillight(tXL, tYhi, tZ);
    carLights.tailBrakeR = addTaillight(tXR, tYhi, tZ);

    // 轮子旋转轴和方向
    if (config.wheelAxis === 'z') wheelSpinAxis.set(0, 0, 1);
    else if (config.wheelAxis === 'y') wheelSpinAxis.set(0, 1, 0);
    else wheelSpinAxis.set(1, 0, 0);
    wheelSpinFlip = config.wheelSpinFlip || 1;
    suspensionScale = config.suspensionScale || 1.0;

    carLights.installed = true;
    modelReady = true;
    initAudio();
    // 初次加载：显示开始界面（进度条隐藏，OK按钮出现）
    // 切换车辆时：直接隐藏loading
    const loadReady = document.getElementById('loadReady');
    if (loadReady && !loadReady._wasShown) {
      loadReady._wasShown = true;
      document.getElementById('loadBarWrap').style.display = 'none';
      document.getElementById('loadStatus').style.display = 'none';
      loadReady.style.display = 'flex';
    } else {
      document.getElementById('loading').classList.add('hidden');
    }
    if (onComplete) onComplete();
  } catch(e) { console.error('[loadVehicle] INIT ERROR:', e); document.getElementById('loadStatus').textContent = '初始化失败: ' + e.message; }
  }, (progress) => {
    if (progress.total) {
      const pct = Math.round(progress.loaded / progress.total * 100);
      const fill = document.getElementById('loadBarFill');
      const status = document.getElementById('loadStatus');
      if (fill) fill.style.width = pct + '%';
      if (status) status.textContent = '加载中... ' + pct + '%';
    }
  }, (err) => { console.error('[loadVehicle] LOAD ERROR:', err); document.getElementById('loadStatus').textContent = '加载失败: ' + err.message; });
}

function switchVehicle(vehicleId) {

  const loadEl = document.getElementById('loading');

  const loadBarWrap = document.getElementById('loadBarWrap');
  if (loadBarWrap) loadBarWrap.style.display = 'none';

  car.bodyRoll = 0; car.bodyPitch = 0; car.rollVel = 0; car.pitchVel = 0;

  car.springFL = car.springFR = car.springBL = car.springBR = 0;
  car.springVelFL = car.springVelFR = car.springVelBL = car.springVelBR = 0;
  loadVehicle(vehicleId);
}

// CAR LIGHTS UPDATE
// ============================================================
// 灯光自动控制（夜晚自动开，白天自动关，不再需要手动切换）

function updateCarLights() {
  if (!carLights.installed) return;

  // 判断环境光亮度 — 取太阳强度+环境强度的综合值
  const sunI = keyLight.intensity;
  const ambI = ambientLight.intensity;
  const brightness = sunI * 0.7 + ambI * 0.3;
  const rainDim = 0; // 天气系统已移除

  // 低于阈值 = 环境暗（黄昏、夜晚、雨天）→ 自动开灯
  const shouldBeOn = (brightness - rainDim) < 0.8;
  carLights.autoOn = shouldBeOn;
  // 自动控制近光远光（夜晚全开，白天全关）
  carLights.lowBeam = shouldBeOn;
  carLights.highBeam = shouldBeOn;

  const lerpSlow = 0.05;
  const lerpFast = 0.2;

  const lightsOn = carLights.lowBeam || carLights.highBeam;

  // ---- 前灯（亮度翻倍）----
  const lowOn = carLights.lowBeam;
  const lowTarget = lowOn ? 8 : 0;  // 原来4，翻倍到8
  carLights.headLowL.intensity += (lowTarget - carLights.headLowL.intensity) * lerpSlow;
  carLights.headLowR.intensity += (lowTarget - carLights.headLowR.intensity) * lerpSlow;

  const highOn = carLights.highBeam;
  const highTarget = highOn ? 30 : 0; // 原来15，翻倍到30
  carLights.headHighL.intensity += (highTarget - carLights.headHighL.intensity) * lerpSlow;
  carLights.headHighR.intensity += (highTarget - carLights.headHighR.intensity) * lerpSlow;

  // 前灯灯罩发光 (headGlows: 0=HL, 1=HR, 2=LL, 3=LR)
  const highGlowTarget = highOn ? 0.95 : 0;
  const lowGlowTarget = lowOn ? 0.8 : 0;
  carLights.headGlows[0].material.opacity += (highGlowTarget - carLights.headGlows[0].material.opacity) * lerpSlow;
  carLights.headGlows[1].material.opacity += (highGlowTarget - carLights.headGlows[1].material.opacity) * lerpSlow;
  carLights.headGlows[2].material.opacity += (lowGlowTarget - carLights.headGlows[2].material.opacity) * lerpSlow;
  carLights.headGlows[3].material.opacity += (lowGlowTarget - carLights.headGlows[3].material.opacity) * lerpSlow;

  // 前灯泛光PointLight（灯罩自发光效果）
  const headPointTarget = (lowOn || highOn) ? 2.5 : 0;
  if (carLights.headPointL) carLights.headPointL.intensity += (headPointTarget - carLights.headPointL.intensity) * lerpSlow;
  if (carLights.headPointR) carLights.headPointR.intensity += (headPointTarget - carLights.headPointR.intensity) * lerpSlow;

  // 前灯材质emissive（blinn4黄色灯壳发光）
  if (carLights.headMat) {
    const headEmissiveTarget = (lowOn || highOn) ? 0.6 : 0;
    const curE = carLights.headMat.emissive.r;
    const newE = curE + (headEmissiveTarget - curE) * lerpSlow;
    carLights.headMat.emissive.setRGB(newE, newE * 0.9, newE * 0.6); // 暖黄
  }

  // ---- 尾灯 ----
  // 刹车判定：自动刹车、反向制动、手刹、完全停车
  const isBraking = (car.throttle === 0 && car.reverse === 0 && Math.abs(car.speed) > 0.3)
                  || (car.reverse > 0 && car.speed > 0.3)
                  || (car.throttle > 0 && car.speed < -0.3)
                  || car.handbrake;
  const isStopped = Math.abs(car.speed) < 0.1 && car.throttle === 0 && car.reverse === 0;

  // 常亮尾灯（tailRunL/R）：只要灯光开启(近光或远光)就常亮暗红，刹车时更亮
  let runTargetI, runTargetOp;
  if (isBraking || isStopped) {
    runTargetI = 1.2; runTargetOp = 0.7;
  } else if (lightsOn) {
    runTargetI = 0.8; runTargetOp = 0.6;
  } else {
    runTargetI = 0; runTargetOp = 0;
  }
  const runLerp = (isBraking || isStopped) ? lerpFast : lerpSlow;
  carLights.tailRunL.intensity += (runTargetI - carLights.tailRunL.intensity) * runLerp;
  carLights.tailRunR.intensity += (runTargetI - carLights.tailRunR.intensity) * runLerp;

  // 刹车灯（tailBrakeL/R）：刹车或停车时高亮
  let brakeTargetI, brakeTargetOp;
  if (isBraking || isStopped) {
    brakeTargetI = 3; brakeTargetOp = 1.0;
  } else if (lightsOn) {
    brakeTargetI = 0.3; brakeTargetOp = 0.3;
  } else {
    brakeTargetI = 0; brakeTargetOp = 0;
  }
  const brakeLerp = (isBraking || isStopped) ? lerpFast : lerpSlow;
  carLights.tailBrakeL.intensity += (brakeTargetI - carLights.tailBrakeL.intensity) * brakeLerp;
  carLights.tailBrakeR.intensity += (brakeTargetI - carLights.tailBrakeR.intensity) * brakeLerp;

  // 尾灯灯罩发光 (tailGlows: 0=TRL, 1=TRR, 2=TBL, 3=TBR)
  carLights.tailGlows[0].material.opacity += (runTargetOp - carLights.tailGlows[0].material.opacity) * runLerp;
  carLights.tailGlows[1].material.opacity += (runTargetOp - carLights.tailGlows[1].material.opacity) * runLerp;
  carLights.tailGlows[2].material.opacity += (brakeTargetOp - carLights.tailGlows[2].material.opacity) * brakeLerp;
  carLights.tailGlows[3].material.opacity += (brakeTargetOp - carLights.tailGlows[3].material.opacity) * brakeLerp;

  // 刹车/停车时尾灯颜色更亮
  const brakeColor = (isBraking || isStopped) ? 0xff1100 : 0xaa0000;
  carLights.tailGlows[2].material.color.set(brakeColor);
  carLights.tailGlows[3].material.color.set(brakeColor);

  // 尾灯材质emissive（blinn5红色灯壳发光）
  if (carLights.tailMat) {
    const maxTailI = Math.max(carLights.tailRunL.intensity, carLights.tailBrakeL.intensity);
    const tailEmTarget = maxTailI > 0.1 ? Math.min(maxTailI / 3, 0.8) : 0;
    const curTE = carLights.tailMat.emissive.r;
    const newTE = curTE + (tailEmTarget - curTE) * lerpFast;
    carLights.tailMat.emissive.setRGB(newTE, newTE * 0.1, 0); // 深红
  }
}

// ============================================================
// TIRE TRACKS — 优化版 ribbon mesh（大幅降低地形查询 + polygonOffset消除穿帮）
// ============================================================
const TRACK_MAX_PTS = 800;       // 每轨迹最多点数（降低内存）
const TRACK_MIN_DIST = 0.12;     // 采样间距
const TIRE_WIDTH = 0.44;
const TRACK_PEAK_ALPHA = 0.3;

const tracks = {};

// 地面类型 → 车辙颜色 & alpha（静态结果对象，避免GC）
const _trackStyleResult = { r: 0.60, g: 0.52, b: 0.38, a: 0.30 };
function _trackSurfaceStyle(p) {
  if (p.onIce)              { _trackStyleResult.r=0.80; _trackStyleResult.g=0.90; _trackStyleResult.b=0.98; _trackStyleResult.a=0.12; }
  else if (p.biome === 'snow')   { _trackStyleResult.r=0.88; _trackStyleResult.g=0.90; _trackStyleResult.b=0.93; _trackStyleResult.a=0.18; }
  else if (p.biome === 'desert') { _trackStyleResult.r=1.20; _trackStyleResult.g=1.00; _trackStyleResult.b=0.70; _trackStyleResult.a=0.25; }
  else { _trackStyleResult.r=0.60; _trackStyleResult.g=0.52; _trackStyleResult.b=0.38; _trackStyleResult.a=0.30; }
  return _trackStyleResult;
}

function initTrack(label) {
  const maxV = TRACK_MAX_PTS * 2;
  const pos = new Float32Array(maxV * 3);
  const uv  = new Float32Array(maxV * 2);
  const alp = new Float32Array(maxV);
  const col = new Float32Array(maxV * 3);
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position',   new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('uv',         new THREE.BufferAttribute(uv,  2));
  geo.setAttribute('alpha',      new THREE.BufferAttribute(alp, 1));
  geo.setAttribute('trackColor', new THREE.BufferAttribute(col, 3));
  const idx = [];
  for (let i = 0; i < TRACK_MAX_PTS - 1; i++) {
    const b = i * 2;
    idx.push(b, b + 1, b + 2, b + 1, b + 3, b + 2);
  }
  geo.setIndex(idx);
  geo.setDrawRange(0, 0);
  const mat = new THREE.ShaderMaterial({
    transparent: true,
    depthWrite: false,
    side: THREE.DoubleSide,
    // polygonOffset 让车辙稍微偏向相机，消除z-fighting穿帮
    polygonOffset: true,
    polygonOffsetFactor: -2,
    polygonOffsetUnits: -2,
    uniforms: { tireMap: { value: tireTexture } },
    vertexShader: `
      attribute float alpha;
      attribute vec3 trackColor;
      varying float vA;
      varying vec2 vUv;
      varying vec3 vCol;
      void main() {
        vA = alpha; vUv = uv; vCol = trackColor;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }`,
    fragmentShader: `
      uniform sampler2D tireMap;
      varying float vA;
      varying vec2 vUv;
      varying vec3 vCol;
      void main() {
        vec4 tex = texture2D(tireMap, vUv);
        gl_FragColor = vec4(vCol * tex.rgb, vA * tex.a);
      }`,
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.frustumCulled = false;
  scene.add(mesh);
  tracks[label] = { pts: [], geo, mesh, totalDist: 0 };
}
['FL', 'FR', 'BL', 'BR'].forEach(initTrack);

function addTrackPoint(label, wx, wz, heading) {
  const t = tracks[label];
  const pts = t.pts;
  const last = pts[pts.length - 1];
  let segDist = 0;
  if (last) {
    const dx = wx - last.x, dz = wz - last.z;
    const d2 = dx * dx + dz * dz;
    if (d2 < TRACK_MIN_DIST * TRACK_MIN_DIST) return;
    segDist = Math.sqrt(d2);
  }
  t.totalDist += segDist;
  const y = getTerrainHeight(wx, wz);
  const biome = getBiomeName(wx, wz);
  const onIce = isInIceLake(wx, wz);
  pts.push({ x: wx, z: wz, y, h: heading, t: gameTime, d: t.totalDist, biome, onIce });
}

// 车辙更新计数器：不用每帧全量更新所有点，分帧处理
let _trackFullUpdateTimer = 0;

function updateTracks() {
  const UV_REPEAT = 0.6;
  // 只对最近30个点做实时高度查询
  const LIVE_Y_PTS = 30;
  // 全量更新每0.5秒做一次（edgeFade/颜色/位置），中间帧只更新尾部新增点
  _trackFullUpdateTimer += 1;
  const doFullUpdate = _trackFullUpdateTimer >= 30; // ~每0.5秒(60fps)
  if (doFullUpdate) _trackFullUpdateTimer = 0;

  for (const label in tracks) {
    const t = tracks[label];
    const pts = t.pts;
    while (pts.length > TRACK_MAX_PTS) pts.shift();
    const posA = t.geo.getAttribute('position');
    const uvA  = t.geo.getAttribute('uv');
    const alpA = t.geo.getAttribute('alpha');
    const colA = t.geo.getAttribute('trackColor');
    const n = pts.length;
    const baseDist = n > 0 ? pts[0].d : 0;

    // 确定本帧需要更新的范围
    // 每帧只更新最后 LIVE_Y_PTS 个点（新增+高度活跃）
    // 全量更新时处理所有点
    const updateStart = doFullUpdate ? 0 : Math.max(0, n - LIVE_Y_PTS - 2);

    for (let i = updateStart; i < n; i++) {
      const p = pts[i];
      const px = Math.cos(p.h) * TIRE_WIDTH;
      const pz = -Math.sin(p.h) * TIRE_WIDTH;
      const vi = i * 2;

      const ldx = p.x - terrainCenterX, ldz = p.z - terrainCenterZ;
      const ldist = Math.sqrt(ldx * ldx + ldz * ldz);
      const ef = Math.max(0, 1 - smoothstepGlobal(TERRAIN_RADIUS - 30, TERRAIN_RADIUS, ldist));
      if (ef <= 0) {
        posA.setXYZ(vi, 0, 0, 0); posA.setXYZ(vi+1, 0, 0, 0);
        alpA.setX(vi, 0); alpA.setX(vi+1, 0);
        continue;
      }

      const liveY = i >= n - LIVE_Y_PTS;
      let yL, yR;
      if (liveY) {
        yL = getTerrainHeight(p.x - px, p.z - pz);
        yR = getTerrainHeight(p.x + px, p.z + pz);
      } else {
        yL = yR = p.y;
      }
      const renderYL = yL * ef;
      const renderYR = yR * ef;

      posA.setXYZ(vi,     p.x - px, renderYL, p.z - pz);
      posA.setXYZ(vi + 1, p.x + px, renderYR, p.z + pz);

      const v = (p.d - baseDist) / UV_REPEAT;
      uvA.setXY(vi,   0, v);
      uvA.setXY(vi+1, 1, v);

      const style = _trackSurfaceStyle(p);
      const a = style.a * ef;
      alpA.setX(vi, a); alpA.setX(vi+1, a);
      colA.setXYZ(vi,   style.r, style.g, style.b);
      colA.setXYZ(vi+1, style.r, style.g, style.b);
    }

    // 全量更新时清空未使用的顶点
    if (doFullUpdate) {
      for (let i = n * 2; i < TRACK_MAX_PTS * 2; i++) {
        posA.setXYZ(i, 0, 0, 0); uvA.setXY(i, 0, 0); alpA.setX(i, 0);
      }
    }

    posA.needsUpdate = true;
    uvA.needsUpdate  = true;
    alpA.needsUpdate = true;
    colA.needsUpdate = true;
    t.geo.setDrawRange(0, Math.max(0, n - 1) * 6);
  }
}

// ============================================================
// UPDATE TRUCK — 硬桥悬架系统
// ============================================================
let totalSpinAngle = 0;

// 平滑值（避免高频抖动）
let smoothBodyY = 0;
let smoothBodyPitch = 0;
let smoothBodyRoll = 0;
let smoothInited = false;

// Pre-allocated objects for updateTruck (avoid GC pressure)
const _hQ = new THREE.Quaternion();
const _bPitchQ = new THREE.Quaternion();
const _bRollQ = new THREE.Quaternion();
const _physRollQ = new THREE.Quaternion();
const _physPitchQ = new THREE.Quaternion();
const _suspBodyRot = new THREE.Quaternion();
const _suspBodyInv = new THREE.Quaternion();
const _axleRollQ = new THREE.Quaternion();
const _spQ = new THREE.Quaternion();
const _sQ = new THREE.Quaternion();
const _axisX = new THREE.Vector3(1, 0, 0);
const _axisY = new THREE.Vector3(0, 1, 0);
const _axisZ = new THREE.Vector3(0, 0, 1);
const _wpTemp = new THREE.Vector3();

function updateTruck(dt) {
  if (!truckGroup || !modelReady) return;



  const wheelList = [
    { label: 'FL', p: wheelFL, front: true,  side: -1 },
    { label: 'FR', p: wheelFR, front: true,  side: +1 },
    { label: 'BL', p: wheelBL, front: false, side: -1 },
    { label: 'BR', p: wheelBR, front: false, side: +1 },
  ];

  const absRoll = Math.abs(car.bodyRoll);

  const sinH = Math.sin(car.heading), cosH = Math.cos(car.heading);
  const halfWB = WHEELBASE / 2;
  const halfTW = HALF_TRACK_WIDTH;

  // ============================================================
  // Step 1: 四轮世界坐标 + 地形采样
  // ============================================================
  // 注意：heading 使车头朝 +Z 方向 (sin(heading)=X, cos(heading)=Z)
  // 前方 = +heading方向，左 = -cosH, +sinH
  const wFL = { x: car.pos.x + sinH * halfWB - cosH * halfTW, z: car.pos.z + cosH * halfWB + sinH * halfTW };
  const wFR = { x: car.pos.x + sinH * halfWB + cosH * halfTW, z: car.pos.z + cosH * halfWB - sinH * halfTW };
  const wBL = { x: car.pos.x - sinH * halfWB - cosH * halfTW, z: car.pos.z - cosH * halfWB + sinH * halfTW };
  const wBR = { x: car.pos.x - sinH * halfWB + cosH * halfTW, z: car.pos.z - cosH * halfWB - sinH * halfTW };

  // 地面高度（轮子触地点）
  const gFL = getTerrainHeight(wFL.x, wFL.z);
  const gFR = getTerrainHeight(wFR.x, wFR.z);
  const gBL = getTerrainHeight(wBL.x, wBL.z);
  const gBR = getTerrainHeight(wBR.x, wBR.z);

  // ============================================================
  // Step 2: 硬桥约束
  // ============================================================
  // 前桥：FL 和 FR 共享一根刚性桥
  // 桥中点高度（桥是刚性的，中点 = 两端平均）
  const frontAxleMid = (gFL + gFR) / 2;
  const rearAxleMid = (gBL + gBR) / 2;

  // 桥倾斜角（用于轮子视觉倾斜）
  const frontAxleRoll = Math.atan2(gFR - gFL, HALF_TRACK_WIDTH * 2);
  const rearAxleRoll = Math.atan2(gBR - gBL, HALF_TRACK_WIDTH * 2);

  // 硬桥杠杆效应下的实际轮子高度：
  // 当一侧轮子碰到高地形时，桥绕弹簧连接点（近似桥中心）旋转
  // 另一侧轮子被杠杆拉离地面（如果行程允许）
  // 但在这里，我们用地形高度直接驱动桥的姿态
  // 桥的两端高度就是地形高度（轮子贴地）
  // 弹簧连接在桥中点和车身之间

  // ============================================================
  // Step 3: 四弹簧计算 + 载荷转移
  // ============================================================
  // 载荷转移：直接是弹簧目标压缩量（米）
  // loadTransferPitch > 0 = 前轴压缩（刹车点头）
  // loadTransferRoll > 0 = 右侧压缩（左转外倾）
  const ltP = car.loadTransferPitch;
  const ltR = car.loadTransferRoll;

  // 每个弹簧的目标压缩量 = 载荷转移分量之和
  const targetFL = (+ltP - ltR);
  const targetFR = (+ltP + ltR);
  const targetBL = (-ltP - ltR);
  const targetBR = (-ltP + ltR);

  // 弹簧-阻尼系统更新（使用预分配对象避免GC）
  const _springResult = { pos: 0, vel: 0 };
  function updateSpring(current, vel, target, dt) {
    const force = (target - current) * SUSP_SPRING_K - vel * SUSP_SPRING_D;
    const newVel = vel + force * dt;
    let newPos = current + newVel * dt;
    newPos = Math.max(-MAX_EXTEND, Math.min(MAX_COMPRESS, newPos));
    _springResult.pos = newPos; _springResult.vel = newVel;
    return _springResult;
  }

  let sFL = updateSpring(car.springFL, car.springVelFL, targetFL, dt);
  car.springFL = sFL.pos; car.springVelFL = sFL.vel;
  let sFR = updateSpring(car.springFR, car.springVelFR, targetFR, dt);
  car.springFR = sFR.pos; car.springVelFR = sFR.vel;
  let sBL = updateSpring(car.springBL, car.springVelBL, targetBL, dt);
  car.springBL = sBL.pos; car.springVelBL = sBL.vel;
  let sBR = updateSpring(car.springBR, car.springVelBR, targetBR, dt);
  car.springBR = sBR.pos; car.springVelBR = sBR.vel;

  // ============================================================
  // Step 4: 车身位姿计算
  // ============================================================
  // 车身基础高度 = 四轮地形平均（模型本身已含轮到车身距离，不额外加）
  const terrainAvg = (gFL + gFR + gBL + gBR) / 4;
  
  // 弹簧压缩量影响车身高度：压缩为正→车身下降，伸展为负→车身上升
  const springAvg = (car.springFL + car.springFR + car.springBL + car.springBR) / 4;
  const targetBodyY = terrainAvg - springAvg;

  // 车身pitch: 由地形前后差 + 弹簧前后差共同决定
  const terrainPitchDiff = ((gFL + gFR) - (gBL + gBR)) / 2; // 前-后地形差
  const springPitchDiff = ((car.springFL + car.springFR) - (car.springBL + car.springBR)) / 2; // 前-后弹簧差
  const targetBodyPitch = Math.atan2(terrainPitchDiff - springPitchDiff, WHEELBASE);

  // 车身roll: 由地形左右差 + 弹簧左右差共同决定
  const terrainRollDiff = ((gFR + gBR) - (gFL + gBL)) / 2; // 右-左地形差
  const springRollDiff = ((car.springFR + car.springBR) - (car.springFL + car.springBL)) / 2; // 右-左弹簧差
  const targetBodyRoll = Math.atan2(terrainRollDiff - springRollDiff, HALF_TRACK_WIDTH * 2);

  // 平滑（避免地形噪声引起的抖动）
  if (!smoothInited) {
    smoothBodyY = targetBodyY;
    smoothBodyPitch = targetBodyPitch;
    smoothBodyRoll = targetBodyRoll;
    smoothInited = true;
  }
  const smoothRate = Math.min(1, 10 * dt);

  // 上升和下降都限速，防止地形突变导致跳帧
  const dyTarget = targetBodyY - smoothBodyY;
  const maxRise = 8.0 * dt; // 最大上升速率 8m/s（提高以避免穿模）
  const maxFall = 5.0 * dt; // 最大下降速率 5m/s
  let clampedDy;
  if (dyTarget > 0) {
    clampedDy = Math.min(dyTarget * smoothRate, maxRise);
  } else {
    clampedDy = Math.max(dyTarget * smoothRate, -maxFall);
  }
  smoothBodyY += clampedDy;

  // 硬底保护：绝对不能低于地形高度（防穿模）
  const terrainFloor = getTerrainHeight(car.pos.x, car.pos.z);
  if (smoothBodyY < terrainFloor) {
    smoothBodyY = terrainFloor;
  }

  // 冰面检测（只调用一次，复用结果）
  const onIce = isInIceLake(car.pos.x, car.pos.z);

  // 冰面地板保护：用平滑过渡替代硬 clamp，消除进出冰面时的高度跳变
  if (onIce) {
    const iceFloor = BIOME_BASE.snow + 2.0;
    if (smoothBodyY < iceFloor) {
      // 平滑上推到冰面高度，而非硬 clamp
      smoothBodyY += (iceFloor - smoothBodyY) * Math.min(1, 15 * dt);
    }
  }

  // 冰面：地面平坦，pitch/roll 用更低的跟随速率压制抖动
  const orientRate = onIce ? Math.min(1, 3 * dt) : smoothRate;
  smoothBodyPitch += (targetBodyPitch - smoothBodyPitch) * orientRate;
  smoothBodyRoll  += (targetBodyRoll  - smoothBodyRoll)  * orientRate;

  car.pos.y = smoothBodyY;

  // ============================================================
  // Step 5: 判断翻车状态
  // ============================================================
  const isFlippedVisual = car.isInFlip;

  // ============================================================
  // Step 6: 设置 truckGroup
  // ============================================================
  _hQ.setFromAxisAngle(_axisY, car.heading);

  if (!isFlippedVisual) {
    _bPitchQ.setFromAxisAngle(_axisX, -smoothBodyPitch);
    _bRollQ.setFromAxisAngle(_axisZ, smoothBodyRoll);
    _physRollQ.setFromAxisAngle(_axisZ, car.bodyRoll);
    truckGroup.quaternion.copy(_hQ).multiply(_bPitchQ).multiply(_bRollQ).multiply(_physRollQ);
    truckGroup.position.set(car.pos.x, smoothBodyY, car.pos.z);

    // truckModel: 不做额外旋转
    truckModel.quaternion.identity();
    truckModel.position.copy(modelCenterOffset);

    // ---- 轮子：悬架模式 ----
    // 轮子转速 = 实际车速 + 打滑时额外空转（油门踩了但抓不住地）
    const grip = car._surfaceGrip !== undefined ? car._surfaceGrip : 1;
    const slipSpin = car.throttle * (1 - grip) * 15; // 打滑时轮子空转更快
    const revSlipSpin = car.reverse * (1 - grip) * 10;
    const spinDelta = ((car.speed + slipSpin - revSlipSpin) / Math.max(wheelRadius, 0.1)) * dt;
    totalSpinAngle += spinDelta;

    _suspBodyRot.copy(_bPitchQ).multiply(_bRollQ).multiply(_physRollQ);
    _suspBodyInv.copy(_suspBodyRot).invert();

    wheelList.forEach(({ label, p, front, side }) => {
      if (!p) return;
      const info = wheelPivotRestPos[label];
      if (!info) return;

      let springComp;
      if (label === 'FL') springComp = car.springFL;
      else if (label === 'FR') springComp = car.springFR;
      else if (label === 'BL') springComp = car.springBL;
      else springComp = car.springBR;

      p.position.set(
        info.localPos.x,
        info.localPos.y + springComp * suspensionScale,
        info.localPos.z
      );

      const axleRoll = front ? frontAxleRoll : rearAxleRoll;
      _axleRollQ.setFromAxisAngle(_axisZ, axleRoll);
      _spQ.setFromAxisAngle(wheelSpinAxis, totalSpinAngle * wheelSpinFlip);

      if (front) {
        _sQ.setFromAxisAngle(_axisY, car.steer * MAX_STEER_ANGLE);
        p.quaternion.copy(_suspBodyInv).multiply(_axleRollQ).multiply(_sQ).multiply(_spQ);
      } else {
        p.quaternion.copy(_suspBodyInv).multiply(_axleRollQ).multiply(_spQ);
      }
    });

  } else {
    // ====== 翻车中 ======
    _bPitchQ.setFromAxisAngle(_axisX, -smoothBodyPitch);
    _bRollQ.setFromAxisAngle(_axisZ, smoothBodyRoll);
    _physRollQ.setFromAxisAngle(_axisZ, car.bodyRoll);
    _physPitchQ.setFromAxisAngle(_axisX, -car.bodyPitch);
    truckGroup.quaternion.copy(_hQ).multiply(_bPitchQ).multiply(_bRollQ).multiply(_physRollQ).multiply(_physPitchQ);
    truckGroup.position.set(car.pos.x, smoothBodyY, car.pos.z);

    truckModel.quaternion.identity();
    truckModel.position.copy(modelCenterOffset);

    // ---- 轮子：翻车模式 ——轮子跟着车身翻，不做反向补偿 ----
    const spinDelta = (car.speed / Math.max(wheelRadius, 0.1)) * dt;
    totalSpinAngle += spinDelta;

    wheelList.forEach(({ label, p, front }) => {
      if (!p) return;
      const info = wheelPivotRestPos[label];
      if (!info) return;

      // 位置恢复到静止位（翻车时悬架弹簧归零）
      p.position.copy(info.localPos);

      // 轮子只保留自转和转向，不做任何反向补偿
      _spQ.setFromAxisAngle(wheelSpinAxis, totalSpinAngle * wheelSpinFlip);
      if (front) {
        _sQ.setFromAxisAngle(_axisY, car.steer * MAX_STEER_ANGLE);
        p.quaternion.copy(_sQ).multiply(_spQ);
      } else {
        p.quaternion.copy(_spQ);
      }
    });

    // 确保车身不陷入地面（用预计算的车身尺寸估算最低点，避免每帧 Box3 遍历）
    const terrainAtCar = getTerrainHeight(car.pos.x, car.pos.z);
    // 翻车时车身最低点≈中心Y - 绕roll+pitch轴旋转后的最大下探距离
    const sinRoll = Math.abs(Math.sin(car.bodyRoll));
    const cosRoll = Math.abs(Math.cos(car.bodyRoll));
    const sinPitch = Math.abs(Math.sin(car.bodyPitch));
    const cosPitch = Math.abs(Math.cos(car.bodyPitch));
    // 取 roll 和 pitch 两个方向上下探距离的较大值
    const dropFromRoll = CAR_HALF_HEIGHT * cosRoll + CAR_HALF_WIDTH * sinRoll;
    const dropFromPitch = CAR_HALF_HEIGHT * cosPitch + WHEELBASE / 2 * sinPitch;
    const estimatedDrop = Math.max(dropFromRoll, dropFromPitch);
    const estimatedMinY = truckGroup.position.y - estimatedDrop;
    if (estimatedMinY < terrainAtCar) {
      truckGroup.position.y += terrainAtCar - estimatedMinY;
    }
  }

  truckGroup.updateMatrixWorld(true);

  // ---- Tire tracks ----
  [['FL', wheelFL], ['FR', wheelFR], ['BL', wheelBL], ['BR', wheelBR]].forEach(([label, pivot]) => {
    if (!pivot) return;
    pivot.getWorldPosition(_wpTemp);
    addTrackPoint(label, _wpTemp.x, _wpTemp.z, car.heading);
  });
  updateTracks();

  // Sky follows car
  sky.position.set(car.pos.x, 0, car.pos.z);
}

UI.gauges = {
  els: {},
  tachCtx: null, speedCtx: null,
  GAUGE_SIZE: 180,
  GAUGE_R: 90,
  GAUGE_CR: 82,
  TACH_MAX: 5000,
  TACH_RED_START: 2000,
  TACH_TICKS: [0, 1, 2, 3, 4, 5],
  SPEED_MAX_GAUGE: 120,
  SPEED_TICKS: [0, 20, 40, 60, 80, 100, 120],
  ARC_START: Math.PI * 0.75,
  ARC_END: Math.PI * 2.25,
  ARC_RANGE: Math.PI * 1.5,
  smoothRPM: RPM_IDLE,
  smoothSpeed: 0,
  lastDisplayGear: null,
  gearFlashTimer: 0,
  _altCache: 0,
  _altTimer: 0,

  init() {
    const tachCanvas = document.getElementById('tachGauge');
    const speedCanvas = document.getElementById('speedGauge');
    this.tachCtx = tachCanvas.getContext('2d');
    this.speedCtx = speedCanvas.getContext('2d');
    this.els.gauges = document.getElementById('gauges');
    this.els.fuelBar = document.getElementById('fuelBar');
    // 初始化燃油条UI
    for (let i = 0; i < 10; i++) {
      const cell = document.createElement('div');
      cell.className = 'fuel-cell ' + (i === 0 ? 'red' : i < 4 ? 'orange' : 'green') + ' on';
      cell.id = 'fuelCell' + i;
      this.els.fuelBar.appendChild(cell);
    }
  },

  drawGauge(ctx, value, maxVal, ticks, unit, label, redStart, gearText, isGearFlash) {
    const w = this.GAUGE_SIZE, h = this.GAUGE_SIZE;
    const cx = w / 2, cy = h / 2;
    const r = this.GAUGE_CR;
    const ARC_START = this.ARC_START, ARC_END = this.ARC_END, ARC_RANGE = this.ARC_RANGE;

    ctx.clearRect(0, 0, w, h);
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(15, 15, 15, 0.85)'; ctx.fill();
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(80, 80, 80, 0.6)'; ctx.lineWidth = 2; ctx.stroke();

    if (redStart !== null) {
      const redAngle = ARC_START + (redStart / maxVal) * ARC_RANGE;
      ctx.beginPath(); ctx.arc(cx, cy, r - 6, redAngle, ARC_END);
      ctx.strokeStyle = 'rgba(220, 40, 40, 0.5)'; ctx.lineWidth = 8; ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx, cy); ctx.arc(cx, cy, r - 2, redAngle, ARC_END);
      ctx.closePath(); ctx.fillStyle = 'rgba(180, 30, 30, 0.12)'; ctx.fill();
    }

    ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.font = 'bold 11px monospace';
    for (let i = 0; i < ticks.length; i++) {
      const tickVal = ticks[i], frac = tickVal / maxVal, angle = ARC_START + frac * ARC_RANGE;
      const x1 = cx + Math.cos(angle) * (r - 16), y1 = cy + Math.sin(angle) * (r - 16);
      const x2 = cx + Math.cos(angle) * (r - 4), y2 = cy + Math.sin(angle) * (r - 4);
      const inRed = redStart !== null && tickVal >= redStart;
      ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
      ctx.strokeStyle = inRed ? '#e53935' : 'rgba(200,200,200,0.7)'; ctx.lineWidth = 2; ctx.stroke();
      const tx = cx + Math.cos(angle) * (r - 26), ty = cy + Math.sin(angle) * (r - 26);
      ctx.fillStyle = inRed ? '#e53935' : 'rgba(200,200,200,0.8)'; ctx.fillText(String(tickVal), tx, ty);
    }

    const smallTickCount = (ticks.length - 1) * 5;
    for (let i = 0; i <= smallTickCount; i++) {
      if (i % 5 === 0) continue;
      const frac = i / smallTickCount, angle = ARC_START + frac * ARC_RANGE;
      const x1 = cx + Math.cos(angle) * (r - 10), y1 = cy + Math.sin(angle) * (r - 10);
      const x2 = cx + Math.cos(angle) * (r - 4), y2 = cy + Math.sin(angle) * (r - 4);
      ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
      ctx.strokeStyle = 'rgba(120,120,120,0.4)'; ctx.lineWidth = 1; ctx.stroke();
    }

    const clampedVal = Math.max(0, Math.min(value, maxVal));
    const needleAngle = ARC_START + (clampedVal / maxVal) * ARC_RANGE;
    ctx.save(); ctx.translate(cx, cy); ctx.rotate(needleAngle);
    ctx.shadowColor = 'rgba(0,0,0,0.4)'; ctx.shadowBlur = 4;
    ctx.beginPath(); ctx.moveTo(r - 20, 0); ctx.lineTo(-10, -3); ctx.lineTo(-10, 3); ctx.closePath();
    const inRedZone = redStart !== null && value >= redStart;
    ctx.fillStyle = inRedZone ? '#e53935' : '#ff6e40'; ctx.fill(); ctx.restore();

    ctx.beginPath(); ctx.arc(cx, cy, 6, 0, Math.PI * 2); ctx.fillStyle = '#444'; ctx.fill();
    ctx.beginPath(); ctx.arc(cx, cy, 3, 0, Math.PI * 2); ctx.fillStyle = '#888'; ctx.fill();

    if (gearText) {
      ctx.font = 'bold 22px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillStyle = isGearFlash ? '#ff6e40' : 'rgba(255,255,255,0.9)';
      ctx.fillText(gearText, cx, cy + 24);
    }
    ctx.font = '10px sans-serif'; ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(150,150,150,0.7)'; ctx.fillText(label, cx, cy + 42);
    ctx.font = 'bold 13px monospace'; ctx.fillStyle = 'rgba(255,255,255,0.85)'; ctx.fillText(unit, cx, cy + 56);
  },

  updateFuelUI() {
    const ratio = Math.max(0, fuel / FUEL_MAX);
    const litCells = Math.ceil(ratio * 10);
    for (let i = 0; i < 10; i++) {
      const cell = document.getElementById('fuelCell' + i);
      if (cell) { if (i < litCells) cell.classList.add('on'); else cell.classList.remove('on'); }
    }
  },

  update(dt) {
    const lerpF = Math.min(1, 12 * dt);
    this.smoothRPM += (car.rpm - this.smoothRPM) * lerpF;
    this.smoothSpeed += (Math.abs(car.speed * 3.6) - this.smoothSpeed) * lerpF;

    const gearText = car.gear === 0 ? 'N' : car.gear === -1 ? 'R1' : car.gear === -2 ? 'R2' : String(car.gear);
    if (this.lastDisplayGear !== null && this.lastDisplayGear !== car.gear) this.gearFlashTimer = 0.3;
    this.lastDisplayGear = car.gear;
    this.gearFlashTimer = Math.max(0, this.gearFlashTimer - dt);
    const isFlash = this.gearFlashTimer > 0 && Math.sin(this.gearFlashTimer * 30) > 0;

    const rpmDisplay = this.smoothRPM / 1000;
    this.drawGauge(this.tachCtx, rpmDisplay, this.TACH_MAX / 1000, this.TACH_TICKS,
      Math.round(this.smoothRPM) + ' rpm', 'RPM × 1000',
      this.TACH_RED_START / 1000, gearText, isFlash);
    this.drawGauge(this.speedCtx, this.smoothSpeed, this.SPEED_MAX_GAUGE, this.SPEED_TICKS,
      Math.round(this.smoothSpeed) + ' km/h', 'SPEED', null, null, false);

    // 海拔信息
    if (!this._altCache || this._altTimer <= 0) {
      this._altCache = getTerrainHeight(car.pos.x, car.pos.z);
      this._altTimer = 0.3;
    }
    this._altTimer -= dt;
    const GR = this.GAUGE_R;
    this.speedCtx.save(); this.speedCtx.font = 'bold 11px monospace'; this.speedCtx.textAlign = 'center';
    this.speedCtx.fillStyle = '#8ab'; this.speedCtx.fillText('ALT', GR, GR + 48);
    this.speedCtx.font = '10px monospace'; this.speedCtx.fillStyle = '#9bc';
    this.speedCtx.fillText(Math.round(this._altCache) + 'm', GR, GR + 60); this.speedCtx.restore();

    // 差速锁指示灯
    this.tachCtx.save(); this.tachCtx.font = 'bold 11px monospace'; this.tachCtx.textAlign = 'center';
    if (car.diffLock) {
      this.tachCtx.fillStyle = '#ff4400'; this.tachCtx.fillText('LOCK', GR, GR + 48);
      this.tachCtx.font = '8px monospace'; this.tachCtx.fillStyle = '#cc3300'; this.tachCtx.fillText('DIFF LOCK', GR, GR + 59);
    } else {
      this.tachCtx.fillStyle = '#555'; this.tachCtx.fillText('OPEN', GR, GR + 48);
      this.tachCtx.font = '8px monospace'; this.tachCtx.fillStyle = '#444'; this.tachCtx.fillText('DIFF', GR, GR + 59);
    }
    this.tachCtx.restore();

    // 翻车提示
    UI.messages.showFlip(car.isInFlip && car.rollStoppedTime > 0.8);
  },

  layout(mobile) {
    const g = this.els.gauges;
    if (mobile) {
      g.style.bottom = '20px'; g.style.right = 'auto'; g.style.left = '50%'; g.style.transform = 'translateX(-50%) scale(0.6)'; g.style.transformOrigin = 'center bottom';
    } else {
      g.style.bottom = '30px'; g.style.right = '30px'; g.style.left = ''; g.style.transform = ''; g.style.transformOrigin = '';
    }
  },
};
UI.gauges.init();

const minimapCvs = document.getElementById('minimapCanvas');
const minimapCtx = minimapCvs.getContext('2d');
const MINIMAP_SIZE = 160;
const MINIMAP_VIEW_RANGE = 300;
const minimapImgData = minimapCtx.createImageData(MINIMAP_SIZE, MINIMAP_SIZE);
const minimapPixels = minimapImgData.data;
let _lastMinimapCX = Infinity, _lastMinimapCZ = Infinity;
const MINIMAP_REDRAW_DIST = 15;

// UI MODULE: minimap — 小地图
UI.minimap = {
  els: {},
  init() {
    this.els.wrap = document.getElementById('minimap');
  },
  update() { updateMinimap(); },
  layout(mobile) {
    const w = this.els.wrap;

// 指路牌：只放在biome交界处（InstancedMesh，3个drawcall替代36个）
const signposts = [];
{
  const SIGN_INTERVAL = 80;
  let accDist = 0;
  // 第一遍：收集候选位置
  const candidates = [];
  for (let i = 1; i < TRAIL_POINTS.length; i++) {
    const dx = TRAIL_POINTS[i].x - TRAIL_POINTS[i-1].x;
    const dz = TRAIL_POINTS[i].z - TRAIL_POINTS[i-1].z;
    accDist += Math.sqrt(dx * dx + dz * dz);
    if (accDist >= SIGN_INTERVAL) {
      accDist = 0;
      const p = TRAIL_POINTS[i];
      const pNext = TRAIL_POINTS[Math.min(i + 5, TRAIL_POINTS.length - 1)];
      const angle = Math.atan2(pNext.x - p.x, pNext.z - p.z);
      candidates.push({ x: p.x + Math.cos(angle) * 3, z: p.z - Math.sin(angle) * 3, angle });
    }
  }
  // 第二遍：只保留biome交界处的路牌（主biome权重 < 0.75 说明在混合区）
  for (const c of candidates) {
    const bw = getBiomeWeights(c.x, c.z);
    const maxW = Math.max(bw.snow, bw.desert, bw.jungle);
    if (maxW < 0.75) { // 在两个biome交界的过渡带
      signposts.push(c);
    }
  }

  const spCount = signposts.length;
  if (spCount > 0) {
    // 共享geometry
    const poleGeo = new THREE.CylinderGeometry(0.05, 0.06, 1.8, 6);
    const boardGeo = new THREE.BoxGeometry(0.8, 0.35, 0.04);
    const arrowGeo = new THREE.BufferGeometry();
    const arrowVerts = new Float32Array([0,0,0.025, 0.2,0.08,0.025, 0.2,-0.08,0.025]);
    arrowGeo.setAttribute('position', new THREE.BufferAttribute(arrowVerts, 3));
    arrowGeo.computeVertexNormals();

    // 共享material
    const poleMat = new THREE.MeshStandardMaterial({ color: 0x8B7355, roughness: 0.8 });
    const boardMat = new THREE.MeshStandardMaterial({ color: 0x557755, roughness: 0.5 });
    const arrowMat = new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide });

    // 3个InstancedMesh
    const poleIM = new THREE.InstancedMesh(poleGeo, poleMat, spCount);
    const boardIM = new THREE.InstancedMesh(boardGeo, boardMat, spCount);
    const arrowIM = new THREE.InstancedMesh(arrowGeo, arrowMat, spCount);
    poleIM.castShadow = false; poleIM.receiveShadow = false;
    boardIM.castShadow = false; boardIM.receiveShadow = false;
    arrowIM.castShadow = false; arrowIM.receiveShadow = false;

    const _dm = new THREE.Matrix4();
    const _pos = new THREE.Vector3();
    const _quat = new THREE.Quaternion();
    const _scl = new THREE.Vector3(1, 1, 1);

    for (let i = 0; i < spCount; i++) {
      const sp = signposts[i];
      const y = getTerrainHeight(sp.x, sp.z);
      // 杆子（y+0.9 = 杆子中心）
      _pos.set(sp.x, y + 0.9, sp.z);
      _quat.setFromAxisAngle(new THREE.Vector3(0,1,0), sp.angle);
      _dm.compose(_pos, _quat, _scl);
      poleIM.setMatrixAt(i, _dm);
      // 指示板（y+1.65）
      _pos.set(sp.x, y + 1.65, sp.z);
      _dm.compose(_pos, _quat, _scl);
      boardIM.setMatrixAt(i, _dm);
      // 箭头（y+1.65，x偏移-0.15沿朝向）
      const ax = sp.x - Math.sin(sp.angle) * 0.15;
      const az = sp.z - Math.cos(sp.angle) * 0.15;
      _pos.set(ax, y + 1.65, az);
      _dm.compose(_pos, _quat, _scl);
      arrowIM.setMatrixAt(i, _dm);
    }
    poleIM.instanceMatrix.needsUpdate = true;
    boardIM.instanceMatrix.needsUpdate = true;
    arrowIM.instanceMatrix.needsUpdate = true;
    scene.add(poleIM); scene.add(boardIM); scene.add(arrowIM);
  }
}

// ============================================================
// DISTANCE CULLING — 隐藏远处物体减少drawcall
// ============================================================
const CULL_DIST = 180; // 超过此距离隐藏
const CULL_DIST_SQ = CULL_DIST * CULL_DIST;
function updateDistanceCulling() {
  const cx = car.pos.x, cz = car.pos.z;
  // 岩石（距离裁剪 + 水下隐藏）
  for (const rock of rocks) {
    if (!rock._mesh) continue;
    const dx = rock.x - cx, dz = rock.z - cz;
    const inRange = (dx * dx + dz * dz) < CULL_DIST_SQ;
    // 深水中的石头隐藏
    const underwater = rock.baseH < SEA_LEVEL - 0.3;
    rock._mesh.visible = inRange && !underwater;
  }
  // 指路牌：InstancedMesh由Three.js自动frustum culling，无需手动遍历
}

function updateMinimap() {
  const ctx = minimapCtx;
  const cx = car.pos.x, cz = car.pos.z;
  const half = MINIMAP_VIEW_RANGE;
  const scale = MINIMAP_SIZE / (half * 2); // px per meter

  // 是否需要重绘底图像素（车移动够远时才重绘，降低CPU开销）
  const ddx = cx - _lastMinimapCX, ddz = cz - _lastMinimapCZ;
  if (ddx * ddx + ddz * ddz > MINIMAP_REDRAW_DIST * MINIMAP_REDRAW_DIST) {
    _lastMinimapCX = cx;
    _lastMinimapCZ = cz;
    // 逐像素绘制biome（低分辨率采样：每2像素采样一次）
    const step = 2;
    for (let py = 0; py < MINIMAP_SIZE; py += step) {
      for (let px = 0; px < MINIMAP_SIZE; px += step) {
        const wx = cx + (px / MINIMAP_SIZE - 0.5) * half * 2;
        const wz = cz + (py / MINIMAP_SIZE - 0.5) * half * 2;
        const bw = getBiomeWeights(wx, wz);
        // 海洋区域在minimap上显示蓝色（用距离估算水深，避免调getTerrainHeight）
        let dr = 210, dg = 180, db = 130;
        if (bw.desert > 0.1) {
          const distC = Math.sqrt(wx*wx + wz*wz);
          if (distC > 160) { dr = 30; dg = 90; db = 140; }
          else if (distC > 120) { dr = 80; dg = 150; db = 170; }
        }
        const r = Math.round(235 * bw.snow + dr * bw.desert + 55 * bw.jungle);
        const g = Math.round(240 * bw.snow + dg * bw.desert + 120 * bw.jungle);
        const b = Math.round(245 * bw.snow + db * bw.desert + 40 * bw.jungle);
        // 圆形遮罩
        const dpx = px - MINIMAP_SIZE / 2, dpz = py - MINIMAP_SIZE / 2;
        const dRatio = Math.sqrt(dpx * dpx + dpz * dpz) / (MINIMAP_SIZE / 2);
        const alpha = dRatio > 0.92 ? Math.max(0, Math.round(255 * (1 - (dRatio - 0.92) / 0.08))) : 255;
        // 填充step×step像素块
        for (let sy = 0; sy < step && py + sy < MINIMAP_SIZE; sy++) {
          for (let sx = 0; sx < step && px + sx < MINIMAP_SIZE; sx++) {
            const idx = ((py + sy) * MINIMAP_SIZE + (px + sx)) * 4;
            minimapPixels[idx] = r;
            minimapPixels[idx + 1] = g;
            minimapPixels[idx + 2] = b;
            minimapPixels[idx + 3] = alpha;
          }
        }
      }
    }
    ctx.putImageData(minimapImgData, 0, 0);
  } else {
    // 底图没变，直接画上次的ImageData
    ctx.putImageData(minimapImgData, 0, 0);
  }

  // 叠加特殊区域（冰湖、泥潭）
  // 冰湖（腰果形，与3D冰面形状一致）
  {
    const iceRelX = (ICE_CENTER_X - cx) * scale + MINIMAP_SIZE / 2;
    const iceRelY = (ICE_CENTER_Z - cz) * scale + MINIMAP_SIZE / 2;
    const iceR = ICE_RADIUS * scale;
    if (iceRelX > -iceR * 2 && iceRelX < MINIMAP_SIZE + iceR * 2 && iceRelY > -iceR * 2 && iceRelY < MINIMAP_SIZE + iceR * 2) {
      const _N = 96, _eX = 1.4, _eZ = 0.9;
      ctx.beginPath();
      for (let i = 0; i <= _N; i++) {
        const t = (i / _N) * Math.PI * 2;
        const indent = 0.38 * Math.max(0, -Math.cos(t)) * (1 + 0.3 * Math.sin(t));
        const r = iceR * (1.0 - indent);
        const px = iceRelX + Math.cos(t) * r * _eX;
        const py = iceRelY + Math.sin(t) * r * _eZ;
        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fillStyle = 'rgba(100,170,220,0.55)';
      ctx.fill();
      ctx.strokeStyle = 'rgba(160,210,245,0.5)';
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }
  }
  // 泥潭
  for (const pit of MUD_PITS) {
    const mx = (pit.x - cx) * scale + MINIMAP_SIZE / 2;
    const my = (pit.z - cz) * scale + MINIMAP_SIZE / 2;
    const mr = pit.r * scale;
    if (mx > -mr && mx < MINIMAP_SIZE + mr && my > -mr && my < MINIMAP_SIZE + mr) {
      ctx.beginPath();
      ctx.arc(mx, my, mr, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(70,55,35,0.4)';
      ctx.fill();
    }
  }

  // 道路（加粗+更明显颜色）
  ctx.strokeStyle = 'rgba(180,170,150,0.85)';
  ctx.lineWidth = 3;
  ctx.beginPath();
  let started = false;
  for (let i = 0; i < TRAIL_POINTS.length; i += 3) {
    const px = (TRAIL_POINTS[i].x - cx) * scale + MINIMAP_SIZE / 2;
    const py = (TRAIL_POINTS[i].z - cz) * scale + MINIMAP_SIZE / 2;
    if (px < -20 || px > MINIMAP_SIZE + 20 || py < -20 || py > MINIMAP_SIZE + 20) {
      started = false; continue;
    }
    if (!started) { ctx.moveTo(px, py); started = true; }
    else ctx.lineTo(px, py);
  }
  ctx.stroke();

  // 宝箱标记（金色小方块闪烁）
  for (const box of treasureBoxes) {
    if (box.collected) continue;
    const bpx = (box.wx - cx) * scale + MINIMAP_SIZE / 2;
    const bpy = (box.wz - cz) * scale + MINIMAP_SIZE / 2;
    if (bpx < 0 || bpx > MINIMAP_SIZE || bpy < 0 || bpy > MINIMAP_SIZE) continue;
    ctx.fillStyle = 'rgba(255,200,40,0.9)';
    ctx.fillRect(bpx - 2.5, bpy - 2.5, 5, 5);
  }

  // 打卡点标记（纯蓝色相机图标 + 屏幕外方向指示器）
  const mmCenter = MINIMAP_SIZE / 2;
  const mmR = MINIMAP_SIZE / 2 - 4;
  for (const cp of checkpointState) {
    if (cp.unlocked) continue;
    const cpx = (cp.wx - cx) * scale + mmCenter;
    const cpy = (cp.wz - cz) * scale + mmCenter;
    const dxM = cpx - mmCenter, dyM = cpy - mmCenter;
    const distM = Math.sqrt(dxM * dxM + dyM * dyM);

    if (distM < mmR - 2) {
      // 在小地图范围内：画蓝色相机图标
      ctx.save();
      ctx.translate(cpx, cpy);
      // 相机主体（13×8）
      ctx.fillStyle = 'rgba(40,120,255,0.9)';
      ctx.fillRect(-6.5, -4, 13, 8);
      ctx.fillRect(-4, -7, 8, 3); // 取景器
      // 镜头
      ctx.beginPath(); ctx.arc(0, 0, 3, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(180,220,255,0.9)'; ctx.fill();
      ctx.restore();
    } else {
      // 在小地图范围外：在圆形边缘显示蓝色方向指示箭头
      const ang = Math.atan2(dyM, dxM);
      const edgeX = mmCenter + Math.cos(ang) * (mmR - 4);
      const edgeY = mmCenter + Math.sin(ang) * (mmR - 4);
      ctx.save();
      ctx.translate(edgeX, edgeY);
      ctx.rotate(ang);
      ctx.fillStyle = 'rgba(40,120,255,0.85)';
      ctx.beginPath();
      ctx.moveTo(7, 0); ctx.lineTo(-4, -4); ctx.lineTo(-4, 4);
      ctx.closePath(); ctx.fill();
      ctx.restore();
    }
  }

  // NPC标记（红色圆点 = 求助）
  for (const npc of stuckNPCs) {
    if (npc.rescued) continue;
    const npx = (npc.wx - cx) * scale + MINIMAP_SIZE / 2;
    const npy = (npc.wz - cz) * scale + MINIMAP_SIZE / 2;
    if (npx < 0 || npx > MINIMAP_SIZE || npy < 0 || npy > MINIMAP_SIZE) continue;
    ctx.fillStyle = 'rgba(255,80,80,0.9)';
    ctx.beginPath(); ctx.arc(npx, npy, 3, 0, Math.PI * 2); ctx.fill();
  }

  // 车辆始终在正中心，传统箭头指向车头方向
  // heading=0 → forward=(sin0,cos0)=(0,1) → minimap: x=0,y=+1(下)
  // canvas rotate(θ): tip(0,-7) → (7sinθ, -7cosθ) → minimap方向(sinθ, -cosθ)
  // 需要(sinθ, -cosθ)=(sinH, cosH) → θ = PI - heading
  ctx.save();
  ctx.translate(MINIMAP_SIZE / 2, MINIMAP_SIZE / 2);
  ctx.rotate(Math.PI - car.heading);
  // 箭头形状：上方尖头 + 窄杆身（放大1.8倍，最醒目）
  ctx.beginPath();
  ctx.moveTo(0, -12.6);    // 箭头尖端
  ctx.lineTo(-7.2, -1.8);  // 左翼
  ctx.lineTo(-2.7, -1.8);  // 左翼内收
  ctx.lineTo(-2.7, 9);     // 杆左
  ctx.lineTo(2.7, 9);      // 杆右
  ctx.lineTo(2.7, -1.8);   // 右翼内收
  ctx.lineTo(7.2, -1.8);   // 右翼
  ctx.closePath();
  ctx.fillStyle = '#ff4444';
  ctx.fill();
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1.2;
  ctx.stroke();
  ctx.restore();

  // 圆形边框遮罩
  ctx.save();
  ctx.globalCompositeOperation = 'destination-in';
  ctx.beginPath();
  ctx.arc(MINIMAP_SIZE / 2, MINIMAP_SIZE / 2, MINIMAP_SIZE / 2 - 1, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // 圆形边框
  ctx.beginPath();
  ctx.arc(MINIMAP_SIZE / 2, MINIMAP_SIZE / 2, MINIMAP_SIZE / 2 - 1, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(255,255,255,0.2)';
  ctx.lineWidth = 1.5;
  ctx.stroke();


}

// ============================================================
// WHEEL SPRAY PARTICLES — 车轮甩起泥土/沙子/草屑/雪花
// 每个粒子有独立大小、颜色、重力系数，模拟不同材质
// ============================================================
const SPRAY_COUNT = 250; // 每组粒子数
const wheelSprays = {};

// biome喷溅配置
const SPRAY_CONFIG = {
  snow: {
    color: 0xeef4ff,
    sizeMin: 0.50, sizeMax: 1.40,
    speedMult: 1.0,
    spreadAngle: 1.5,
    upMin: 2.5, upMax: 6.0,
    gravityMult: 0.4,
    lifeMin: 0.8, lifeMax: 1.5,
    dragOnGround: 0.15,
    opacityBase: 0.7,
  },
  desert: {
    color: 0xcceeff,
    sizeMin: 0.40, sizeMax: 1.10,
    speedMult: 1.2,
    spreadAngle: 1.5,
    upMin: 2.5, upMax: 6.0,
    gravityMult: 0.8,
    lifeMin: 0.5, lifeMax: 0.9,
    dragOnGround: 0.1,
    opacityBase: 0.6,
  },
  jungle: {
    color: 0x4a3820,
    sizeMin: 0.50, sizeMax: 1.30,
    speedMult: 0.8,
    spreadAngle: 0.9,
    upMin: 2.5, upMax: 6.5,
    gravityMult: 1.2,
    lifeMin: 0.7, lifeMax: 1.3,
    dragOnGround: 0.4,
    opacityBase: 0.85,
  },
};

function initWheelSpray(label) {
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(SPRAY_COUNT * 3);
  const vel = new Float32Array(SPRAY_COUNT * 3);
  const life = new Float32Array(SPRAY_COUNT);
  const sizes = new Float32Array(SPRAY_COUNT);
  const gravMult = new Float32Array(SPRAY_COUNT).fill(1.0); // 每粒子重力系数
  const colors = new Float32Array(SPRAY_COUNT * 3); // 每粒子颜色

  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
  geo.setAttribute('aColor', new THREE.BufferAttribute(colors, 3));

  // 自定义shader实现per-particle size + color
  const mat = new THREE.ShaderMaterial({
    transparent: true,
    depthWrite: false,
    uniforms: {
      uOpacity: { value: 0.6 },
    },
    vertexShader: `
      attribute float size;
      attribute vec3 aColor;
      varying vec3 vColor;
      varying float vAlpha;
      void main() {
        vColor = aColor;
        vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
        gl_PointSize = size * (250.0 / -mvPos.z);
        gl_PointSize = clamp(gl_PointSize, 1.0, 30.0);
        gl_Position = projectionMatrix * mvPos;
        // 远处淡出
        vAlpha = smoothstep(150.0, 30.0, -mvPos.z);
      }
    `,
    fragmentShader: `
      uniform float uOpacity;
      varying vec3 vColor;
      varying float vAlpha;
      void main() {
        float d = length(gl_PointCoord - 0.5) * 2.0;
        if (d > 1.0) discard;
        // 柔和边缘
        float alpha = (1.0 - d * d) * uOpacity * vAlpha;
        gl_FragColor = vec4(vColor, alpha);
      }
    `,
  });

  const points = new THREE.Points(geo, mat);
  points.frustumCulled = false;
  scene.add(points);
  wheelSprays[label] = { geo, mat, points, vel, life, sizes, gravMult, colors, nextIdx: 0 };
}
['BL', 'BR', 'FL', 'FR'].forEach(initWheelSpray);

const _emitBaseColor = new THREE.Color();
const _emitBiomeHint = new THREE.Color();
function emitSpray(label, wx, wy, wz, carSpeed, heading) {
  const sp = wheelSprays[label];
  if (!sp) return;
  const absSpeed = Math.abs(carSpeed);
  if (absSpeed < 1.5) return;

  // 当前biome配置
  const biome = getBiomeName(wx, wz);
  const cfg = SPRAY_CONFIG[biome] || SPRAY_CONFIG.desert;
  const onIce = isInIceLake(wx, wz);
  const iceScale = onIce ? 0.2 : 1.0; // 冰面粒子缩小到0.2倍

  // 每帧发射量：速度越快越多（冰面减少发射量）
  const emitCount = Math.min(8, Math.floor(absSpeed * 0.4 * iceScale));
  const posArr = sp.geo.getAttribute('position');
  const sizeAttr = sp.geo.getAttribute('size');
  const colorAttr = sp.geo.getAttribute('aColor');
  // 使用biome配置颜色（避免每帧调用昂贵的computeVertexColor）
  _emitBaseColor.set(cfg.color);

  for (let e = 0; e < emitCount; e++) {
    const i = sp.nextIdx;
    sp.nextIdx = (sp.nextIdx + 1) % SPRAY_COUNT;

    // 发射位置：轮子附近随机偏移（冰面缩小范围）
    const offX = (Math.random() - 0.5) * 0.4 * iceScale;
    const offZ = (Math.random() - 0.5) * 0.4 * iceScale;
    posArr.setXYZ(i, wx + offX, wy + 0.05 + Math.random() * 0.1 * iceScale, wz + offZ);

    // 速度：向后方喷射 + 随机扩散（冰面缩小速度）
    const speedFactor = absSpeed * 0.3 * cfg.speedMult * iceScale;
    const backX = -Math.sin(heading) * speedFactor;
    const backZ = -Math.cos(heading) * speedFactor;
    // 随机偏转角（扩散）
    const spreadAngle = (Math.random() - 0.5) * cfg.spreadAngle;
    const cosS = Math.cos(spreadAngle), sinS = Math.sin(spreadAngle);
    const vx = backX * cosS - backZ * sinS + (Math.random() - 0.5) * 1.5;
    const vz = backX * sinS + backZ * cosS + (Math.random() - 0.5) * 1.5;
    const vy = cfg.upMin + Math.random() * (cfg.upMax - cfg.upMin);

    sp.vel[i * 3]     = vx;
    sp.vel[i * 3 + 1] = vy;
    sp.vel[i * 3 + 2] = vz;

    // 随机大小（冰面粒子缩小）
    const sizePow = (cfg.sizeMin + Math.pow(Math.random(), 1.8) * (cfg.sizeMax - cfg.sizeMin)) * iceScale;
    sizeAttr.setX(i, sizePow);

    // 每粒子颜色微调（自然变化）
    const colorVar = 0.85 + Math.random() * 0.3;
    colorAttr.setXYZ(i, _emitBaseColor.r * colorVar, _emitBaseColor.g * colorVar, _emitBaseColor.b * colorVar);

    // 重力系数：大粒子更重
    sp.gravMult[i] = cfg.gravityMult * (0.7 + sizePow / cfg.sizeMax * 0.6);

    // 寿命
    sp.life[i] = cfg.lifeMin + Math.random() * (cfg.lifeMax - cfg.lifeMin);
  }
}

// 缓存车辆附近地面高度（喷溅粒子用，避免每粒子调getTerrainHeight）
let _sprayGroundY = 0;
let _sprayGroundX = 0, _sprayGroundZ = 0;

function updateWheelSprays(dt) {
  // 每帧只采样一次车辆位置的地面高度
  _sprayGroundY = getTerrainHeight(car.pos.x, car.pos.z);
  _sprayGroundX = car.pos.x;
  _sprayGroundZ = car.pos.z;

  for (const label in wheelSprays) {
    const sp = wheelSprays[label];
    const posArr = sp.geo.getAttribute('position');
    const sizeAttr = sp.geo.getAttribute('size');

    for (let i = 0; i < SPRAY_COUNT; i++) {
      if (sp.life[i] <= 0) continue;
      sp.life[i] -= dt;
      if (sp.life[i] <= 0) {
        posArr.setXYZ(i, 0, -100, 0);
        sizeAttr.setX(i, 0);
        continue;
      }
      sp.vel[i * 3 + 1] -= 9.81 * sp.gravMult[i] * dt;
      const airDrag = 0.98;
      sp.vel[i * 3] *= airDrag;
      sp.vel[i * 3 + 2] *= airDrag;

      const x = posArr.getX(i) + sp.vel[i * 3] * dt;
      const y = posArr.getY(i) + sp.vel[i * 3 + 1] * dt;
      const z = posArr.getZ(i) + sp.vel[i * 3 + 2] * dt;

      // 地面碰撞（用缓存的近似高度，不逐粒子调用getTerrainHeight）
      const groundY = _sprayGroundY;
      if (y < groundY) {
        posArr.setXYZ(i, x, groundY, z);
        // 大小不同弹跳行为不同
        const bounce = 0.1 + Math.random() * 0.2;
        sp.vel[i * 3] *= bounce;
        sp.vel[i * 3 + 1] = Math.abs(sp.vel[i * 3 + 1]) * bounce * 0.3;
        sp.vel[i * 3 + 2] *= bounce;
        sp.life[i] = Math.min(sp.life[i], 0.15);
        // 落地后缩小
        sizeAttr.setX(i, sizeAttr.getX(i) * 0.6);
      } else {
        posArr.setXYZ(i, x, y, z);
      }

      // 临终缩小
      if (sp.life[i] < 0.15) {
        sizeAttr.setX(i, sizeAttr.getX(i) * (sp.life[i] / 0.15));
      }
    }
    posArr.needsUpdate = true;
    sizeAttr.needsUpdate = true;

    // 更新整体透明度
    const biome = getBiomeName(car.pos.x, car.pos.z);
    const cfg = SPRAY_CONFIG[biome] || SPRAY_CONFIG.desert;
    sp.mat.uniforms.uOpacity.value = cfg.opacityBase;

    // 颜色属性也需要标记更新（因为emit时写了新颜色）
    sp.geo.getAttribute('aColor').needsUpdate = true;
  }
}
