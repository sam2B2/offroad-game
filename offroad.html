// MODEL
// ============================================================
let truckModel = null;
let truckGroup = null;
let wheelFL = null, wheelFR = null, wheelBL = null, wheelBR = null;
let wheelRadius = 0.4;
let modelReady = false;
let wheelPivotRestPos = {}; // 每个轮子pivot的静止local position（在其parent内）
let modelCenterOffset = new THREE.Vector3(); // truckModel的居中偏移

// 车灯状态
const carLights = {
  installed: false,
  lowBeam: false,      // 近光灯开关（手动）
  highBeam: false,     // 远光灯开关（手动）
  autoOn: false,       // 自动判断是否需要开灯（光线暗时）
  // 前灯：上2=远光(high)，下2=近光(low)
  headHighL: null, headHighR: null,  // SpotLight
  headLowL: null, headLowR: null,    // SpotLight
  headGlows: [],       // 4个灯罩发光mesh
  // 尾灯：下2=常亮(running)，上2=刹车(brake)
  tailRunL: null, tailRunR: null,    // PointLight
  tailBrakeL: null, tailBrakeR: null, // PointLight
  tailGlows: [],       // 4个尾灯发光mesh
  // 材质引用（用于emissive控制）
  headMat: null,       // blinn4
  tailMat: null,       // blinn5
};

const loader = new GLTFLoader();
loader.load(
  'lp_offroad_truck1/scene.gltf',
  (gltf) => { try {
    truckModel = gltf.scene;

    // Scale
    const box = new THREE.Box3().setFromObject(truckModel);
    const size = box.getSize(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);
    const scale = 4.5 / maxDim;
    truckModel.scale.setScalar(scale);

    // Re-center
    const box2 = new THREE.Box3().setFromObject(truckModel);
    const center2 = box2.getCenter(new THREE.Vector3());
    const min2 = box2.min;
    truckModel.position.x -= center2.x;
    truckModel.position.z -= center2.z;
    truckModel.position.y -= min2.y;
    modelCenterOffset.copy(truckModel.position);

    // Fix materials
    truckModel.traverse((child) => {
      if (child.isMesh) {
        child.castShadow = true;
        child.receiveShadow = true;
        const mat = child.material;
        const name = mat.name || '';
        if (name === 'lambert6') { mat.color.set(0x3a3a3a); mat.metalness = 0; mat.roughness = 0.85; }
        if (name === 'blinn9') { mat.color.set(0xaaaaaa); mat.metalness = 0.6; mat.roughness = 0.2; }
        if (name === 'lambert7') { mat.color.set(0x888888); mat.metalness = 0.3; mat.roughness = 0.4; }
        if (name === 'blinn1') { mat.color.set(0x4488bb); mat.metalness = 0.1; mat.roughness = 0.05; mat.transparent = true; mat.opacity = 0.6; }
        if (name === 'phong1') { mat.color.set(0x2a2a2a); mat.metalness = 0.1; mat.roughness = 0.6; }
        if (name === 'lambert8') { mat.color.set(0x333333); mat.metalness = 0.1; mat.roughness = 0.7; }
        if (name === 'lambert4' || name === 'lambert5') { mat.color.set(0x336688); mat.metalness = 0.05; mat.roughness = 0.1; mat.transparent = true; mat.opacity = 0.5; }
        if (name === 'blinn8') { mat.color.set(0xcccccc); mat.metalness = 0.7; mat.roughness = 0.15; }
        if (name === 'lambert3') { mat.color.set(0x444444); mat.metalness = 0.1; mat.roughness = 0.7; }
      }
    });

    // Hierarchy: truckGroup > truckModel (含车身+轮子)
    // 悬架方案：truckGroup 平贴地面，truckModel 整体做 pitch/roll，
    //           但每帧对轮子 pivot 施加反向补偿，让轮子视觉上始终贴地
    truckGroup = new THREE.Group();
    truckGroup.add(truckModel);
    scene.add(truckGroup);

    // Find and create wheel pivots（与原来完全相同的方式）
    let rawFL = null, rawFR = null, rawBL = null, rawBR = null;
    truckModel.traverse((child) => {
      if (child.name === 'WTmesh_FL') rawFL = child;
      if (child.name === 'WTmesh_FR') rawFR = child;
      if (child.name === 'WTmesh_BL') rawBL = child;
      if (child.name === 'WTmesh_BR') rawBR = child;
    });

    truckGroup.updateMatrixWorld(true);

    function createWheelPivot(wheelNode) {
      if (!wheelNode) return null;
      const wBox = new THREE.Box3().setFromObject(wheelNode);
      const wCenter = wBox.getCenter(new THREE.Vector3());
      const wSize = wBox.getSize(new THREE.Vector3());
      const parent = wheelNode.parent;
      const parentInv = new THREE.Matrix4().copy(parent.matrixWorld).invert();
      const localCenter = wCenter.clone().applyMatrix4(parentInv);
      const pivot = new THREE.Group();
      pivot.name = wheelNode.name + '_pivot';
      pivot.position.copy(localCenter);
      parent.add(pivot);
      parent.remove(wheelNode);
      pivot.add(wheelNode);
      wheelNode.position.set(-localCenter.x, -localCenter.y, -localCenter.z);
      return { pivot, size: wSize, center: wCenter, localCenter };
    }

    const flInfo = createWheelPivot(rawFL);
    const frInfo = createWheelPivot(rawFR);
    const blInfo = createWheelPivot(rawBL);
    const brInfo = createWheelPivot(rawBR);

    wheelFL = flInfo?.pivot || null;
    wheelFR = frInfo?.pivot || null;
    wheelBL = blInfo?.pivot || null;
    wheelBR = brInfo?.pivot || null;

    // 记录每个轮子pivot的信息：pivot引用 + 静止时的世界Y坐标 + 在parent内的localCenter
    truckGroup.updateMatrixWorld(true);
    [['FL', flInfo], ['FR', frInfo], ['BL', blInfo], ['BR', brInfo]].forEach(([label, info]) => {
      if (!info) return;
      const wp = new THREE.Vector3();
      info.pivot.getWorldPosition(wp);
      wheelPivotRestPos[label] = {
        localPos: info.localCenter.clone(), // pivot.position in parent space
        worldY: wp.y,                        // 静止时的世界Y
      };
    });

    // 计算实际半轮距（左右轮中心的X距离的一半）
    if (flInfo && frInfo) {
      const flW = new THREE.Vector3(), frW = new THREE.Vector3();
      flInfo.pivot.getWorldPosition(flW);
      frInfo.pivot.getWorldPosition(frW);
      HALF_TRACK_WIDTH = Math.abs(flW.x - frW.x) / 2;
    }

    if (flInfo) {
      const dims = [flInfo.size.x, flInfo.size.y, flInfo.size.z].sort((a, b) => a - b);
      wheelRadius = dims[2] / 2;
    }

    // 计算轴距（前轮中心到后轮中心的Z距离）
    if (flInfo && blInfo) {
      const flW = new THREE.Vector3(), blW = new THREE.Vector3();
      flInfo.pivot.getWorldPosition(flW);
      blInfo.pivot.getWorldPosition(blW);
      WHEELBASE = Math.sqrt((flW.x - blW.x) ** 2 + (flW.z - blW.z) ** 2);
    }

    // 从模型实际尺寸计算物理参数
    const finalBox = new THREE.Box3().setFromObject(truckGroup);
    const carHeight = finalBox.max.y - finalBox.min.y;
    const carWidth = finalBox.max.x - finalBox.min.x;
    CG_HEIGHT = carHeight * 0.22;  // 重心很低 → 非常稳
    CAR_HALF_HEIGHT = carHeight / 2;
    CAR_HALF_WIDTH = carWidth / 2;

    console.log(`[Vehicle] wheelbase=${WHEELBASE.toFixed(3)}, halfTrack=${HALF_TRACK_WIDTH.toFixed(3)}, cgH=${CG_HEIGHT.toFixed(3)}, carH=${carHeight.toFixed(3)}, carW=${carWidth.toFixed(3)}, wheelR=${wheelRadius.toFixed(3)}, critAngle=${(Math.atan2(HALF_TRACK_WIDTH, CG_HEIGHT) * 57.3).toFixed(1)}°`);

    // ============================================================
    // HEADLIGHTS & TAILLIGHTS — 从模型网格精确定位
    // ============================================================
    // 找到灯光相关的材质mesh，获取精确位置
    let headlightMesh = null, taillightMesh = null;
    truckModel.traverse((child) => {
      if (!child.isMesh) return;
      const mName = child.material?.name || '';
      // blinn4 = 前灯（黄色），blinn5 = 尾灯（纯红）
      if (mName === 'blinn4') headlightMesh = child;
      if (mName === 'blinn5') taillightMesh = child;
    });

    // 计算灯光mesh的包围盒中心（在truckModel空间内）
    truckGroup.updateMatrixWorld(true);

    function getMeshBoundsLocal(mesh) {
      const box = new THREE.Box3().setFromObject(mesh);
      // 转到truckModel本地空间
      const inv = new THREE.Matrix4().copy(truckModel.matrixWorld).invert();
      box.applyMatrix4(inv);
      return box;
    }

    const headBox = headlightMesh ? getMeshBoundsLocal(headlightMesh) : null;
    const tailBox = taillightMesh ? getMeshBoundsLocal(taillightMesh) : null;

    // 前灯位置（从模型mesh推算）
    const hZ = headBox ? headBox.max.z + 0.02 : finalBox.max.z - finalBox.min.z / 2 * 0.9;
    const hYlo = headBox ? headBox.min.y + (headBox.max.y - headBox.min.y) * 0.25 : carHeight * 0.4;
    const hYhi = headBox ? headBox.min.y + (headBox.max.y - headBox.min.y) * 0.75 : carHeight * 0.5;
    const hXout = headBox ? (headBox.max.x - headBox.min.x) * 0.35 : HALF_TRACK_WIDTH * 0.6;
    const hXin = headBox ? (headBox.max.x - headBox.min.x) * 0.15 : HALF_TRACK_WIDTH * 0.3;

    // 尾灯位置
    const tZ = tailBox ? tailBox.min.z - 0.02 : -(finalBox.max.z - finalBox.min.z) / 2 * 0.9;
    const tYlo = tailBox ? tailBox.min.y + (tailBox.max.y - tailBox.min.y) * 0.15 : carHeight * 0.35;
    const tYhi = tailBox ? tailBox.min.y + (tailBox.max.y - tailBox.min.y) * 0.65 : carHeight * 0.45;
    const tXout = tailBox ? (tailBox.max.x - tailBox.min.x) * 0.35 : HALF_TRACK_WIDTH * 0.65;
    const tXin = tailBox ? (tailBox.max.x - tailBox.min.x) * 0.15 : HALF_TRACK_WIDTH * 0.3;

    // -- 前大灯 ×4: 上2=远光(High), 下2=近光(Low) --
    function addHeadlight(x, y, z, distance, angle, key) {
      const light = new THREE.SpotLight(0xfff4d0, 0, distance, angle, 0.4, 1.5);
      light.position.set(x, y, z);
      light.castShadow = false;
      const target = new THREE.Object3D();
      target.position.set(x, y - 1, z + 20);
      truckModel.add(target);
      light.target = target;
      truckModel.add(light);
      // 灯泡发光
      const glow = new THREE.Mesh(
        new THREE.SphereGeometry(0.06, 6, 6),
        new THREE.MeshBasicMaterial({ color: 0xfff8e0, transparent: true, opacity: 0 })
      );
      glow.position.set(x, y, z + 0.02);
      truckModel.add(glow);
      carLights.headGlows.push(glow);
      return light;
    }

    // 远光灯（上排，照得更远更窄更亮）
    carLights.headHighL = addHeadlight(-hXout, hYhi, hZ, 80, Math.PI / 9, 'HL');
    carLights.headHighR = addHeadlight(hXout, hYhi, hZ, 80, Math.PI / 9, 'HR');
    // 远光target更远更平
    carLights.headHighL.target.position.set(-hXout * 0.3, hYhi - 0.5, hZ + 40);
    carLights.headHighR.target.position.set(hXout * 0.3, hYhi - 0.5, hZ + 40);
    // 近光灯（下排，照得近但更宽，略朝下）
    carLights.headLowL = addHeadlight(-hXin, hYlo, hZ, 30, Math.PI / 4.5, 'LL');
    carLights.headLowR = addHeadlight(hXin, hYlo, hZ, 30, Math.PI / 4.5, 'LR');
    // 近光target更朝下
    carLights.headLowL.target.position.y = hYlo - 2;
    carLights.headLowL.target.position.z = hZ + 12;
    carLights.headLowR.target.position.y = hYlo - 2;
    carLights.headLowR.target.position.z = hZ + 12;

    // -- 尾灯 ×4: 下2=常亮(Running), 上2=刹车(Brake) --
    function addTaillight(x, y, z, key) {
      const light = new THREE.PointLight(0xff2200, 0, 6, 2);
      light.position.set(x, y, z);
      truckModel.add(light);
      const glow = new THREE.Mesh(
        new THREE.BoxGeometry(0.12, 0.06, 0.03),
        new THREE.MeshBasicMaterial({ color: 0xaa0000, transparent: true, opacity: 0 })
      );
      glow.position.set(x, y, z - 0.01);
      truckModel.add(glow);
      carLights.tailGlows.push(glow);
      return light;
    }

    // 常亮尾灯（下排）
    carLights.tailRunL = addTaillight(-tXout, tYlo, tZ, 'TRL');
    carLights.tailRunR = addTaillight(tXout, tYlo, tZ, 'TRR');
    // 刹车灯（上排）
    carLights.tailBrakeL = addTaillight(-tXin, tYhi, tZ, 'TBL');
    carLights.tailBrakeR = addTaillight(tXin, tYhi, tZ, 'TBR');

    // 保存灯光材质引用（用于emissive控制）
    if (headlightMesh) {
      carLights.headMat = headlightMesh.material;
      headlightMesh.material.emissive = new THREE.Color(0x000000);
    }
    if (taillightMesh) {
      carLights.tailMat = taillightMesh.material;
      taillightMesh.material.emissive = new THREE.Color(0x000000);
    }

    carLights.installed = true;

    modelReady = true;
    document.getElementById('loading').classList.add('hidden');
  } catch(e) { console.error(e); document.getElementById('loading').textContent = '初始化失败: ' + e.message; }
  },
  undefined,
  (err) => { console.error(err); document.getElementById('loading').textContent = '加载失败: ' + err.message; }
);

// ============================================================
// CAR LIGHTS UPDATE
// ============================================================
// 灯光自动控制（夜晚自动开，白天自动关，不再需要手动切换）

function updateCarLights() {
  if (!carLights.installed) return;

  // 判断环境光亮度 — 取太阳强度+环境强度的综合值
  const sunI = keyLight.intensity;
  const ambI = ambientLight.intensity;
  const brightness = sunI * 0.7 + ambI * 0.3;
  const rainDim = 0; // 天气系统已移除

  // 低于阈值 = 环境暗（黄昏、夜晚、雨天）→ 自动开灯
  const shouldBeOn = (brightness - rainDim) < 0.8;
  carLights.autoOn = shouldBeOn;
  // 自动控制近光远光（夜晚全开，白天全关）
  carLights.lowBeam = shouldBeOn;
  carLights.highBeam = shouldBeOn;

  const lerpSlow = 0.05;
  const lerpFast = 0.2;

  const lightsOn = carLights.lowBeam || carLights.highBeam;

  // ---- 前灯（亮度翻倍）----
  const lowOn = carLights.lowBeam;
  const lowTarget = lowOn ? 8 : 0;  // 原来4，翻倍到8
  carLights.headLowL.intensity += (lowTarget - carLights.headLowL.intensity) * lerpSlow;
  carLights.headLowR.intensity += (lowTarget - carLights.headLowR.intensity) * lerpSlow;

  const highOn = carLights.highBeam;
  const highTarget = highOn ? 30 : 0; // 原来15，翻倍到30
  carLights.headHighL.intensity += (highTarget - carLights.headHighL.intensity) * lerpSlow;
  carLights.headHighR.intensity += (highTarget - carLights.headHighR.intensity) * lerpSlow;

  // 前灯灯罩发光 (headGlows: 0=HL, 1=HR, 2=LL, 3=LR)
  const highGlowTarget = highOn ? 0.95 : 0;
  const lowGlowTarget = lowOn ? 0.8 : 0;
  carLights.headGlows[0].material.opacity += (highGlowTarget - carLights.headGlows[0].material.opacity) * lerpSlow;
  carLights.headGlows[1].material.opacity += (highGlowTarget - carLights.headGlows[1].material.opacity) * lerpSlow;
  carLights.headGlows[2].material.opacity += (lowGlowTarget - carLights.headGlows[2].material.opacity) * lerpSlow;
  carLights.headGlows[3].material.opacity += (lowGlowTarget - carLights.headGlows[3].material.opacity) * lerpSlow;

  // 前灯材质emissive（blinn4黄色灯壳发光）
  if (carLights.headMat) {
    const headEmissiveTarget = (lowOn || highOn) ? 0.6 : 0;
    const curE = carLights.headMat.emissive.r;
    const newE = curE + (headEmissiveTarget - curE) * lerpSlow;
    carLights.headMat.emissive.setRGB(newE, newE * 0.9, newE * 0.6); // 暖黄
  }

  // ---- 尾灯 ----
  // 刹车判定：自动刹车、反向制动、手刹、完全停车
  const isBraking = (car.throttle === 0 && car.reverse === 0 && Math.abs(car.speed) > 0.3)
                  || (car.reverse > 0 && car.speed > 0.3)
                  || (car.throttle > 0 && car.speed < -0.3)
                  || car.handbrake;
  const isStopped = Math.abs(car.speed) < 0.1 && car.throttle === 0 && car.reverse === 0;

  // 常亮尾灯（tailRunL/R）：只要灯光开启(近光或远光)就常亮暗红，刹车时更亮
  let runTargetI, runTargetOp;
  if (isBraking || isStopped) {
    runTargetI = 1.2; runTargetOp = 0.7;
  } else if (lightsOn) {
    runTargetI = 0.8; runTargetOp = 0.6;
  } else {
    runTargetI = 0; runTargetOp = 0;
  }
  const runLerp = (isBraking || isStopped) ? lerpFast : lerpSlow;
  carLights.tailRunL.intensity += (runTargetI - carLights.tailRunL.intensity) * runLerp;
  carLights.tailRunR.intensity += (runTargetI - carLights.tailRunR.intensity) * runLerp;

  // 刹车灯（tailBrakeL/R）：刹车或停车时高亮
  let brakeTargetI, brakeTargetOp;
  if (isBraking || isStopped) {
    brakeTargetI = 3; brakeTargetOp = 1.0;
  } else if (lightsOn) {
    brakeTargetI = 0.3; brakeTargetOp = 0.3;
  } else {
    brakeTargetI = 0; brakeTargetOp = 0;
  }
  const brakeLerp = (isBraking || isStopped) ? lerpFast : lerpSlow;
  carLights.tailBrakeL.intensity += (brakeTargetI - carLights.tailBrakeL.intensity) * brakeLerp;
  carLights.tailBrakeR.intensity += (brakeTargetI - carLights.tailBrakeR.intensity) * brakeLerp;

  // 尾灯灯罩发光 (tailGlows: 0=TRL, 1=TRR, 2=TBL, 3=TBR)
  carLights.tailGlows[0].material.opacity += (runTargetOp - carLights.tailGlows[0].material.opacity) * runLerp;
  carLights.tailGlows[1].material.opacity += (runTargetOp - carLights.tailGlows[1].material.opacity) * runLerp;
  carLights.tailGlows[2].material.opacity += (brakeTargetOp - carLights.tailGlows[2].material.opacity) * brakeLerp;
  carLights.tailGlows[3].material.opacity += (brakeTargetOp - carLights.tailGlows[3].material.opacity) * brakeLerp;

  // 刹车/停车时尾灯颜色更亮
  const brakeColor = (isBraking || isStopped) ? 0xff1100 : 0xaa0000;
  carLights.tailGlows[2].material.color.set(brakeColor);
  carLights.tailGlows[3].material.color.set(brakeColor);

  // 尾灯材质emissive（blinn5红色灯壳发光）
  if (carLights.tailMat) {
    const maxTailI = Math.max(carLights.tailRunL.intensity, carLights.tailBrakeL.intensity);
    const tailEmTarget = maxTailI > 0.1 ? Math.min(maxTailI / 3, 0.8) : 0;
    const curTE = carLights.tailMat.emissive.r;
    const newTE = curTE + (tailEmTarget - curTE) * lerpFast;
    carLights.tailMat.emissive.setRGB(newTE, newTE * 0.1, 0); // 深红
  }
}

// ============================================================
// TIRE TRACKS — 优化版 ribbon mesh（大幅降低地形查询 + polygonOffset消除穿帮）
// ============================================================
const TRACK_MAX_PTS = 800;       // 每轨迹最多点数（降低内存）
const TRACK_MIN_DIST = 0.12;     // 采样间距
const TIRE_WIDTH = 0.44;
const TRACK_PEAK_ALPHA = 0.3;

const tracks = {};

// 地面类型 → 车辙颜色 & alpha（静态结果对象，避免GC）
const _trackStyleResult = { r: 0.60, g: 0.52, b: 0.38, a: 0.30 };
function _trackSurfaceStyle(p) {
  if (p.onIce)              { _trackStyleResult.r=0.80; _trackStyleResult.g=0.90; _trackStyleResult.b=0.98; _trackStyleResult.a=0.12; }
  else if (p.biome === 'snow')   { _trackStyleResult.r=0.88; _trackStyleResult.g=0.90; _trackStyleResult.b=0.93; _trackStyleResult.a=0.18; }
  else if (p.biome === 'desert') { _trackStyleResult.r=1.20; _trackStyleResult.g=1.00; _trackStyleResult.b=0.70; _trackStyleResult.a=0.25; }
  else { _trackStyleResult.r=0.60; _trackStyleResult.g=0.52; _trackStyleResult.b=0.38; _trackStyleResult.a=0.30; }
  return _trackStyleResult;
}

function initTrack(label) {
  const maxV = TRACK_MAX_PTS * 2;
  const pos = new Float32Array(maxV * 3);
  const uv  = new Float32Array(maxV * 2);
  const alp = new Float32Array(maxV);
  const col = new Float32Array(maxV * 3);
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position',   new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('uv',         new THREE.BufferAttribute(uv,  2));
  geo.setAttribute('alpha',      new THREE.BufferAttribute(alp, 1));
  geo.setAttribute('trackColor', new THREE.BufferAttribute(col, 3));
  const idx = [];
  for (let i = 0; i < TRACK_MAX_PTS - 1; i++) {
    const b = i * 2;
    idx.push(b, b + 1, b + 2, b + 1, b + 3, b + 2);
  }
  geo.setIndex(idx);
  geo.setDrawRange(0, 0);
  const mat = new THREE.ShaderMaterial({
    transparent: true,
    depthWrite: false,
    side: THREE.DoubleSide,
    // polygonOffset 让车辙稍微偏向相机，消除z-fighting穿帮
    polygonOffset: true,
    polygonOffsetFactor: -2,
    polygonOffsetUnits: -2,
    uniforms: { tireMap: { value: tireTexture } },
    vertexShader: `
      attribute float alpha;
      attribute vec3 trackColor;
      varying float vA;
      varying vec2 vUv;
      varying vec3 vCol;
      void main() {
        vA = alpha; vUv = uv; vCol = trackColor;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }`,
    fragmentShader: `
      uniform sampler2D tireMap;
      varying float vA;
      varying vec2 vUv;
      varying vec3 vCol;
      void main() {
        vec4 tex = texture2D(tireMap, vUv);
        gl_FragColor = vec4(vCol * tex.rgb, vA * tex.a);
      }`,
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.frustumCulled = false;
  scene.add(mesh);
  tracks[label] = { pts: [], geo, mesh, totalDist: 0 };
}
['FL', 'FR', 'BL', 'BR'].forEach(initTrack);

function addTrackPoint(label, wx, wz, heading) {
  const t = tracks[label];
  const pts = t.pts;
  const last = pts[pts.length - 1];
  let segDist = 0;
  if (last) {
    const dx = wx - last.x, dz = wz - last.z;
    const d2 = dx * dx + dz * dz;
    if (d2 < TRACK_MIN_DIST * TRACK_MIN_DIST) return;
    segDist = Math.sqrt(d2);
  }
  t.totalDist += segDist;
  const y = getTerrainHeight(wx, wz);
  const biome = getBiomeName(wx, wz);
  const onIce = isInIceLake(wx, wz);
  pts.push({ x: wx, z: wz, y, h: heading, t: gameTime, d: t.totalDist, biome, onIce });
}

// 车辙更新计数器：不用每帧全量更新所有点，分帧处理
let _trackFullUpdateTimer = 0;

function updateTracks() {
  const UV_REPEAT = 0.6;
  // 只对最近30个点做实时高度查询
  const LIVE_Y_PTS = 30;
  // 全量更新每0.5秒做一次（edgeFade/颜色/位置），中间帧只更新尾部新增点
  _trackFullUpdateTimer += 1;
  const doFullUpdate = _trackFullUpdateTimer >= 30; // ~每0.5秒(60fps)
  if (doFullUpdate) _trackFullUpdateTimer = 0;

  for (const label in tracks) {
    const t = tracks[label];
    const pts = t.pts;
    while (pts.length > TRACK_MAX_PTS) pts.shift();
    const posA = t.geo.getAttribute('position');
    const uvA  = t.geo.getAttribute('uv');
    const alpA = t.geo.getAttribute('alpha');
    const colA = t.geo.getAttribute('trackColor');
    const n = pts.length;
    const baseDist = n > 0 ? pts[0].d : 0;

    // 确定本帧需要更新的范围
    // 每帧只更新最后 LIVE_Y_PTS 个点（新增+高度活跃）
    // 全量更新时处理所有点
    const updateStart = doFullUpdate ? 0 : Math.max(0, n - LIVE_Y_PTS - 2);

    for (let i = updateStart; i < n; i++) {
      const p = pts[i];
      const px = Math.cos(p.h) * TIRE_WIDTH;
      const pz = -Math.sin(p.h) * TIRE_WIDTH;
      const vi = i * 2;

      const ldx = p.x - terrainCenterX, ldz = p.z - terrainCenterZ;
      const ldist = Math.sqrt(ldx * ldx + ldz * ldz);
      const ef = Math.max(0, 1 - smoothstepGlobal(TERRAIN_RADIUS - 30, TERRAIN_RADIUS, ldist));
      if (ef <= 0) {
        posA.setXYZ(vi, 0, 0, 0); posA.setXYZ(vi+1, 0, 0, 0);
        alpA.setX(vi, 0); alpA.setX(vi+1, 0);
        continue;
      }

      const liveY = i >= n - LIVE_Y_PTS;
      let yL, yR;
      if (liveY) {
        yL = getTerrainHeight(p.x - px, p.z - pz);
        yR = getTerrainHeight(p.x + px, p.z + pz);
      } else {
        yL = yR = p.y;
      }
      const renderYL = yL * ef;
      const renderYR = yR * ef;

      posA.setXYZ(vi,     p.x - px, renderYL, p.z - pz);
      posA.setXYZ(vi + 1, p.x + px, renderYR, p.z + pz);

      const v = (p.d - baseDist) / UV_REPEAT;
      uvA.setXY(vi,   0, v);
      uvA.setXY(vi+1, 1, v);

      const style = _trackSurfaceStyle(p);
      const a = style.a * ef;
      alpA.setX(vi, a); alpA.setX(vi+1, a);
      colA.setXYZ(vi,   style.r, style.g, style.b);
      colA.setXYZ(vi+1, style.r, style.g, style.b);
    }

    // 全量更新时清空未使用的顶点
    if (doFullUpdate) {
      for (let i = n * 2; i < TRACK_MAX_PTS * 2; i++) {
        posA.setXYZ(i, 0, 0, 0); uvA.setXY(i, 0, 0); alpA.setX(i, 0);
      }
    }

    posA.needsUpdate = true;
    uvA.needsUpdate  = true;
    alpA.needsUpdate = true;
    colA.needsUpdate = true;
    t.geo.setDrawRange(0, Math.max(0, n - 1) * 6);
  }
}

// ============================================================
// UPDATE TRUCK — 硬桥悬架系统
// ============================================================
let totalSpinAngle = 0;

// 平滑值（避免高频抖动）
let smoothBodyY = 0;
let smoothBodyPitch = 0;
let smoothBodyRoll = 0;
let smoothInited = false;

// Pre-allocated objects for updateTruck (avoid GC pressure)
const _hQ = new THREE.Quaternion();
const _bPitchQ = new THREE.Quaternion();
const _bRollQ = new THREE.Quaternion();
const _physRollQ = new THREE.Quaternion();
const _physPitchQ = new THREE.Quaternion();
const _suspBodyRot = new THREE.Quaternion();
const _suspBodyInv = new THREE.Quaternion();
const _axleRollQ = new THREE.Quaternion();
const _spQ = new THREE.Quaternion();
const _sQ = new THREE.Quaternion();
const _axisX = new THREE.Vector3(1, 0, 0);
const _axisY = new THREE.Vector3(0, 1, 0);
const _axisZ = new THREE.Vector3(0, 0, 1);
const _wpTemp = new THREE.Vector3();

function updateTruck(dt) {
  if (!truckGroup || !modelReady) return;

  const wheelList = [
    { label: 'FL', p: wheelFL, front: true,  side: -1 },
    { label: 'FR', p: wheelFR, front: true,  side: +1 },
    { label: 'BL', p: wheelBL, front: false, side: -1 },
    { label: 'BR', p: wheelBR, front: false, side: +1 },
  ];

  const absRoll = Math.abs(car.bodyRoll);

  const sinH = Math.sin(car.heading), cosH = Math.cos(car.heading);
  const halfWB = WHEELBASE / 2;
  const halfTW = HALF_TRACK_WIDTH;

  // ============================================================
  // Step 1: 四轮世界坐标 + 地形采样
  // ============================================================
  // 注意：heading 使车头朝 +Z 方向 (sin(heading)=X, cos(heading)=Z)
  // 前方 = +heading方向，左 = -cosH, +sinH
  const wFL = { x: car.pos.x + sinH * halfWB - cosH * halfTW, z: car.pos.z + cosH * halfWB + sinH * halfTW };
  const wFR = { x: car.pos.x + sinH * halfWB + cosH * halfTW, z: car.pos.z + cosH * halfWB - sinH * halfTW };
  const wBL = { x: car.pos.x - sinH * halfWB - cosH * halfTW, z: car.pos.z - cosH * halfWB + sinH * halfTW };
  const wBR = { x: car.pos.x - sinH * halfWB + cosH * halfTW, z: car.pos.z - cosH * halfWB - sinH * halfTW };

  // 地面高度（轮子触地点）
  const gFL = getTerrainHeight(wFL.x, wFL.z);
  const gFR = getTerrainHeight(wFR.x, wFR.z);
  const gBL = getTerrainHeight(wBL.x, wBL.z);
  const gBR = getTerrainHeight(wBR.x, wBR.z);

  // ============================================================
  // Step 2: 硬桥约束
  // ============================================================
  // 前桥：FL 和 FR 共享一根刚性桥
  // 桥中点高度（桥是刚性的，中点 = 两端平均）
  const frontAxleMid = (gFL + gFR) / 2;
  const rearAxleMid = (gBL + gBR) / 2;

  // 桥倾斜角（用于轮子视觉倾斜）
  const frontAxleRoll = Math.atan2(gFR - gFL, HALF_TRACK_WIDTH * 2);
  const rearAxleRoll = Math.atan2(gBR - gBL, HALF_TRACK_WIDTH * 2);

  // 硬桥杠杆效应下的实际轮子高度：
  // 当一侧轮子碰到高地形时，桥绕弹簧连接点（近似桥中心）旋转
  // 另一侧轮子被杠杆拉离地面（如果行程允许）
  // 但在这里，我们用地形高度直接驱动桥的姿态
  // 桥的两端高度就是地形高度（轮子贴地）
  // 弹簧连接在桥中点和车身之间

  // ============================================================
  // Step 3: 四弹簧计算 + 载荷转移
  // ============================================================
  // 载荷转移：直接是弹簧目标压缩量（米）
  // loadTransferPitch > 0 = 前轴压缩（刹车点头）
  // loadTransferRoll > 0 = 右侧压缩（左转外倾）
  const ltP = car.loadTransferPitch;
  const ltR = car.loadTransferRoll;

  // 每个弹簧的目标压缩量 = 载荷转移分量之和
  const targetFL = (+ltP - ltR);
  const targetFR = (+ltP + ltR);
  const targetBL = (-ltP - ltR);
  const targetBR = (-ltP + ltR);

  // 弹簧-阻尼系统更新（使用预分配对象避免GC）
  const _springResult = { pos: 0, vel: 0 };
  function updateSpring(current, vel, target, dt) {
    const force = (target - current) * SUSP_SPRING_K - vel * SUSP_SPRING_D;
    const newVel = vel + force * dt;
    let newPos = current + newVel * dt;
    newPos = Math.max(-MAX_EXTEND, Math.min(MAX_COMPRESS, newPos));
    _springResult.pos = newPos; _springResult.vel = newVel;
    return _springResult;
  }

  let sFL = updateSpring(car.springFL, car.springVelFL, targetFL, dt);
  car.springFL = sFL.pos; car.springVelFL = sFL.vel;
  let sFR = updateSpring(car.springFR, car.springVelFR, targetFR, dt);
  car.springFR = sFR.pos; car.springVelFR = sFR.vel;
  let sBL = updateSpring(car.springBL, car.springVelBL, targetBL, dt);
  car.springBL = sBL.pos; car.springVelBL = sBL.vel;
  let sBR = updateSpring(car.springBR, car.springVelBR, targetBR, dt);
  car.springBR = sBR.pos; car.springVelBR = sBR.vel;

  // ============================================================
  // Step 4: 车身位姿计算
  // ============================================================
  // 车身基础高度 = 四轮地形平均（模型本身已含轮到车身距离，不额外加）
  const terrainAvg = (gFL + gFR + gBL + gBR) / 4;
  
  // 弹簧压缩量影响车身高度：压缩为正→车身下降，伸展为负→车身上升
  const springAvg = (car.springFL + car.springFR + car.springBL + car.springBR) / 4;
  const targetBodyY = terrainAvg - springAvg;

  // 车身pitch: 由地形前后差 + 弹簧前后差共同决定
  const terrainPitchDiff = ((gFL + gFR) - (gBL + gBR)) / 2; // 前-后地形差
  const springPitchDiff = ((car.springFL + car.springFR) - (car.springBL + car.springBR)) / 2; // 前-后弹簧差
  const targetBodyPitch = Math.atan2(terrainPitchDiff - springPitchDiff, WHEELBASE);

  // 车身roll: 由地形左右差 + 弹簧左右差共同决定
  const terrainRollDiff = ((gFR + gBR) - (gFL + gBL)) / 2; // 右-左地形差
  const springRollDiff = ((car.springFR + car.springBR) - (car.springFL + car.springBL)) / 2; // 右-左弹簧差
  const targetBodyRoll = Math.atan2(terrainRollDiff - springRollDiff, HALF_TRACK_WIDTH * 2);

  // 平滑（避免地形噪声引起的抖动）
  if (!smoothInited) {
    smoothBodyY = targetBodyY;
    smoothBodyPitch = targetBodyPitch;
    smoothBodyRoll = targetBodyRoll;
    smoothInited = true;
  }
  const smoothRate = Math.min(1, 10 * dt);

  // 上升和下降都限速，防止地形突变导致跳帧
  const dyTarget = targetBodyY - smoothBodyY;
  const maxRise = 8.0 * dt; // 最大上升速率 8m/s（提高以避免穿模）
  const maxFall = 5.0 * dt; // 最大下降速率 5m/s
  let clampedDy;
  if (dyTarget > 0) {
    clampedDy = Math.min(dyTarget * smoothRate, maxRise);
  } else {
    clampedDy = Math.max(dyTarget * smoothRate, -maxFall);
  }
  smoothBodyY += clampedDy;

  // 硬底保护：绝对不能低于地形高度（防穿模）
  const terrainFloor = getTerrainHeight(car.pos.x, car.pos.z);
  if (smoothBodyY < terrainFloor) {
    smoothBodyY = terrainFloor;
  }

  // 冰面检测（只调用一次，复用结果）
  const onIce = isInIceLake(car.pos.x, car.pos.z);

  // 冰面地板保护：用平滑过渡替代硬 clamp，消除进出冰面时的高度跳变
  if (onIce) {
    const iceFloor = BIOME_BASE.snow + 2.0;
    if (smoothBodyY < iceFloor) {
      // 平滑上推到冰面高度，而非硬 clamp
      smoothBodyY += (iceFloor - smoothBodyY) * Math.min(1, 15 * dt);
    }
  }

  // 冰面：地面平坦，pitch/roll 用更低的跟随速率压制抖动
  const orientRate = onIce ? Math.min(1, 3 * dt) : smoothRate;
  smoothBodyPitch += (targetBodyPitch - smoothBodyPitch) * orientRate;
  smoothBodyRoll  += (targetBodyRoll  - smoothBodyRoll)  * orientRate;

  car.pos.y = smoothBodyY;

  // ============================================================
  // Step 5: 判断翻车状态
  // ============================================================
  const isFlippedVisual = car.isInFlip;

  // ============================================================
  // Step 6: 设置 truckGroup
  // ============================================================
  _hQ.setFromAxisAngle(_axisY, car.heading);

  if (!isFlippedVisual) {
    _bPitchQ.setFromAxisAngle(_axisX, -smoothBodyPitch);
    _bRollQ.setFromAxisAngle(_axisZ, smoothBodyRoll);
    _physRollQ.setFromAxisAngle(_axisZ, car.bodyRoll);
    truckGroup.quaternion.copy(_hQ).multiply(_bPitchQ).multiply(_bRollQ).multiply(_physRollQ);
    truckGroup.position.set(car.pos.x, smoothBodyY, car.pos.z);

    // truckModel: 不做额外旋转
    truckModel.quaternion.identity();
    truckModel.position.copy(modelCenterOffset);

    // ---- 轮子：悬架模式 ----
    // 轮子转速 = 实际车速 + 打滑时额外空转（油门踩了但抓不住地）
    const grip = car._surfaceGrip !== undefined ? car._surfaceGrip : 1;
    const slipSpin = car.throttle * (1 - grip) * 15; // 打滑时轮子空转更快
    const revSlipSpin = car.reverse * (1 - grip) * 10;
    const spinDelta = ((car.speed + slipSpin - revSlipSpin) / Math.max(wheelRadius, 0.1)) * dt;
    totalSpinAngle += spinDelta;

    _suspBodyRot.copy(_bPitchQ).multiply(_bRollQ).multiply(_physRollQ);
    _suspBodyInv.copy(_suspBodyRot).invert();

    wheelList.forEach(({ label, p, front, side }) => {
      if (!p) return;
      const info = wheelPivotRestPos[label];
      if (!info) return;

      let springComp;
      if (label === 'FL') springComp = car.springFL;
      else if (label === 'FR') springComp = car.springFR;
      else if (label === 'BL') springComp = car.springBL;
      else springComp = car.springBR;

      p.position.set(
        info.localPos.x,
        info.localPos.y + springComp,
        info.localPos.z
      );

      const axleRoll = front ? frontAxleRoll : rearAxleRoll;
      _axleRollQ.setFromAxisAngle(_axisZ, axleRoll);
      _spQ.setFromAxisAngle(_axisX, totalSpinAngle);

      if (front) {
        _sQ.setFromAxisAngle(_axisY, car.steer * MAX_STEER_ANGLE);
        p.quaternion.copy(_suspBodyInv).multiply(_axleRollQ).multiply(_sQ).multiply(_spQ);
      } else {
        p.quaternion.copy(_suspBodyInv).multiply(_axleRollQ).multiply(_spQ);
      }
    });

  } else {
    // ====== 翻车中 ======
    _bPitchQ.setFromAxisAngle(_axisX, -smoothBodyPitch);
    _bRollQ.setFromAxisAngle(_axisZ, smoothBodyRoll);
    _physRollQ.setFromAxisAngle(_axisZ, car.bodyRoll);
    _physPitchQ.setFromAxisAngle(_axisX, -car.bodyPitch);
    truckGroup.quaternion.copy(_hQ).multiply(_bPitchQ).multiply(_bRollQ).multiply(_physRollQ).multiply(_physPitchQ);
    truckGroup.position.set(car.pos.x, smoothBodyY, car.pos.z);

    truckModel.quaternion.identity();
    truckModel.position.copy(modelCenterOffset);

    // ---- 轮子：翻车模式 ——轮子跟着车身翻，不做反向补偿 ----
    const spinDelta = (car.speed / Math.max(wheelRadius, 0.1)) * dt;
    totalSpinAngle += spinDelta;

    wheelList.forEach(({ label, p, front }) => {
      if (!p) return;
      const info = wheelPivotRestPos[label];
      if (!info) return;

      // 位置恢复到静止位（翻车时悬架弹簧归零）
      p.position.copy(info.localPos);

      // 轮子只保留自转和转向，不做任何反向补偿
      // 这样轮子跟着车身一起翻，角度自然
      _spQ.setFromAxisAngle(_axisX, totalSpinAngle);
      if (front) {
        _sQ.setFromAxisAngle(_axisY, car.steer * MAX_STEER_ANGLE);
        p.quaternion.copy(_sQ).multiply(_spQ);
      } else {
        p.quaternion.copy(_spQ);
      }
    });

    // 确保车身不陷入地面（用预计算的车身尺寸估算最低点，避免每帧 Box3 遍历）
    const terrainAtCar = getTerrainHeight(car.pos.x, car.pos.z);
    // 翻车时车身最低点≈中心Y - 绕roll+pitch轴旋转后的最大下探距离
    const sinRoll = Math.abs(Math.sin(car.bodyRoll));
    const cosRoll = Math.abs(Math.cos(car.bodyRoll));
    const sinPitch = Math.abs(Math.sin(car.bodyPitch));
    const cosPitch = Math.abs(Math.cos(car.bodyPitch));
    // 取 roll 和 pitch 两个方向上下探距离的较大值
    const dropFromRoll = CAR_HALF_HEIGHT * cosRoll + CAR_HALF_WIDTH * sinRoll;
    const dropFromPitch = CAR_HALF_HEIGHT * cosPitch + WHEELBASE / 2 * sinPitch;
    const estimatedDrop = Math.max(dropFromRoll, dropFromPitch);
    const estimatedMinY = truckGroup.position.y - estimatedDrop;
    if (estimatedMinY < terrainAtCar) {
      truckGroup.position.y += terrainAtCar - estimatedMinY;
    }
  }

  truckGroup.updateMatrixWorld(true);

  // ---- Tire tracks ----
  [['FL', wheelFL], ['FR', wheelFR], ['BL', wheelBL], ['BR', wheelBR]].forEach(([label, pivot]) => {
    if (!pivot) return;
    pivot.getWorldPosition(_wpTemp);
    addTrackPoint(label, _wpTemp.x, _wpTemp.z, car.heading);
  });
  updateTracks();

  // Sky follows car
  sky.position.set(car.pos.x, 0, car.pos.z);
}

// ============================================================
// HUD — 双表盘（Canvas 绘制）
// ============================================================
const tachCanvas = document.getElementById('tachGauge');
const speedCanvas = document.getElementById('speedGauge');
const tachCtx = tachCanvas.getContext('2d');
const speedCtx = speedCanvas.getContext('2d');

// 表盘参数
const GAUGE_SIZE = 180;
const GAUGE_R = GAUGE_SIZE / 2;
const GAUGE_CR = GAUGE_R - 8; // 圆弧半径

// 转速表：0~5000 RPM, 刻度间隔 1000
const TACH_MAX = 5000;
const TACH_RED_START = 2000; // 2000转开始红区
const TACH_TICKS = [0, 1, 2, 3, 4, 5]; // ×1000

// 时速表：0~120 km/h, 刻度间隔 20
const SPEED_MAX_GAUGE = 120;
const SPEED_TICKS = [0, 20, 40, 60, 80, 100, 120];

// 表盘起止角度（从左下方开始顺时针到右下方）
const ARC_START = Math.PI * 0.75;  // 135°
const ARC_END   = Math.PI * 2.25;  // 405° = 45°
const ARC_RANGE = ARC_END - ARC_START; // 270°

// 平滑指针
let smoothRPM = RPM_IDLE;
let smoothSpeed = 0;
let lastDisplayGear = null;
let gearFlashTimer = 0;

function drawGauge(ctx, value, maxVal, ticks, unit, label, redStart, gearText, isGearFlash) {
  const w = GAUGE_SIZE, h = GAUGE_SIZE;
  const cx = w / 2, cy = h / 2;
  const r = GAUGE_CR;

  ctx.clearRect(0, 0, w, h);

  // ---- 表盘背景 ----
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(15, 15, 15, 0.85)';
  ctx.fill();

  // ---- 外圈 ----
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(80, 80, 80, 0.6)';
  ctx.lineWidth = 2;
  ctx.stroke();

  // ---- 红区弧线（如果有）----
  if (redStart !== null) {
    const redAngle = ARC_START + (redStart / maxVal) * ARC_RANGE;
    ctx.beginPath();
    ctx.arc(cx, cy, r - 6, redAngle, ARC_END);
    ctx.strokeStyle = 'rgba(220, 40, 40, 0.5)';
    ctx.lineWidth = 8;
    ctx.stroke();

    // 红区背景填充（扇形）
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r - 2, redAngle, ARC_END);
    ctx.closePath();
    ctx.fillStyle = 'rgba(180, 30, 30, 0.12)';
    ctx.fill();
  }

  // ---- 刻度线 + 数字 ----
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = 'bold 11px monospace';

  for (let i = 0; i < ticks.length; i++) {
    const tickVal = ticks[i];
    const frac = tickVal / maxVal;
    const angle = ARC_START + frac * ARC_RANGE;

    // 大刻度线
    const x1 = cx + Math.cos(angle) * (r - 16);
    const y1 = cy + Math.sin(angle) * (r - 16);
    const x2 = cx + Math.cos(angle) * (r - 4);
    const y2 = cy + Math.sin(angle) * (r - 4);

    const inRed = redStart !== null && tickVal >= redStart;
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.strokeStyle = inRed ? '#e53935' : 'rgba(200,200,200,0.7)';
    ctx.lineWidth = 2;
    ctx.stroke();

    // 数字
    const tx = cx + Math.cos(angle) * (r - 26);
    const ty = cy + Math.sin(angle) * (r - 26);
    ctx.fillStyle = inRed ? '#e53935' : 'rgba(200,200,200,0.8)';
    ctx.fillText(String(tickVal), tx, ty);
  }

  // ---- 小刻度（每个大刻度间分5格）----
  const smallTickCount = (ticks.length - 1) * 5;
  for (let i = 0; i <= smallTickCount; i++) {
    if (i % 5 === 0) continue; // 大刻度位置跳过
    const frac = i / smallTickCount;
    const angle = ARC_START + frac * ARC_RANGE;
    const x1 = cx + Math.cos(angle) * (r - 10);
    const y1 = cy + Math.sin(angle) * (r - 10);
    const x2 = cx + Math.cos(angle) * (r - 4);
    const y2 = cy + Math.sin(angle) * (r - 4);
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.strokeStyle = 'rgba(120,120,120,0.4)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // ---- 指针 ----
  const clampedVal = Math.max(0, Math.min(value, maxVal));
  const needleAngle = ARC_START + (clampedVal / maxVal) * ARC_RANGE;

  // 指针阴影
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(needleAngle);
  ctx.shadowColor = 'rgba(0,0,0,0.4)';
  ctx.shadowBlur = 4;

  // 指针主体（三角形）
  ctx.beginPath();
  ctx.moveTo(r - 20, 0);      // 尖端
  ctx.lineTo(-10, -3);         // 后端左
  ctx.lineTo(-10, 3);          // 后端右
  ctx.closePath();

  const inRedZone = redStart !== null && value >= redStart;
  ctx.fillStyle = inRedZone ? '#e53935' : '#ff6e40';
  ctx.fill();
  ctx.restore();

  // 中心圆
  ctx.beginPath();
  ctx.arc(cx, cy, 6, 0, Math.PI * 2);
  ctx.fillStyle = '#444';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(cx, cy, 3, 0, Math.PI * 2);
  ctx.fillStyle = '#888';
  ctx.fill();

  // ---- 挡位显示（表盘中央偏下）----
  if (gearText) {
    ctx.font = 'bold 22px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = isGearFlash ? '#ff6e40' : 'rgba(255,255,255,0.9)';
    ctx.fillText(gearText, cx, cy + 24);
  }

  // ---- 底部标签 ----
  ctx.font = '10px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(150,150,150,0.7)';
  ctx.fillText(label, cx, cy + 42);

  // ---- 当前值数字 ----
  ctx.font = 'bold 13px monospace';
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.fillText(unit, cx, cy + 56);
}

function updateHUD(dt) {
  // 平滑指针
  const lerpF = Math.min(1, 12 * dt);
  smoothRPM += (car.rpm - smoothRPM) * lerpF;
  smoothSpeed += (Math.abs(car.speed * 3.6) - smoothSpeed) * lerpF;

  // 换挡闪烁
  const gearText = car.gear === 0 ? 'N' : car.gear === -1 ? 'R1' : car.gear === -2 ? 'R2' : String(car.gear);
  if (lastDisplayGear !== null && lastDisplayGear !== car.gear) {
    gearFlashTimer = 0.3; // 闪烁0.3秒
  }
  lastDisplayGear = car.gear;
  gearFlashTimer = Math.max(0, gearFlashTimer - dt);
  const isFlash = gearFlashTimer > 0 && Math.sin(gearFlashTimer * 30) > 0;

  // 左表盘：转速（×1000显示）
  const rpmDisplay = smoothRPM / 1000;
  drawGauge(tachCtx, rpmDisplay, TACH_MAX / 1000, TACH_TICKS,
    Math.round(smoothRPM) + ' rpm', 'RPM × 1000',
    TACH_RED_START / 1000, gearText, isFlash);

  // 右表盘：时速
  drawGauge(speedCtx, smoothSpeed, SPEED_MAX_GAUGE, SPEED_TICKS,
    Math.round(smoothSpeed) + ' km/h', 'SPEED',
    null, null, false);

  // 海拔信息（画在速度表下方，用缓存值避免每帧调用getTerrainHeight）
  if (!updateHUD._altCache || updateHUD._altTimer <= 0) {
    updateHUD._altCache = getTerrainHeight(car.pos.x, car.pos.z);
    updateHUD._altTimer = 0.3;
  }
  updateHUD._altTimer -= dt;
  const altitude = updateHUD._altCache;
  speedCtx.save();
  speedCtx.font = 'bold 11px monospace';
  speedCtx.textAlign = 'center';
  speedCtx.fillStyle = '#8ab';
  speedCtx.fillText('ALT', GAUGE_R, GAUGE_R + 48);
  speedCtx.font = '10px monospace';
  speedCtx.fillStyle = '#9bc';
  speedCtx.fillText(Math.round(altitude) + 'm', GAUGE_R, GAUGE_R + 60);
  speedCtx.restore();

  // 差速锁指示灯：画在转速表下方
  tachCtx.save();
  tachCtx.font = 'bold 11px monospace';
  tachCtx.textAlign = 'center';
  if (car.diffLock) {
    tachCtx.fillStyle = '#ff4400';
    tachCtx.fillText('LOCK', GAUGE_R, GAUGE_R + 48);
    tachCtx.font = '8px monospace';
    tachCtx.fillStyle = '#cc3300';
    tachCtx.fillText('DIFF LOCK', GAUGE_R, GAUGE_R + 59);
  } else {
    tachCtx.fillStyle = '#555';
    tachCtx.fillText('OPEN', GAUGE_R, GAUGE_R + 48);
    tachCtx.font = '8px monospace';
    tachCtx.fillStyle = '#444';
    tachCtx.fillText('DIFF', GAUGE_R, GAUGE_R + 59);
  }
  tachCtx.restore();

  // 翻车提示
  const flipMsg = document.getElementById('flipMsg');
  if (car.isInFlip && car.rollStoppedTime > 0.8) {
    flipMsg.style.opacity = '1';
  } else {
    flipMsg.style.opacity = '0';
  }
}

// ============================================================
// MINIMAP — 车辆居中的动态小地图
// ============================================================
const minimapCvs = document.getElementById('minimapCanvas');
const minimapCtx = minimapCvs.getContext('2d');
const MINIMAP_SIZE = 160;
const MINIMAP_VIEW_RANGE = 300; // 小地图可见范围半径（m）

// 离屏缓冲：用ImageData逐像素绘制biome（比fillRect快）
const minimapImgData = minimapCtx.createImageData(MINIMAP_SIZE, MINIMAP_SIZE);
const minimapPixels = minimapImgData.data;

// 上次渲染的minimap中心（避免每帧都重绘像素）
let _lastMinimapCX = Infinity, _lastMinimapCZ = Infinity;
const MINIMAP_REDRAW_DIST = 15; // 车移动超过此距离重绘底图

// 指路牌：沿路线每隔一段距离放一个
const signposts = [];
{
  const SIGN_INTERVAL = 80; // 每80m一个
  let accDist = 0;
  for (let i = 1; i < TRAIL_POINTS.length; i++) {
    const dx = TRAIL_POINTS[i].x - TRAIL_POINTS[i-1].x;
    const dz = TRAIL_POINTS[i].z - TRAIL_POINTS[i-1].z;
    accDist += Math.sqrt(dx * dx + dz * dz);
    if (accDist >= SIGN_INTERVAL) {
      accDist = 0;
      const p = TRAIL_POINTS[i];
      const pNext = TRAIL_POINTS[Math.min(i + 5, TRAIL_POINTS.length - 1)];
      const angle = Math.atan2(pNext.x - p.x, pNext.z - p.z);
      signposts.push({ x: p.x + Math.cos(angle) * 3, z: p.z - Math.sin(angle) * 3, angle });
    }
  }

  // 创建指路牌3D对象
  for (const sp of signposts) {
    const group = new THREE.Group();
    // 杆子
    const poleMat = new THREE.MeshStandardMaterial({ color: 0x8B7355, roughness: 0.8 });
    const poleGeo = new THREE.CylinderGeometry(0.05, 0.06, 1.8, 6);
    const pole = new THREE.Mesh(poleGeo, poleMat);
    pole.position.y = 0.9;
    group.add(pole);
    // 指示板
    const boardGeo = new THREE.BoxGeometry(0.8, 0.35, 0.04);
    const biome = getBiomeName(sp.x, sp.z);
    const boardColor = biome === 'snow' ? 0x4477aa : biome === 'jungle' ? 0x337744 : 0xbb8833;
    const boardMat = new THREE.MeshStandardMaterial({ color: boardColor, roughness: 0.5 });
    const board = new THREE.Mesh(boardGeo, boardMat);
    board.position.y = 1.65;
    board.rotation.y = Math.PI / 12; // 微倾斜
    group.add(board);
    // 箭头（小三角形）
    const arrowGeo = new THREE.BufferGeometry();
    const arrowVerts = new Float32Array([0,0,0.025, 0.2,0.08,0.025, 0.2,-0.08,0.025]);
    arrowGeo.setAttribute('position', new THREE.BufferAttribute(arrowVerts, 3));
    arrowGeo.computeVertexNormals();
    const arrow = new THREE.Mesh(arrowGeo, new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide }));
    arrow.position.set(-0.15, 1.65, 0);
    group.add(arrow);

    const y = getTerrainHeight(sp.x, sp.z);
    group.position.set(sp.x, y, sp.z);
    group.rotation.y = sp.angle;
    group.castShadow = true;
    scene.add(group);
    sp._group = group; // 保存引用供距离裁剪用
  }
}

// ============================================================
// DISTANCE CULLING — 隐藏远处物体减少drawcall
// ============================================================
const CULL_DIST = 180; // 超过此距离隐藏
const CULL_DIST_SQ = CULL_DIST * CULL_DIST;
function updateDistanceCulling() {
  const cx = car.pos.x, cz = car.pos.z;
  // 岩石（距离裁剪 + 水下隐藏）
  for (const rock of rocks) {
    if (!rock._mesh) continue;
    const dx = rock.x - cx, dz = rock.z - cz;
    const inRange = (dx * dx + dz * dz) < CULL_DIST_SQ;
    // 深水中的石头隐藏
    const underwater = rock.baseH < SEA_LEVEL - 0.3;
    rock._mesh.visible = inRange && !underwater;
  }
  // 指路牌
  for (const sp of signposts) {
    if (!sp._group) continue;
    const dx = sp.x - cx, dz = sp.z - cz;
    sp._group.visible = (dx * dx + dz * dz) < CULL_DIST_SQ;
  }
}

function updateMinimap() {
  const ctx = minimapCtx;
  const cx = car.pos.x, cz = car.pos.z;
  const half = MINIMAP_VIEW_RANGE;
  const scale = MINIMAP_SIZE / (half * 2); // px per meter

  // 是否需要重绘底图像素（车移动够远时才重绘，降低CPU开销）
  const ddx = cx - _lastMinimapCX, ddz = cz - _lastMinimapCZ;
  if (ddx * ddx + ddz * ddz > MINIMAP_REDRAW_DIST * MINIMAP_REDRAW_DIST) {
    _lastMinimapCX = cx;
    _lastMinimapCZ = cz;
    // 逐像素绘制biome（低分辨率采样：每2像素采样一次）
    const step = 2;
    for (let py = 0; py < MINIMAP_SIZE; py += step) {
      for (let px = 0; px < MINIMAP_SIZE; px += step) {
        const wx = cx + (px / MINIMAP_SIZE - 0.5) * half * 2;
        const wz = cz + (py / MINIMAP_SIZE - 0.5) * half * 2;
        const bw = getBiomeWeights(wx, wz);
        // 海洋区域在minimap上显示蓝色（用距离估算水深，避免调getTerrainHeight）
        let dr = 210, dg = 180, db = 130;
        if (bw.desert > 0.1) {
          const distC = Math.sqrt(wx*wx + wz*wz);
          if (distC > 160) { dr = 30; dg = 90; db = 140; }
          else if (distC > 120) { dr = 80; dg = 150; db = 170; }
        }
        const r = Math.round(235 * bw.snow + dr * bw.desert + 55 * bw.jungle);
        const g = Math.round(240 * bw.snow + dg * bw.desert + 120 * bw.jungle);
        const b = Math.round(245 * bw.snow + db * bw.desert + 40 * bw.jungle);
        // 圆形遮罩
        const dpx = px - MINIMAP_SIZE / 2, dpz = py - MINIMAP_SIZE / 2;
        const dRatio = Math.sqrt(dpx * dpx + dpz * dpz) / (MINIMAP_SIZE / 2);
        const alpha = dRatio > 0.92 ? Math.max(0, Math.round(255 * (1 - (dRatio - 0.92) / 0.08))) : 255;
        // 填充step×step像素块
        for (let sy = 0; sy < step && py + sy < MINIMAP_SIZE; sy++) {
          for (let sx = 0; sx < step && px + sx < MINIMAP_SIZE; sx++) {
            const idx = ((py + sy) * MINIMAP_SIZE + (px + sx)) * 4;
            minimapPixels[idx] = r;
            minimapPixels[idx + 1] = g;
            minimapPixels[idx + 2] = b;
            minimapPixels[idx + 3] = alpha;
          }
        }
      }
    }
    ctx.putImageData(minimapImgData, 0, 0);
  } else {
    // 底图没变，直接画上次的ImageData
    ctx.putImageData(minimapImgData, 0, 0);
  }

  // 叠加特殊区域（冰湖、泥潭）
  // 冰湖（腰果形，与3D冰面形状一致）
  {
    const iceRelX = (ICE_CENTER_X - cx) * scale + MINIMAP_SIZE / 2;
    const iceRelY = (ICE_CENTER_Z - cz) * scale + MINIMAP_SIZE / 2;
    const iceR = ICE_RADIUS * scale;
    if (iceRelX > -iceR * 2 && iceRelX < MINIMAP_SIZE + iceR * 2 && iceRelY > -iceR * 2 && iceRelY < MINIMAP_SIZE + iceR * 2) {
      const _N = 96, _eX = 1.4, _eZ = 0.9;
      ctx.beginPath();
      for (let i = 0; i <= _N; i++) {
        const t = (i / _N) * Math.PI * 2;
        const indent = 0.38 * Math.max(0, -Math.cos(t)) * (1 + 0.3 * Math.sin(t));
        const r = iceR * (1.0 - indent);
        const px = iceRelX + Math.cos(t) * r * _eX;
        const py = iceRelY + Math.sin(t) * r * _eZ;
        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fillStyle = 'rgba(100,170,220,0.55)';
      ctx.fill();
      ctx.strokeStyle = 'rgba(160,210,245,0.5)';
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }
  }
  // 泥潭
  for (const pit of MUD_PITS) {
    const mx = (pit.x - cx) * scale + MINIMAP_SIZE / 2;
    const my = (pit.z - cz) * scale + MINIMAP_SIZE / 2;
    const mr = pit.r * scale;
    if (mx > -mr && mx < MINIMAP_SIZE + mr && my > -mr && my < MINIMAP_SIZE + mr) {
      ctx.beginPath();
      ctx.arc(mx, my, mr, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(70,55,35,0.4)';
      ctx.fill();
    }
  }

  // 道路（加粗+更明显颜色）
  ctx.strokeStyle = 'rgba(180,170,150,0.85)';
  ctx.lineWidth = 3;
  ctx.beginPath();
  let started = false;
  for (let i = 0; i < TRAIL_POINTS.length; i += 3) {
    const px = (TRAIL_POINTS[i].x - cx) * scale + MINIMAP_SIZE / 2;
    const py = (TRAIL_POINTS[i].z - cz) * scale + MINIMAP_SIZE / 2;
    if (px < -20 || px > MINIMAP_SIZE + 20 || py < -20 || py > MINIMAP_SIZE + 20) {
      started = false; continue;
    }
    if (!started) { ctx.moveTo(px, py); started = true; }
    else ctx.lineTo(px, py);
  }
  ctx.stroke();

  // 宝箱标记（金色小方块闪烁）
  for (const box of treasureBoxes) {
    if (box.collected) continue;
    const bpx = (box.wx - cx) * scale + MINIMAP_SIZE / 2;
    const bpy = (box.wz - cz) * scale + MINIMAP_SIZE / 2;
    if (bpx < 0 || bpx > MINIMAP_SIZE || bpy < 0 || bpy > MINIMAP_SIZE) continue;
    ctx.fillStyle = 'rgba(255,200,40,0.9)';
    ctx.fillRect(bpx - 2.5, bpy - 2.5, 5, 5);
  }

  // 打卡点标记（纯蓝色相机图标 + 屏幕外方向指示器）
  const mmCenter = MINIMAP_SIZE / 2;
  const mmR = MINIMAP_SIZE / 2 - 4;
  for (const cp of checkpointState) {
    if (cp.unlocked) continue;
    const cpx = (cp.wx - cx) * scale + mmCenter;
    const cpy = (cp.wz - cz) * scale + mmCenter;
    const dxM = cpx - mmCenter, dyM = cpy - mmCenter;
    const distM = Math.sqrt(dxM * dxM + dyM * dyM);

    if (distM < mmR - 2) {
      // 在小地图范围内：画蓝色相机图标
      ctx.save();
      ctx.translate(cpx, cpy);
      // 相机主体
      ctx.fillStyle = 'rgba(40,120,255,0.9)';
      ctx.fillRect(-5, -3, 10, 6);
      ctx.fillRect(-3, -5, 6, 2); // 取景器
      // 镜头
      ctx.beginPath(); ctx.arc(0, 0, 2.5, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(180,220,255,0.9)'; ctx.fill();
      ctx.restore();
    } else {
      // 在小地图范围外：在圆形边缘显示蓝色方向指示箭头
      const ang = Math.atan2(dyM, dxM);
      const edgeX = mmCenter + Math.cos(ang) * (mmR - 3);
      const edgeY = mmCenter + Math.sin(ang) * (mmR - 3);
      ctx.save();
      ctx.translate(edgeX, edgeY);
      ctx.rotate(ang);
      ctx.fillStyle = 'rgba(40,120,255,0.85)';
      ctx.beginPath();
      ctx.moveTo(5, 0); ctx.lineTo(-3, -3); ctx.lineTo(-3, 3);
      ctx.closePath(); ctx.fill();
      ctx.restore();
    }
  }

  // NPC标记（红色圆点 = 求助）
  for (const npc of stuckNPCs) {
    if (npc.rescued) continue;
    const npx = (npc.wx - cx) * scale + MINIMAP_SIZE / 2;
    const npy = (npc.wz - cz) * scale + MINIMAP_SIZE / 2;
    if (npx < 0 || npx > MINIMAP_SIZE || npy < 0 || npy > MINIMAP_SIZE) continue;
    ctx.fillStyle = 'rgba(255,80,80,0.9)';
    ctx.beginPath(); ctx.arc(npx, npy, 3, 0, Math.PI * 2); ctx.fill();
  }

  // 车辆始终在正中心，传统箭头指向车头方向
  // heading=0 → forward=(sin0,cos0)=(0,1) → minimap: x=0,y=+1(下)
  // canvas rotate(θ): tip(0,-7) → (7sinθ, -7cosθ) → minimap方向(sinθ, -cosθ)
  // 需要(sinθ, -cosθ)=(sinH, cosH) → θ = PI - heading
  ctx.save();
  ctx.translate(MINIMAP_SIZE / 2, MINIMAP_SIZE / 2);
  ctx.rotate(Math.PI - car.heading);
  // 箭头形状：上方尖头 + 窄杆身
  ctx.beginPath();
  ctx.moveTo(0, -7);     // 箭头尖端
  ctx.lineTo(-4, -1);    // 左翼
  ctx.lineTo(-1.5, -1);  // 左翼内收
  ctx.lineTo(-1.5, 5);   // 杆左
  ctx.lineTo(1.5, 5);    // 杆右
  ctx.lineTo(1.5, -1);   // 右翼内收
  ctx.lineTo(4, -1);     // 右翼
  ctx.closePath();
  ctx.fillStyle = '#ff4444';
  ctx.fill();
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 0.8;
  ctx.stroke();
  ctx.restore();

  // 圆形边框遮罩
  ctx.save();
  ctx.globalCompositeOperation = 'destination-in';
  ctx.beginPath();
  ctx.arc(MINIMAP_SIZE / 2, MINIMAP_SIZE / 2, MINIMAP_SIZE / 2 - 1, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // 圆形边框
  ctx.beginPath();
  ctx.arc(MINIMAP_SIZE / 2, MINIMAP_SIZE / 2, MINIMAP_SIZE / 2 - 1, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(255,255,255,0.2)';
  ctx.lineWidth = 1.5;
  ctx.stroke();


}

function initWheelSpray(label) {

  const vel = new Float32Array(SPRAY_COUNT * 3);
  const life = new Float32Array(SPRAY_COUNT);
  const sizes = new Float32Array(SPRAY_COUNT);

    transparent: true,
    depthWrite: false,
    uniforms: {
      uOpacity: { value: 0.6 },
    },
    vertexShader: `
      attribute float size;
      attribute vec3 aColor;
      varying vec3 vColor;
      varying float vAlpha;
      void main() {
        vColor = aColor;
        vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
        gl_PointSize = size * (250.0 / -mvPos.z);
        gl_PointSize = clamp(gl_PointSize, 1.0, 30.0);
        gl_Position = projectionMatrix * mvPos;
        // 远处淡出
        vAlpha = smoothstep(150.0, 30.0, -mvPos.z);
      }
    `,
    fragmentShader: `
      uniform float uOpacity;
      varying vec3 vColor;
      varying float vAlpha;
      void main() {
        float d = length(gl_PointCoord - 0.5) * 2.0;
        if (d > 1.0) discard;
        // 柔和边缘
        float alpha = (1.0 - d * d) * uOpacity * vAlpha;
        gl_FragColor = vec4(vColor, alpha);
      }
    `,
  });

  const points = new THREE.Points(geo, mat);
  points.frustumCulled = false;
  scene.add(points);
  wheelSprays[label] = { geo, mat, points, vel, life, sizes, gravMult, colors, nextIdx: 0 };
}

const _emitBaseColor = new THREE.Color();
const _emitBiomeHint = new THREE.Color();
function emitSpray(label, wx, wy, wz, carSpeed, heading) {
  const sp = wheelSprays[label];
  if (!sp) return;
  const absSpeed = Math.abs(carSpeed);
  if (absSpeed < 1.5) return;

  // 当前biome配置
  const biome = getBiomeName(wx, wz);
  const cfg = SPRAY_CONFIG[biome] || SPRAY_CONFIG.desert;
  const onIce = isInIceLake(wx, wz);
  const iceScale = onIce ? 0.2 : 1.0; // 冰面粒子缩小到0.2倍

  // 每帧发射量：速度越快越多（冰面减少发射量）
  const emitCount = Math.min(8, Math.floor(absSpeed * 0.4 * iceScale));
  const posArr = sp.geo.getAttribute('position');
  const sizeAttr = sp.geo.getAttribute('size');
  const colorAttr = sp.geo.getAttribute('aColor');
  // 使用biome配置颜色（避免每帧调用昂贵的computeVertexColor）
  _emitBaseColor.set(cfg.color);

  for (let e = 0; e < emitCount; e++) {
    const i = sp.nextIdx;
    sp.nextIdx = (sp.nextIdx + 1) % SPRAY_COUNT;

    // 发射位置：轮子附近随机偏移（冰面缩小范围）
    const offX = (Math.random() - 0.5) * 0.4 * iceScale;
    const offZ = (Math.random() - 0.5) * 0.4 * iceScale;
    posArr.setXYZ(i, wx + offX, wy + 0.05 + Math.random() * 0.1 * iceScale, wz + offZ);

    // 速度：向后方喷射 + 随机扩散（冰面缩小速度）
    const speedFactor = absSpeed * 0.3 * cfg.speedMult * iceScale;
    const backX = -Math.sin(heading) * speedFactor;
    const backZ = -Math.cos(heading) * speedFactor;
    // 随机偏转角（扩散）
    const spreadAngle = (Math.random() - 0.5) * cfg.spreadAngle;
    const cosS = Math.cos(spreadAngle), sinS = Math.sin(spreadAngle);
    const vx = backX * cosS - backZ * sinS + (Math.random() - 0.5) * 1.5;
    const vz = backX * sinS + backZ * cosS + (Math.random() - 0.5) * 1.5;
    const vy = cfg.upMin + Math.random() * (cfg.upMax - cfg.upMin);

    sp.vel[i * 3]     = vx;
    sp.vel[i * 3 + 1] = vy;
    sp.vel[i * 3 + 2] = vz;

    // 随机大小（冰面粒子缩小）
    const sizePow = (cfg.sizeMin + Math.pow(Math.random(), 1.8) * (cfg.sizeMax - cfg.sizeMin)) * iceScale;
    sizeAttr.setX(i, sizePow);

    // 每粒子颜色微调（自然变化）
    const colorVar = 0.85 + Math.random() * 0.3;
    colorAttr.setXYZ(i, _emitBaseColor.r * colorVar, _emitBaseColor.g * colorVar, _emitBaseColor.b * colorVar);

    // 重力系数：大粒子更重
    sp.gravMult[i] = cfg.gravityMult * (0.7 + sizePow / cfg.sizeMax * 0.6);

    // 寿命
    sp.life[i] = cfg.lifeMin + Math.random() * (cfg.lifeMax - cfg.lifeMin);
  }
}

// 缓存车辆附近地面高度（喷溅粒子用，避免每粒子调getTerrainHeight）
let _sprayGroundY = 0;
let _sprayGroundX = 0, _sprayGroundZ = 0;

function updateWheelSprays(dt) {
  // 每帧只采样一次车辆位置的地面高度
  _sprayGroundY = getTerrainHeight(car.pos.x, car.pos.z);
  _sprayGroundX = car.pos.x;
  _sprayGroundZ = car.pos.z;

  for (const label in wheelSprays) {
    const sp = wheelSprays[label];
    const posArr = sp.geo.getAttribute('position');
    const sizeAttr = sp.geo.getAttribute('size');

    for (let i = 0; i < SPRAY_COUNT; i++) {
      if (sp.life[i] <= 0) continue;
      sp.life[i] -= dt;
      if (sp.life[i] <= 0) {
        posArr.setXYZ(i, 0, -100, 0);
        sizeAttr.setX(i, 0);
        continue;
      }
      sp.vel[i * 3 + 1] -= 9.81 * sp.gravMult[i] * dt;
      const airDrag = 0.98;
      sp.vel[i * 3] *= airDrag;
      sp.vel[i * 3 + 2] *= airDrag;

      const x = posArr.getX(i) + sp.vel[i * 3] * dt;
      const y = posArr.getY(i) + sp.vel[i * 3 + 1] * dt;
      const z = posArr.getZ(i) + sp.vel[i * 3 + 2] * dt;

      // 地面碰撞（用缓存的近似高度，不逐粒子调用getTerrainHeight）
      const groundY = _sprayGroundY;
      if (y < groundY) {
        posArr.setXYZ(i, x, groundY, z);
        // 大小不同弹跳行为不同
        const bounce = 0.1 + Math.random() * 0.2;
        sp.vel[i * 3] *= bounce;
        sp.vel[i * 3 + 1] = Math.abs(sp.vel[i * 3 + 1]) * bounce * 0.3;
        sp.vel[i * 3 + 2] *= bounce;
        sp.life[i] = Math.min(sp.life[i], 0.15);
        // 落地后缩小
        sizeAttr.setX(i, sizeAttr.getX(i) * 0.6);
      } else {
        posArr.setXYZ(i, x, y, z);
      }

      // 临终缩小
      if (sp.life[i] < 0.15) {
        sizeAttr.setX(i, sizeAttr.getX(i) * (sp.life[i] / 0.15));
      }
    }
    posArr.needsUpdate = true;
    sizeAttr.needsUpdate = true;

    // 更新整体透明度
    const biome = getBiomeName(car.pos.x, car.pos.z);
    const cfg = SPRAY_CONFIG[biome] || SPRAY_CONFIG.desert;
    sp.mat.uniforms.uOpacity.value = cfg.opacityBase;

    // 颜色属性也需要标记更新（因为emit时写了新颜色）
    sp.geo.getAttribute('aColor').needsUpdate = true;
  }
}

function useFuelItem(slotIdx) {

  const sx = startRect.left + startRect.width / 2;
  const sy = startRect.top + startRect.height / 2;
  const ex = endRect.left + endRect.width / 2;
  const ey = endRect.top + endRect.height / 2;
  const t0 = performance.now();
  const dur = 500;
  function step(now) {
    let t = Math.min(1, (now - t0) / dur);
    const x = sx + (ex - sx) * t;
    const y = sy + (ey - sy) * t - Math.sin(t * Math.PI) * 40;
    el.style.left = (x - 14) + 'px';
    el.style.top = (y - 14) + 'px';
    el.style.opacity = String(t < 0.8 ? 1 : 1 - (t - 0.8) / 0.2);

function animateItemFlyIn(icon, slotIdx) {
  const el = document.createElement('div');
  el.className = 'fly-item';
  el.textContent = icon;
  // 起点：屏幕中心偏上
  const startX = window.innerWidth / 2;
  const startY = window.innerHeight / 2 - 60;
  el.style.left = startX + 'px';
  el.style.top = startY + 'px';
  document.body.appendChild(el);

  // 终点：物品栏槽位位置
  const slotEl = document.getElementById('invSlot' + slotIdx);
  const slotRect = slotEl.getBoundingClientRect();
  const endX = slotRect.left + slotRect.width / 2 - 14;
  const endY = slotRect.top + slotRect.height / 2 - 14;

  // 变速飞行：先上抬（ease-out），再加速飞向目标（ease-in）
  const RISE = 220, FLY = 360; // ms
  const riseEndX = startX, riseEndY = startY - 80;
  const t0 = performance.now();

  function step(now) {
    const elapsed = now - t0;
    if (elapsed < RISE) {
      const t = elapsed / RISE;
      const eased = 1 - (1 - t) * (1 - t);
      const cy = startY + (riseEndY - startY) * eased;
      const s = 1 + 0.6 * Math.sin(t * Math.PI);
      el.style.left = (riseEndX - 14) + 'px';
      el.style.top = (cy - 14) + 'px';
      el.style.transform = `scale(${s})`;
      el.style.opacity = '1';
    } else {
      const t = Math.min(1, (elapsed - RISE) / FLY);
      const eased = t * t; // ease-in 加速
      const cx = riseEndX + (endX - riseEndX) * eased;
      const cy = riseEndY + (endY - riseEndY) * eased;
      const s = 1.5 - 0.5 * t;
      el.style.left = cx + 'px';
      el.style.top = cy + 'px';
      el.style.transform = `scale(${s})`;
      el.style.opacity = String(t < 0.75 ? 1 : 1 - (t - 0.75) / 0.25);
      if (t >= 1) {
        el.remove();
        if (slotEl) {
          slotEl.style.boxShadow = '0 0 20px rgba(255,200,50,0.8)';
          setTimeout(() => { slotEl.style.boxShadow = ''; }, 400);
        }
        return;
      }
    }
    requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

// 彩带爆炸粒子系统（Three.js场景中）
const CONFETTI_COUNT = 160;
const confettiGeo = new THREE.BufferGeometry();
const confettiPosArr = new Float32Array(CONFETTI_COUNT * 3);
const confettiColArr = new Float32Array(CONFETTI_COUNT * 3);
const confettiVel = new Float32Array(CONFETTI_COUNT * 3);
const confettiLife = new Float32Array(CONFETTI_COUNT);
const confettiSizes = new Float32Array(CONFETTI_COUNT);
confettiGeo.setAttribute('position', new THREE.BufferAttribute(confettiPosArr, 3));
confettiGeo.setAttribute('aColor', new THREE.BufferAttribute(confettiColArr, 3));
confettiGeo.setAttribute('size', new THREE.BufferAttribute(confettiSizes, 1));

const confettiMat = new THREE.ShaderMaterial({
  transparent: true, depthWrite: false,
  uniforms: {},
  vertexShader: `
    attribute float size;
    attribute vec3 aColor;
    varying vec3 vColor;
    void main() {
      vColor = aColor;
      vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
      gl_PointSize = size * (320.0 / -mvPos.z);
      gl_PointSize = clamp(gl_PointSize, 2.0, 80.0);
      gl_Position = projectionMatrix * mvPos;
    }
  `,
  fragmentShader: `
    varying vec3 vColor;
    void main() {
      vec2 p = gl_PointCoord - 0.5;
      // 方形彩带片
      float alpha = (abs(p.x) < 0.4 && abs(p.y) < 0.35) ? 0.9 : 0.0;
      if (alpha < 0.01) discard;
      gl_FragColor = vec4(vColor, alpha);
    }
  `,
});
const confettiPoints = new THREE.Points(confettiGeo, confettiMat);
confettiPoints.frustumCulled = false;
scene.add(confettiPoints);
let confettiNextIdx = 0;

// 彩带颜色
const CONFETTI_COLORS = [
  [1, 0.2, 0.2], [0.2, 1, 0.3], [0.2, 0.4, 1], [1, 0.9, 0.1],
  [1, 0.4, 0.8], [0.1, 0.9, 0.9], [1, 0.6, 0.1],
];

function emitConfetti(wx, wy, wz) {
  const posAttr = confettiGeo.getAttribute('position');
  const colAttr = confettiGeo.getAttribute('aColor');
  const sizeAttr = confettiGeo.getAttribute('size');
  for (let i = 0; i < CONFETTI_COUNT; i++) {
    const idx = (confettiNextIdx + i) % CONFETTI_COUNT;
    posAttr.setXYZ(idx, wx, wy + 1.5, wz);
    // 随机方向爆炸（速度更大，全向均匀）
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.random() * Math.PI * 0.75;
    const spd = 8 + Math.random() * 14; // 更快初速
    confettiVel[idx * 3]     = Math.cos(theta) * Math.sin(phi) * spd;
    confettiVel[idx * 3 + 1] = Math.cos(phi) * spd + 4; // 向上分量更大
    confettiVel[idx * 3 + 2] = Math.sin(theta) * Math.sin(phi) * spd;
    // 随机颜色
    const c = CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)];
    colAttr.setXYZ(idx, c[0], c[1], c[2]);
    sizeAttr.setX(idx, 0.55 + Math.random() * 0.75); // 更大粒子
    confettiLife[idx] = 0.7 + Math.random() * 0.5; // 更短但更猛
  }
  confettiNextIdx = (confettiNextIdx + CONFETTI_COUNT) % CONFETTI_COUNT;
}

function updateConfetti(dt) {
  const posAttr = confettiGeo.getAttribute('position');
  const sizeAttr = confettiGeo.getAttribute('size');
  let any = false;
  for (let i = 0; i < CONFETTI_COUNT; i++) {
    if (confettiLife[i] <= 0) continue;
    confettiLife[i] -= dt;
    if (confettiLife[i] <= 0) {
      posAttr.setXYZ(i, 0, -100, 0);
      sizeAttr.setX(i, 0);
      continue;
    }
    any = true;
    confettiVel[i * 3 + 1] -= 14.0 * dt; // 爆炸重力（快速落地）
    confettiVel[i * 3] *= 0.98;      // 空气阻力
    confettiVel[i * 3 + 2] *= 0.98;
    // 飘动
    confettiVel[i * 3] += (Math.random() - 0.5) * 2 * dt;
    confettiVel[i * 3 + 2] += (Math.random() - 0.5) * 2 * dt;
    const x = posAttr.getX(i) + confettiVel[i * 3] * dt;
    const y = posAttr.getY(i) + confettiVel[i * 3 + 1] * dt;
    const z = posAttr.getZ(i) + confettiVel[i * 3 + 2] * dt;
    posAttr.setXYZ(i, x, Math.max(y, _sprayGroundY), z); // 用缓存地面高度
    // 临终缩小
    if (confettiLife[i] < 0.3) {
      sizeAttr.setX(i, sizeAttr.getX(i) * 0.92);
    }
  }
  posAttr.needsUpdate = true;
  sizeAttr.needsUpdate = true;
  confettiGeo.getAttribute('aColor').needsUpdate = true;
}

let boxTemplate = null;

const boxLoader = new GLTFLoader();
boxLoader.load('question_mark_box/scene.gltf', (gltf) => {
  const raw = gltf.scene;

  // 先测量原始大小（含内部0.01缩放矩阵）
  const bb1 = new THREE.Box3().setFromObject(raw);
  const size1 = bb1.getSize(new THREE.Vector3());
  const maxDim = Math.max(size1.x, size1.y, size1.z);
  // 缩放到目标尺寸（约1.8m高，1.2倍放大）
  const targetSize = 1.5 * 1.2;
  const sc = targetSize / Math.max(maxDim, 0.001);
  raw.scale.multiplyScalar(sc);

  // 重新测量缩放后的包围盒
  const bb2 = new THREE.Box3().setFromObject(raw);
  const center2 = bb2.getCenter(new THREE.Vector3());
  // 水平居中，底部对齐Y=0
  raw.position.x -= center2.x;
  raw.position.z -= center2.z;
  raw.position.y -= bb2.min.y;

  // 替换所有材质为不受光照影响的黄色材质，确保远处也能看到
  const boxBodyMat = new THREE.MeshBasicMaterial({ color: 0xf0b020 }); // 黄色箱体
  const boxNailMat = new THREE.MeshBasicMaterial({ color: 0x8B6914 }); // 深金色钉子
  const boxMarkMat = new THREE.MeshBasicMaterial({ color: 0xffffff }); // 白色问号
  raw.traverse(c => {
    if (c.isMesh) {
      c.castShadow = true;
      c.receiveShadow = false;
      const name = (c.material && c.material.name) || '';
      if (name === 'cube')   c.material = boxBodyMat;
      else if (name === 'nails') c.material = boxNailMat;
      else if (name === 'phong2') c.material = boxMarkMat;
      else c.material = boxBodyMat; // fallback
    }
  });

  boxTemplate = raw;
  // 初始生成几个箱子
  for (let i = 0; i < 5; i++) spawnTreasureBox();
});

// 保持一定数量的箱子
let _boxSpawnTimer = 0;
const MAX_BOXES = 8;

function updateTreasureBoxes(dt) {
  _boxSpawnTimer += dt;
  // 定期补充箱子
  let activeCount = 0; for (let _bi = 0; _bi < treasureBoxes.length; _bi++) if (!treasureBoxes[_bi].collected) activeCount++;
  if (_boxSpawnTimer > 8 && activeCount < MAX_BOXES && boxTemplate) {
    _boxSpawnTimer = 0;
    spawnTreasureBox();
  }

  for (let i = treasureBoxes.length - 1; i >= 0; i--) {
    const box = treasureBoxes[i];
    if (box.collected) {
      // 已收集的箱子，等动画结束后移除
      box._removeTimer = (box._removeTimer || 0) + dt;
      if (box._removeTimer > 2) {
        disposeObject(box.group);
        treasureBoxes.splice(i, 1);
      }
      continue;
    }

    // 上下浮动 + 旋转
    box.bobPhase += dt * 2.5;
    box.group.position.y = getTerrainHeight(box.wx, box.wz) + 0.8 + Math.sin(box.bobPhase) * 0.3;
    box.group.children[0].rotation.y += dt * 1.2;

    // 碰撞检测（车与箱子距离）
    const dx = car.pos.x - box.wx;
    const dz = car.pos.z - box.wz;
    const dist = Math.sqrt(dx * dx + dz * dz);
    if (dist < 3.5) {
      // 收集！
      box.collected = true;

      // 彩带爆炸
      emitConfetti(box.wx, box.group.position.y, box.wz);

      // 箱子爆炸消失动画：先瞬间膨胀再快速消失
      const g = box.group;
      const origY = g.position.y;
      const t0box = performance.now();
      function explodeStep(now) {
        const t = Math.min((now - t0box) / 180, 1); // 0.18s 完成
        // 先快速膨胀到1.6倍再收缩消失
        const s = t < 0.3 ? (1 + t / 0.3 * 0.6) : (1.6 * (1 - (t - 0.3) / 0.7));
        g.scale.setScalar(Math.max(0, s));
        g.position.y = origY + t * 2;
        if (t < 1) requestAnimationFrame(explodeStep);
        else g.visible = false;
      }
      requestAnimationFrame(explodeStep);

      // 随机物品（满了就不给）
      const loot = pickRandomLoot();
      const slotIdx = addToInventory(loot.icon, loot.name);
      if (slotIdx >= 0) {
        setTimeout(() => animateItemFlyIn(loot.icon, slotIdx), 200);
      }
    }

    // 清理太远的箱子（节省性能）
    if (dist > 350) {
      disposeObject(box.group);
      treasureBoxes.splice(i, 1);
    }
  }

  // 更新彩带
  updateConfetti(dt);
}

// 金币弹出动画 — 马里奥奥德赛风格
// Y轴旋转 + 弹性上升（先快后慢）+ 到顶淡出 + 不缩小
const flyCoins = [];
const COIN_DURATION = 1.5; // 总时长秒
const COIN_RISE_HEIGHT = 4.5; // 最大上升高度

function spawnFlyCoin(wx, wy, wz, amount) {
  amount = amount || 1;
  if (!coinTemplate) { addCoin(amount, true); return; }
  const coin = coinTemplate.clone();
  coin.position.set(wx, wy, wz);
  scene.add(coin);
  // 预缓存所有材质引用（避免每帧traverse）
  const mats = [];
  coin.traverse(c => { if (c.isMesh && c.material) { c.material = c.material.clone(); c.material.transparent = true; mats.push(c.material); } });
  flyCoins.push({ mesh: coin, age: 0, startY: wy, startX: wx, startZ: wz, mats, amount });
}

function updateFlyCoins(dt) {
  for (let i = flyCoins.length - 1; i >= 0; i--) {
    const fc = flyCoins[i];
    fc.age += dt;
    const t = fc.age / COIN_DURATION; // 0~1

    if (t >= 1) {
      disposeObject(fc.mesh);
      flyCoins.splice(i, 1);
      addCoin(fc.amount || 1, true);
      continue;
    }

    // Y轴快速旋转
    fc.mesh.rotation.y += dt * 12;

    // 弹性上升曲线：easeOutBack — 先冲过头再回弹
    // f(t) = 1 - (1-t)^2 * (1 + 2.5*(1-t))  — overshoot then settle
    const easeT = 1 - Math.pow(1 - Math.min(t / 0.7, 1), 2) * (1 + 2.0 * Math.max(0, 1 - t / 0.7));
    fc.mesh.position.y = fc.startY + easeT * COIN_RISE_HEIGHT;
    // 保持原始XZ（跟随车子会太复杂，固定在弹出位置即可）
    fc.mesh.position.x = fc.startX;
    fc.mesh.position.z = fc.startZ;

    // 不缩小，保持原尺寸
    fc.mesh.scale.setScalar(1);

    // 最后30%淡出（用缓存的材质引用，不traverse）
    if (t > 0.7 && fc.mats) {
      const opacity = 1 - (t - 0.7) / 0.3;
      for (const m of fc.mats) m.opacity = opacity;
    }
  }
}

function spawnStuckNPC() {
  if (!npcModelReady) return;

  let wx, wz, biome, wy;
  for (let attempt = 0; attempt < 15; attempt++) {
    const trailIdx = Math.floor(Math.random() * TRAIL_POINTS.length);
    const tp = TRAIL_POINTS[trailIdx];
    wx = tp.x + (Math.random() - 0.5) * 4;
    wz = tp.z + (Math.random() - 0.5) * 4;
    wy = getTerrainHeight(wx, wz);
    if (getWaterDepth(wx, wz) < 0.1) break;
    if (attempt === 14) return; // 放弃
  }
  biome = getBiomeName(wx, wz);

  const group = new THREE.Group();
  // 克隆NPC卡车
  const npcCar = npcTemplateGroup.clone();
  // 随机颜色

  npcCar.traverse(c => {
    if (c.isMesh && c.material && (c.material.name === 'lambert6' || c.material.name === '')) {
      c.material = c.material.clone();
      c.material.color.set(thisColor);
    }
  });
  group.add(npcCar);

  // 陷车表现：根据biome微倾+下沉
  let sinkY = 0, tiltX = 0, tiltZ = 0;
  if (biome === 'snow') {
    const _inx = (wx - ICE_CENTER_X) / 1.4, _inz = (wz - ICE_CENTER_Z) / 0.9;
    const _iDn = Math.sqrt(_inx * _inx + _inz * _inz);
    const _iAng = Math.atan2(_inz, _inx);
    const _iInd = 0.38 * Math.max(0, -Math.cos(_iAng)) * (1 + 0.3 * Math.sin(_iAng));
    if (_iDn < ICE_RADIUS * (1.0 - _iInd) * 1.05) {
      // 冰湖上：不下沉，轻微打滑姿态，正常落在冰面
      sinkY = 0; tiltX = 0.03; tiltZ = (Math.random() - 0.5) * 0.05;
    } else {
      sinkY = -0.4; tiltX = 0.08 + Math.random() * 0.1;
    }
  } else if (biome === 'jungle') {
    sinkY = -0.5; tiltX = 0.1 + Math.random() * 0.12; tiltZ = (Math.random() - 0.5) * 0.1;
  } else { // desert
    sinkY = -0.3; tiltZ = 0.07 + Math.random() * 0.1;
  }

  // 随机朝向
  const heading = Math.random() * Math.PI * 2;
  group.position.set(wx, wy + sinkY, wz);
  group.rotation.set(tiltX, heading, tiltZ);

  // 圆角矩形
  const rx = 8, rw = 120, rh = 44, ry = 4;
  hctx.beginPath();
  hctx.moveTo(rx + 10, ry); hctx.lineTo(rx + rw - 10, ry);
  hctx.quadraticCurveTo(rx + rw, ry, rx + rw, ry + 10);
  hctx.lineTo(rx + rw, ry + rh - 10);
  hctx.quadraticCurveTo(rx + rw, ry + rh, rx + rw - 10, ry + rh);
  // 尖角
  hctx.lineTo(74, ry + rh); hctx.lineTo(64, ry + rh + 14); hctx.lineTo(54, ry + rh);
  hctx.lineTo(rx + 10, ry + rh);
  hctx.quadraticCurveTo(rx, ry + rh, rx, ry + rh - 10);
  hctx.lineTo(rx, ry + 10);
  hctx.quadraticCurveTo(rx, ry, rx + 10, ry);
  hctx.closePath();
  hctx.fill();
  hctx.fillStyle = '#111';
  hctx.font = 'bold 22px sans-serif';
  hctx.textAlign = 'center';
  hctx.fillText('HELP!', 68, 36);

  const helpTex = new THREE.CanvasTexture(helpCanvas);
  const helpMat = new THREE.SpriteMaterial({ map: helpTex, transparent: true, depthTest: false });
  const helpSprite = new THREE.Sprite(helpMat);
  helpSprite.scale.set(3, 1.5, 1);
  helpSprite.position.set(0, 4.5, 0);
  helpSprite.visible = false; // 近距离才显示
  group.add(helpSprite);

  // 找轮子 pivot（与玩家车相同结构：WTmesh_XX_pivot）
  const _npcWheels = [];
  npcCar.traverse(c => {
    if (c.name === 'WTmesh_FL_pivot' || c.name === 'WTmesh_FR_pivot' ||
        c.name === 'WTmesh_BL_pivot' || c.name === 'WTmesh_BR_pivot') {
      _npcWheels.push(c);
    }
  });

  // 救援有效区域 — 半透明圆形标识（8m半径）
  const rescueZoneGeo = new THREE.RingGeometry(7.5, 8.0, 48);
  rescueZoneGeo.rotateX(-Math.PI / 2);
  const rescueZoneMat = new THREE.MeshBasicMaterial({
    color: 0x44aaff, transparent: true, opacity: 0.25,
    side: THREE.DoubleSide, depthWrite: false,
  });
  const rescueZone = new THREE.Mesh(rescueZoneGeo, rescueZoneMat);
  // 内部填充
  const rescueZoneFillGeo = new THREE.CircleGeometry(7.5, 48);
  rescueZoneFillGeo.rotateX(-Math.PI / 2);
  const rescueZoneFillMat = new THREE.MeshBasicMaterial({
    color: 0x44aaff, transparent: true, opacity: 0.08,
    side: THREE.DoubleSide, depthWrite: false,
  });
  const rescueZoneFill = new THREE.Mesh(rescueZoneFillGeo, rescueZoneFillMat);
  rescueZone.add(rescueZoneFill);
  rescueZone.position.y = -sinkY + 1.5; // 车身一半高度，避免地面/冰面穿模
  rescueZone.renderOrder = 999;
  rescueZone.castShadow = false;
  rescueZone.receiveShadow = false;
  group.add(rescueZone);

  stuckNPCs.push({
    group, wx, wz, biome, rescued: false,
    helpSprite, _removeTimer: 0,
    _vx: 0, _vz: 0,          // 碰撞速度
    _wheels: _npcWheels,      // 轮子 pivot 引用

    _npcSmoothY: group.position.y,
    _npcSmoothPitch: tiltX,
    _rescueZone: rescueZone,  // 救援区域mesh引用
  });
}

// 创建拖车绳（固定顶点数的粗线条，每帧只更新位置）
const ROPE_SEGMENTS = 10;
function createTowRope() {
  const geo = new THREE.BufferGeometry();
  // 每段2个三角形(quad)，每个quad 6个顶点，双面 = 单面就行用DoubleSide
  // 简化：用宽线条ribbon（每段4个顶点=2个三角形）
  const vertCount = (ROPE_SEGMENTS + 1) * 2; // 每个截面2个顶点（上下）
  const posArr = new Float32Array(vertCount * 3);
  const idxArr = [];
  for (let i = 0; i < ROPE_SEGMENTS; i++) {
    const a = i * 2, b = a + 1, c = a + 2, d = a + 3;
    idxArr.push(a, c, b, b, c, d);
  }
  geo.setAttribute('position', new THREE.BufferAttribute(posArr, 3));
  geo.setIndex(idxArr);
  const mat = new THREE.MeshBasicMaterial({ color: 0xd4a040, side: THREE.DoubleSide });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.frustumCulled = false;
  scene.add(mesh);
  return mesh;
}

function updateTowRopeGeometry(ropeMesh, x0, y0, z0, x1, y1, z1) {
  // NaN保护：如果任何坐标无效，跳过更新避免渲染卡死
  if (!isFinite(x0+y0+z0+x1+y1+z1)) return;
  const posAttr = ropeMesh.geometry.getAttribute('position');
  const midX = (x0 + x1) / 2, midZ = (z0 + z1) / 2;
  const midY = Math.min(y0, y1) - 0.4; // 下垂
  const ropeWidth = 0.06;
  const dx = x1 - x0, dz = z1 - z0;
  const len = Math.sqrt(dx * dx + dz * dz) || 1;
  const nx = -dz / len * ropeWidth, nz = dx / len * ropeWidth;

  for (let i = 0; i <= ROPE_SEGMENTS; i++) {
    const t = i / ROPE_SEGMENTS;
    const u = 1 - t;
    const px = u * u * x0 + 2 * u * t * midX + t * t * x1;
    const py = u * u * y0 + 2 * u * t * midY + t * t * y1;
    const pz = u * u * z0 + 2 * u * t * midZ + t * t * z1;
    posAttr.setXYZ(i * 2, px + nx, py + ropeWidth, pz + nz);
    posAttr.setXYZ(i * 2 + 1, px - nx, py - ropeWidth, pz - nz);
  }
  posAttr.needsUpdate = true;
  ropeMesh.geometry.computeBoundingSphere();
}

// 创建方向箭头（黄色，更大更明显）
function createTowArrow() {
  const shape = new THREE.Shape();
  // 粗壮的箭头：尖端在 y=1.5，宽翼，厚箭杆
  shape.moveTo(0, 1.5); shape.lineTo(-0.8, 0.2); shape.lineTo(-0.3, 0.2);
  shape.lineTo(-0.3, -1.2); shape.lineTo(0.3, -1.2); shape.lineTo(0.3, 0.2);
  shape.lineTo(0.8, 0.2); shape.closePath();
  const geo = new THREE.ShapeGeometry(shape);
  geo.rotateX(-Math.PI / 2);
  const mat = new THREE.MeshBasicMaterial({ color: 0xffdd00, transparent: true, opacity: 0.92, side: THREE.DoubleSide, depthTest: false });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.renderOrder = 999;
  scene.add(mesh);
  return mesh;
}

function startTow(npc) {
  console.log('[TOW] startTow called, npc at:', npc.wx.toFixed(1), npc.wz.toFixed(1), 'onIce:', isInIceLake(npc.wx, npc.wz));
  // 消耗物品（飞出动画）
  const hookSlot = consumeInventoryItem('拖车钩');
  const ropeSlot = consumeInventoryItem('拖车绳');
  if (hookSlot >= 0) animateItemFlyToWorld('🪝', hookSlot, npc.wx, npc.group.position.y + 2, npc.wz);
  if (ropeSlot >= 0) animateItemFlyToWorld('🪢', ropeSlot, npc.wx, npc.group.position.y + 2, npc.wz);

  towState.active = true;
  towState.npc = npc;
  towState.countdown = 5;
  towState.counting = false;
  towState.shakePhase = 0;

  const h = npc.group.rotation.y;
  const fwdX = Math.sin(h), fwdZ = Math.cos(h); // NPC车头方向

  // 箭头始终在车头，拖拽方向 = 车头前方
  towState.isFront = true;
  towState.towDir = { x: fwdX, z: fwdZ };
  towState.towAnchor = { x: npc.wx + fwdX * 2.5, z: npc.wz + fwdZ * 2.5 };

  // 创建绳子和箭头
  towState.rope = createTowRope();
  towState.arrow = createTowArrow();
  // 箭头放在车头前方地面
  const ax = towState.towAnchor.x + fwdX * 2;
  const az = towState.towAnchor.z + fwdZ * 2;
  towState.arrow.position.set(ax, getTerrainHeight(ax, az) + 0.15, az);
  // 箭头尖端朝向车头前方：几何体默认尖端在局部 -Z，需转 h+PI 使其指向 fwdX/fwdZ
  towState.arrow.rotation.y = h + Math.PI;
  towState.arrow.scale.set(1.75, 1.75, 1.75);
}

function endTow(success) {
  console.log('[TOW] endTow called, success:', success);
  if (towState.rope) { disposeObject(towState.rope); towState.rope = null; }
