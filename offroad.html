function useFuelItem(slotIdx) {
  if (!inventory[slotIdx] || inventory[slotIdx].name !== '油料') return;
  const icon = inventory[slotIdx].icon;
  inventory[slotIdx] = null;
  updateInventoryUI();

  // 图标飞向燃油条
  const slotEl = document.getElementById('invSlot' + slotIdx);
  const fuelBarEl = document.getElementById('fuelBar');
  if (!slotEl || !fuelBarEl) { fuel = Math.min(FUEL_MAX, fuel + FUEL_MAX * 0.3); updateFuelUI(); return; }

  const startRect = slotEl.getBoundingClientRect();
  const endRect = fuelBarEl.getBoundingClientRect();
  const el = document.createElement('div');
  el.className = 'fly-item';
  el.textContent = icon;
  el.style.left = (startRect.left + startRect.width / 2 - 14) + 'px';
  el.style.top = (startRect.top + startRect.height / 2 - 14) + 'px';
  document.body.appendChild(el);

  const sx = startRect.left + startRect.width / 2;
  const sy = startRect.top + startRect.height / 2;
  const ex = endRect.left + endRect.width / 2;
  const ey = endRect.top + endRect.height / 2;
  const t0 = performance.now();
  const dur = 500;
  function step(now) {
    let t = Math.min(1, (now - t0) / dur);
    const x = sx + (ex - sx) * t;
    const y = sy + (ey - sy) * t - Math.sin(t * Math.PI) * 40;
    el.style.left = (x - 14) + 'px';
    el.style.top = (y - 14) + 'px';
    el.style.opacity = String(t < 0.8 ? 1 : 1 - (t - 0.8) / 0.2);
    if (t < 1) requestAnimationFrame(step);
    else {
      el.remove();
      fuel = Math.min(FUEL_MAX, fuel + FUEL_MAX * 0.3);
      updateFuelUI();

      fuelBarEl.style.boxShadow = '0 0 15px rgba(67,160,71,0.8)';
      setTimeout(() => { fuelBarEl.style.boxShadow = ''; }, 400);
    }
  }
  requestAnimationFrame(step);
}

// 飞入动画：从世界坐标飞到物品栏槽位
function animateItemFlyIn(icon, slotIdx) {
  const el = document.createElement('div');
  el.className = 'fly-item';
  el.textContent = icon;
  // 起点：屏幕中心偏上
  const startX = window.innerWidth / 2;
  const startY = window.innerHeight / 2 - 60;
  el.style.left = startX + 'px';
  el.style.top = startY + 'px';
  document.body.appendChild(el);

  // 终点：物品栏槽位位置
  const slotEl = document.getElementById('invSlot' + slotIdx);
  const slotRect = slotEl.getBoundingClientRect();
  const endX = slotRect.left + slotRect.width / 2 - 14;
  const endY = slotRect.top + slotRect.height / 2 - 14;

  // 变速飞行：先上抬（ease-out），再加速飞向目标（ease-in）
  const RISE = 220, FLY = 360; // ms
  const riseEndX = startX, riseEndY = startY - 80;
  const t0 = performance.now();

  function step(now) {
    const elapsed = now - t0;
    if (elapsed < RISE) {
      const t = elapsed / RISE;
      const eased = 1 - (1 - t) * (1 - t);
      const cy = startY + (riseEndY - startY) * eased;
      const s = 1 + 0.6 * Math.sin(t * Math.PI);
      el.style.left = (riseEndX - 14) + 'px';
      el.style.top = (cy - 14) + 'px';
      el.style.transform = `scale(${s})`;
      el.style.opacity = '1';
    } else {
      const t = Math.min(1, (elapsed - RISE) / FLY);
      const eased = t * t; // ease-in 加速
      const cx = riseEndX + (endX - riseEndX) * eased;
      const cy = riseEndY + (endY - riseEndY) * eased;
      const s = 1.5 - 0.5 * t;
      el.style.left = cx + 'px';
      el.style.top = cy + 'px';
      el.style.transform = `scale(${s})`;
      el.style.opacity = String(t < 0.75 ? 1 : 1 - (t - 0.75) / 0.25);
      if (t >= 1) {
        el.remove();
        if (slotEl) {
          slotEl.style.boxShadow = '0 0 20px rgba(255,200,50,0.8)';
          setTimeout(() => { slotEl.style.boxShadow = ''; }, 400);
        }
        return;
      }
    }
    requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

// 彩带爆炸粒子系统（Three.js场景中）
const CONFETTI_COUNT = 160;
const confettiGeo = new THREE.BufferGeometry();
const confettiPosArr = new Float32Array(CONFETTI_COUNT * 3);
const confettiColArr = new Float32Array(CONFETTI_COUNT * 3);
const confettiVel = new Float32Array(CONFETTI_COUNT * 3);
const confettiLife = new Float32Array(CONFETTI_COUNT);
const confettiSizes = new Float32Array(CONFETTI_COUNT);
confettiGeo.setAttribute('position', new THREE.BufferAttribute(confettiPosArr, 3));
confettiGeo.setAttribute('aColor', new THREE.BufferAttribute(confettiColArr, 3));
confettiGeo.setAttribute('size', new THREE.BufferAttribute(confettiSizes, 1));

const confettiMat = new THREE.ShaderMaterial({
  transparent: true, depthWrite: false,
  uniforms: {},
  vertexShader: `
    attribute float size;
    attribute vec3 aColor;
    varying vec3 vColor;
    void main() {
      vColor = aColor;
      vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
      gl_PointSize = size * (320.0 / -mvPos.z);
      gl_PointSize = clamp(gl_PointSize, 2.0, 80.0);
      gl_Position = projectionMatrix * mvPos;
    }
  `,
  fragmentShader: `
    varying vec3 vColor;
    void main() {
      vec2 p = gl_PointCoord - 0.5;
      // 方形彩带片
      float alpha = (abs(p.x) < 0.4 && abs(p.y) < 0.35) ? 0.9 : 0.0;
      if (alpha < 0.01) discard;
      gl_FragColor = vec4(vColor, alpha);
    }
  `,
});
const confettiPoints = new THREE.Points(confettiGeo, confettiMat);
confettiPoints.frustumCulled = false;
scene.add(confettiPoints);
let confettiNextIdx = 0;

// 彩带颜色
const CONFETTI_COLORS = [
  [1, 0.2, 0.2], [0.2, 1, 0.3], [0.2, 0.4, 1], [1, 0.9, 0.1],
  [1, 0.4, 0.8], [0.1, 0.9, 0.9], [1, 0.6, 0.1],
];

function emitConfetti(wx, wy, wz) {
  const posAttr = confettiGeo.getAttribute('position');
  const colAttr = confettiGeo.getAttribute('aColor');
  const sizeAttr = confettiGeo.getAttribute('size');
  for (let i = 0; i < CONFETTI_COUNT; i++) {
    const idx = (confettiNextIdx + i) % CONFETTI_COUNT;
    posAttr.setXYZ(idx, wx, wy + 1.5, wz);
    // 随机方向爆炸（速度更大，全向均匀）
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.random() * Math.PI * 0.75;
    const spd = 8 + Math.random() * 14; // 更快初速
    confettiVel[idx * 3]     = Math.cos(theta) * Math.sin(phi) * spd;
    confettiVel[idx * 3 + 1] = Math.cos(phi) * spd + 4; // 向上分量更大
    confettiVel[idx * 3 + 2] = Math.sin(theta) * Math.sin(phi) * spd;
    // 随机颜色
    const c = CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)];
    colAttr.setXYZ(idx, c[0], c[1], c[2]);
    sizeAttr.setX(idx, 0.55 + Math.random() * 0.75); // 更大粒子
    confettiLife[idx] = 0.7 + Math.random() * 0.5; // 更短但更猛
  }
  confettiNextIdx = (confettiNextIdx + CONFETTI_COUNT) % CONFETTI_COUNT;
}

function updateConfetti(dt) {
  const posAttr = confettiGeo.getAttribute('position');
  const sizeAttr = confettiGeo.getAttribute('size');
  let any = false;
  for (let i = 0; i < CONFETTI_COUNT; i++) {
    if (confettiLife[i] <= 0) continue;
    confettiLife[i] -= dt;
    if (confettiLife[i] <= 0) {
      posAttr.setXYZ(i, 0, -100, 0);
      sizeAttr.setX(i, 0);
      continue;
    }
    any = true;
    confettiVel[i * 3 + 1] -= 14.0 * dt; // 爆炸重力（快速落地）
    confettiVel[i * 3] *= 0.98;      // 空气阻力
    confettiVel[i * 3 + 2] *= 0.98;
    // 飘动
    confettiVel[i * 3] += (Math.random() - 0.5) * 2 * dt;
    confettiVel[i * 3 + 2] += (Math.random() - 0.5) * 2 * dt;
    const x = posAttr.getX(i) + confettiVel[i * 3] * dt;
    const y = posAttr.getY(i) + confettiVel[i * 3 + 1] * dt;
    const z = posAttr.getZ(i) + confettiVel[i * 3 + 2] * dt;
    posAttr.setXYZ(i, x, Math.max(y, _sprayGroundY), z); // 用缓存地面高度
    // 临终缩小
    if (confettiLife[i] < 0.3) {
      sizeAttr.setX(i, sizeAttr.getX(i) * 0.92);
    }
  }
  posAttr.needsUpdate = true;
  sizeAttr.needsUpdate = true;
  confettiGeo.getAttribute('aColor').needsUpdate = true;
}

let boxTemplate = null;

const boxLoader = new GLTFLoader();
boxLoader.load('question_mark_box/scene.gltf', (gltf) => {
  const raw = gltf.scene;

  // 先测量原始大小（含内部0.01缩放矩阵）
  const bb1 = new THREE.Box3().setFromObject(raw);
  const size1 = bb1.getSize(new THREE.Vector3());
  const maxDim = Math.max(size1.x, size1.y, size1.z);
  // 缩放到目标尺寸（约1.8m高，1.2倍放大）
  const targetSize = 1.5 * 1.2;
  const sc = targetSize / Math.max(maxDim, 0.001);
  raw.scale.multiplyScalar(sc);

  // 重新测量缩放后的包围盒
  const bb2 = new THREE.Box3().setFromObject(raw);
  const center2 = bb2.getCenter(new THREE.Vector3());
  // 水平居中，底部对齐Y=0
  raw.position.x -= center2.x;
  raw.position.z -= center2.z;
  raw.position.y -= bb2.min.y;

  // 替换所有材质为不受光照影响的黄色材质，确保远处也能看到
  const boxBodyMat = new THREE.MeshBasicMaterial({ color: 0xf0b020 }); // 黄色箱体
  const boxNailMat = new THREE.MeshBasicMaterial({ color: 0x8B6914 }); // 深金色钉子
  const boxMarkMat = new THREE.MeshBasicMaterial({ color: 0xffffff }); // 白色问号
  raw.traverse(c => {
    if (c.isMesh) {
      c.castShadow = true;
      c.receiveShadow = false;
      const name = (c.material && c.material.name) || '';
      if (name === 'cube')   c.material = boxBodyMat;
      else if (name === 'nails') c.material = boxNailMat;
      else if (name === 'phong2') c.material = boxMarkMat;
      else c.material = boxBodyMat; // fallback
    }
  });

  boxTemplate = raw;
  // 初始生成几个箱子
  for (let i = 0; i < 5; i++) spawnTreasureBox();
});

// 宝箱实例管理
const treasureBoxes = []; // { group, wx, wz, bobPhase, collected }

function spawnTreasureBox() {
  if (!boxTemplate) return;
  // 在车周围 60~200m 处随机放置（避开水域 + 避开NPC 10m范围）
  let wx, wz, wy;
  for (let attempt = 0; attempt < 10; attempt++) {
    const angle = Math.random() * Math.PI * 2;
    const dist = 60 + Math.random() * 140;
    wx = car.pos.x + Math.cos(angle) * dist;
    wz = car.pos.z + Math.sin(angle) * dist;
    wy = getTerrainHeight(wx, wz);
    if (getWaterDepth(wx, wz) < 0.1 && !_isTooCloseToNPC(wx, wz)) break;
    if (attempt === 9) return; // 多次失败放弃
  }

  const group = new THREE.Group();
  const model = boxTemplate.clone();
  group.add(model);
  group.position.set(wx, wy + 0.8, wz);
  scene.add(group);

  // 发光光柱（让玩家远处就能看到）
  const pillarGeo = new THREE.CylinderGeometry(0.15, 0.4, 8, 8, 1, true);
  const pillarMat = new THREE.MeshBasicMaterial({
    color: 0xffcc00, transparent: true, opacity: 0.12,
    side: THREE.DoubleSide, depthWrite: false,
  });
  const pillar = new THREE.Mesh(pillarGeo, pillarMat);
  pillar.position.y = 4;
  group.add(pillar);

  treasureBoxes.push({ group, wx, wz, bobPhase: Math.random() * Math.PI * 2, collected: false });
}

// 保持一定数量的箱子
let _boxSpawnTimer = 0;
const MAX_BOXES = 8;

function updateTreasureBoxes(dt) {
  _boxSpawnTimer += dt;
  // 定期补充箱子
  let activeCount = 0; for (let _bi = 0; _bi < treasureBoxes.length; _bi++) if (!treasureBoxes[_bi].collected) activeCount++;
  if (_boxSpawnTimer > 8 && activeCount < MAX_BOXES && boxTemplate) {
    _boxSpawnTimer = 0;
    spawnTreasureBox();
  }

  for (let i = treasureBoxes.length - 1; i >= 0; i--) {
    const box = treasureBoxes[i];
    if (box.collected) {
      // 已收集的箱子，等动画结束后移除
      box._removeTimer = (box._removeTimer || 0) + dt;
      if (box._removeTimer > 2) {
        disposeObject(box.group);
        treasureBoxes.splice(i, 1);
      }
      continue;
    }

    // 上下浮动 + 旋转
    box.bobPhase += dt * 2.5;
    box.group.position.y = getTerrainHeight(box.wx, box.wz) + 0.8 + Math.sin(box.bobPhase) * 0.3;
    box.group.children[0].rotation.y += dt * 1.2;

    // 碰撞检测（车与箱子距离）
    const dx = car.pos.x - box.wx;
    const dz = car.pos.z - box.wz;
    const dist = Math.sqrt(dx * dx + dz * dz);
    if (dist < 3.5) {
      // 收集！
      box.collected = true;
      playTreasureSound();

      // 彩带爆炸
      emitConfetti(box.wx, box.group.position.y, box.wz);

      // 箱子爆炸消失动画：先瞬间膨胀再快速消失
      const g = box.group;
      const origY = g.position.y;
      const t0box = performance.now();
      function explodeStep(now) {
        const t = Math.min((now - t0box) / 180, 1); // 0.18s 完成
        // 先快速膨胀到1.6倍再收缩消失
        const s = t < 0.3 ? (1 + t / 0.3 * 0.6) : (1.6 * (1 - (t - 0.3) / 0.7));
        g.scale.setScalar(Math.max(0, s));
        g.position.y = origY + t * 2;
        if (t < 1) requestAnimationFrame(explodeStep);
        else g.visible = false;
      }
      requestAnimationFrame(explodeStep);

      // 随机物品（满了就不给）
      const loot = pickRandomLoot();
      const slotIdx = addToInventory(loot.icon, loot.name);
      if (slotIdx >= 0) {
        setTimeout(() => animateItemFlyIn(loot.icon, slotIdx), 200);
      }
    }

    // 清理太远的箱子（节省性能）
    if (dist > 350) {
      disposeObject(box.group);
      treasureBoxes.splice(i, 1);
    }
  }

  // 更新彩带
  updateConfetti(dt);
}

  const star2 = new THREE.Mesh(starGeo, starMat);
  star2.rotation.y = -Math.PI / 2;
  star2.position.x = -0.035;
  coinGroup.add(star2);
  // 绕X轴旋转90度让金币正面朝向玩家
  coinGroup.rotation.x = Math.PI / 2;
  coinTemplate = coinGroup;
}

// 金币弹出动画 — 马里奥奥德赛风格
// Y轴旋转 + 弹性上升（先快后慢）+ 到顶淡出 + 不缩小
const flyCoins = [];
const COIN_DURATION = 1.5; // 总时长秒
const COIN_RISE_HEIGHT = 4.5; // 最大上升高度

function spawnFlyCoin(wx, wy, wz, amount) {
  amount = amount || 1;
  if (!coinTemplate) { addCoin(amount, true); return; }
  const coin = coinTemplate.clone();
  coin.position.set(wx, wy, wz);
  scene.add(coin);
  // 预缓存所有材质引用（避免每帧traverse）
  const mats = [];
  coin.traverse(c => { if (c.isMesh && c.material) { c.material = c.material.clone(); c.material.transparent = true; mats.push(c.material); } });
  flyCoins.push({ mesh: coin, age: 0, startY: wy, startX: wx, startZ: wz, mats, amount });
}

function updateFlyCoins(dt) {
  for (let i = flyCoins.length - 1; i >= 0; i--) {
    const fc = flyCoins[i];
    fc.age += dt;
    const t = fc.age / COIN_DURATION; // 0~1

    if (t >= 1) {
      disposeObject(fc.mesh);
      flyCoins.splice(i, 1);
      addCoin(fc.amount || 1, true);
      continue;
    }

    // Y轴快速旋转
    fc.mesh.rotation.y += dt * 12;

    // 弹性上升曲线：easeOutBack — 先冲过头再回弹
    // f(t) = 1 - (1-t)^2 * (1 + 2.5*(1-t))  — overshoot then settle
    const easeT = 1 - Math.pow(1 - Math.min(t / 0.7, 1), 2) * (1 + 2.0 * Math.max(0, 1 - t / 0.7));
    fc.mesh.position.y = fc.startY + easeT * COIN_RISE_HEIGHT;
    // 保持原始XZ（跟随车子会太复杂，固定在弹出位置即可）
    fc.mesh.position.x = fc.startX;
    fc.mesh.position.z = fc.startZ;

    // 不缩小，保持原尺寸
    fc.mesh.scale.setScalar(1);

    // 最后30%淡出（用缓存的材质引用，不traverse）
    if (t > 0.7 && fc.mats) {
      const opacity = 1 - (t - 0.7) / 0.3;
      for (const m of fc.mats) m.opacity = opacity;
    }
  }
}

const stuckNPCs = [];
const MAX_NPCS = 5;

// 用卡车模型的简化版代替（克隆主车模型并改色）

// NPC使用TANK 300模型（复用玩家车完整的pivot处理流程，确保轮距正确）
{
  const npcCfg = VEHICLES['tank_300'];
  const npcLoader = new GLTFLoader();
  npcLoader.load(npcCfg.path, (npcGltf) => {
    const npcRaw = npcGltf.scene;

    // 1. 朝向校正
    if (npcCfg.modelRotation) {
      const rotW = new THREE.Group();
      rotW.rotation.y = npcCfg.modelRotation;
      while (npcRaw.children.length > 0) rotW.add(npcRaw.children[0]);
      npcRaw.add(rotW);
      npcRaw.updateMatrixWorld(true);
    }

    // 2. 节点清理
    npcCfg.removeNodes.forEach(nodeName => {
      let target = null;
      npcRaw.traverse(c => { if (c.name === nodeName) target = c; });
      if (target?.parent) { target.parent.remove(target); target.traverse(c => { if (c.isMesh) { c.geometry?.dispose(); c.material?.dispose?.(); } }); }
    });

    // 3. 缩放+居中
    const box = new THREE.Box3().setFromObject(npcRaw);
    const sz = box.getSize(new THREE.Vector3());
    npcRaw.scale.setScalar(npcCfg.scale / Math.max(sz.x, sz.y, sz.z));
    const box2 = new THREE.Box3().setFromObject(npcRaw);
    const c2 = box2.getCenter(new THREE.Vector3());
    npcRaw.position.x -= c2.x;
    npcRaw.position.z -= c2.z;
    npcRaw.position.y -= box2.min.y;

    // 4. 轮子pivot化（和玩家车完全相同的createWheelPivot逻辑）
    const wn = npcCfg.wheelNames;
    let rawFL = null, rawFR = null, rawBL = null, rawBR = null;
    npcRaw.traverse(c => {
      if (c.name === wn.FL) rawFL = c;
      if (c.name === wn.FR) rawFR = c;
      if (c.name === wn.BL) rawBL = c;
      if (c.name === wn.BR) rawBR = c;
    });
    npcRaw.updateMatrixWorld(true);
    function _npcPivot(wheelNode) {
      if (!wheelNode) return null;
      const wBox = new THREE.Box3().setFromObject(wheelNode);
      const wCenter = wBox.getCenter(new THREE.Vector3());
      const parent = wheelNode.parent;
      const parentInv = new THREE.Matrix4().copy(parent.matrixWorld).invert();
      const localCenter = wCenter.clone().applyMatrix4(parentInv);
      const pivot = new THREE.Group();
      pivot.name = wheelNode.name + '_pivot';
      pivot.position.copy(localCenter);
      parent.add(pivot);
      parent.remove(wheelNode);
      pivot.add(wheelNode);
      wheelNode.position.set(-localCenter.x, -localCenter.y, -localCenter.z);
      return pivot;
    }
    _npcPivot(rawFL); _npcPivot(rawFR); _npcPivot(rawBL); _npcPivot(rawBR);

    // 5. 轮子缩放（对pivot整体缩放，和玩家车完全相同）
    if (npcCfg.wheelScale) {
      const ws = npcCfg.wheelScale;
      npcRaw.traverse(c => {
        if (c.name && c.name.endsWith('_pivot') && c.name.startsWith('WTmesh_')) {
          c.scale.set(ws.x || 1, ws.y || 1, ws.z || 1);
        }
      });
    }

    // 6. 材质
    npcRaw.traverse(c => {
      if (c.isMesh) { c.castShadow = false; c.receiveShadow = true; }
    });

    npcRaw._wheelSpinFlip = npcCfg.wheelSpinFlip || 1;
    npcRaw._wheelAxis = npcCfg.wheelAxis || 'x';
    npcTemplateGroup = npcRaw;
    npcModelReady = true;
    console.log('[NPC] TANK 300 loaded with full pivot setup');
  });
}

const MIN_ENTITY_DIST = 10;
const MIN_ENTITY_DIST_SQ = MIN_ENTITY_DIST * MIN_ENTITY_DIST;
function _isTooCloseToNPC(wx, wz) {
  for (let i = 0; i < stuckNPCs.length; i++) {
    const dx = wx - stuckNPCs[i].wx, dz = wz - stuckNPCs[i].wz;
    if (dx * dx + dz * dz < MIN_ENTITY_DIST_SQ) return true;
  }
  // 同时检查打卡相机位置
  if (typeof checkpointState !== 'undefined') {
    for (let i = 0; i < checkpointState.length; i++) {
      if (checkpointState[i].unlocked) continue;
      const dx = wx - checkpointState[i].wx, dz = wz - checkpointState[i].wz;
      if (dx * dx + dz * dz < MIN_ENTITY_DIST_SQ) return true;
    }
  }
  return false;
}

function spawnStuckNPC() {

  let wx, wz, biome, wy;

    const trailIdx = Math.floor(Math.random() * TRAIL_POINTS.length);
    const tp = TRAIL_POINTS[trailIdx];
    wx = tp.x + (Math.random() - 0.5) * 4;
    wz = tp.z + (Math.random() - 0.5) * 4;
    wy = getTerrainHeight(wx, wz);
    // 冰湖及边缘排除（iceR * 1.3 覆盖冰面+过渡带）
    const _niDx = (wx - ICE_CENTER_X) / 1.4, _niDz = (wz - ICE_CENTER_Z) / 0.9;
    const _nearIce = Math.sqrt(_niDx * _niDx + _niDz * _niDz) < ICE_RADIUS * 1.3;
    if (getWaterDepth(wx, wz) < 0.1 && !_isTooCloseToNPC(wx, wz) && !_nearIce) break;
    if (attempt === 14) return; // 放弃
  }
  biome = getBiomeName(wx, wz);

  const group = new THREE.Group();

  let sinkY = 0, tiltX = 0, tiltZ = 0;

    const _iDn = Math.sqrt(_inx * _inx + _inz * _inz);
    const _iAng = Math.atan2(_inz, _inx);
    const _iInd = 0.38 * Math.max(0, -Math.cos(_iAng)) * (1 + 0.3 * Math.sin(_iAng));
    if (_iDn < ICE_RADIUS * (1.0 - _iInd) * 1.05) {

  // 随机朝向

  hctx.quadraticCurveTo(rx + rw, ry, rx + rw, ry + 10);

  hctx.quadraticCurveTo(rx + rw, ry + rh, rx + rw - 10, ry + rh);

  hctx.lineTo(rx + 10, ry + rh);

  // 找轮子节点（TANK 300直接用WTmesh_XX名称，旧皮卡用_pivot后缀）

               c.name === 'WTmesh_BL_pivot' || c.name === 'WTmesh_BR_pivot') {

  rescueZone.renderOrder = 999;
  rescueZone.castShadow = false;
  rescueZone.receiveShadow = false;
  group.add(rescueZone);

  stuckNPCs.push({
    group, wx, wz, biome, rescued: false,
    helpSprite, _removeTimer: 0,
    _vx: 0, _vz: 0,          // 碰撞速度
    _wheels: _npcWheels,      // 轮子 pivot 引用

}

// 创建拖车绳（固定顶点数的粗线条，每帧只更新位置）
const ROPE_SEGMENTS = 10;
function createTowRope() {
  const geo = new THREE.BufferGeometry();
  // 每段2个三角形(quad)，每个quad 6个顶点，双面 = 单面就行用DoubleSide
  // 简化：用宽线条ribbon（每段4个顶点=2个三角形）
  const vertCount = (ROPE_SEGMENTS + 1) * 2; // 每个截面2个顶点（上下）
  const posArr = new Float32Array(vertCount * 3);
  const idxArr = [];
  for (let i = 0; i < ROPE_SEGMENTS; i++) {
    const a = i * 2, b = a + 1, c = a + 2, d = a + 3;
    idxArr.push(a, c, b, b, c, d);
  }
  geo.setAttribute('position', new THREE.BufferAttribute(posArr, 3));
  geo.setIndex(idxArr);
  const mat = new THREE.MeshBasicMaterial({ color: 0xd4a040, side: THREE.DoubleSide });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.frustumCulled = false;
  scene.add(mesh);
  return mesh;
}

function updateTowRopeGeometry(ropeMesh, x0, y0, z0, x1, y1, z1) {
  // NaN保护：如果任何坐标无效，跳过更新避免渲染卡死
  if (!isFinite(x0+y0+z0+x1+y1+z1)) return;
  const posAttr = ropeMesh.geometry.getAttribute('position');
  const midX = (x0 + x1) / 2, midZ = (z0 + z1) / 2;
  const midY = Math.min(y0, y1) - 0.4; // 下垂
  const ropeWidth = 0.06;
  const dx = x1 - x0, dz = z1 - z0;
  const len = Math.sqrt(dx * dx + dz * dz) || 1;
  const nx = -dz / len * ropeWidth, nz = dx / len * ropeWidth;

  for (let i = 0; i <= ROPE_SEGMENTS; i++) {
    const t = i / ROPE_SEGMENTS;
    const u = 1 - t;
    const px = u * u * x0 + 2 * u * t * midX + t * t * x1;
    const py = u * u * y0 + 2 * u * t * midY + t * t * y1;
    const pz = u * u * z0 + 2 * u * t * midZ + t * t * z1;
    posAttr.setXYZ(i * 2, px + nx, py + ropeWidth, pz + nz);
    posAttr.setXYZ(i * 2 + 1, px - nx, py - ropeWidth, pz - nz);
  }
  posAttr.needsUpdate = true;
  ropeMesh.geometry.computeBoundingSphere();
}

// 创建方向箭头（黄色，更大更明显）
function createTowArrow() {
  const shape = new THREE.Shape();
  // 粗壮的箭头：尖端在 y=1.5，宽翼，厚箭杆
  shape.moveTo(0, 1.5); shape.lineTo(-0.8, 0.2); shape.lineTo(-0.3, 0.2);
  shape.lineTo(-0.3, -1.2); shape.lineTo(0.3, -1.2); shape.lineTo(0.3, 0.2);
  shape.lineTo(0.8, 0.2); shape.closePath();
  const geo = new THREE.ShapeGeometry(shape);
  geo.rotateX(-Math.PI / 2);
  const mat = new THREE.MeshBasicMaterial({ color: 0xffdd00, transparent: true, opacity: 0.92, side: THREE.DoubleSide, depthTest: false });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.renderOrder = 999;
  scene.add(mesh);
  return mesh;
}

function startTow(npc) {
  console.log('[TOW] startTow called, npc at:', npc.wx.toFixed(1), npc.wz.toFixed(1), 'onIce:', isInIceLake(npc.wx, npc.wz));
  // 消耗物品（飞出动画）
  const hookSlot = consumeInventoryItem('拖车钩');
  const ropeSlot = consumeInventoryItem('拖车绳');
  if (hookSlot >= 0) animateItemFlyToWorld('🪝', hookSlot, npc.wx, npc.group.position.y + 2, npc.wz);
  if (ropeSlot >= 0) animateItemFlyToWorld('🪢', ropeSlot, npc.wx, npc.group.position.y + 2, npc.wz);

  towState.active = true;
  towState.npc = npc;
  towState.countdown = 5;
  towState.counting = false;
  towState.shakePhase = 0;

  const h = npc.group.rotation.y;
  const fwdX = Math.sin(h), fwdZ = Math.cos(h); // NPC车头方向

  // 箭头始终在车头，拖拽方向 = 车头前方
  towState.isFront = true;
  towState.towDir = { x: fwdX, z: fwdZ };
  towState.towAnchor = { x: npc.wx + fwdX * 2.5, z: npc.wz + fwdZ * 2.5 };

  // 创建绳子和箭头
  towState.rope = createTowRope();
  towState.arrow = createTowArrow();
  // 箭头放在车头前方地面
  const ax = towState.towAnchor.x + fwdX * 2;
  const az = towState.towAnchor.z + fwdZ * 2;
  towState.arrow.position.set(ax, getTerrainHeight(ax, az) + 0.15, az);
  // 箭头尖端朝向车头前方：几何体默认尖端在局部 -Z，需转 h+PI 使其指向 fwdX/fwdZ
  towState.arrow.rotation.y = h + Math.PI;
  towState.arrow.scale.set(1.75, 1.75, 1.75);
}

    // roundRect polyfill
    { const _x=4,_y=4,_w=248,_h=44,_r=10; tc.moveTo(_x+_r,_y); tc.lineTo(_x+_w-_r,_y); tc.quadraticCurveTo(_x+_w,_y,_x+_w,_y+_r); tc.lineTo(_x+_w,_y+_h-_r); tc.quadraticCurveTo(_x+_w,_y+_h,_x+_w-_r,_y+_h); tc.lineTo(_x+_r,_y+_h); tc.quadraticCurveTo(_x,_y+_h,_x,_y+_h-_r); tc.lineTo(_x,_y+_r); tc.quadraticCurveTo(_x,_y,_x+_r,_y); }

// 物品飞向世界坐标（用于拖车钩/绳飞向NPC）
function animateItemFlyToWorld(icon, slotIdx, wx, wy, wz) {
  const el = document.createElement('div');
  el.className = 'fly-item';
  el.textContent = icon;
  const slotEl = document.getElementById('invSlot' + slotIdx);
  if (!slotEl) return;
  const rect = slotEl.getBoundingClientRect();
  const sx = rect.left + rect.width / 2;
  const sy = rect.top + rect.height / 2;
  el.style.left = (sx - 14) + 'px';
  el.style.top = (sy - 14) + 'px';
  document.body.appendChild(el);
  // 飞到屏幕中心偏下（NPC大概在那）
  const ex = window.innerWidth / 2, ey = window.innerHeight / 2 + 30;
  const t0 = performance.now();
  function step(now) {
    let t = Math.min(1, (now - t0) / 500);
    el.style.left = (sx + (ex - sx) * t - 14) + 'px';
    el.style.top = (sy + (ey - sy) * t - Math.sin(t * Math.PI) * 50 - 14) + 'px';
    el.style.opacity = String(t < 0.7 ? 1 : 1 - (t - 0.7) / 0.3);
    if (t < 1) requestAnimationFrame(step); else el.remove();
  }
  requestAnimationFrame(step);
}

// ---- 玩家头顶气泡（可切换文字）----
let playerBubble = null;       // "按H救援车辆"
let playerBubbleWarn = null;   // "需要拖车钩和拖车绳"
let _warnBubbleTimer = 0;

function _makeBubbleSprite(text, width, fontSize, worldHeight) {
  // 用2倍分辨率绘制canvas，保证文字清晰
  const dpr = 2;
  const logicW = width || 256;
  const logicFS = fontSize || 16;
  const logicH = Math.max(50, logicFS * 3.2);
  const w = logicW * dpr, h = logicH * dpr;
  const fs = logicFS * dpr;
  const cvs = document.createElement('canvas');
  cvs.width = w; cvs.height = h;
  const ctx = cvs.getContext('2d');
  const bodyH = h - 16 * dpr;
  // 背景圆角矩形
  ctx.fillStyle = 'rgba(255,255,255,0.95)';
  ctx.beginPath();
  { const _x=4*dpr,_y=4*dpr,_w=w-8*dpr,_h=bodyH-4*dpr,_r=10*dpr;
    ctx.moveTo(_x+_r,_y); ctx.lineTo(_x+_w-_r,_y); ctx.quadraticCurveTo(_x+_w,_y,_x+_w,_y+_r);
    ctx.lineTo(_x+_w,_y+_h-_r); ctx.quadraticCurveTo(_x+_w,_y+_h,_x+_w-_r,_y+_h);
    ctx.lineTo(_x+_r,_y+_h); ctx.quadraticCurveTo(_x,_y+_h,_x,_y+_h-_r);
    ctx.lineTo(_x,_y+_r); ctx.quadraticCurveTo(_x,_y,_x+_r,_y); }
  ctx.fill();
  // 小三角尾巴
  ctx.beginPath();
  ctx.moveTo(w/2-8*dpr, bodyH); ctx.lineTo(w/2, bodyH+12*dpr); ctx.lineTo(w/2+8*dpr, bodyH);
  ctx.fill();
  // 文字
  ctx.fillStyle = '#111';
  ctx.font = 'bold ' + fs + 'px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, w / 2, (bodyH - 4*dpr) / 2 + 4*dpr);
  const tex = new THREE.CanvasTexture(cvs);
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false });
  const sprite = new THREE.Sprite(mat);
  // sprite scale 保持和 canvas 完全相同的宽高比，不变形
  const wh = worldHeight || 1.5; // 世界空间高度
  const aspect = logicW / logicH;
  sprite.scale.set(wh * aspect, wh, 1);
  sprite.visible = false;
  scene.add(sprite);
  return sprite;
}

function ensurePlayerBubble() {
  if (!playerBubble) {
    // worldHeight=2.2，比HELP气泡(scale 3×1.5)更大更醒目
    playerBubble = _makeBubbleSprite('按 H 救援车辆', 280, 24, 2.2);
  }

    playerBubbleWarn = _makeBubbleSprite('需要拖车钩和拖车绳完成救援', 440, 20, 2.0);
  }
}

function updateStuckNPCs(dt) {
  if (!npcModelReady) buildNpcTemplate(); // NPC模型独立加载，不依赖玩家车辆
  ensurePlayerBubble();

  _npcSpawnTimer += dt;
  let activeCount = 0; for (let i = 0; i < stuckNPCs.length; i++) if (!stuckNPCs[i].rescued) activeCount++;
  if (_npcSpawnTimer > 12 && activeCount < MAX_NPCS && npcModelReady) {
    _npcSpawnTimer = 0;
    spawnStuckNPC();
  }

  const rescueMsg = document.getElementById('rescueMsg');
  let nearestNPC = null, nearestDist = Infinity;

  for (let i = stuckNPCs.length - 1; i >= 0; i--) {
    const npc = stuckNPCs[i];

    if (npc.rescued) {
      npc._removeTimer += dt;

      // ---- 距离裁剪：200m外隐藏+跳过AI更新 ----
      const dxCull = npc.group.position.x - car.pos.x;
      const dzCull = npc.group.position.z - car.pos.z;
      const distSqCull = dxCull * dxCull + dzCull * dzCull;
      if (distSqCull > 200 * 200) {
        npc.group.visible = false;
        // 距离救援点足够远 + 玩家看不到 → 删除
        const dxOrig = npc.group.position.x - (npc._rescueOriginX || 0);
        const dzOrig = npc.group.position.z - (npc._rescueOriginZ || 0);
        if (dxOrig * dxOrig + dzOrig * dzOrig > 80 * 80) { disposeObject(npc.group); stuckNPCs.splice(i, 1); }
        continue;
      }
      npc.group.visible = true;

      const npcX = npc.group.position.x, npcZ = npc.group.position.z;
      const spd = npc._npcSpeed || 5;

      // ---- AI沿道路行驶：找最近道路点跟随 ----
      if (!npc._aiTrailIdx) {
        // 初始化：找到最近的道路点作为起始
        let bestD = Infinity, bestIdx = 0;
        for (let ti = 0; ti < TRAIL_POINTS.length; ti++) {
          const tdx = TRAIL_POINTS[ti].x - npcX, tdz = TRAIL_POINTS[ti].z - npcZ;
          const d2 = tdx * tdx + tdz * tdz;
          if (d2 < bestD) { bestD = d2; bestIdx = ti; }
        }
        npc._aiTrailIdx = bestIdx;
        npc._aiDir = 1; // 沿道路正方向
        // 感谢气泡 3秒后淡出
        if (npc._thankSprite) npc._thankFadeTimer = 3.0;
      }

      // ---- 碰撞检测：与玩家车 ----
      const collDx = car.pos.x - npcX, collDz = car.pos.z - npcZ;
      const collDist = Math.sqrt(collDx * collDx + collDz * collDz);
      const NPC_COLLIDE_RADIUS = 4.5;

      let playerBlocking = false;
      if (collDist < NPC_COLLIDE_RADIUS * 2) {
        const fwdDot = (collDx * Math.sin(npc.group.rotation.y) + collDz * Math.cos(npc.group.rotation.y)) / Math.max(collDist, 0.01);
        playerBlocking = fwdDot > 0.3;
      }
      if (collDist < NPC_COLLIDE_RADIUS && collDist > 0.01) {
        const cn = 1 / collDist;
        const pushNx = collDx * cn, pushNz = collDz * cn;
        const overlap = NPC_COLLIDE_RADIUS - collDist;
        npc.group.position.x -= pushNx * overlap * 0.5;
        npc.group.position.z -= pushNz * overlap * 0.5;
        car.pos.x += pushNx * overlap * 0.3;
        car.pos.z += pushNz * overlap * 0.3;
        playCollisionSound(Math.abs(spd) * 0.3);
      }

      // ---- 碰撞检测：与其他NPC车辆（避免穿模）----
      let otherBlocking = false;
      for (let j = 0; j < stuckNPCs.length; j++) {
        if (j === i) continue;
        const other = stuckNPCs[j];
        const odx = other.group.position.x - npcX, odz = other.group.position.z - npcZ;
        const oDist = Math.sqrt(odx * odx + odz * odz);
        // 推开（不穿模）
        if (oDist < NPC_COLLIDE_RADIUS && oDist > 0.01) {
          const on = 1 / oDist;
          const overlap = NPC_COLLIDE_RADIUS - oDist;
          npc.group.position.x -= odx * on * overlap * 0.5;
          npc.group.position.z -= odz * on * overlap * 0.5;
        }
        // 前方有其他NPC → 阻挡
        if (oDist < NPC_COLLIDE_RADIUS * 2 && oDist > 0.01) {
          const fDot = (odx * Math.sin(npc.group.rotation.y) + odz * Math.cos(npc.group.rotation.y)) / oDist;
          if (fDot > 0.3) otherBlocking = true;
        }
      }

      // 决策：绕开还是停车
      const anyBlocking = playerBlocking || otherBlocking;
      if (anyBlocking) {
        if (npc._blockAction === undefined) {
          npc._blockAction = Math.random() > 0.5 ? 'dodge' : 'stop';
          npc._blockTimer = 0;
        }
        npc._blockTimer += dt;
      } else {
        npc._blockAction = undefined;
      }

      const isStopped = npc._blockAction === 'stop';
      const isDodging = npc._blockAction === 'dodge';

      // 目标路点
      const targetPt = TRAIL_POINTS[npc._aiTrailIdx];
      const tdx = targetPt.x - npcX, tdz = targetPt.z - npcZ;
      const distToTarget = Math.sqrt(tdx * tdx + tdz * tdz);

      // 到达当前路点 → 前进到下一个
      if (distToTarget < 3) {
        npc._aiTrailIdx = (npc._aiTrailIdx + npc._aiDir + TRAIL_POINTS.length) % TRAIL_POINTS.length;
      }

      // 转向目标路点（绕开时偏转方向）
      let targetH = Math.atan2(tdx, tdz);
      if (isDodging) {
        // 偏转45度绕开（固定偏右）
        targetH += 0.8;
      }
      let dh = targetH - npc.group.rotation.y;
      while (dh > Math.PI) dh -= Math.PI * 2;
      while (dh < -Math.PI) dh += Math.PI * 2;
      npc.group.rotation.y += dh * Math.min(1, 3 * dt);

      // 前进（停车时速度为0，绕开时正常速度，转弯时减速）
      const turnFactor = 1 - Math.min(1, Math.abs(dh) * 0.5);
      let actualSpd = spd * (0.4 + 0.6 * turnFactor);
      if (isStopped) actualSpd = 0;
      npc.group.position.x += Math.sin(npc.group.rotation.y) * actualSpd * dt;
      npc.group.position.z += Math.cos(npc.group.rotation.y) * actualSpd * dt;

      // ---- 感谢气泡淡出 ----
      if (npc._thankSprite && npc._thankFadeTimer !== undefined) {
        npc._thankFadeTimer -= dt;
        npc._thankSprite.material.opacity = Math.max(0, npc._thankFadeTimer / 1.5);
        if (npc._thankFadeTimer <= 0) {
          npc.group.remove(npc._thankSprite);
          npc._thankSprite.material.dispose();
          npc._thankSprite = null;
        }
      }

      // ---- 悬架：前后采样地形计算 pitch + smoothY ----
      const fwdX2 = Math.sin(npc.group.rotation.y), fwdZ2 = Math.cos(npc.group.rotation.y);
      const gF = getTerrainHeight(npc.group.position.x + fwdX2 * 1.3, npc.group.position.z + fwdZ2 * 1.3);
      const gR = getTerrainHeight(npc.group.position.x - fwdX2 * 1.3, npc.group.position.z - fwdZ2 * 1.3);
      const targetH2 = (gF + gR) / 2;
      npc._npcSmoothY += (targetH2 - npc._npcSmoothY) * Math.min(1, 8 * dt);
      npc.group.position.y = npc._npcSmoothY;
      const targetPitch = Math.atan2(gF - gR, 2.6);
      npc._npcSmoothPitch += (-targetPitch - npc._npcSmoothPitch) * Math.min(1, 6 * dt);
      npc.group.rotation.x = npc._npcSmoothPitch;
      npc.group.rotation.z *= 0.92;

      // ---- 轮子转动（使用NPC模型的正确旋转轴）----
      const npcWheelAxis = npcTemplateGroup?._wheelAxis || 'x';
      const npcSpinFlip = npcTemplateGroup?._wheelSpinFlip || 1;
      npc._spinAngle += actualSpd / 0.4 * dt * npcSpinFlip;
      if (npc._wheels) {
        for (const w of npc._wheels) {
          if (npcWheelAxis === 'z') w.rotation.z = npc._spinAngle;
          else w.rotation.x = npc._spinAngle;
        }
      }

      // 消失条件：距离救援点>80m + 距离玩家>100m（不在视野内自然不可见）
      const dxO = npc.group.position.x - (npc._rescueOriginX || 0);
      const dzO = npc.group.position.z - (npc._rescueOriginZ || 0);
      const distFromOriginSq = dxO * dxO + dzO * dzO;
      const distFromPlayerSq = dxCull * dxCull + dzCull * dzCull;
      if (distFromOriginSq > 80 * 80 && distFromPlayerSq > 100 * 100) {
        disposeObject(npc.group); stuckNPCs.splice(i, 1);
      }
      continue;
    }

    // NPC 碰撞速度积分（陷车阻力大，快速衰减）
    if (npc._vx !== undefined) {
      const npcFriction = Math.pow(0.05, dt); // 强阻力：约0.2秒停下
      npc._vx *= npcFriction;
      npc._vz *= npcFriction;
      npc.wx += npc._vx * dt;
      npc.wz += npc._vz * dt;
      npc.group.position.x = npc.wx;
      npc.group.position.z = npc.wz;
    }

    const dx = car.pos.x - npc.wx, dz = car.pos.z - npc.wz;
    const dist = Math.sqrt(dx * dx + dz * dz);
    npc.helpSprite.visible = dist < 25;
    if (dist < nearestDist) { nearestDist = dist; nearestNPC = npc; }

    // 救援区域视觉：被救后隐藏，接近时脉冲高亮
    if (npc._rescueZone) {
      if (npc.rescued) {
        npc._rescueZone.visible = false;
      } else {
        npc._rescueZone.visible = dist < 30;
        const inZone = dist < 8;
        const pulse = inZone ? 0.35 + 0.15 * Math.sin(gameTime * 4) : 0.25;
        npc._rescueZone.material.opacity = pulse;
        npc._rescueZone.material.color.setHex(inZone ? 0x66ddff : 0x44aaff);
      }
    }
    if (dist > 400 && !npc._isFixedRescue) { disposeObject(npc.group); stuckNPCs.splice(i, 1); continue; }

    // ---- NPC 碰撞：等质量弹性碰撞（不触发救援）----
    const NPC_COLLIDE_R = 3.2;
    if (dist < NPC_COLLIDE_R && dist > 0.01) {
      const cn = 1 / dist;
      const nx = dx * cn, nz = dz * cn; // 碰撞法线（NPC → 玩家）
      const overlap = NPC_COLLIDE_R - dist;
      // 位置分离：各承担一半
      car.pos.x += nx * overlap * 0.5;
      car.pos.z += nz * overlap * 0.5;
      npc.wx   -= nx * overlap * 0.5;
      npc.wz   -= nz * overlap * 0.5;
      npc.group.position.x = npc.wx;
      npc.group.position.z = npc.wz;
      // 各自速度矢量
      const cvx = Math.sin(car.velAngle) * car.speed;
      const cvz = Math.cos(car.velAngle) * car.speed;
      const nvx = npc._vx, nvz = npc._vz;
      // 相对速度在法线方向的分量（>0 = 两者靠近）
      const vRel = (cvx - nvx) * nx + (cvz - nvz) * nz;
      if (vRel > 0) {
        playCollisionSound(vRel); // 碰撞力度越大声音越响
        // 等质量弹性碰撞 impulse = vRel（每方向各传递一半）
        const j = vRel * 0.85; // 0.85 = 略有能量损耗
        // 玩家速度矢量
        const newCvx = cvx - j * nx, newCvz = cvz - j * nz;
        car.speed = Math.sqrt(newCvx * newCvx + newCvz * newCvz) * Math.sign(car.speed || 1);
        if (Math.abs(car.speed) > 0.1) car.velAngle = Math.atan2(newCvx, newCvz);
        // NPC 获得对应冲量
        npc._vx += j * nx;
        npc._vz += j * nz;
      }
    }
  }

  // 玩家气泡位置
  const showHBubble = nearestDist < 8 && !towState.active && _warnBubbleTimer <= 0;
  if (playerBubble) {
    playerBubble.position.set(car.pos.x, car.pos.y + 5.5, car.pos.z);
    playerBubble.visible = showHBubble;
  }
  // 警告气泡
  if (_warnBubbleTimer > 0) _warnBubbleTimer -= dt;
  if (playerBubbleWarn) {
    playerBubbleWarn.position.set(car.pos.x, car.pos.y + 5.5, car.pos.z);
    playerBubbleWarn.visible = _warnBubbleTimer > 0;
  }

  // ---- H键按下逻辑 ----
  const DEBUG_FREE_RESCUE = false;
  if (keys['KeyH'] && !towState.active && nearestNPC && nearestDist < 8) {
    keys['KeyH'] = false;
    const hasHook = hasInventoryItem('拖车钩');
    const hasRope = hasInventoryItem('拖车绳');
    if (DEBUG_FREE_RESCUE || (hasHook && hasRope)) {
      startTow(nearestNPC);
    } else {
      if (playerBubble) playerBubble.visible = false;
      _warnBubbleTimer = 3.0;
    }
  }

  // ---- 拖拽进行中（物理拖拽）----
  if (towState.active && towState.npc) {
    const npc = towState.npc;
    if (npc.rescued) { endTow(false); return; }

    // ---- 计算两端连接点 ----
    // 玩家端：车尾
    const rearX = car.pos.x - Math.sin(car.heading) * 2.5;
    const rearZ = car.pos.z - Math.cos(car.heading) * 2.5;
    const rearY = getTerrainHeight(rearX, rearZ) + 0.8;
    // NPC端：车头或车尾
    const npcH = npc.group.rotation.y;
    const sign = towState.isFront ? 1 : -1;
    const anchorX = npc.wx + sign * Math.sin(npcH) * 2.5;
    const anchorZ = npc.wz + sign * Math.cos(npcH) * 2.5;
    const anchorY = npc.group.position.y + 0.8;

    // ---- 绳子物理：计算绳子张力 ----
    const ropeDx = rearX - anchorX, ropeDz = rearZ - anchorZ;
    const ropeDist = Math.sqrt(ropeDx * ropeDx + ropeDz * ropeDz);
    const ropeRestLen = 5; // 绳子自然长度（松弛时不产生力）
    const ropeStretch = Math.max(0, ropeDist - ropeRestLen); // 拉伸量

    // 绳子方向（从NPC锚点指向玩家车尾 = 拉力方向）
    const ropeNx = ropeDist > 0.01 ? ropeDx / ropeDist : 0;
    const ropeNz = ropeDist > 0.01 ? ropeDz / ropeDist : 0;

    // 绳子方向和箭头方向的点积（仍用于绳子颜色反馈）
    const pullDot = ropeNx * towState.towDir.x + ropeNz * towState.towDir.z;

    // 更新绳子几何体
    updateTowRopeGeometry(towState.rope, rearX, rearY, rearZ, anchorX, anchorY, anchorZ);

    // ---- 有效拖拽判定：基于NPC实际移动方向（不再要求玩家正向油门）----
    const isTensioned = ropeStretch > 0.2;
    // NPC帧间位移
    const npcDx = npc.wx - (npc._prevTowX !== undefined ? npc._prevTowX : npc.wx);
    const npcDz = npc.wz - (npc._prevTowZ !== undefined ? npc._prevTowZ : npc.wz);
    const npcMoveDist = Math.sqrt(npcDx * npcDx + npcDz * npcDz);
    const npcMoveSpeed = dt > 0 ? npcMoveDist / dt : 0;
    // NPC移动方向和箭头方向的点积（归一化）
    let npcMoveDot = 0;
    if (npcMoveDist > 0.0001) {
      npcMoveDot = (npcDx * towState.towDir.x + npcDz * towState.towDir.z) / npcMoveDist;
    }
    npc._prevTowX = npc.wx;
    npc._prevTowZ = npc.wz;
    // 有效条件：绳子有张力 + NPC正在往箭头方向移动
    const isValidTow = isTensioned && npcMoveDot > 0.3 && npcMoveSpeed > 0.15;
    towState.isValid = isValidTow;

    // 箭头：正确方向绿色闪烁，否则黄色
    if (towState.arrow) {
      if (isValidTow) {
        const gf = 0.6 + 0.4 * Math.sin(gameTime * 8);
        towState.arrow.material.color.setRGB(0, gf, 0.15 * gf);
        towState.arrow.material.opacity = 0.8 + 0.2 * Math.sin(gameTime * 8);
      } else {
        towState.arrow.material.color.setHex(0xffcc00);
        towState.arrow.material.opacity = 0.75 + 0.25 * Math.sin(gameTime * 4);
      }
    }

    // 绳子颜色反馈
    if (towState.rope && towState.rope.material) {
      if (isValidTow) {
        const flash = 0.6 + 0.4 * Math.sin(gameTime * 8);
        towState.rope.material.color.setRGB(0, flash, 0.2 * flash);
      } else if (isTensioned) {
        towState.rope.material.color.setHex(0xd4a040); // 有张力但方向不对：橙色
      } else {
        towState.rope.material.color.setRGB(0.5, 0.5, 0.4); // 松弛：暗灰
      }
    }

    // 救援区域圈：正确方向绿色闪烁
    if (npc._rescueZone && npc._rescueZone.visible) {
      if (isValidTow) {
        const gFlash = 0.3 + 0.2 * Math.sin(gameTime * 8);
        npc._rescueZone.material.color.setRGB(0, 1, 0.3);
        npc._rescueZone.material.opacity = gFlash;
        // 内填充也变绿
        if (npc._rescueZone.children[0]) {
          npc._rescueZone.children[0].material.color.setRGB(0, 1, 0.3);
          npc._rescueZone.children[0].material.opacity = gFlash * 0.4;
        }
      }
    }

    // ---- NPC物理拖拽（只要绳子张紧且方向大致正确就施力）----
    // 这独立于 isValidTow，解决"鸡生蛋"问题：先让NPC动起来，再判定方向是否有效
    if (isTensioned && pullDot > 0) {
      // 玩家车被拖拽减速
      car.speed *= (1 - 1.5 * dt);
      if (Math.abs(car.speed) > 3.5) car.speed = Math.sign(car.speed) * 3.5;
      // NPC被绳子张力拉动
      const pullForce = Math.min(ropeStretch * 0.8, 2.0);
      const npcDrag = 0.85;
      const effectivePull = pullForce * pullDot;
      npc.wx += towState.towDir.x * effectivePull * dt * npcDrag;
      npc.wz += towState.towDir.z * effectivePull * dt * npcDrag;
      npc.group.position.x = npc.wx;
      npc.group.position.z = npc.wz;
      // 拖拽时轮子转动（根据实际移动距离）
      if (npc._wheels && npcMoveDist > 0.001) {
        const npcWheelAxis = npcTemplateGroup?._wheelAxis || 'x';
        const npcFlip = npcTemplateGroup?._wheelSpinFlip || 1;
        npc._spinAngle += (npcMoveSpeed / 0.4) * dt * npcFlip;
        for (const w of npc._wheels) {
          if (npcWheelAxis === 'z') w.rotation.z = npc._spinAngle;
          else w.rotation.x = npc._spinAngle;
        }
      }
      // 车身微颤
      towState.shakePhase += dt * 40;
      car.bodyRoll += Math.sin(towState.shakePhase) * 0.004 * ropeStretch;
      car.bodyPitch += Math.cos(towState.shakePhase * 1.3) * 0.003 * ropeStretch;
    } else if (isTensioned) {
      // 绳子有张力但方向不对，轻微阻力
      car.speed *= (1 - 0.5 * dt);
    }

    // ---- 倒计时 + 视觉反馈（基于NPC实际移动方向）----
    if (isValidTow) {
      // NPC逐渐脱困（慢慢升高恢复水平）
      const pullProg = 1 - towState.countdown / 5;
      npc.group.position.y = getTerrainHeight(npc.wx, npc.wz) + (-0.4 + pullProg * 0.35);
      npc.group.rotation.x *= 0.995;
      npc.group.rotation.z *= 0.995;

      // 倒计时推进
      if (!towState.counting) {
        towState.counting = true;
        towState.countdown = 5;
      }
      towState.countdown -= dt;

      rescueMsg.innerHTML = '<div style="font-size:64px;font-weight:900;line-height:1;">' + Math.ceil(Math.max(towState.countdown, 0)) + '</div><div style="font-size:14px;margin-top:4px;">救援中...</div>';
      rescueMsg.style.display = 'block';

      if (towState.countdown <= 0) {
        endTow(true);
        rescueMsg.textContent = '救援成功！';
        rescueMsg.style.display = 'block';
        setTimeout(() => { rescueMsg.style.display = 'none'; }, 2000);
      }
    } else {
      // ---- 未有效拖拽：提示信息 ----
      if (towState.counting) {
        towState.counting = false;
        rescueMsg.textContent = '保持拉紧绳子沿箭头方向拖拽';
        rescueMsg.style.display = 'block';
      } else if (!isTensioned) {
        rescueMsg.textContent = '拉紧绳子';
        rescueMsg.style.display = 'block';
      } else if (pullDot <= 0) {
        rescueMsg.textContent = '请沿箭头方向拖拽';
        rescueMsg.style.display = 'block';
      } else {
        rescueMsg.textContent = '用力沿箭头方向拖拽';
        rescueMsg.style.display = 'block';
      }
    }

    // 绳子断裂（拉太远）
    if (ropeDist > 20) {
      playRopeSnapSound();
      endTow(false);
      rescueMsg.textContent = '绳子断开了！';
      rescueMsg.style.display = 'block';
      setTimeout(() => { rescueMsg.style.display = 'none'; }, 2000);
    }
  }
}

// 加载相机模型
let cameraTemplate = null;
{
  const camLoader = new GLTFLoader();
  camLoader.load('low_poly_colorful_camera/scene.gltf', (gltf) => {
    const raw = gltf.scene;
    const bb = new THREE.Box3().setFromObject(raw);
    const sz = bb.getSize(new THREE.Vector3());
    const sc = 2.4 / Math.max(sz.x, sz.y, sz.z, 0.001); // 放大2倍（原1.2 × 2）
    raw.scale.multiplyScalar(sc);
    const bb2 = new THREE.Box3().setFromObject(raw);
    const c2 = bb2.getCenter(new THREE.Vector3());
    raw.position.sub(c2);
    raw.position.y -= bb2.min.y;
    raw.traverse(c => {
      if (c.isMesh) {
        c.castShadow = true;
        // 修复透明问题：确保所有材质不透明且可见
        if (c.material) {
          c.material = c.material.clone();
          c.material.transparent = false;
          c.material.opacity = 1.0;
          c.material.depthWrite = true;
          c.material.side = THREE.FrontSide;
          // 如果颜色太暗（接近黑色），稍微提亮
          if (c.material.color) {
            const col = c.material.color;
            if (col.r + col.g + col.b < 0.15) {
              col.multiplyScalar(3);
            }
          }
        }
      }
    });
    cameraTemplate = raw;
    // 初始化所有打卡点
    initCheckpoints();
  });
}

function initCheckpoints() {
  for (const cp of checkpointState) {
    if (cp.group) continue; // 已创建
    const group = new THREE.Group();
    const model = cameraTemplate.clone();

    group.add(model);
    const wy = getTerrainHeight(cp.wx, cp.wz);
    group.position.set(cp.wx, wy + 1.5, cp.wz);
    const pillarColor = 0x4488ff;
    const pillarGeo = new THREE.CylinderGeometry(0.12, 0.35, 10, 8, 1, true);
    const pillarMat = new THREE.MeshBasicMaterial({ color: pillarColor, transparent: true, opacity: 0.1, side: THREE.DoubleSide, depthWrite: false });
    const pillar = new THREE.Mesh(pillarGeo, pillarMat);
    pillar.position.y = 5;
    group.add(pillar);
    scene.add(group);
    cp.group = group;

    // 特殊打卡点：生成固定NPC
    if (cp.rescue && npcModelReady) {
      spawnFixedRescueNPC(cp);
    }
  }
  updateAchieveBarUI();
}

// 为特殊打卡点生成固定NPC（不会随机消失）
function spawnFixedRescueNPC(cp) {
  if (!npcModelReady || cp.rescueNPC) return;
  // NPC在打卡点旁边8m处
  const offsetAngle = cp.angle + 0.3;
  const nx = cp.wx + Math.cos(offsetAngle) * 8;
  const nz = cp.wz + Math.sin(offsetAngle) * 8;
  const ny = getTerrainHeight(nx, nz);
  const biome = getBiomeName(nx, nz);

  const group = new THREE.Group();
  const npcCar = npcTemplateGroup.clone();
  const npcColors = [0xcc4444, 0x44aa44, 0x4466cc, 0xccaa22, 0xcc6622];
  const thisColor = npcColors[Math.floor(Math.random() * npcColors.length)];
  npcCar.traverse(c => {
    if (c.isMesh && c.material) { c.material = c.material.clone(); c.material.color.set(thisColor); }
  });
  group.add(npcCar);

  let sinkY = -0.4, tiltX = 0.08, tiltZ = 0;
  if (biome === 'snow') { sinkY = -0.4; tiltX = 0.1; }
  else if (biome === 'jungle') { sinkY = -0.5; tiltX = 0.12; tiltZ = 0.06; }
  else { sinkY = -0.3; tiltZ = 0.08; }

  const heading = Math.random() * Math.PI * 2;
  group.position.set(nx, ny + sinkY, nz);
  group.rotation.set(tiltX, heading, tiltZ);
  scene.add(group);

  // HELP气泡
  const helpCanvas = document.createElement('canvas');
  helpCanvas.width = 128; helpCanvas.height = 64;
  const hctx = helpCanvas.getContext('2d');
  hctx.fillStyle = 'rgba(255,255,255,0.92)';
  hctx.beginPath();
  hctx.moveTo(18, 4); hctx.lineTo(110, 4); hctx.quadraticCurveTo(120, 4, 120, 14);
  hctx.lineTo(120, 34); hctx.quadraticCurveTo(120, 44, 110, 44);
  hctx.lineTo(74, 44); hctx.lineTo(64, 58); hctx.lineTo(54, 44);
  hctx.lineTo(18, 44); hctx.quadraticCurveTo(8, 44, 8, 34);
  hctx.lineTo(8, 14); hctx.quadraticCurveTo(8, 4, 18, 4);
  hctx.closePath(); hctx.fill();
  hctx.fillStyle = '#111'; hctx.font = 'bold 20px sans-serif'; hctx.textAlign = 'center';
  hctx.fillText('HELP!', 64, 32);
  const helpTex = new THREE.CanvasTexture(helpCanvas);
  const helpMat = new THREE.SpriteMaterial({ map: helpTex, transparent: true, depthTest: false });
  const helpSprite = new THREE.Sprite(helpMat);
  helpSprite.scale.set(3, 1.5, 1); helpSprite.position.set(0, 4.5, 0);
  helpSprite.visible = false;
  group.add(helpSprite);

  // 救援有效区域 — 半透明圆形标识
  const rZoneGeo = new THREE.RingGeometry(7.5, 8.0, 48);
  rZoneGeo.rotateX(-Math.PI / 2);
  const rZoneMat = new THREE.MeshBasicMaterial({ color: 0x44aaff, transparent: true, opacity: 0.25, side: THREE.DoubleSide, depthWrite: false });
  const rZone = new THREE.Mesh(rZoneGeo, rZoneMat);
  const rZoneFillGeo = new THREE.CircleGeometry(7.5, 48);
  rZoneFillGeo.rotateX(-Math.PI / 2);
  const rZoneFillMat = new THREE.MeshBasicMaterial({ color: 0x44aaff, transparent: true, opacity: 0.08, side: THREE.DoubleSide, depthWrite: false });
  rZone.add(new THREE.Mesh(rZoneFillGeo, rZoneFillMat));
  rZone.position.y = 1.5; // 车身一半高度，避免地面/冰面穿模
  group.add(rZone);

  // 注册为stuckNPC（复用现有救援系统）
  const npcData = { group, wx: nx, wz: nz, biome, rescued: false, helpSprite, _removeTimer: 0, _isFixedRescue: true, _checkpointId: cp.id, _rescueZone: rZone };
  stuckNPCs.push(npcData);
  cp.rescueNPC = npcData;
}

// 视频播放
let gamePausedForVideo = false;
let _animFrameId = null;
window.playVideo = function(src) {
  const decodedSrc = decodeURI(src);
  const slot = videoSlots.get(decodedSrc);
  const overlay = document.getElementById('videoOverlay');
  const defaultPlayer = document.getElementById('videoPlayer');

  // 暂停其他视频的后台下载，全部带宽给当前视频
  pauseOtherPreloads(decodedSrc);
  _currentVideoUrl = decodedSrc;

  if (slot) {
    // 使用预创建的 <video> 标签（保留已缓冲数据 + 续播位置）
    defaultPlayer.style.display = 'none';
    slot.video.controls = true;
    slot.video.playsInline = true;
    slot.video.style.display = '';
    slot.video.style.maxWidth = '85%';
    slot.video.style.maxHeight = '80%';
    slot.video.style.borderRadius = '8px';
    slot.video.style.boxShadow = '0 4px 30px rgba(0,0,0,0.5)';
    overlay.appendChild(slot.video);
    // 续播：从上次关闭的位置开始
    if (slot.lastTime > 0) slot.video.currentTime = slot.lastTime;
    overlay.style.display = 'flex';
    slot.video.play().catch(() => {});
  } else {
    // fallback：videoSlots 还没初始化时，用默认 player
    defaultPlayer.style.display = '';
    defaultPlayer.src = decodedSrc;
    overlay.style.display = 'flex';
    defaultPlayer.play().catch(() => {});
  }

  gamePausedForVideo = true;
  if (audioCtx && audioCtx.state === 'running') audioCtx.suspend();
  if (_animFrameId !== null) { cancelAnimationFrame(_animFrameId); _animFrameId = null; }
};
window.closeVideo = function(e) {
  if (e && e.target.tagName === 'VIDEO') return;
  const overlay = document.getElementById('videoOverlay');

  // 保存播放位置
  const slot = _currentVideoUrl ? videoSlots.get(_currentVideoUrl) : null;
  if (slot) {
    // 播放完毕 → 重置位置（下次从头播放）；未播完 → 记录位置（下次续播）
    slot.lastTime = slot.video.ended ? 0 : slot.video.currentTime;
    slot.video.pause();
    slot.video.style.display = 'none';
    slot.video.controls = false;
  } else {
    // fallback player
    const defaultPlayer = document.getElementById('videoPlayer');
    defaultPlayer.pause(); defaultPlayer.src = '';
  }

  overlay.style.display = 'none';
  gamePausedForVideo = false;
  _currentVideoUrl = null;

  if (audioCtx && audioCtx.state === 'suspended' && audioResumed) audioCtx.resume();
  if (_animFrameId === null) { clock.getDelta(); animate(); }
  // 恢复所有视频的后台预加载
  resumeAllPreloads();
};

// 打卡检测+更新
function updateCheckpoints(dt) {
  if (!cameraTemplate) return;
  // 确保特殊打卡点的NPC已生成
  if (npcModelReady) {
    for (const cp of checkpointState) {
      if (cp.rescue && !cp.rescueNPC && !cp.unlocked) spawnFixedRescueNPC(cp);
    }
  }

  const cpMsg = document.getElementById('checkpointMsg');
  let showMsg = false;

  for (const cp of checkpointState) {
    if (cp.unlocked) continue;

    // 救援打卡点：相机模型跟随NPC头顶（气泡上方）
    if (cp.rescue && cp.rescueNPC && cp.group) {
      const npc = cp.rescueNPC;
      if (!npc.rescued) {
        cp.group.position.set(npc.group.position.x, npc.group.position.y + 6.5, npc.group.position.z);
        cp.wx = npc.group.position.x;
        cp.wz = npc.group.position.z;
      }
    }

    if (!cp.group) continue;

    // 浮动+旋转（使用缓存高度避免每帧调用getTerrainHeight）
    cp.group.children[0].rotation.y += dt * 1.5;
    if (!cp.rescue) {
      if (!cp._cachedY) cp._cachedY = getTerrainHeight(cp.wx, cp.wz);
      cp.group.position.y = cp._cachedY + 1.5 + Math.sin(gameTime * 2 + cp.dist) * 0.25;
    } else {
      // 救援打卡点上下浮动（在NPC头顶）
      cp.group.position.y += Math.sin(gameTime * 2.5) * 0.003;
    }

    // 检查救援状态（特殊打卡点）
    if (cp.rescue && cp.rescueNPC && cp.rescueNPC.rescued && !cp.rescueDone) {
      cp.rescueDone = true;
      unlockCheckpoint(cp);
    }

    // 碰撞检测（车距<3.5m直接打卡，普通打卡点）
    const dx = car.pos.x - cp.wx, dz = car.pos.z - cp.wz;
    const dist = Math.sqrt(dx * dx + dz * dz);

    if (!cp.rescue && dist < 3.5) {
      // 普通打卡点：碰到即打卡
      unlockCheckpoint(cp);
      continue;
    }

    // 靠近时显示提示
    if (dist < 12) {
      if (cp.rescue && !cp.rescueDone) {
        cpMsg.textContent = '📷 ' + cp.name + ' — 救援该车辆打卡';
        cpMsg.style.display = 'block';
        showMsg = true;
      } else if (!cp.rescue) {
        cpMsg.textContent = '📷 ' + cp.name;
        cpMsg.style.display = 'block';
        showMsg = true;
      }
    }
  }

  if (!showMsg) cpMsg.style.display = 'none';
}

function unlockCheckpoint(cp) {
  if (cp.unlocked) return;
  playCheckpointSound();
  const cpIdx = checkpointState.indexOf(cp);
  cp.unlocked = true;
  if (cp.group) { disposeObject(cp.group); cp.group = null; }

  // 📷 飞入动画：从屏幕中心飞到成就栏对应格子
  const flyEl = document.createElement('div');
  flyEl.textContent = '📷';
  flyEl.style.cssText = 'position:fixed;z-index:150;font-size:32px;pointer-events:none;filter:drop-shadow(0 2px 8px rgba(60,140,255,0.6));transition:none;';
  const sx = window.innerWidth / 2, sy = window.innerHeight / 2 - 40;
  flyEl.style.left = sx + 'px'; flyEl.style.top = sy + 'px';
  document.body.appendChild(flyEl);

  // 先更新UI（但隐藏新格子，等飞入后再显示）
  updateAchieveBarUI();
  const slotEl = document.getElementById('achSlot' + cpIdx);
  if (slotEl) slotEl.style.opacity = '0';

  // 飞入目标位置
  const targetRect = slotEl ? slotEl.getBoundingClientRect() : { left: 40, top: window.innerHeight - 100, width: 56, height: 42 };
  const ex = targetRect.left + targetRect.width / 2;
  const ey = targetRect.top + targetRect.height / 2;
  const t0 = performance.now();
  const RISE_DUR = 230, FLY_DUR = 380; // ms：上抬阶段 + 加速飞行阶段
  const riseEndY = sy - 95; // 上抬高度

  function flyStep(now) {
    const elapsed = now - t0;

    if (elapsed < RISE_DUR) {
      // Phase 1：向上弹起，ease-out，图标放大
      const t = elapsed / RISE_DUR;
      const eased = 1 - (1 - t) * (1 - t);
      const cy = sy + (riseEndY - sy) * eased;
      const s = 1 + 0.7 * Math.sin(t * Math.PI);
      flyEl.style.left = (sx - 18) + 'px';
      flyEl.style.top = (cy - 18) + 'px';
      flyEl.style.transform = `scale(${s})`;
      flyEl.style.opacity = '1';
    } else {
      // Phase 2：ease-in 加速飞向目标槽位
      const t = Math.min(1, (elapsed - RISE_DUR) / FLY_DUR);
      const eased = t * t; // 加速
      const cx = sx + (ex - sx) * eased;
      const cy = riseEndY + (ey - riseEndY) * eased;
      const s = 1.6 - 0.6 * t; // 从大到正常
      flyEl.style.left = (cx - 18) + 'px';
      flyEl.style.top = (cy - 18) + 'px';
      flyEl.style.transform = `scale(${s})`;
      flyEl.style.opacity = String(t < 0.75 ? 1 : 1 - (t - 0.75) / 0.25);
      if (t >= 1) {
        flyEl.remove();
        // 缩放弹跳动画：1 → 1.5 → 0.9 → 1
        if (slotEl) {
          slotEl.style.opacity = '1';
          slotEl.style.transition = 'transform 0.15s ease-out';
          slotEl.style.transform = 'scale(1.5)';
          setTimeout(() => { slotEl.style.transform = 'scale(0.9)'; }, 150);
          setTimeout(() => { slotEl.style.transform = 'scale(1)'; }, 300);
          setTimeout(() => { slotEl.style.transition = ''; slotEl.style.transform = ''; }, 500);
        }
        return;
      }
    }
    requestAnimationFrame(flyStep);
  }
  requestAnimationFrame(flyStep);

  const cpMsg = document.getElementById('checkpointMsg');
  cpMsg.innerHTML = '🎉 打卡成功：' + cp.name;
  cpMsg.style.display = 'block';
  setTimeout(() => { cpMsg.style.display = 'none'; }, 2500);
}

// ============================================================
// ============================================================
// UI MODULE: touchControls — 手机端虚拟摇杆+按钮+视角触控
// ============================================================
UI.touchControls = {
  enabled: false,
  // 虚拟摇杆状态
  joyActive: false,
  joyTouchId: null,
  joyCenterX: 0, joyCenterY: 0,
  joyX: 0, joyY: 0, // -1~1 归一化
  JOY_RADIUS: 50,
  // 手刹状态
  brakeActive: false,
  // 视角触控状态
  camTouchId: null,
  camLastX: 0, camLastY: 0,
  // 双指缩放
  pinchDist: 0,
  pinchActive: false,

  init() {
    this.els = {
      wrap: document.getElementById('mobileControls'),
      joyZone: document.getElementById('joystickZone'),
      joyBase: document.getElementById('joystickBase'),
      joyThumb: document.getElementById('joystickThumb'),
      btnBrake: document.getElementById('mBtnBrake'),
      btnRescue: document.getElementById('mBtnRescue'),
      btnLock: document.getElementById('mBtnLock'),
      btnReset: document.getElementById('mBtnReset'),
      btnSwitch: document.getElementById('mBtnSwitch'),
    };
    if (!this.els.wrap) return;

    // ---- 虚拟摇杆 touch 事件 ----
    const self = this;
    this.els.joyZone.addEventListener('touchstart', (e) => {
      e.preventDefault();
      if (self.joyActive) return;
      const t = e.changedTouches[0];
      self.joyTouchId = t.identifier;
      self.joyActive = true;
      const rect = self.els.joyBase.getBoundingClientRect();
      self.joyCenterX = rect.left + rect.width / 2;
      self.joyCenterY = rect.top + rect.height / 2;
      self._updateJoy(t.clientX, t.clientY);
      resumeAudio();
    }, { passive: false });

    this.els.joyZone.addEventListener('touchmove', (e) => {
      e.preventDefault();
      for (const t of e.changedTouches) {
        if (t.identifier === self.joyTouchId) {
          self._updateJoy(t.clientX, t.clientY);
        }
      }
    }, { passive: false });

    const joyEnd = (e) => {
      for (const t of e.changedTouches) {
        if (t.identifier === self.joyTouchId) {
          self.joyActive = false; self.joyTouchId = null;
          self.joyX = 0; self.joyY = 0;
          self.els.joyThumb.style.transform = 'translate(-50%,-50%)';
          self._applyJoyToKeys();
        }
      }
    };
    this.els.joyZone.addEventListener('touchend', joyEnd);
    this.els.joyZone.addEventListener('touchcancel', joyEnd);

    // ---- 右侧按钮 ----
    // 手刹
    this._bindHold(this.els.btnBrake, () => { self.brakeActive = true; keys['Space'] = true; self.els.btnBrake.classList.add('active'); },
      () => { self.brakeActive = false; keys['Space'] = false; self.els.btnBrake.classList.remove('active'); });
    // 救援
    this._bindTap(this.els.btnRescue, () => { keys['KeyH'] = true; setTimeout(() => { keys['KeyH'] = false; }, 100); });
    // 差速锁
    this._bindTap(this.els.btnLock, () => { toggleDiffLock(); });
    // 重置
    this._bindTap(this.els.btnReset, () => { keys['KeyR'] = true; setTimeout(() => { keys['KeyR'] = false; }, 100); });
    // 换车
    this._bindTap(this.els.btnSwitch, () => {
      const ids = Object.keys(VEHICLES);
      const nextIdx = (ids.indexOf(currentVehicleId) + 1) % ids.length;
      switchVehicle(ids[nextIdx]);
    });

    // ---- 视角触控（canvas 上非控件区域） ----
    canvas.addEventListener('touchstart', (e) => {
      if (e.touches.length === 2) {
        // 双指开始缩放
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        self.pinchDist = Math.sqrt(dx * dx + dy * dy);
        self.pinchActive = true;
        e.preventDefault(); return;
      }
      if (e.touches.length === 1 && self.camTouchId === null) {
        // 单指开始拖拽视角（不在控件区域的touch）
        const t = e.touches[0];
        // 判断是否在左半屏（摇杆区域）或右下按钮区域，是的话不处理
        if (t.clientX < 200 && t.clientY > window.innerHeight - 200) return;
        if (t.clientX > window.innerWidth - 100) return;
        self.camTouchId = t.identifier;
        self.camLastX = t.clientX; self.camLastY = t.clientY;
        chaseCam.returnTimer = 0;
        resumeAudio();
      }
    }, { passive: false });

    canvas.addEventListener('touchmove', (e) => {
      if (self.pinchActive && e.touches.length === 2) {
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const delta = dist - self.pinchDist;
        chaseCam.distance -= delta * 0.05;
        chaseCam.distance = Math.max(8, Math.min(40, chaseCam.distance));
        self.pinchDist = dist;
        e.preventDefault(); return;
      }
      for (const t of e.changedTouches) {
        if (t.identifier === self.camTouchId) {
          const dx = t.clientX - self.camLastX;
          const dy = t.clientY - self.camLastY;
          chaseCam.yawOffset -= dx * 0.006;
          chaseCam.pitchOffset -= dy * 0.004;
          chaseCam.pitchOffset = Math.max(-0.3, Math.min(0.6, chaseCam.pitchOffset));
          self.camLastX = t.clientX; self.camLastY = t.clientY;
          e.preventDefault();
        }
      }
    }, { passive: false });

    const camEnd = (e) => {
      for (const t of e.changedTouches) {
        if (t.identifier === self.camTouchId) {
          self.camTouchId = null;
          chaseCam.returnTimer = 0;
        }
      }
      if (e.touches.length < 2) self.pinchActive = false;
    };
    canvas.addEventListener('touchend', camEnd);
    canvas.addEventListener('touchcancel', camEnd);
  },

  _updateJoy(tx, ty) {
    let dx = tx - this.joyCenterX;
    let dy = ty - this.joyCenterY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const maxR = this.JOY_RADIUS;
    if (dist > maxR) { dx = dx / dist * maxR; dy = dy / dist * maxR; }
    this.joyX = dx / maxR; // -1 (left) to 1 (right)
    this.joyY = -dy / maxR; // -1 (down/back) to 1 (up/forward)  注意Y轴反转
    // 移动摇杆指示器
    this.els.joyThumb.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
    this._applyJoyToKeys();
  },

  _applyJoyToKeys() {
    // 将摇杆位置映射到键盘状态（带死区）
    const DEAD = 0.2;
    keys['KeyW'] = this.joyY > DEAD;
    keys['ArrowUp'] = false;
    keys['KeyS'] = this.joyY < -DEAD;
    keys['ArrowDown'] = false;
    keys['KeyA'] = this.joyX < -DEAD;
    keys['ArrowLeft'] = false;
    keys['KeyD'] = this.joyX > DEAD;
    keys['ArrowRight'] = false;
  },

  _bindHold(el, onDown, onUp) {
    if (!el) return;
    el.addEventListener('touchstart', (e) => { e.preventDefault(); onDown(); resumeAudio(); }, { passive: false });
    el.addEventListener('touchend', (e) => { e.preventDefault(); onUp(); });
    el.addEventListener('touchcancel', (e) => { onUp(); });
  },

  _bindTap(el, fn) {
    if (!el) return;
    el.addEventListener('touchstart', (e) => {
      e.preventDefault(); el.classList.add('active');
      resumeAudio(); fn();
      setTimeout(() => el.classList.remove('active'), 150);
    }, { passive: false });
  },

  show() {
    if (this.els.wrap) this.els.wrap.style.display = 'block';
    this.enabled = true;
  },
  hide() {
    if (this.els.wrap) this.els.wrap.style.display = 'none';
    this.enabled = false;
  },
  layout(mobile) {
    if (mobile) this.show(); else this.hide();
  },
};

// ---- 给物理系统提供渐进式转向输入（摇杆模拟量 vs 键盘0/1） ----
UI.touchControls._getSteer = function() {
  if (!this.joyActive) return 0;
  const DEAD = 0.2;
  if (Math.abs(this.joyX) < DEAD) return 0;
  return -this.joyX; // 左为正转向
};
UI.touchControls._getThrottle = function() {
  if (!this.joyActive) return 0;
  const DEAD = 0.2;
  return this.joyY > DEAD ? Math.min(1, (this.joyY - DEAD) / (1 - DEAD)) : 0;
};
UI.touchControls._getReverse = function() {
  if (!this.joyActive) return 0;
  const DEAD = 0.2;
  return this.joyY < -DEAD ? Math.min(1, (-this.joyY - DEAD) / (1 - DEAD)) : 0;
};

// ============================================================
// FULLSCREEN MANAGEMENT — 全屏管理（方案 A + B + C 组合）
// ============================================================
const _isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);

function tryFullscreen() {
  if (!isMobile) return;
  const el = document.documentElement;
  if (_isIOS) {
    window.scrollTo(0, 1);
    return;
  }
  // Android / 其他 — Fullscreen API（try-catch 兼容 webkit 前缀）
  try {
    if (el.requestFullscreen) {
      el.requestFullscreen().catch(() => {});
    } else if (el.webkitRequestFullscreen) {
      el.webkitRequestFullscreen(); // 老版本不返回 Promise
    }
  } catch(e) {}
  // 锁定横屏（独立 try-catch，不依赖全屏成功）
  try {
    if (screen.orientation && screen.orientation.lock) {
      screen.orientation.lock('landscape').catch(() => {});
    }
  } catch(e) {}
}

// OK 按钮：只绑定 click（viewport meta 下移动端 click 无 300ms 延迟）
document.getElementById('loadOK').addEventListener('click', () => {
  tryFullscreen();
  document.getElementById('loading').classList.add('hidden');
});

// 监听全屏退出 — 显示重新全屏按钮
{
  const fullscreenBtn = document.getElementById('fullscreenBtn');
  function onFullscreenChange() {
    if (!isMobile || _isIOS) return;
    const isFS = !!(document.fullscreenElement || document.webkitFullscreenElement);
    if (fullscreenBtn) fullscreenBtn.style.display = isFS ? 'none' : 'block';
  }
  document.addEventListener('fullscreenchange', onFullscreenChange);
  document.addEventListener('webkitfullscreenchange', onFullscreenChange);
  // 重新进入全屏按钮（只用 click）
  if (fullscreenBtn) fullscreenBtn.addEventListener('click', tryFullscreen);
}

// ============================================================
// MEDIA PRELOAD — 视频/缩略图智能预加载（带优先级调度）
// ============================================================
// 预加载所有缩略图（返回 Promise，全部完成后 resolve）
function preloadThumbs() {
  const promises = CHECKPOINTS.map(cp => new Promise(resolve => {
    const img = new Image();
    img.onload = resolve;
    img.onerror = resolve;
    img.src = cp.thumb;
  }));
  return Promise.all(promises);
}

// ============================================================
// VIDEO SLOTS — 基于 <video> 标签的预加载 + 续播系统
// ============================================================
const videoSlots = new Map(); // url → { video: HTMLVideoElement, lastTime: number }
let _currentVideoUrl = null;  // 当前正在播放的视频 URL

// 为每个视频创建一个隐藏的 <video preload="auto">，浏览器后台自动下载
function initVideoSlots() {
  for (const cp of CHECKPOINTS) {
    const v = document.createElement('video');
    v.preload = 'auto';
    v.src = cp.video;
    v.playsInline = true;
    v.style.display = 'none';
    document.body.appendChild(v);
    videoSlots.set(cp.video, { video: v, lastTime: 0 });
  }
}

// 暂停其他视频的后台下载（preload='none'），全部带宽给当前播放
function pauseOtherPreloads(currentUrl) {
  for (const [url, slot] of videoSlots) {
    if (url !== currentUrl) slot.video.preload = 'none';
  }
}

// 恢复所有视频的后台下载
function resumeAllPreloads() {
  for (const [url, slot] of videoSlots) {
    slot.video.preload = 'auto';
  }
}

// 立即开始预加载
// 缩略图优先（26MB），全部完成后再创建 video slots 启动视频预加载
preloadThumbs().then(() => initVideoSlots());

// ============================================================
// LOOP
// ============================================================
const clock = new THREE.Clock();
const _sprayPos = new THREE.Vector3();
let _calRenderTimer = 0;

// ---- FPS 计量 ----
let _fpsFrames = 0, _fpsLastTime = performance.now(), _fpsDisplay = 0;
let _fpsMin = 999, _fpsMax = 0, _frameTimes = [];
const _fpsPanelEl = document.getElementById('fpsPanel');

function animate() {
  _animFrameId = requestAnimationFrame(animate);

  // FPS 统计
  const _fpsNow = performance.now();
  const _frameMs = _fpsNow - _fpsLastTime;
  _frameTimes.push(_frameMs);
  if (_frameTimes.length > 120) _frameTimes.shift();
  _fpsLastTime = _fpsNow;
  _fpsFrames++;
  // 每0.5秒刷新显示
  if (_fpsFrames % 30 === 0) {
    const avg = _frameTimes.reduce((a,b) => a+b, 0) / _frameTimes.length;
    const maxMs = Math.max(..._frameTimes.slice(-60));
    const minMs = Math.min(..._frameTimes.slice(-60));
    _fpsDisplay = Math.round(1000 / avg);
    if (_fpsPanelEl) {
      try {
        const ri = renderer.info;
        let perfLine = '';
        if (window._pfAccum && window._pfCount > 10) {
          const sorted = Object.entries(window._pfAccum)
            .map(([k,v]) => [k, v / window._pfCount])
            .sort((a,b) => b[1] - a[1])
            .slice(0, 5);
          perfLine = '\n' + sorted.map(([k,v]) => `${k}:${v.toFixed(1)}`).join(' ');
        }
        _fpsPanelEl.textContent =
          `FPS: ${_fpsDisplay}  avg:${avg.toFixed(1)}ms  worst:${maxMs.toFixed(1)}ms\n` +
          `draw:${ri.render.calls}  tris:${ri.render.triangles}  tex:${ri.memory.textures}  geo:${ri.memory.geometries}` +
          perfLine;
      } catch(e) {}
    }
  }

  const rawDt = clock.getDelta();
  const dt = rawDt;
  gameTime += dt;

  try { // 全局错误捕获

  // ---- 逐函数计时（每60帧打印一次）----
  const _pf = {};
  let _t0;
  function _ps(n) { _t0 = performance.now(); }
  function _pe(n) { _pf[n] = (_pf[n] || 0) + performance.now() - _t0; }

  _ps(); updateDayNight(dt); _pe('dayNight');
  _ps(); updateBiomeSkyTint(); _pe('biomeSky');
  _ps(); if (!gameOver) updatePhysics(dt); _pe('physics');
  _ps(); updateFuel(dt); _pe('fuel');
  _ps(); updateDynamicTerrain(); _pe('terrain');
  _ps(); updateWater(dt); _pe('water');
  _ps(); updateDistanceCulling(); _pe('culling');
  _ps(); updateTruck(dt); _pe('truck');
  _ps(); updateCarLights(); _pe('lights');
  _ps(); updateHUD(dt); _pe('hud');
  _ps(); updateChaseCamera(dt); _pe('camera');

  _ps();
  if (modelReady && wheelBL && wheelBR) {
    wheelBL.getWorldPosition(_sprayPos);
    emitSpray('BL', _sprayPos.x, _sprayPos.y, _sprayPos.z, car.speed, car.heading);
    wheelBR.getWorldPosition(_sprayPos);
    emitSpray('BR', _sprayPos.x, _sprayPos.y, _sprayPos.z, car.speed, car.heading);
    if (car.diffLock && wheelFL && wheelFR) {
      wheelFL.getWorldPosition(_sprayPos);
      emitSpray('FL', _sprayPos.x, _sprayPos.y, _sprayPos.z, car.speed, car.heading);
      wheelFR.getWorldPosition(_sprayPos);
      emitSpray('FR', _sprayPos.x, _sprayPos.y, _sprayPos.z, car.speed, car.heading);
    }
  }
  updateWheelSprays(dt); _pe('sprays');

  _ps(); updateTreasureBoxes(dt); _pe('treasure');
  _ps(); updateStuckNPCs(dt); _pe('npcs');
  _ps(); updateFlyCoins(dt); _pe('coins');
  _ps(); updateCheckpoints(dt); _pe('checkpoints');
  _ps(); updateAudio(dt); _pe('audio');

  _calRenderTimer += dt;
  if (_calRenderTimer > 0.5) {
    _calRenderTimer = 0;
    _ps(); updateMinimap(); _pe('minimap');
  }

  // 渲染前检查scene是否有异常对象
  if (window._debugRender && _fpsFrames % 60 === 0) {
    let meshCount = 0, badCount = 0;
    scene.traverse(c => {
      if (c.isMesh) {
        meshCount++;
        const p = c.geometry?.getAttribute('position');
        if (p) {
          for (let _di = 0; _di < Math.min(p.count, 10); _di++) {
            if (!isFinite(p.getX(_di) + p.getY(_di) + p.getZ(_di))) { badCount++; break; }
          }
        }
      }
    });
    console.log('[DEBUG] meshes:', meshCount, 'badGeo:', badCount);
  }
  const _renderStart = performance.now();
  _ps(); renderer.render(scene, camera); _pe('render');
  const _renderTime = performance.now() - _renderStart;
  if (_renderTime > 200) {
    console.warn('[SLOW RENDER]', _renderTime.toFixed(0), 'ms - frame', _fpsFrames,
      'towActive:', towState.active, 'meshes:', renderer.info.render.calls);
  }

  // 累积并显示
  if (!window._pfAccum) window._pfAccum = {};
  if (!window._pfCount) window._pfCount = 0;
  for (const k in _pf) { window._pfAccum[k] = (window._pfAccum[k] || 0) + _pf[k]; }
  window._pfCount++;
  if (window._pfCount >= 60) {
    const lines = Object.entries(window._pfAccum)
      .map(([k,v]) => [k, (v / window._pfCount).toFixed(1)])
      .sort((a,b) => b[1] - a[1])
      .map(([k,v]) => `${k}:${v}ms`).join(' | ');
    console.log('[PERF]', lines);
    window._pfAccum = {}; window._pfCount = 0;
  }

  } catch(e) { // 全局错误捕获
    if (!window._lastAnimErr || window._lastAnimErr !== e.message) {
      window._lastAnimErr = e.message;
      console.error('[ANIMATE ERROR]', e.message, '\n', e.stack);
    }
  }
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  // 重新检测设备并调整UI布局（横竖屏切换等）
  const mobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent)
                 || (navigator.maxTouchPoints > 0 && window.innerWidth < 1024);
  UI.layoutAll(mobile);
});
