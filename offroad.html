<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json">
<title>越野驾驶</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#fff;touch-action:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;}
#gameCanvas{display:block;width:100%;height:100%;touch-action:none;}
#loading{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:#111;font-family:'Noto Sans SC',sans-serif;color:#ccc;z-index:100;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);}
#loading.hidden{opacity:0;pointer-events:none;transition:opacity 0.5s;}
#loadTitle{font-size:28px;font-weight:700;color:#fff;letter-spacing:2px;margin-bottom:24px;text-shadow:0 2px 12px rgba(255,255,255,0.15);}
#loadBarWrap{width:220px;height:4px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden;margin-bottom:12px;}
#loadBarFill{width:0%;height:100%;background:linear-gradient(90deg,#4488ff,#44ddff);border-radius:2px;transition:width 0.3s;}
#loadStatus{font-size:13px;color:#666;margin-bottom:0;transition:opacity 0.3s;}
#loadReady{display:none;flex-direction:column;align-items:center;gap:16px;animation:loadFadeIn 0.5s ease;}
#loadTip{font-size:14px;color:#888;}
#loadOK{padding:12px 48px;font-family:'Noto Sans SC',sans-serif;font-size:16px;font-weight:600;
  color:#fff;background:rgba(68,136,255,0.8);border:1.5px solid rgba(100,170,255,0.5);border-radius:10px;
  cursor:pointer;outline:none;transition:all 0.2s;backdrop-filter:blur(4px);letter-spacing:1px;
  touch-action:manipulation;-webkit-tap-highlight-color:transparent;}
#loadOK:hover{background:rgba(68,136,255,1);border-color:rgba(130,190,255,0.8);}
#loadOK:active{transform:scale(0.96);}
@keyframes loadFadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
/* 全屏提示按钮（游戏内，退出全屏后显示） */
#fullscreenBtn{position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:90;
  padding:6px 16px;font-family:'Noto Sans SC',sans-serif;font-size:12px;color:rgba(255,255,255,0.7);
  background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.2);border-radius:6px;
  cursor:pointer;backdrop-filter:blur(4px);display:none;pointer-events:auto;transition:opacity 0.3s;}
#hud{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);font-family:'Noto Sans SC',monospace;font-size:13px;color:#999;pointer-events:none;text-align:center;line-height:1.8;}
#hud kbd{display:inline-block;padding:1px 6px;background:#f0f0f0;border:1px solid #ddd;border-radius:3px;font-family:monospace;font-size:12px;color:#555;}
#gauges{position:fixed;bottom:30px;right:30px;pointer-events:none;display:flex;gap:0px;align-items:flex-end;}
#fuelBar{width:28px;height:160px;display:flex;flex-direction:column-reverse;gap:2px;padding:4px 3px;
  background:rgba(0,0,0,0.35);border-radius:6px;backdrop-filter:blur(4px);margin:0 4px;}
.fuel-cell{flex:1;border-radius:2px;opacity:0.2;transition:opacity 0.3s;}
.fuel-cell.on{opacity:1;}
.fuel-cell.red{background:#e53935;}
.fuel-cell.orange{background:#ff9800;}
.fuel-cell.green{background:#43a047;}
#gameOverlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.75);display:none;
  z-index:200;align-items:center;justify-content:center;flex-direction:column;font-family:'Noto Sans SC',sans-serif;color:#fff;text-align:center;}
#gameOverlay .go-title{font-size:32px;font-weight:bold;color:#e53935;margin-bottom:12px;}
#gameOverlay .go-sub{font-size:18px;color:#ccc;margin-bottom:20px;}
#gameOverlay .go-coins{font-size:24px;color:#ffd700;margin-bottom:24px;}
#gameOverlay .go-hint{font-size:14px;color:#999;}
#invTooltip{position:fixed;pointer-events:none;z-index:120;background:rgba(0,0,0,0.85);color:#eee;
  font-family:'Noto Sans SC',monospace;font-size:11px;padding:6px 10px;border-radius:6px;max-width:180px;
  line-height:1.5;display:none;backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,0.1);}
#rescueMsg{position:fixed;top:35%;left:50%;transform:translateX(-50%);font-family:'Noto Sans SC',sans-serif;
  font-size:16px;color:#fff;text-align:center;pointer-events:none;z-index:50;display:none;
  background:rgba(0,0,0,0.55);padding:8px 18px;border-radius:8px;text-shadow:0 1px 3px rgba(0,0,0,0.5);}
#achieveWrap{position:fixed;bottom:65px;left:16px;z-index:20;pointer-events:auto;}
#achieveTitle{font-family:'Noto Sans SC',monospace;font-size:10px;color:rgba(255,255,255,0.7);margin-bottom:4px;
  display:flex;align-items:center;gap:4px;}
#achieveTitle .at-icon{font-size:13px;}
#achieveBar{display:flex;gap:5px;}
.ach-slot{width:56px;height:42px;border-radius:6px;border:1.5px solid rgba(255,255,255,0.15);background:rgba(0,0,0,0.3);
  backdrop-filter:blur(4px);overflow:hidden;position:relative;cursor:default;display:flex;align-items:center;justify-content:center;}
.ach-slot.locked{opacity:0.4;}
.ach-slot.locked::after{content:'?';color:rgba(255,255,255,0.3);font-size:18px;font-weight:bold;}
.ach-slot.unlocked{border-color:rgba(100,180,255,0.6);cursor:pointer;opacity:1;}
.ach-slot img{width:100%;height:100%;object-fit:cover;}
.ach-play{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:0;height:0;
  border-left:12px solid rgba(255,255,255,0.8);border-top:7px solid transparent;border-bottom:7px solid transparent;
  filter:drop-shadow(0 1px 3px rgba(0,0,0,0.5));pointer-events:none;}
#videoOverlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);
  z-index:300;display:none;align-items:center;justify-content:center;}
#videoOverlay .vo-close{position:absolute;top:20px;right:30px;color:#fff;font-size:28px;cursor:pointer;z-index:301;
  width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:rgba(0,0,0,0.5);}
#videoOverlay video{max-width:85%;max-height:80%;border-radius:8px;box-shadow:0 4px 30px rgba(0,0,0,0.5);}
#checkpointMsg{position:fixed;top:40%;left:50%;transform:translateX(-50%);font-family:'Noto Sans SC',sans-serif;
  font-size:15px;color:#fff;text-align:center;pointer-events:none;z-index:50;display:none;
  background:rgba(0,0,0,0.6);padding:8px 18px;border-radius:8px;}
#lightControls{position:fixed;bottom:230px;right:30px;display:flex;gap:8px;z-index:10;}
#lightControls button{
  padding:6px 14px;font-family:'Noto Sans SC',monospace;font-size:12px;font-weight:600;
  border:2px solid rgba(255,255,255,0.3);border-radius:6px;cursor:pointer;
  background:rgba(20,20,20,0.7);color:rgba(200,200,200,0.8);
  transition:all 0.2s;backdrop-filter:blur(4px);
}
#lightControls button:hover{background:rgba(40,40,40,0.8);border-color:rgba(255,255,255,0.5);}
#lightControls button.active{background:rgba(60,120,200,0.6);border-color:rgba(100,180,255,0.8);color:#fff;}
#flipMsg{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Noto Sans SC',sans-serif;font-size:22px;font-weight:700;color:#d32f2f;text-align:center;pointer-events:none;opacity:0;transition:opacity 0.3s;line-height:1.8;text-shadow:0 1px 4px rgba(0,0,0,0.1);}

#minimap{position:fixed;top:16px;left:16px;pointer-events:none;z-index:20;}
#minimap canvas{border-radius:50%;border:1.5px solid rgba(255,255,255,0.15);box-shadow:0 2px 12px rgba(0,0,0,0.4);}
#minimapLabel{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);font-family:'Noto Sans SC',monospace;
  font-size:10px;color:rgba(255,255,255,0.9);text-shadow:0 1px 4px rgba(0,0,0,0.8);white-space:nowrap;}
#inventory{position:fixed;right:20px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:8px;z-index:20;}
.inv-slot{width:52px;height:52px;border:2px solid rgba(255,255,255,0.2);border-radius:8px;background:rgba(0,0,0,0.35);
  backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;
  transition:border-color 0.3s,box-shadow 0.3s;cursor:pointer;pointer-events:auto;}
.inv-slot.filled{border-color:rgba(255,200,50,0.6);box-shadow:0 0 12px rgba(255,200,50,0.2);}
.inv-slot .inv-icon{font-size:24px;filter:drop-shadow(0 1px 2px rgba(0,0,0,0.5));pointer-events:none;}
.fly-item{position:fixed;z-index:100;font-size:28px;pointer-events:none;transition:none;filter:drop-shadow(0 2px 6px rgba(0,0,0,0.5));}
#coinBar{position:fixed;top:18px;right:90px;display:flex;align-items:center;gap:6px;font-family:'Noto Sans SC',monospace;
  font-size:16px;color:#ffd700;text-shadow:0 1px 3px rgba(0,0,0,0.6);pointer-events:none;z-index:20;}
#coinBar .coin-icon{width:48px;height:48px;filter:drop-shadow(0 1px 3px rgba(0,0,0,0.5));}
#coinBar .coin-count{font-weight:bold;}

/* ===== MOBILE TOUCH CONTROLS ===== */
#mobileControls{display:none;} /* 默认隐藏，JS根据isMobile切换 */

/* 虚拟摇杆 */
#joystickZone{position:fixed;left:20px;bottom:30px;width:150px;height:150px;z-index:60;touch-action:none;}
#joystickBase{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:130px;height:130px;
  border-radius:50%;background:rgba(255,255,255,0.08);border:2px solid rgba(255,255,255,0.15);
  backdrop-filter:blur(2px);}
#joystickThumb{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:56px;height:56px;
  border-radius:50%;background:rgba(255,255,255,0.25);border:2px solid rgba(255,255,255,0.35);
  transition:none;pointer-events:none;}

/* 右侧按钮组 */
#mobileBtns{position:fixed;right:16px;bottom:30px;display:flex;flex-direction:column;gap:10px;
  align-items:center;z-index:60;touch-action:none;}
.m-btn{width:60px;height:60px;border-radius:50%;border:2px solid rgba(255,255,255,0.25);
  background:rgba(0,0,0,0.4);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;
  font-family:'Noto Sans SC',sans-serif;font-size:11px;font-weight:600;color:rgba(255,255,255,0.7);
  touch-action:none;user-select:none;-webkit-user-select:none;cursor:pointer;
  transition:background 0.1s,border-color 0.1s;}
.m-btn.active{background:rgba(255,255,255,0.2);border-color:rgba(255,255,255,0.5);}
.m-btn .m-icon{font-size:22px;line-height:1;}
.m-btn .m-label{font-size:9px;margin-top:2px;opacity:0.7;}

/* 手刹按钮特殊样式（更大） */
#mBtnBrake{width:72px;height:72px;border-color:rgba(255,80,80,0.4);}
#mBtnBrake.active{background:rgba(255,60,60,0.3);border-color:rgba(255,80,80,0.7);}

/* 右侧次要按钮（重置/换车）放在上方 */
#mobileBtnsSecondary{position:fixed;right:20px;top:50%;transform:translateY(-50%);display:flex;
  flex-direction:column;gap:8px;z-index:60;touch-action:none;}
.m-btn-sm{width:44px;height:44px;border-radius:50%;border:1.5px solid rgba(255,255,255,0.15);
  background:rgba(0,0,0,0.3);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;
  font-family:'Noto Sans SC',sans-serif;font-size:10px;font-weight:500;color:rgba(255,255,255,0.5);
  touch-action:none;user-select:none;-webkit-user-select:none;cursor:pointer;}
.m-btn-sm.active{background:rgba(255,255,255,0.15);border-color:rgba(255,255,255,0.4);color:rgba(255,255,255,0.8);}
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>
<div id="fpsPanel" style="position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:999;
  font-family:monospace;font-size:13px;color:#0f0;background:rgba(0,0,0,0.7);padding:4px 12px;
  border-radius:6px;pointer-events:none;white-space:pre;"></div>
<div id="loading">
  <div id="loadTitle">越野驾驶</div>
  <div id="loadBarWrap"><div id="loadBarFill"></div></div>
  <div id="loadStatus">加载中...</div>

    <div id="loadTip">建议全屏体验</div>
    <button id="loadOK">OK</button>
  </div>
</div>
<div id="fullscreenBtn">点击全屏</div>
<div id="hud">
  <kbd>W</kbd>/<kbd>&uarr;</kbd> 前进 &nbsp;
  <kbd>S</kbd>/<kbd>&darr;</kbd> 倒车 &nbsp;
  <kbd>A</kbd>/<kbd>D</kbd> 转向 &nbsp;
  <kbd>Space</kbd> 手刹 &nbsp;
  <kbd>R</kbd> 翻车重置 &nbsp;

<div id="flipMsg">ROLLED OVER!<br><span style="font-size:15px;color:#666;font-weight:400;">Press <kbd style="padding:2px 8px;background:#f0f0f0;border:1px solid #ddd;border-radius:3px;font-family:monospace;">R</kbd> to reset</span></div>
<div id="lightControls">
  <button id="btnLock" onclick="toggleDiffLock()" title="差速锁" style="background:#222;border:2px solid #444;padding:4px 6px;border-radius:8px;cursor:pointer;outline:none;">
    <svg width="36" height="40" viewBox="0 0 36 40" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- 四个轮胎 -->
      <rect x="1" y="2" width="8" height="14" rx="3" fill="#666" id="lockWFL"/>
      <rect x="27" y="2" width="8" height="14" rx="3" fill="#666" id="lockWFR"/>
      <rect x="1" y="24" width="8" height="14" rx="3" fill="#666" id="lockWBL"/>
      <rect x="27" y="24" width="8" height="14" rx="3" fill="#666" id="lockWBR"/>
      <!-- 传动轴 -->
      <line x1="9" y1="9" x2="27" y2="9" stroke="#555" stroke-width="1.5" id="lockAxleF"/>
      <line x1="9" y1="31" x2="27" y2="31" stroke="#555" stroke-width="1.5" id="lockAxleR"/>
      <line x1="18" y1="9" x2="18" y2="31" stroke="#555" stroke-width="1.5" id="lockShaft"/>
      <!-- 锁 -->
      <circle cx="18" cy="20" r="5" fill="#444" id="lockBody"/>
      <path d="M15 18 V15 A3 3 0 0 1 21 15 V18" stroke="#555" stroke-width="1.5" fill="none" id="lockShackle"/>
    </svg>
  </button>
</div>
<div id="minimap"><canvas id="minimapCanvas" width="160" height="160"></canvas></div>
<div id="gauges">
  <canvas id="tachGauge" width="180" height="180"></canvas>
  <div id="fuelBar"></div>
  <canvas id="speedGauge" width="180" height="180"></canvas>
</div>
<div id="gameOverlay"><div class="go-title">油料耗尽</div><div class="go-sub">游戏失败</div>
  <div class="go-coins"><svg width="28" height="28" viewBox="0 0 24 24" style="vertical-align:middle;"><circle cx="12" cy="12" r="11" fill="#ffd700" stroke="#b8860b" stroke-width="1.5"/><polygon points="12,3.5 13.8,9.2 19.8,9.2 14.9,12.8 16.7,18.5 12,14.8 7.3,18.5 9.1,12.8 4.2,9.2 10.2,9.2" fill="#b8860b"/></svg> <span id="goCoins">0</span></div>
  <div class="go-hint">按 <kbd style="padding:2px 8px;background:#555;border:1px solid #777;border-radius:3px;color:#fff;">R</kbd> 重置游戏</div></div>
<div id="invTooltip"></div>
<div id="rescueMsg"></div>



<div id="diffLockTip" style="display:none;position:fixed;top:28%;left:50%;transform:translateX(-50%);
  font-family:'Noto Sans SC',sans-serif;font-size:16px;color:#fff;background:rgba(255,136,0,0.85);
  padding:10px 24px;border-radius:10px;pointer-events:none;z-index:50;white-space:nowrap;
  transition:opacity 0.4s;backdrop-filter:blur(6px);"></div>
<div id="checkpointMsg"></div>
<div id="achieveWrap"><div id="achieveTitle"><span class="at-icon">📷</span> 打卡成就</div><div id="achieveBar"></div></div>
<div id="videoOverlay" onclick="closeVideo(event)"><div class="vo-close" onclick="closeVideo(event)">✕</div><video id="videoPlayer" controls></video></div>
<div id="coinBar"><svg class="coin-icon" width="24" height="24" viewBox="0 0 24 24"><circle cx="12" cy="12" r="11" fill="#ffd700" stroke="#b8860b" stroke-width="1.5"/><polygon points="12,3.5 13.8,9.2 19.8,9.2 14.9,12.8 16.7,18.5 12,14.8 7.3,18.5 9.1,12.8 4.2,9.2 10.2,9.2" fill="#b8860b"/></svg><span class="coin-count" id="coinCount">0</span></div>
<div id="inventory">
  <div class="inv-slot" id="invSlot0"><span class="inv-icon"></span></div>
  <div class="inv-slot" id="invSlot1"><span class="inv-icon"></span></div>
  <div class="inv-slot" id="invSlot2"><span class="inv-icon"></span></div>
  <div class="inv-slot" id="invSlot3"><span class="inv-icon"></span></div>
</div>

<!-- ===== 手机端虚拟控件 ===== -->
<div id="mobileControls">
  <!-- 左侧虚拟摇杆 -->
  <div id="joystickZone">
    <div id="joystickBase">
      <div id="joystickThumb"></div>
    </div>

  </div>
  <!-- 右侧次要按钮（重置+换车） -->
  <div id="mobileBtnsSecondary">
    <div class="m-btn-sm" id="mBtnReset">R</div>

  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
// OrbitControls removed — using custom GTA-style chase camera

// ============================================================
// DEVICE DETECTION + UI MODULE SYSTEM
// ============================================================
const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent)
                 || (navigator.maxTouchPoints > 0 && window.innerWidth < 1024);
const UI = {}; // 所有UI模块挂载到此命名空间

// ============================================================
// SCENE
// ============================================================
const canvas = document.getElementById('gameCanvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(1); // 固定1x分辨率，大幅减少GPU像素填充
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.BasicShadowMap; // 最轻量的阴影模式

const scene = new THREE.Scene();
// 背景由天空球控制，不设纯色

// 工具函数：从场景移除并释放GPU资源
function disposeObject(obj) {
  if (!obj) return;
  scene.remove(obj);
  obj.traverse(c => {
    if (c.geometry) c.geometry.dispose();
    if (c.material) {
      if (Array.isArray(c.material)) c.material.forEach(m => { if (m.map) m.map.dispose(); m.dispose(); });
      else { if (c.material.map) c.material.map.dispose(); c.material.dispose(); }
    }
  });
}

// ============================================================
// AUDIO SYSTEM — 全程序化生成（Web Audio API，零外部文件）
// ============================================================
let audioCtx = null;
let audioResumed = false;
const audio = {
  // 引擎（4层Oscillator叠加 = 更浑厚）
  engineOsc1: null, engineOsc2: null, engineOsc3: null, engineOsc4: null,
  engineGain: null, engineFilter: null,
  // 冰面漂移摩擦声
  iceSkidGain: null,
  // 环境音：白噪声源 + 各biome GainNode
  noiseSource: null, noiseBuffer: null,
  jungleBirdGain: null, jungleLeafGain: null,
  snowWindGain: null,
  seaWaveGain: null, _seaLfoPhase: 0,
  // 主音量
  masterGain: null,
};

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  audio.masterGain = audioCtx.createGain();
  audio.masterGain.gain.value = 0.5;
  audio.masterGain.connect(audioCtx.destination);

  // ---- 引擎声：4层Oscillator + 低通滤波器（浑厚感）----
  audio.engineGain = audioCtx.createGain();
  audio.engineGain.gain.value = 0;
  audio.engineFilter = audioCtx.createBiquadFilter();
  audio.engineFilter.type = 'lowpass';
  audio.engineFilter.frequency.value = 400;
  audio.engineFilter.Q.value = 3;
  audio.engineGain.connect(audio.engineFilter);
  audio.engineFilter.connect(audio.masterGain);

  // 层1：超低频基础（方波 = 厚重的低频脉冲）
  audio.engineOsc1 = audioCtx.createOscillator();
  audio.engineOsc1.type = 'square';
  audio.engineOsc1.frequency.value = 30;
  const eng1Gain = audioCtx.createGain(); eng1Gain.gain.value = 0.18;
  audio.engineOsc1.connect(eng1Gain); eng1Gain.connect(audio.engineGain);
  audio.engineOsc1.start();
  audio._eng1Gain = eng1Gain;

  // 层2：低频锯齿波（引擎主体音色）
  audio.engineOsc2 = audioCtx.createOscillator();
  audio.engineOsc2.type = 'sawtooth';
  audio.engineOsc2.frequency.value = 60;
  const eng2Gain = audioCtx.createGain(); eng2Gain.gain.value = 0.22;
  audio.engineOsc2.connect(eng2Gain); eng2Gain.connect(audio.engineGain);
  audio.engineOsc2.start();
  audio._eng2Gain = eng2Gain;

  // 层3：中频三角波（温暖的共鸣泛音）
  audio.engineOsc3 = audioCtx.createOscillator();
  audio.engineOsc3.type = 'triangle';
  audio.engineOsc3.frequency.value = 90;
  const eng3Gain = audioCtx.createGain(); eng3Gain.gain.value = 0.1;
  audio.engineOsc3.connect(eng3Gain); eng3Gain.connect(audio.engineGain);
  audio.engineOsc3.start();
  audio._eng3Gain = eng3Gain;

  // 层4：噪声层（模拟排气管的粗糙质感）
  audio.engineOsc4 = audioCtx.createBufferSource();
  const engNoiseBuf = audioCtx.createBuffer(1, audioCtx.sampleRate * 2, audioCtx.sampleRate);
  const engNoiseData = engNoiseBuf.getChannelData(0);
  for (let i = 0; i < engNoiseData.length; i++) engNoiseData[i] = Math.random() * 2 - 1;
  audio.engineOsc4.buffer = engNoiseBuf; audio.engineOsc4.loop = true;
  const engNoiseFilter = audioCtx.createBiquadFilter();
  engNoiseFilter.type = 'bandpass'; engNoiseFilter.frequency.value = 120; engNoiseFilter.Q.value = 1.5;
  const eng4Gain = audioCtx.createGain(); eng4Gain.gain.value = 0.08;
  audio.engineOsc4.connect(engNoiseFilter); engNoiseFilter.connect(eng4Gain);
  eng4Gain.connect(audio.engineGain);
  audio.engineOsc4.start();
  audio._eng4Gain = eng4Gain;
  audio._engNoiseFilter = engNoiseFilter;

  // ---- 漂移摩擦地面声（低频沙沙 + 中频摩擦，模拟轮胎刮地）----
  audio.iceSkidGain = audioCtx.createGain();
  audio.iceSkidGain.gain.value = 0;
  audio.iceSkidGain.connect(audio.masterGain);
  // 层A：低频摩擦（200-600Hz，沉闷的轮胎拖地声）
  const skidLoSrc = audioCtx.createBufferSource();
  skidLoSrc.buffer = engNoiseBuf; skidLoSrc.loop = true;
  const skidLoFilter = audioCtx.createBiquadFilter();
  skidLoFilter.type = 'bandpass'; skidLoFilter.frequency.value = 400; skidLoFilter.Q.value = 0.8;
  const skidLoGain = audioCtx.createGain(); skidLoGain.gain.value = 0.7;
  skidLoSrc.connect(skidLoFilter); skidLoFilter.connect(skidLoGain);
  skidLoGain.connect(audio.iceSkidGain);
  skidLoSrc.start();
  // 层B：中频摩擦（800-2000Hz，沙沙的刮擦质感）
  const skidMidSrc = audioCtx.createBufferSource();
  skidMidSrc.buffer = engNoiseBuf; skidMidSrc.loop = true;
  const skidMidFilter = audioCtx.createBiquadFilter();
  skidMidFilter.type = 'bandpass'; skidMidFilter.frequency.value = 1200; skidMidFilter.Q.value = 1.2;
  const skidMidGain = audioCtx.createGain(); skidMidGain.gain.value = 0.3;
  skidMidSrc.connect(skidMidFilter); skidMidFilter.connect(skidMidGain);
  skidMidGain.connect(audio.iceSkidGain);
  skidMidSrc.start();

  // ---- 白噪声Buffer（所有环境音的源头）----
  const bufLen = audioCtx.sampleRate * 4; // 4秒循环
  audio.noiseBuffer = audioCtx.createBuffer(1, bufLen, audioCtx.sampleRate);
  const data = audio.noiseBuffer.getChannelData(0);
  for (let i = 0; i < bufLen; i++) data[i] = Math.random() * 2 - 1;

  // ---- 雨林：鸟叫（带通滤波白噪声，随机触发）----
  audio.jungleBirdGain = audioCtx.createGain();
  audio.jungleBirdGain.gain.value = 0;
  const birdFilter = audioCtx.createBiquadFilter();
  birdFilter.type = 'bandpass'; birdFilter.frequency.value = 3500; birdFilter.Q.value = 8;
  birdFilter.connect(audio.jungleBirdGain);
  audio.jungleBirdGain.connect(audio.masterGain);
  audio._birdFilter = birdFilter;
  audio._birdTimer = 0;
  audio._birdActive = false;

  // 雨林叶子沙沙声已移除（太吵）

  // ---- 雪地：风声（低通白噪声）----
  audio.snowWindGain = audioCtx.createGain();
  audio.snowWindGain.gain.value = 0;
  const windFilter = audioCtx.createBiquadFilter();
  windFilter.type = 'lowpass'; windFilter.frequency.value = 600; windFilter.Q.value = 1;
  const windSrc = audioCtx.createBufferSource();
  windSrc.buffer = audio.noiseBuffer; windSrc.loop = true;
  windSrc.connect(windFilter); windFilter.connect(audio.snowWindGain);
  audio.snowWindGain.connect(audio.masterGain);
  windSrc.start();

  // ---- 海浪声（低通白噪声 + LFO音量调制）----
  audio.seaWaveGain = audioCtx.createGain();
  audio.seaWaveGain.gain.value = 0;
  const seaFilter = audioCtx.createBiquadFilter();
  seaFilter.type = 'lowpass'; seaFilter.frequency.value = 800; seaFilter.Q.value = 0.8;
  const seaSrc = audioCtx.createBufferSource();
  seaSrc.buffer = audio.noiseBuffer; seaSrc.loop = true;
  seaSrc.connect(seaFilter); seaFilter.connect(audio.seaWaveGain);
  audio.seaWaveGain.connect(audio.masterGain);
  seaSrc.start();
}

function resumeAudio() {
  if (audioResumed) return;
  if (!audioCtx) initAudio();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  audioResumed = true;
}

// ---- 一次性音效：宝箱获得（上行琶音 C-E-G-C'）----
function playTreasureSound() {
  if (!audioCtx || !audioResumed) return;
  const notes = [523.25, 659.25, 783.99, 1046.50]; // C5-E5-G5-C6
  const t = audioCtx.currentTime;
  notes.forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    osc.type = 'square';
    osc.frequency.value = freq;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0.15, t + i * 0.08);
    g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.08 + 0.15);
    osc.connect(g); g.connect(audio.masterGain);
    osc.start(t + i * 0.08);
    osc.stop(t + i * 0.08 + 0.2);
  });
}

// ---- 一次性音效：打卡成就（更华丽的和弦琶音）----
function playCheckpointSound() {
  if (!audioCtx || !audioResumed) return;
  const notes = [392, 493.88, 587.33, 783.99, 987.77]; // G4-B4-D5-G5-B5
  const t = audioCtx.currentTime;
  notes.forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    osc.type = 'sine';
    osc.frequency.value = freq;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0.2, t + i * 0.1);

    osc.connect(g); g.connect(audio.masterGain);
    osc.start(t + i * 0.1);
    osc.stop(t + i * 0.1 + 0.5);
  });
  // 持续和弦底音
  const pad = audioCtx.createOscillator();
  pad.type = 'sine'; pad.frequency.value = 196; // G3
  const pg = audioCtx.createGain();
  pg.gain.setValueAtTime(0.1, t);
  pg.gain.exponentialRampToValueAtTime(0.001, t + 1.0);
  pad.connect(pg); pg.connect(audio.masterGain);
  pad.start(t); pad.stop(t + 1.1);
}

// ---- 车辆碰撞声（低频撞击 + 金属碎响）----
function playCollisionSound(intensity) {
  if (!audioCtx || !audioResumed) return;
  const vol = Math.min(0.3, intensity * 0.04);
  if (vol < 0.02) return;
  const t = audioCtx.currentTime;
  // 低频撞击：短促正弦波快速衰减
  const boom = audioCtx.createOscillator();
  boom.type = 'sine';
  boom.frequency.setValueAtTime(120, t);
  boom.frequency.exponentialRampToValueAtTime(40, t + 0.15);
  const bg = audioCtx.createGain();
  bg.gain.setValueAtTime(vol, t);
  bg.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
  boom.connect(bg); bg.connect(audio.masterGain);
  boom.start(t); boom.stop(t + 0.25);
  // 金属碎响：带通噪声脉冲
  const nSrc = audioCtx.createBufferSource();
  nSrc.buffer = audio.noiseBuffer;
  const nf = audioCtx.createBiquadFilter();
  nf.type = 'bandpass'; nf.frequency.value = 1500 + Math.random() * 1000; nf.Q.value = 3;
  const ng = audioCtx.createGain();
  ng.gain.setValueAtTime(vol * 0.6, t);
  ng.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
  nSrc.connect(nf); nf.connect(ng); ng.connect(audio.masterGain);
  nSrc.start(t); nSrc.stop(t + 0.15);
}

// ---- 绳子崩断声（弹簧弹断 + 甩鞭声）----
function playRopeSnapSound() {
  if (!audioCtx || !audioResumed) return;
  const t = audioCtx.currentTime;
  // 弹断：快速下行频率扫描
  const snap = audioCtx.createOscillator();
  snap.type = 'sawtooth';
  snap.frequency.setValueAtTime(800, t);
  snap.frequency.exponentialRampToValueAtTime(80, t + 0.08);
  const sg = audioCtx.createGain();
  sg.gain.setValueAtTime(0.2, t);
  sg.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
  snap.connect(sg); sg.connect(audio.masterGain);
  snap.start(t); snap.stop(t + 0.15);
  // 甩鞭尾声：高频噪声短脉冲
  const whip = audioCtx.createBufferSource();
  whip.buffer = audio.noiseBuffer;
  const wf = audioCtx.createBiquadFilter();
  wf.type = 'highpass'; wf.frequency.value = 3000;
  const wg = audioCtx.createGain();
  wg.gain.setValueAtTime(0.15, t + 0.03);
  wg.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
  whip.connect(wf); wf.connect(wg); wg.connect(audio.masterGain);
  whip.start(t); whip.stop(t + 0.15);
}

// ---- 鸟叫触发（短促白噪声脉冲通过高Q带通滤波器）----
function _triggerBirdCall() {
  if (!audioCtx) return;
  const src = audioCtx.createBufferSource();
  src.buffer = audio.noiseBuffer;
  // 随机频率模拟不同鸟
  const freq = 2500 + Math.random() * 3000;
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'bandpass'; filter.frequency.value = freq; filter.Q.value = 15 + Math.random() * 10;
  const g = audioCtx.createGain();
  const t = audioCtx.currentTime;
  // 快速颤音：用 AM 调制
  const dur = 0.15 + Math.random() * 0.4;
  const chirps = 2 + Math.floor(Math.random() * 4);
  for (let c = 0; c < chirps; c++) {
    const ct = t + c * (dur / chirps);
    g.gain.setValueAtTime(0.25, ct);
    g.gain.exponentialRampToValueAtTime(0.001, ct + dur / chirps * 0.7);
  }
  src.connect(filter); filter.connect(g); g.connect(audio.jungleBirdGain);
  src.start(t); src.stop(t + dur + 0.1);
}

// ---- 每帧更新音频（由animate调用）----
function updateAudio(dt) {
  if (!audioCtx || !audioResumed) return;

  // ---- 引擎声（4层浑厚）----
  const rpm = car.rpm || 800;
  const throttleOn = car.throttle > 0 || car.reverse > 0;
  const absSpeed = Math.abs(car.speed);
  const rpmNorm = (rpm - 800) / (5000 - 800); // 0~1
  // 层1超低频：30→55Hz | 层2主体：60→140Hz | 层3泛音：90→210Hz
  audio.engineOsc1.frequency.value = 30 + rpmNorm * 25;
  audio.engineOsc2.frequency.value = 60 + rpmNorm * 80;
  audio.engineOsc3.frequency.value = 90 + rpmNorm * 120;
  // 排气噪声层跟随RPM调带通频率
  audio._engNoiseFilter.frequency.value = 80 + rpmNorm * 200;
  // 总音量：怠速浑厚低沉，油门时更响更有力
  const engineVol = throttleOn ? 0.15 + rpmNorm * 0.2 : 0.08 + rpmNorm * 0.1;
  audio.engineGain.gain.value += (engineVol - audio.engineGain.gain.value) * Math.min(1, 8 * dt);
  // 油门时超低频更重，松油门时衰减
  audio._eng1Gain.gain.value += ((throttleOn ? 0.22 : 0.12) - audio._eng1Gain.gain.value) * Math.min(1, 5 * dt);
  // 滤波器：油门打开高频，怠速闷
  const filterFreq = throttleOn ? 500 + rpm * 0.12 : 250 + rpm * 0.04;
  audio.engineFilter.frequency.value += (filterFreq - audio.engineFilter.frequency.value) * Math.min(1, 5 * dt);

  // ---- 漂移摩擦地面声 ----
  const onIceNow = isInIceLake(car.pos.x, car.pos.z);
  // 侧滑量：车头方向和实际运动方向的偏差 × 速度
  const slipAngle = Math.abs(Math.sin(car.heading - car.velAngle));
  const sideSlip = onIceNow ? slipAngle * absSpeed : 0;
  // 音量：侧滑越大越响，速度快时更明显
  const skidVol = Math.min(0.25, sideSlip * 0.025);
  audio.iceSkidGain.gain.value += (skidVol - audio.iceSkidGain.gain.value) * Math.min(1, 12 * dt);

  // ---- 环境音（基于biome权重）----
  const bw = getBiomeWeights(car.pos.x, car.pos.z);

  // 雨林鸟叫（随机触发）
  const jungleVol = Math.max(0, bw.jungle - 0.2) * 0.5;
  audio.jungleBirdGain.gain.value += (jungleVol - audio.jungleBirdGain.gain.value) * Math.min(1, 2 * dt);
  if (bw.jungle > 0.3) {
    audio._birdTimer -= dt;
    if (audio._birdTimer <= 0) {
      _triggerBirdCall();
      audio._birdTimer = 3 + Math.random() * 6; // 3-9秒间隔
    }
  }

  // 雪地风声
  const windVol = Math.max(0, bw.snow - 0.15) * 0.12 + absSpeed * 0.002;
  audio.snowWindGain.gain.value += (windVol - audio.snowWindGain.gain.value) * Math.min(1, 2 * dt);

  // 海浪声（基于到海边的距离 + LFO调制）
  const distToCenter = Math.sqrt(car.pos.x * car.pos.x + car.pos.z * car.pos.z);
  const desertBiome = bw.desert;
  // 海边在desert biome的远处（120m+）
  const seaProximity = desertBiome > 0.3 ? Math.max(0, 1 - Math.max(0, 130 - distToCenter) / 40) : 0;
  audio._seaLfoPhase += dt * 0.15; // ~0.15Hz 海浪节奏
  const seaLfo = 0.5 + 0.5 * Math.sin(audio._seaLfoPhase * Math.PI * 2);
  const seaVol = seaProximity * 0.2 * seaLfo;
  audio.seaWaveGain.gain.value += (seaVol - audio.seaWaveGain.gain.value) * Math.min(1, 3 * dt);
}

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 500);
camera.position.set(0, 18, 22);

// ---- GTA式第三人称追踪摄像机 ----
const chaseCam = {
  distance: 22,        // 摄像机到车的距离（大全景）
  height: 18.0,        // 摄像机高度（高空俯瞰）
  lookHeight: 0.5,     // 看向车身的高度
  // 鼠标控制的偏移角度
  yawOffset: 0,        // 水平偏转（鼠标左右拖拽）
  pitchOffset: 0,      // 垂直偏转（鼠标上下拖拽）
  // 当前平滑后的位置
  currentPos: new THREE.Vector3(0, 18, 22),
  currentLookAt: new THREE.Vector3(0, 0.5, 0),
  // 平滑跟随的航向角（避免摄像机晃动）
  smoothHeading: 0,
  // 鼠标拖拽状态
  dragging: false,
  lastMouseX: 0,
  lastMouseY: 0,
  // 返回车后方的自动回正计时
  returnTimer: 0,
};

// 鼠标拖拽控制视角
canvas.addEventListener('mousedown', (e) => {
  resumeAudio();
  if (e.button === 0 || e.button === 2) {  // 左键或右键
    chaseCam.dragging = true;
    chaseCam.lastMouseX = e.clientX;
    chaseCam.lastMouseY = e.clientY;
    chaseCam.returnTimer = 0;
  }
});
window.addEventListener('mouseup', () => {
  chaseCam.dragging = false;
  chaseCam.returnTimer = 0;
});
canvas.addEventListener('mousemove', (e) => {
  if (!chaseCam.dragging) return;
  const dx = e.clientX - chaseCam.lastMouseX;
  const dy = e.clientY - chaseCam.lastMouseY;
  chaseCam.yawOffset -= dx * 0.005;
  chaseCam.pitchOffset -= dy * 0.003;
  chaseCam.pitchOffset = Math.max(-0.3, Math.min(0.6, chaseCam.pitchOffset));
  chaseCam.lastMouseX = e.clientX;
  chaseCam.lastMouseY = e.clientY;
});
// 滚轮控制距离
canvas.addEventListener('wheel', (e) => {
  chaseCam.distance += e.deltaY * 0.005;
  chaseCam.distance = Math.max(8, Math.min(40, chaseCam.distance));
  e.preventDefault();
}, { passive: false });
// 禁用右键菜单
canvas.addEventListener('contextmenu', (e) => e.preventDefault());

const _camTargetPos = new THREE.Vector3();
const _camTargetLook = new THREE.Vector3();

function updateChaseCamera(dt) {
  const speed = Math.abs(car.speed);

  // 鼠标没拖拽时，yaw自动回正到车后方
  if (!chaseCam.dragging) {
    chaseCam.returnTimer += dt;
    if (chaseCam.returnTimer > 0.5) {
      const returnSpeed = 2.0 * dt;
      chaseCam.yawOffset *= Math.max(1 - returnSpeed, 0);
      chaseCam.pitchOffset *= Math.max(1 - returnSpeed * 0.5, 0);
      if (Math.abs(chaseCam.yawOffset) < 0.001) chaseCam.yawOffset = 0;
    }
  }

  // 车速越快，FOV略增加（速度感）— 仅在FOV变化显著时更新投影矩阵
  const newFov = 45 + speed * 0.15;
  if (Math.abs(newFov - camera.fov) > 0.1) {
    camera.fov = newFov;
    camera.updateProjectionMatrix();
  }

  // ---- 平滑航向 ----
  // 摄像机不直接跟 car.heading，而是用 smoothHeading 做滞后跟随
  // 角度差需要做环绕处理（-PI ~ PI）
  let headingDiff = car.heading - chaseCam.smoothHeading;
  // 规范化到 [-PI, PI]
  while (headingDiff > Math.PI) headingDiff -= Math.PI * 2;
  while (headingDiff < -Math.PI) headingDiff += Math.PI * 2;
  // 低速时跟随更慢（转弯晃动小），高速时稍紧（不要太落后）
  const headingLerp = Math.min(1, (1.5 + speed * 0.08) * dt);
  chaseCam.smoothHeading += headingDiff * headingLerp;

  // 目标摄像机角度 = 平滑航向 + PI（在车后面）+ 鼠标偏转
  const camYaw = chaseCam.smoothHeading + Math.PI + chaseCam.yawOffset;
  const camPitch = chaseCam.pitchOffset;

  // 地形高度
  const carTerrainY = typeof getTerrainHeight === 'function' ? getTerrainHeight(car.pos.x, car.pos.z) : 0;

  // 救援镜头平滑过渡（camBlend: 0=默认镜头, 1=救援镜头）
  const towCamTarget = (towState.active && towState.isValid && towState.npc) ? 1 : 0;
  if (towState.camBlend < towCamTarget) {
    towState.camBlend = Math.min(1, towState.camBlend + dt * 1.5); // ~0.7秒缓入
  } else if (towState.camBlend > towCamTarget) {
    towState.camBlend = Math.max(0, towState.camBlend - dt * 2.0); // ~0.5秒缓出
  }
  const tb = towState.camBlend;

  let dist = chaseCam.distance;
  let h = chaseCam.height + camPitch * 5;
  let lookX = car.pos.x, lookZ = car.pos.z, lookY = carTerrainY + chaseCam.lookHeight;

  if (tb > 0.001 && towState.npc) {
    const npc = towState.npc;
    const midX = (car.pos.x + npc.wx) / 2;
    const midZ = (car.pos.z + npc.wz) / 2;
    const sepDist = Math.sqrt((car.pos.x - npc.wx) ** 2 + (car.pos.z - npc.wz) ** 2);
    const towDist = Math.max(chaseCam.distance, sepDist * 1.2 + 8);
    const towH = Math.max(chaseCam.height * 1.3, sepDist * 0.6 + 10);
    dist = dist * (1 - tb) + towDist * tb;
    h = h * (1 - tb) + towH * tb;
    lookX = lookX * (1 - tb) + midX * tb;
    lookZ = lookZ * (1 - tb) + midZ * tb;
    lookY = lookY * (1 - tb) + (carTerrainY + 1.5) * tb;
  }

  // 目标位置
  _camTargetPos.set(
    car.pos.x + Math.sin(camYaw) * dist,
    Math.max(carTerrainY + 2, h + carTerrainY),
    car.pos.z + Math.cos(camYaw) * dist
  );

  // 目标看向点（看向点也用平滑位置，减少抖动）
  _camTargetLook.set(lookX, lookY, lookZ);

  // 位置平滑跟随 — 比航向更慢，给出"沉重"的滞后感
  const posLerp = Math.min(1, (2.5 + speed * 0.15) * dt);
  const lookLerp = Math.min(1, (3.5 + speed * 0.3) * dt);

  chaseCam.currentPos.lerp(_camTargetPos, posLerp);
  chaseCam.currentLookAt.lerp(_camTargetLook, lookLerp);

  camera.position.copy(chaseCam.currentPos);
  camera.lookAt(chaseCam.currentLookAt);
}

// ============================================================
// NOISE — hash-based（CPU和GPU shader使用完全相同的算法，确保高度一致）
// ============================================================
function _fade(t) { return t * t * t * (t * (t * 6 - 15) + 10); }
// 和GLSL shader中完全相同的hash函数
function _hash(px, py) {
  const h = px * 127.1 + py * 311.7;
  return (Math.sin(h) * 43758.5453123) % 1;
}
// 和GLSL shader中完全相同的noise2D
function noise2D(x, y) {
  const ix = Math.floor(x), iy = Math.floor(y);
  const fx = x - ix, fy = y - iy;
  const ux = _fade(fx), uy = _fade(fy);
  const a = _hash(ix, iy);
  const b = _hash(ix + 1, iy);
  const c = _hash(ix, iy + 1);
  const d = _hash(ix + 1, iy + 1);
  return ((a * (1 - ux) + b * ux) * (1 - uy) + (c * (1 - ux) + d * ux) * uy) * 2.0 - 1.0;
}
function fbm(x, y, octaves, lacunarity, gain) {
  let sum = 0, amp = 1, maxAmp = 0;
  let px = x, py = y;
  for (let i = 0; i < octaves; i++) {
    sum += noise2D(px, py) * amp;
    maxAmp += amp;
    amp *= gain;
    px *= lacunarity;
    py *= lacunarity;
  }
  return sum / maxAmp;
}

// ============================================================
// BIOME SYSTEM — 北部大面积雪地(2/4), 南部: 西=雨林(1/4), 东=沙漠(1/4)
// ============================================================
const TERRAIN_SIZE = 500;
const BIOME_TRANSITION = 0.22; // 过渡带角度宽度（弧度）
const SEA_LEVEL = -2.5; // 海平面高度（降低使沙滩区域露出）

// 扇区中心角度（弧度） atan2(z,x): 0=东, PI/2=南, PI=西, -PI/2=北
// 雪地占北半(180°): 中心=-PI/2, 半宽=PI/2
// 沙漠占东南(90°): 中心=PI/4, 半宽=PI/4
// 雨林占西南(90°): 中心=3*PI/4, 半宽=PI/4
const BIOME_SECTOR_ANGLES = {
  snow:    -Math.PI / 2,     // 北（Z负方向）
  desert:   Math.PI / 4,     // 东南（+X,+Z方向）
  jungle:   Math.PI * 3 / 4, // 西南（-X,+Z方向）
};

// 噪声扰动边界（使扇区边缘有机化）
function _biomeAngleNoise(angle, dist) {
  const n1 = noise2D(angle * 2.5 + 300, dist * 0.008 + 300) * 0.3;
  const n2 = noise2D(angle * 5.0 + 700, dist * 0.015 + 700) * 0.15;
  return n1 + n2;
}

function _normAngle(a) {
  while (a > Math.PI) a -= Math.PI * 2;
  while (a < -Math.PI) a += Math.PI * 2;
  return a;
}

// biome权重：返回预分配的静态对象 { snow, desert, jungle } 各 0~1，总和=1
// 注意：返回值是共享的静态对象，调用者如需保留值请立即复制
const _biomeWeightsResult = { snow: 0, desert: 0, jungle: 0 };
function getBiomeWeights(wx, wz) {
  const dist = Math.sqrt(wx * wx + wz * wz);
  const angle = Math.atan2(wz, wx); // -PI ~ PI

  const noiseScale = smoothstepGlobal(10, 60, dist);
  const aNoise = _biomeAngleNoise(angle, dist) * noiseScale;

  // 到每个biome中心的角度距离（加噪声扰动）
  const dSnow   = Math.abs(_normAngle(angle - BIOME_SECTOR_ANGLES.snow   + aNoise));
  const dDesert  = Math.abs(_normAngle(angle - BIOME_SECTOR_ANGLES.desert  + aNoise * 0.8));
  const dJungle  = Math.abs(_normAngle(angle - BIOME_SECTOR_ANGLES.jungle  + aNoise * 1.1));

  // 雪地半宽=PI/2(90°=占半圆), 沙漠/雨林半宽=PI/4(45°=各占四分之一圆)
  const snowHalf    = Math.PI / 2;
  const desertHalf  = Math.PI / 4;
  const jungleHalf  = Math.PI / 4;

  const wSnow   = Math.max(0, 1 - smoothstepGlobal(snowHalf   - BIOME_TRANSITION, snowHalf   + BIOME_TRANSITION, dSnow));
  const wDesert  = Math.max(0, 1 - smoothstepGlobal(desertHalf  - BIOME_TRANSITION, desertHalf  + BIOME_TRANSITION, dDesert));
  const wJungle  = Math.max(0, 1 - smoothstepGlobal(jungleHalf  - BIOME_TRANSITION, jungleHalf  + BIOME_TRANSITION, dJungle));

  const total = wSnow + wDesert + wJungle;
  if (total < 0.001) { _biomeWeightsResult.snow = 0.5; _biomeWeightsResult.desert = 0.25; _biomeWeightsResult.jungle = 0.25; }
  else { _biomeWeightsResult.snow = wSnow / total; _biomeWeightsResult.desert = wDesert / total; _biomeWeightsResult.jungle = wJungle / total; }
  return _biomeWeightsResult;
}

// 返回主要biome名称
function getBiomeName(wx, wz) {
  const w = getBiomeWeights(wx, wz);
  if (w.snow >= w.desert && w.snow >= w.jungle) return 'snow';
  if (w.jungle >= w.desert) return 'jungle';
  return 'desert';
}

// 特殊区域坐标（基于扇区布局）
// 雪地扇区方向：正北(-PI/2)，冰湖在该方向~155m处
const ICE_CENTER_X = Math.cos(BIOME_SECTOR_ANGLES.snow) * 140;
const ICE_CENTER_Z = Math.sin(BIOME_SECTOR_ANGLES.snow) * 140;
const ICE_RADIUS = 85; // 大片冰湖（参考截图面积）

// 腰果形冰湖判断（共享函数，避免重复代码）
function isInIceLake(wx, wz) {
  const nx = (wx - ICE_CENTER_X) / 1.4, nz = (wz - ICE_CENTER_Z) / 0.9;
  const dn = Math.sqrt(nx * nx + nz * nz);
  const ia = Math.atan2(nz, nx);
  const ind = 0.38 * Math.max(0, -Math.cos(ia)) * (1 + 0.3 * Math.sin(ia));
  return dn < ICE_RADIUS * (1.0 - ind);
}

// 雨林扇区方向：西南(3*PI/4)，泥潭在该方向不同距离处
const _jungleDir = BIOME_SECTOR_ANGLES.jungle;
const MUD_PITS = [
  { x: Math.cos(_jungleDir - 0.15) * 130, z: Math.sin(_jungleDir - 0.15) * 130, r: 15, depth: 1.5 },
  { x: Math.cos(_jungleDir + 0.2) * 160,  z: Math.sin(_jungleDir + 0.2) * 160,  r: 12, depth: 1.2 },
  { x: Math.cos(_jungleDir - 0.3) * 100,  z: Math.sin(_jungleDir - 0.3) * 100,  r: 10, depth: 1.0 },
];

// 地面摩擦系数：影响抓地力
// 返回预分配静态对象 { grip: 0~1, drag: 额外阻力系数 }
const _surfacePropsResult = { grip: 1, drag: 0 };
function getSurfaceProperties(wx, wz) {
  const biome = getBiomeName(wx, wz);

  // 基础属性
  let grip = 1.0, drag = 0;

  if (biome === 'snow') {
    grip = 0.75;  // 雪地抓地力稍低
    drag = 0.18;  // 雪地阻力轻微（可感知但不吃力）
    // 冰面区域（腰果形，精确匹配视觉边界，不提前生效）
    {
      const _nx = (wx - ICE_CENTER_X) / 1.4, _nz = (wz - ICE_CENTER_Z) / 0.9;
      const _dn = Math.sqrt(_nx * _nx + _nz * _nz);
      const _ia = Math.atan2(_nz, _nx);
      const _ind = 0.38 * Math.max(0, -Math.cos(_ia)) * (1 + 0.3 * Math.sin(_ia));
      const _ir = ICE_RADIUS * (1.0 - _ind);
      if (_dn < _ir) {
        // 只有进入视觉冰面范围才生效，grip 提高到 0.42（有附着力但会漂移）
        grip = 0.42; drag = 0.04;
      }
    }
  } else if (biome === 'jungle') {
    grip = 0.85;  // 潮湿地面
    drag = 0.15;
    // 泥潭区域
    for (const pit of MUD_PITS) {
      const dist = Math.sqrt((wx - pit.x) ** 2 + (wz - pit.z) ** 2);
      if (dist < pit.r) {
        const mudBlend = 1 - smoothstepGlobal(pit.r - 5, pit.r, dist);
        grip = grip * (1 - mudBlend) + 0.45 * mudBlend;
        drag = drag * (1 - mudBlend) + 1.2 * mudBlend;
      }
    }
  }
  // 沙漠/海滩/海水区域
  if (biome === 'desert') {
    const depth = typeof getWaterDepth === 'function' ? getWaterDepth(wx, wz) : 0;
    if (depth <= 0) {
      // 干沙滩
      grip = 0.88; drag = 0.12;
    } else if (depth < 0.3) {
      // 浅水（可行驶，阻力增加）
      grip = 0.65; drag = 0.5 + depth * 2;
    } else if (depth < 0.8) {
      // 较深水（勉强可行驶，严重减速）
      grip = 0.4; drag = 2.0 + depth * 3;
    } else {
      // 深水（极大阻力）
      grip = 0.2; drag = 5.0;
    }
  }

  // 道路加成（在路上grip最好、drag最低）
  if (typeof getRoadSurfaceBonus === 'function') {
    const bonus = getRoadSurfaceBonus(wx, wz);
    grip = Math.min(1, grip + bonus.gripBonus);
    drag = Math.max(0, drag * (1 - bonus.dragReduction));
  }

  // 越野路线加成（在路上grip更好、drag更低）
  if (typeof getTrailSurfaceBonus === 'function') {
    const bonus = getTrailSurfaceBonus(wx, wz);
    grip = Math.min(1, grip + bonus.gripBonus);
    drag = Math.max(0, drag * (1 - bonus.dragReduction));
  }

  _surfacePropsResult.grip = grip;
  _surfacePropsResult.drag = drag;
  return _surfacePropsResult;
}

function smoothstepGlobal(edge0, edge1, x) {
  const t = Math.max(0, Math.min(1, (x - edge0) / (edge1 - edge0)));
  return t * t * (3 - 2 * t);
}

const DAY_DURATION_SEC = 300; // 5分钟 = 1天

// ============================================================
// TERRAIN HEIGHT FUNCTION (全局可用) — biome-aware
// ============================================================
const TERRAIN_SCALE = 0.008;  // 噪声缩放（越小=沙丘越宽）
const TERRAIN_HEIGHT = 8;     // 最大高度起伏
const TERRAIN_DETAIL = 0.03;  // 细节噪声缩放
const TERRAIN_DETAIL_H = 1.5; // 细节高度

// ---- 石块数据 ----
// 每块石头: { x, z, radius, height, seed }
// radius = 水平半径，height = 顶部高度（坡度 = height/radius，保持缓坡）
const rocks = [];
{
  // 伪随机种子函数（确定性，不用Math.random以便地形一致）
  function seededRand(seed) {
    let s = seed;
    return function() {
      s = (s * 16807 + 0) % 2147483647;
      return (s & 0x7fffffff) / 0x7fffffff;
    };
  }
  const rng = seededRand(42);

  // 小石块（车轮一半大小~车轮大小）: 很多，散布广
  for (let i = 0; i < 120; i++) {
    const angle = rng() * Math.PI * 2;
    const dist = 35 + rng() * 180; // 35m~215m，避开出生区
    const r = 0.2 + rng() * 0.4;   // 半径0.2~0.6
    const h = r * (0.3 + rng() * 0.3); // 高度=半径的30%~60%（缓坡）
    rocks.push({ x: Math.cos(angle) * dist, z: Math.sin(angle) * dist, radius: r, height: h, seed: rng() });
  }
  // 中石块（车身大小）
  for (let i = 0; i < 50; i++) {
    const angle = rng() * Math.PI * 2;
    const dist = 40 + rng() * 180;
    const r = 1.0 + rng() * 2.0;   // 半径1~3
    const h = r * (0.25 + rng() * 0.2); // 高度=半径的25%~45%
    rocks.push({ x: Math.cos(angle) * dist, z: Math.sin(angle) * dist, radius: r, height: h, seed: rng() });
  }
  // 大石块（小山）
  for (let i = 0; i < 15; i++) {
    const angle = rng() * Math.PI * 2;
    const dist = 60 + rng() * 150;
    const r = 5.0 + rng() * 7.0;   // 半径5~12
    const h = r * (0.15 + rng() * 0.15); // 高度=半径的15%~30%（大石坡度更缓）
    rocks.push({ x: Math.cos(angle) * dist, z: Math.sin(angle) * dist, radius: r, height: h, seed: rng() });
  }
  // 巨型石块（山丘级别）
  for (let i = 0; i < 5; i++) {
    const angle = rng() * Math.PI * 2;
    const dist = 80 + rng() * 130;
    const r = 15.0 + rng() * 15.0;  // 半径15~30
    const h = r * (0.1 + rng() * 0.1); // 高度=半径的10%~20%（极缓坡）
    rocks.push({ x: Math.cos(angle) * dist, z: Math.sin(angle) * dist, radius: r, height: h, seed: rng() });
  }
}

// 空间哈希加速石块查询 — 用数值key避免GC
const ROCK_CELL = 16;
const ROCK_GRID_SHIFT = 1000;
const rockGrid = new Map();
for (const rock of rocks) {
  const minCX = Math.floor((rock.x - rock.radius) / ROCK_CELL) + ROCK_GRID_SHIFT;
  const maxCX = Math.floor((rock.x + rock.radius) / ROCK_CELL) + ROCK_GRID_SHIFT;
  const minCZ = Math.floor((rock.z - rock.radius) / ROCK_CELL) + ROCK_GRID_SHIFT;
  const maxCZ = Math.floor((rock.z + rock.radius) / ROCK_CELL) + ROCK_GRID_SHIFT;
  for (let cx = minCX; cx <= maxCX; cx++) {
    for (let cz = minCZ; cz <= maxCZ; cz++) {
      const key = cx * 100000 + cz;
      let cell = rockGrid.get(key);
      if (!cell) { cell = []; rockGrid.set(key, cell); }
      cell.push(rock);
    }
  }
}

function getRockHeight(wx, wz) {
  const cx = Math.floor(wx / ROCK_CELL) + ROCK_GRID_SHIFT;
  const cz = Math.floor(wz / ROCK_CELL) + ROCK_GRID_SHIFT;
  const key = cx * 100000 + cz;
  const cell = rockGrid.get(key);
  if (!cell) return 0;
  let maxH = 0;
  for (let i = 0; i < cell.length; i++) {
    const rock = cell[i];
    const dx = wx - rock.x, dz = wz - rock.z;
    // 快速排除（用boundRadius，比radius稍大以覆盖旋转后的范围）
    const br = rock.radius * 1.15;
    if (dx * dx + dz * dz >= br * br) continue;
    // 从rock的heightmap采样
    const hm = rock.heightmap;
    if (!hm) continue;
    // 世界坐标 → heightmap局部坐标（考虑旋转）
    const cosR = rock._cosR, sinR = rock._sinR;
    const lx = dx * cosR + dz * sinR;  // 旋转到石头局部空间
    const lz = -dx * sinR + dz * cosR;
    // 局部坐标 → heightmap网格索引（局部范围 [-radius, +radius]）
    const r = rock.radius;
    const res = hm.res;
    const gx = (lx / r * 0.5 + 0.5) * (res - 1);
    const gz = (lz / r * 0.5 + 0.5) * (res - 1);
    if (gx < 0 || gx >= res - 1 || gz < 0 || gz >= res - 1) continue;
    // 双线性插值
    const ix = Math.floor(gx), iz = Math.floor(gz);
    const fx = gx - ix, fz = gz - iz;
    const d = hm.data;
    const h00 = d[iz * res + ix];
    const h10 = d[iz * res + ix + 1];
    const h01 = d[(iz + 1) * res + ix];
    const h11 = d[(iz + 1) * res + ix + 1];
    const h = (h00 * (1 - fx) + h10 * fx) * (1 - fz) + (h01 * (1 - fx) + h11 * fx) * fz;
    if (h > maxH) maxH = h;
  }
  return maxH;
}

// ============================================================
// 阶梯式地形高度系统（平缓版）
// 海底 < 海面(-2.5) < 海滩(0~2) < 雨林(2~8) < 冰雪(4~15+)
// 雨林和雪地海拔差缩小，保证车子能开上去
// 海滩到海水过渡平缓，车子可以开到浅水区
// ============================================================
const BIOME_BASE = { desert: 0, jungle: 2, snow: 4 };

// ---- 原始地形高度（含所有噪声计算，仅用于预计算高度场）----
function _getTerrainHeightRaw(wx, wz) {
  const bw = getBiomeWeights(wx, wz);
  const distFromCenter = Math.sqrt(wx * wx + wz * wz);
  const flattenFactor = Math.min(1, distFromCenter / 30);
  let h = 0;
  if (bw.desert > 0.05) {
    const dist2 = distFromCenter;
    const beachEnd = 120, shallowStart = 140, deepStart = 200;
    const beachH = BIOME_BASE.desert + Math.abs(fbm(wx * 0.008, wz * 0.008, 2, 2.0, 0.5)) * 1.8 + 0.3;
    const seaBedH = SEA_LEVEL - 1.5 - Math.abs(fbm(wx * 0.005 + 200, wz * 0.005 + 200, 2, 2.0, 0.5)) * 1.5;
    let desertH;
    if (dist2 < beachEnd) desertH = beachH;
    else if (dist2 < shallowStart) { const t = smoothstepGlobal(beachEnd, shallowStart, dist2); desertH = beachH * (1-t) + (SEA_LEVEL+0.5) * t; }
    else if (dist2 < deepStart) { const t = smoothstepGlobal(shallowStart, deepStart, dist2); desertH = (SEA_LEVEL+0.5) * (1-t) + seaBedH * t; }
    else desertH = seaBedH;
    h += desertH * bw.desert;
  }
  if (bw.jungle > 0.05) {
    const noise1 = Math.abs(fbm(wx * 0.01 - 500, wz * 0.01 - 500, 3, 2.0, 0.55)) * 5;
    const noise2 = Math.abs(fbm(wx * 0.04 - 500, wz * 0.04 - 500, 2, 2.5, 0.4)) * 1.5;
    h += (BIOME_BASE.jungle + noise1 + noise2) * bw.jungle;
  }
  if (bw.snow > 0.05) {
    const noise1 = Math.abs(fbm(wx * 0.006 + 500, wz * 0.006 + 500, 3, 2.0, 0.5)) * 6;
    const noise2 = Math.abs(fbm(wx * 0.025 + 500, wz * 0.025 + 500, 2, 2.5, 0.4)) * 2;
    let snowH = BIOME_BASE.snow + noise1 + noise2;
    snowH += getSnowHillHeight(wx, wz);
    h += snowH * bw.snow;
  }
  h *= flattenFactor;
  { // 冰湖
    const iceDx = wx - ICE_CENTER_X, iceDz = wz - ICE_CENTER_Z;
    const nx = iceDx / 1.4, nz = iceDz / 0.9;
    const distNorm = Math.sqrt(nx * nx + nz * nz);
    const iceAngle = Math.atan2(nz, nx);
    const indent = 0.38 * Math.max(0, -Math.cos(iceAngle)) * (1 + 0.3 * Math.sin(iceAngle));
    const iceR = ICE_RADIUS * (1.0 - indent);
    const iceLevel = BIOME_BASE.snow + 2.0;
    if (distNorm <= iceR * 0.85) h = iceLevel;
    else if (distNorm < iceR * 2.0) { const t = smoothstepGlobal(iceR * 0.85, iceR * 2.0, distNorm); h = iceLevel * (1-t) + h * t; }
  }
  { // 道路
    const roadDist = getTrailDistance(wx, wz);
    const roadWidth = 10;
    if (roadDist < roadWidth + 5) {
      const flatBlend = 1 - smoothstepGlobal(roadWidth - 2, roadWidth + 5, roadDist);
      const rampH = distFromCenter * 0.05;
      const roadH = Math.min(h, rampH);
      h = h * (1 - flatBlend) + roadH * flatBlend;
    }
  }
  return h; // 注意：不含石块高度（石块高度在getTerrainHeight中单独加）
}

// ============================================================
// 预计算高度场（类似Rapier的heightfield）
// 声明+查询函数先定义，实际预计算在getTrailDistance之后执行
// ============================================================
const HF_SIZE = 512;            // 高度场分辨率（512²=26万，预计算<1秒）
const HF_WORLD = 550;           // 覆盖世界范围: [-275, +275]
const HF_HALF = HF_WORLD / 2;
const HF_CELL = HF_WORLD / HF_SIZE; // 每格约1.07m
const HF_DATA = new Float32Array(HF_SIZE * HF_SIZE);
let _hfReady = false;

// 运行时地形高度查询：双线性插值（极快）
// 高度场未就绪时回退到原始计算（仅初始化阶段）
function getTerrainHeight(wx, wz) {
  if (!_hfReady) return _getTerrainHeightRaw(wx, wz) + getRockHeight(wx, wz);
  // 世界坐标 → 高度场网格坐标
  const gx = (wx + HF_HALF) / HF_WORLD * (HF_SIZE - 1);
  const gz = (wz + HF_HALF) / HF_WORLD * (HF_SIZE - 1);
  // 边界钳制
  const gxc = Math.max(0, Math.min(HF_SIZE - 2, gx));
  const gzc = Math.max(0, Math.min(HF_SIZE - 2, gz));
  const ix = gxc | 0, iz = gzc | 0; // 快速取整
  const fx = gxc - ix, fz = gzc - iz;
  // 双线性插值
  const h00 = HF_DATA[iz * HF_SIZE + ix];
  const h10 = HF_DATA[iz * HF_SIZE + ix + 1];
  const h01 = HF_DATA[(iz + 1) * HF_SIZE + ix];
  const h11 = HF_DATA[(iz + 1) * HF_SIZE + ix + 1];
  const h = (h00 * (1 - fx) + h10 * fx) * (1 - fz) + (h01 * (1 - fx) + h11 * fx) * fz;
  // 石块高度叠加
  return h + getRockHeight(wx, wz);
}

// 雪丘系统 — 大面积起伏的雪山丘（取代原来的螺旋公路尖柱）
// 预生成雪丘位置（确定性随机）
const SNOW_HILLS = [];
{
  let _shSeed = 777;
  function _shRng() { _shSeed = (_shSeed * 16807) % 2147483647; return (_shSeed & 0x7fffffff) / 0x7fffffff; }
  const snowDir = BIOME_SECTOR_ANGLES.snow;
  for (let i = 0; i < 18; i++) {
    const a = snowDir + (_shRng() - 0.5) * 1.4; // 在雪地扇区内散布
    const d = 50 + _shRng() * 160;
    SNOW_HILLS.push({
      x: Math.cos(a) * d, z: Math.sin(a) * d,
      rx: 15 + _shRng() * 25,   // 水平半径 15~40m
      rz: 15 + _shRng() * 25,
      h: 3 + _shRng() * 9,      // 高度 3~12m（有些缓能上，有些陡上不去）
      rot: _shRng() * Math.PI,   // 随机朝向
    });
  }
}

// 预计算雪丘的AABB包围半径（用于快速排除）和cos/sin
for (const hill of SNOW_HILLS) {
  hill._boundR2 = Math.max(hill.rx, hill.rz); // 最大轴半径
  hill._boundR2 *= hill._boundR2; // 平方，用于距离快速比较
  hill._cosR = Math.cos(hill.rot);
  hill._sinR = Math.sin(hill.rot);
}
// 查询雪丘在 (wx,wz) 的附加高度（含AABB预筛选）
function getSnowHillHeight(wx, wz) {
  let maxH = 0;
  for (let _hi = 0; _hi < SNOW_HILLS.length; _hi++) {
    const hill = SNOW_HILLS[_hi];
    const dx = wx - hill.x, dz = wz - hill.z;
    // AABB快速排除：距离平方 > 最大轴半径平方 → 不可能在椭圆内
    if (dx * dx + dz * dz > hill._boundR2) continue;
    // 旋转到丘体局部空间（用预计算的cos/sin）
    const lx = dx * hill._cosR + dz * hill._sinR;
    const lz = -dx * hill._sinR + dz * hill._cosR;
    // 椭圆距离
    const ex = lx / hill.rx, ez = lz / hill.rz;
    const d2 = ex * ex + ez * ez;
    if (d2 >= 1) continue;
    // cos型平滑山丘（顶部圆润）
    const t = Math.sqrt(d2);
    const h = hill.h * (0.5 + 0.5 * Math.cos(t * Math.PI));
    if (h > maxH) maxH = h;
  }
  return maxH;
}

// getSnowRoadHeight 保留接口但返回null（不再有螺旋公路）
function getSnowRoadHeight() { return null; }

const _terrainNormal = new THREE.Vector3();
function getTerrainNormal(wx, wz) {
  const eps = 0.3;
  const hL = getTerrainHeight(wx - eps, wz);
  const hR = getTerrainHeight(wx + eps, wz);
  const hD = getTerrainHeight(wx, wz - eps);
  const hU = getTerrainHeight(wx, wz + eps);
  return _terrainNormal.set(hL - hR, 2 * eps, hD - hU).normalize();
}

// TRAIL/ROAD PATH — 定义在terrain mesh之前，以便地形生成时使用
// ============================================================
const TRAIL_POINTS = [];
{
  const _sA = BIOME_SECTOR_ANGLES.snow;
  const _dA = BIOME_SECTOR_ANGLES.desert;
  const _jA = BIOME_SECTOR_ANGLES.jungle;
  const _pt = (angle, dist, perpOffset) => ({
    x: Math.cos(angle) * dist + Math.cos(angle + Math.PI/2) * (perpOffset || 0),
    z: Math.sin(angle) * dist + Math.sin(angle + Math.PI/2) * (perpOffset || 0),
  });
  const nodes = [
    { x: 10, z: 5 },
    _pt(_sA, 40, 8),
    _pt(_sA, 80, -10),
    _pt(_sA, 120, 5),
    _pt(_sA, 170, -8),
    _pt(_sA, 130, 15),
    _pt(_sA, 70, 0),
    { x: 5, z: -5 },
    _pt(_dA, 45, -5),
    _pt(_dA, 90, 10),
    _pt(_dA, 140, -8),
    _pt(_dA, 185, 5),
    _pt(_dA, 130, -12),
    _pt(_dA, 65, 6),
    { x: -8, z: 3 },
    _pt(_jA, 50, 7),
    _pt(_jA, 95, -10),
    _pt(_jA, 135, 8),
    _pt(_jA, 180, -5),
    _pt(_jA, 140, -15),
    _pt(_jA, 75, 0),
    { x: -5, z: -3 },
  ];
  for (let i = 0; i < nodes.length - 1; i++) {
    const p0 = nodes[Math.max(0, i - 1)];
    const p1 = nodes[i];
    const p2 = nodes[i + 1];
    const p3 = nodes[Math.min(nodes.length - 1, i + 2)];
    for (let t = 0; t < 1; t += 0.05) {
      const t2 = t * t, t3 = t2 * t;
      const x = 0.5 * ((2 * p1.x) + (-p0.x + p2.x) * t + (2 * p0.x - 5 * p1.x + 4 * p2.x - p3.x) * t2 + (-p0.x + 3 * p1.x - 3 * p2.x + p3.x) * t3);
      const z = 0.5 * ((2 * p1.z) + (-p0.z + p2.z) * t + (2 * p0.z - 5 * p1.z + 4 * p2.z - p3.z) * t2 + (-p0.z + 3 * p1.z - 3 * p2.z + p3.z) * t3);
      TRAIL_POINTS.push({ x, z });
    }
  }
  TRAIL_POINTS.push(nodes[nodes.length - 1]);
}

// ---- 打卡点支路（从主路分支到每个打卡点位置）----
// 在CHECKPOINTS定义之前不能直接引用，所以用角度/距离预计算位置
{
  const _sA = BIOME_SECTOR_ANGLES.snow;
  const _dA = BIOME_SECTOR_ANGLES.desert;
  const _jA = BIOME_SECTOR_ANGLES.jungle;
  // 打卡点坐标（和CHECKPOINTS定义一致）
  const cpPositions = [
    // 雨林 4 个
    { x: Math.cos(_jA - 0.3) * 70, z: Math.sin(_jA - 0.3) * 70 },
    { x: Math.cos(_jA + 0.1) * 120, z: Math.sin(_jA + 0.1) * 120 },
    { x: Math.cos(_jA + 0.35) * 90, z: Math.sin(_jA + 0.35) * 90 },
    { x: Math.cos(_jA - 0.15) * 150, z: Math.sin(_jA - 0.15) * 150 },
    // 冰雪 3 个（冰雪1在冰湖中心）
    { x: ICE_CENTER_X, z: ICE_CENTER_Z },
    { x: Math.cos(_sA + 0.2) * 130, z: Math.sin(_sA + 0.2) * 130 },
    { x: Math.cos(_sA + 0.5) * 100, z: Math.sin(_sA + 0.5) * 100 },
    // 海滩 1 个
    { x: Math.cos(_dA) * 60, z: Math.sin(_dA) * 60 },
  ];

  // 为每个打卡点找到主路上最近的点，生成支路
  for (const cp of cpPositions) {
    // 找主路最近点
    let bestDist = Infinity, bestIdx = 0;
    for (let i = 0; i < TRAIL_POINTS.length; i++) {
      const dx = TRAIL_POINTS[i].x - cp.x, dz = TRAIL_POINTS[i].z - cp.z;
      const d = dx * dx + dz * dz;
      if (d < bestDist) { bestDist = d; bestIdx = i; }
    }
    const nearest = TRAIL_POINTS[bestIdx];
    // 如果已经很近（<15m），不需要额外支路
    if (Math.sqrt(bestDist) < 15) continue;
    // 生成支路：主路点 → 中间点 → 打卡点
    const midX = (nearest.x + cp.x) / 2 + (Math.random() - 0.5) * 10;
    const midZ = (nearest.z + cp.z) / 2 + (Math.random() - 0.5) * 10;
    const branchNodes = [nearest, { x: midX, z: midZ }, cp];
    // Catmull-Rom 插值
    for (let i = 0; i < branchNodes.length - 1; i++) {
      const p0 = branchNodes[Math.max(0, i - 1)];
      const p1 = branchNodes[i];
      const p2 = branchNodes[i + 1];
      const p3 = branchNodes[Math.min(branchNodes.length - 1, i + 2)];
      for (let t = 0; t < 1; t += 0.1) {
        const t2 = t * t, t3 = t2 * t;
        const x = 0.5 * ((2*p1.x) + (-p0.x+p2.x)*t + (2*p0.x-5*p1.x+4*p2.x-p3.x)*t2 + (-p0.x+3*p1.x-3*p2.x+p3.x)*t3);
        const z = 0.5 * ((2*p1.z) + (-p0.z+p2.z)*t + (2*p0.z-5*p1.z+4*p2.z-p3.z)*t2 + (-p0.z+3*p1.z-3*p2.z+p3.z)*t3);
        TRAIL_POINTS.push({ x, z });
      }
    }
    TRAIL_POINTS.push(cp);
  }
}

// 道路空间网格（加速getTrailDistance查找）— 用数值key避免GC
const TRAIL_GRID_CELL = 20; // 20m格子
const TRAIL_GRID_SHIFT = 10000; // 坐标偏移避免负数key
const trailGrid = new Map();
for (let i = 0; i < TRAIL_POINTS.length; i++) {
  const cx = Math.floor(TRAIL_POINTS[i].x / TRAIL_GRID_CELL) + TRAIL_GRID_SHIFT;
  const cz = Math.floor(TRAIL_POINTS[i].z / TRAIL_GRID_CELL) + TRAIL_GRID_SHIFT;
  const key = cx * 100000 + cz;
  let cell = trailGrid.get(key);
  if (!cell) { cell = []; trailGrid.set(key, cell); }
  cell.push(i);
}

function getTrailDistance(wx, wz) {
  const cx = Math.floor(wx / TRAIL_GRID_CELL) + TRAIL_GRID_SHIFT;
  const cz = Math.floor(wz / TRAIL_GRID_CELL) + TRAIL_GRID_SHIFT;
  let minDist = Infinity;
  for (let dx = -1; dx <= 1; dx++) {
    for (let dz = -1; dz <= 1; dz++) {
      const key = (cx+dx) * 100000 + (cz+dz);
      const cell = trailGrid.get(key);
      if (!cell) continue;
      for (let k = 0; k < cell.length; k++) {
        const p = TRAIL_POINTS[cell[k]];
        const ddx = wx - p.x, ddz = wz - p.z;
        const d = ddx * ddx + ddz * ddz;
        if (d < minDist) minDist = d;
      }
    }
  }
  return minDist < Infinity ? Math.sqrt(minDist) : 999;
}

const _roadBonusResult = { gripBonus: 0, dragReduction: 0 };
function getRoadSurfaceBonus(wx, wz) {
  const dist = getTrailDistance(wx, wz);
  const roadWidth = 6;
  if (dist > roadWidth) { _roadBonusResult.gripBonus = 0; _roadBonusResult.dragReduction = 0; return _roadBonusResult; }
  const blend = 1 - smoothstepGlobal(roadWidth - 2, roadWidth, dist);
  _roadBonusResult.gripBonus = 0.35 * blend;
  _roadBonusResult.dragReduction = 0.85 * blend;
  return _roadBonusResult;
}

function getTrailSurfaceBonus(wx, wz) {
  return getRoadSurfaceBonus(wx, wz);
}

// TERRAIN MESH — CPU地形（优化版：低段数+大间距重建+匹配噪声）
// ============================================================
const TERRAIN_SEG = 96;
const TERRAIN_RADIUS = 250;
const TERRAIN_MESH_SIZE = TERRAIN_RADIUS * 2;
const TERRAIN_REGEN_DIST = 80;

const terrainGeo = new THREE.PlaneGeometry(TERRAIN_MESH_SIZE, TERRAIN_MESH_SIZE, TERRAIN_SEG, TERRAIN_SEG);
terrainGeo.rotateX(-Math.PI / 2);

const terrainPos = terrainGeo.getAttribute('position');
const vertexColors = new Float32Array(terrainPos.count * 3);

const SNOW_COLOR = new THREE.Color(0.92, 0.94, 0.96);
const DESERT_COLOR = new THREE.Color(0.85, 0.75, 0.55);  // 海滩沙色
const SEABED_COLOR = new THREE.Color(0.15, 0.30, 0.35);  // 海底深蓝绿
const SHALLOW_COLOR = new THREE.Color(0.25, 0.50, 0.50); // 浅水蓝绿
const JUNGLE_COLOR = new THREE.Color(0.25, 0.52, 0.18);
const ICE_COLOR = new THREE.Color(0.75, 0.88, 0.95);
const MUD_COLOR = new THREE.Color(0.28, 0.22, 0.14);
const ROAD_COLOR = new THREE.Color(0.45, 0.42, 0.40);
const STREAM_COLOR = new THREE.Color(0.20, 0.35, 0.25);
const _tmpCol = new THREE.Color();
const _tmpCol2 = new THREE.Color(); // 水深颜色混合用

const _vertexColorResult = { r: 0, g: 0, b: 0 };
function computeVertexColor(x, z) {
  const bw = getBiomeWeights(x, z);
  // 海洋/海滩区域根据距离估算水深（避免调用昂贵的getTerrainHeight）
  let dCol = DESERT_COLOR;
  if (bw.desert > 0.01) {
    const distC = Math.sqrt(x * x + z * z);
    if (distC > 160) dCol = SEABED_COLOR;
    else if (distC > 120) { const t = (distC - 120) / 40; _tmpCol2.copy(DESERT_COLOR).lerp(SHALLOW_COLOR, t); dCol = _tmpCol2; }
  }
  _tmpCol.setRGB(
    SNOW_COLOR.r*bw.snow + dCol.r*bw.desert + JUNGLE_COLOR.r*bw.jungle,
    SNOW_COLOR.g*bw.snow + dCol.g*bw.desert + JUNGLE_COLOR.g*bw.jungle,
    SNOW_COLOR.b*bw.snow + dCol.b*bw.desert + JUNGLE_COLOR.b*bw.jungle
  );
  if (bw.snow > 0.3) {
    const distIce = Math.sqrt((x-ICE_CENTER_X)**2 + (z-ICE_CENTER_Z)**2);
    if (distIce < ICE_RADIUS) { const ib = 1-smoothstepGlobal(ICE_RADIUS-8,ICE_RADIUS,distIce); _tmpCol.lerp(ICE_COLOR,ib*bw.snow); }
    const shH = getSnowHillHeight(x,z);
    if (shH > 1) _tmpCol.lerp(SNOW_COLOR, Math.min(1,shH/6)*0.5);
  }
  if (bw.jungle > 0.3) {
    for (const pit of MUD_PITS) { const d=Math.sqrt((x-pit.x)**2+(z-pit.z)**2); if(d<pit.r){const mb=1-smoothstepGlobal(pit.r-5,pit.r,d);_tmpCol.lerp(MUD_COLOR,mb*bw.jungle);} }
    // 雨林深浅变化（去掉了溪流水面效果）
    const af=0.8+noise2D(x*0.05,z*0.05)*0.3; _tmpCol.r*=af;_tmpCol.g*=af;_tmpCol.b*=af;
  }
  // 道路着色（加宽+更明显的灰色，带深色边线）
  {
    const rd = getTrailDistance(x, z);
    if (rd < 10) {
      if (rd < 5) {
        // 路面中心：强烈灰色覆盖
        const rb = 1 - smoothstepGlobal(2, 5, rd);
        _tmpCol.lerp(ROAD_COLOR, rb * 0.85);
      } else {
        // 路肩：稍深色过渡
        const rb = 1 - smoothstepGlobal(5, 10, rd);
        const edgeColor = { r: ROAD_COLOR.r * 0.7, g: ROAD_COLOR.g * 0.7, b: ROAD_COLOR.b * 0.7 };
        _tmpCol.r = _tmpCol.r * (1 - rb * 0.4) + edgeColor.r * rb * 0.4;
        _tmpCol.g = _tmpCol.g * (1 - rb * 0.4) + edgeColor.g * rb * 0.4;
        _tmpCol.b = _tmpCol.b * (1 - rb * 0.4) + edgeColor.b * rb * 0.4;
      }
    }
  }
  _vertexColorResult.r = _tmpCol.r; _vertexColorResult.g = _tmpCol.g; _vertexColorResult.b = _tmpCol.b;
  return _vertexColorResult;
}

let terrainCenterX = 0, terrainCenterZ = 0;

// ============================================================
// 双缓冲异步地形重建系统
// - 两份 geometry（A/B），当前显示 A
// - 需要重建时，在 B 上逐帧填充
// - 填充完毕后一次性 swap geometry，避免闪烁
// ============================================================
const TERRAIN_CHUNK_SIZE = 4800; // 高度场查询极快，约2帧完成全部9409顶点

// 创建第二份 geometry 用于后台填充
const terrainGeoB = new THREE.PlaneGeometry(TERRAIN_MESH_SIZE, TERRAIN_MESH_SIZE, TERRAIN_SEG, TERRAIN_SEG);
terrainGeoB.rotateX(-Math.PI / 2);
const vertexColorsB = new Float32Array(terrainGeoB.getAttribute('position').count * 3);
terrainGeoB.setAttribute('color', new THREE.BufferAttribute(vertexColorsB, 3));

// 当前活跃 geometry 索引（0=A, 1=B）
let activeGeoIdx = 0;
const terrainGeos = [terrainGeo, terrainGeoB];

const terrainRegen = {
  active: false,
  centerX: 0, centerZ: 0,
  cursor: 0,
  total: 0,
  targetGeoIdx: 1,  // 正在填充哪份 geometry
};

// 填充一份 geometry 的指定顶点范围
function _fillTerrainVerts(geo, cx, cz, startIdx, endIdx) {
  const posAttr = geo.getAttribute('position');
  const colorAttr = geo.getAttribute('color');
  for (let i = startIdx; i < endIdx; i++) {
    const lx = posAttr.getX(i), lz = posAttr.getZ(i);
    const wx = lx + cx, wz = lz + cz;
    const localDist = Math.sqrt(lx * lx + lz * lz);
    const edgeFade = 1 - smoothstepGlobal(TERRAIN_RADIUS - 30, TERRAIN_RADIUS, localDist);
    const h = getTerrainHeight(wx, wz);
    posAttr.setY(i, h * edgeFade);
    const bw = getBiomeWeights(wx, wz);
    colorAttr.setXYZ(i,
      0.92 * bw.snow + 0.83 * bw.desert + 0.25 * bw.jungle,
      0.94 * bw.snow + 0.63 * bw.desert + 0.52 * bw.jungle,
      0.96 * bw.snow + 0.33 * bw.desert + 0.18 * bw.jungle
    );
  }
}

// 启动异步重建（在后台 geometry 上）
function startTerrainRegenAsync(centerX, centerZ) {
  if (terrainRegen.active) return; // 已经在重建中
  const targetIdx = 1 - activeGeoIdx; // 选择非活跃的 geometry
  terrainRegen.active = true;
  terrainRegen.centerX = centerX;
  terrainRegen.centerZ = centerZ;
  terrainRegen.cursor = 0;
  terrainRegen.total = terrainGeos[targetIdx].getAttribute('position').count;
  terrainRegen.targetGeoIdx = targetIdx;
}

// 每帧 tick：处理一批顶点
function tickTerrainRegen() {
  if (!terrainRegen.active) return;
  const geo = terrainGeos[terrainRegen.targetGeoIdx];
  const cx = terrainRegen.centerX, cz = terrainRegen.centerZ;
  const end = Math.min(terrainRegen.cursor + TERRAIN_CHUNK_SIZE, terrainRegen.total);

  _fillTerrainVerts(geo, cx, cz, terrainRegen.cursor, end);
  terrainRegen.cursor = end;

  if (terrainRegen.cursor >= terrainRegen.total) {
    // 后台 geometry 填充完毕 → 计算法线 → swap
    const posAttr = geo.getAttribute('position');
    const colorAttr = geo.getAttribute('color');
    posAttr.needsUpdate = true;
    colorAttr.needsUpdate = true;
    geo.computeVertexNormals();

    // Swap: terrain mesh 切换到新 geometry
    terrain.geometry = geo;
    terrainCenterX = terrainRegen.centerX;
    terrainCenterZ = terrainRegen.centerZ;
    terrain.position.set(terrainCenterX, 0, terrainCenterZ);
    activeGeoIdx = terrainRegen.targetGeoIdx;

    if (typeof updateRockVisibility === 'function') updateRockVisibility();
    terrainRegen.active = false;
  }
}

// 同步版本仅用于初始加载（第一次必须全部完成）
function regenerateTerrainSync(centerX, centerZ) {
  terrainCenterX = centerX; terrainCenterZ = centerZ;
  const geo = terrainGeos[activeGeoIdx];
  const posAttr = geo.getAttribute('position');
  const count = posAttr.count;
  _fillTerrainVerts(geo, centerX, centerZ, 0, count);
  posAttr.needsUpdate = true;
  geo.getAttribute('color').needsUpdate = true;
  geo.computeVertexNormals();
  if (typeof updateRockVisibility === 'function') updateRockVisibility();
}

function createTireTexture() {
  const cvs = document.createElement('canvas');
  cvs.width = 64; cvs.height = 128;
  const ctx = cvs.getContext('2d');
  ctx.clearRect(0, 0, 64, 128);
  const blockH = 16;
  for (let row = 0; row < 128; row += blockH) {
    const even = (row / blockH) % 2 === 0;
    ctx.fillStyle = 'rgba(50, 45, 38, 255)';
    ctx.beginPath();
    if (even) { ctx.moveTo(0, row+3); ctx.lineTo(27, row+1); ctx.lineTo(27, row+blockH-3); ctx.lineTo(0, row+blockH-1); }
    else { ctx.moveTo(0, row+1); ctx.lineTo(27, row+3); ctx.lineTo(27, row+blockH-1); ctx.lineTo(0, row+blockH-3); }
    ctx.fill();
    ctx.beginPath();
    if (even) { ctx.moveTo(64, row+3); ctx.lineTo(37, row+1); ctx.lineTo(37, row+blockH-3); ctx.lineTo(64, row+blockH-1); }
    else { ctx.moveTo(64, row+1); ctx.lineTo(37, row+3); ctx.lineTo(37, row+blockH-1); ctx.lineTo(64, row+blockH-3); }
    ctx.fill();
  }
  ctx.globalCompositeOperation = 'source-atop';
  ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
  for (let row = 0; row < 128; row += blockH) { ctx.fillRect(0, row, 64, 2); ctx.fillRect(0, row+blockH-2, 64, 2); }
  ctx.globalCompositeOperation = 'source-over';
  const tex = new THREE.CanvasTexture(cvs);
  tex.wrapS = THREE.ClampToEdgeWrapping;
  tex.wrapT = THREE.RepeatWrapping;
  tex.magFilter = THREE.LinearFilter;
  tex.minFilter = THREE.LinearMipMapLinearFilter;
  return tex;
}

// ============================================================
// ROCKS — 大小不一的石块（含碰撞heightmap烘焙）
// ============================================================
{
  function rockRng(seed) {
    let s = Math.floor(seed * 2147483647) || 1;
    s = (s * 16807) % 2147483647;
    return (s & 0x7fffffff) / 0x7fffffff;
  }

  // 用于烘焙heightmap的Raycaster（从上往下打）
  const _hRay = new THREE.Raycaster();
  const _hOrigin = new THREE.Vector3();
  const _hDir = new THREE.Vector3(0, -1, 0);

  for (const rock of rocks) {
    // 根据大小选择细分层级
    const detail = rock.radius < 1 ? 1 : rock.radius < 4 ? 2 : 3;
    const geo = new THREE.DodecahedronGeometry(1, detail);
    const pos = geo.getAttribute('position');

    // 噪声扰动 + 下半球压平
    const s1 = rock.seed * 1000;
    for (let i = 0; i < pos.count; i++) {
      let vx = pos.getX(i), vy = pos.getY(i), vz = pos.getZ(i);
      const n = noise2D(vx * 2 + s1, vz * 2 + s1) * 0.2;
      const sc = 1 + n;
      vx *= sc; vy *= sc; vz *= sc;
      if (vy < 0) vy *= 0.15;
      pos.setXYZ(i, vx, vy, vz);
    }
    geo.computeVertexNormals();

    const scaleXZ = rock.radius;
    const scaleY = rock.height;

    // 颜色（根据biome调整石头颜色）
    const rockBiome = getBiomeName(rock.x, rock.z);
    const grey = 0.32 + rockRng(rock.seed) * 0.2;
    const warmth = rockRng(rock.seed + 0.1) * 0.05;
    let col;
    if (rockBiome === 'snow') {
      // 雪地石头：灰白+微蓝
      col = new THREE.Color(grey + 0.35, grey + 0.35, grey + 0.40);
    } else if (rockBiome === 'jungle') {
      // 雨林石头：苔藓覆盖，偏绿灰
      col = new THREE.Color(grey - 0.05, grey + 0.08, grey - 0.08);
    } else {
      col = new THREE.Color(grey + warmth, grey, grey - warmth * 0.5);
    }
    const mat = new THREE.MeshStandardMaterial({
      color: col,
      roughness: 0.85 + rockRng(rock.seed + 0.2) * 0.1,
      metalness: 0.02,
      flatShading: detail <= 1,
    });

    const mesh = new THREE.Mesh(geo, mat);

    // 地形基础高度：直接用 getTerrainHeight - getRockHeight，与视觉地形完全一致
    // （getRockHeight 此时只含已初始化过的石块，不含当前石块，避免循环）
    const baseH = getTerrainHeight(rock.x, rock.z) - getRockHeight(rock.x, rock.z);
    rock.baseH = baseH;

    const rotY = rockRng(rock.seed + 0.3) * Math.PI * 2;
    // 石头下沉一点确保不浮空（补偿地形网格插值误差）
    mesh.position.set(rock.x, baseH - rock.height * 0.15, rock.z);
    mesh.scale.set(scaleXZ, scaleY, scaleXZ);
    mesh.rotation.y = rotY;
    mesh.castShadow = false;  // 石块不投射阴影（节省shadow pass）
    mesh.receiveShadow = true;
    scene.add(mesh);
    rock._mesh = mesh; // 保存引用供距离裁剪用

    // 预存旋转cos/sin供getRockHeight使用
    rock._cosR = Math.cos(rotY);
    rock._sinR = Math.sin(rotY);

    // ---- 烘焙heightmap ----
    // 在石头局部空间（旋转前）从上往下raycast，记录表面高度
    // 分辨率根据大小：小石头低分辨率，大石头高分辨率
    const hmRes = rock.radius < 1 ? 5 : rock.radius < 5 ? 9 : rock.radius < 16 ? 17 : 25;
    const hmData = new Float32Array(hmRes * hmRes);

    // 临时mesh用于raycast（无旋转无位移，只有缩放）
    mesh.updateMatrixWorld(true);
    const tmpMesh = new THREE.Mesh(geo, mat);
    tmpMesh.scale.set(scaleXZ, scaleY, scaleXZ);
    tmpMesh.updateMatrixWorld(true);

    for (let iz = 0; iz < hmRes; iz++) {
      for (let ix = 0; ix < hmRes; ix++) {
        // 局部XZ坐标：[-radius, +radius]
        const lx = ((ix / (hmRes - 1)) * 2 - 1) * rock.radius;
        const lz = ((iz / (hmRes - 1)) * 2 - 1) * rock.radius;
        // 从高处往下raycast
        _hOrigin.set(lx, rock.height * 3, lz);
        _hRay.set(_hOrigin, _hDir);
        const hits = _hRay.intersectObject(tmpMesh, false);
        if (hits.length > 0) {
          // 表面Y值（相对于mesh原点Y=0=baseH）
          hmData[iz * hmRes + ix] = Math.max(0, hits[0].point.y);
        } else {
          hmData[iz * hmRes + ix] = 0;
        }
      }
    }

    rock.heightmap = { res: hmRes, data: hmData };
  }

  // 初始可见性
  updateRockVisibility();
}

// 石头可见性：隐藏在地形 edgeFade 区域内的石头，避免浮空
function updateRockVisibility() {
  for (const rock of rocks) {
    if (!rock._mesh) continue;
    const dx = rock.x - terrainCenterX;
    const dz = rock.z - terrainCenterZ;
    rock._mesh.visible = (dx * dx + dz * dz) < (TERRAIN_RADIUS - 40) * (TERRAIN_RADIUS - 40);
  }
}

function updateDayNight(dt) {
  dayNight.time += dayNight.speed * dt;
  if (dayNight.time >= 1) dayNight.time -= 1;

  const t = dayNight.time;
  const ph = dayNight.phases;

  // 找到当前所在的两个phase之间
  let a = ph[0], b = ph[1];
  for (let i = 0; i < ph.length - 1; i++) {
    if (t >= ph[i].t && t <= ph[i + 1].t) {
      a = ph[i]; b = ph[i + 1];
      break;
    }
  }
  const f = (b.t - a.t) > 0 ? (t - a.t) / (b.t - a.t) : 0;

  // 太阳位置（绕一圈）
  const sunAngle = t * Math.PI * 2 - Math.PI / 2; // 0.25=地平线, 0.5=天顶
  const sunHeight = Math.sin(sunAngle);
  const sunDist = 40;
  keyLight.position.set(
    car.pos.x + Math.cos(sunAngle) * sunDist,
    Math.max(0.5, sunHeight * sunDist),
    car.pos.z + sunDist * 0.3
  );
  keyLight.target.position.set(car.pos.x, 0, car.pos.z);

  // 插值光照
  keyLight.color.copy(lerpColor(a.sun, b.sun, f));
  keyLight.intensity = a.si + (b.si - a.si) * f;
  ambientLight.color.copy(lerpColor(a.amb, b.amb, f));
  ambientLight.intensity = a.ai + (b.ai - a.ai) * f;

  // 天空颜色
  skyMat.uniforms.uTopColor.value.copy(lerpColor(a.skyT, b.skyT, f));
  skyMat.uniforms.uHorizonColor.value.copy(lerpColor(a.skyH, b.skyH, f));

  // 色调映射曝光
  renderer.toneMappingExposure = a.exp + (b.exp - a.exp) * f;

  // 半球光跟随天空色
  hemiLight.color.copy(skyMat.uniforms.uTopColor.value);
  hemiLight.groundColor.set(0xd4a054);

    // 轻雾（沙漠热气感，不遮挡视野）
    sceneFog.color.copy(lerpColor(a.fog, b.fog, f));
    sceneFog.density = 0.004;
    scene.background = null; // 天空球代替背景色
}

let DRIVE_MASS = 1400;   // 有效驱动质量
let FUEL_MAX = 300;      // 满油秒数（可被车辆配置覆盖）
const GRAVITY = 9.81;

// ---- 6-speed auto transmission ----
const RPM_IDLE = 800;
const RPM_REDLINE = 5000;    // 表底5000转
const RPM_UPSHIFT = 2000;    // 2000转升挡
const RPM_DOWNSHIFT = 900;   // 降到900转降挡
const GEAR_RATIOS = [0, 4.0, 2.8, 2.0, 1.4, 1.0, 0.75]; // index 0=N, 1-6（配合2000转升挡）
const REVERSE_RATIOS = [0, 4.0, 2.8]; // R1, R2（和1挡2挡一样）
const FINAL_DRIVE = 3.2;
let ENGINE_TORQUE_PEAK = 1100;
function engineTorqueCurve(rpm) {
  const r = (rpm - RPM_IDLE) / (RPM_REDLINE - RPM_IDLE);
  // 低转非常饱满，峰值在中段，高转略衰减
  return 0.85 + 0.8 * r - 0.7 * r * r;
}

const BRAKE_FORCE = 22000;
const HANDBRAKE_FORCE = 28000;

// ---- 硬桥悬架参数 ----
const SPRING_REST_LEN = 0.35;    // 弹簧自然长度（m）
const MAX_COMPRESS = 0.25;       // 最大压缩行程（m）
const MAX_EXTEND = 0.28;         // 最大伸展行程（m）
const LOAD_TRANSFER_SMOOTH = 8;  // 载荷转移平滑速度
const SUSP_SPRING_K = 50;       // 悬架弹簧刚度（高→压下去后快速弹回）
const SUSP_SPRING_D = 8;       // 悬架弹簧阻尼（高→快速收敛，不振荡）
const LT_GAIN_PITCH = 2.5;      // 纵向载荷转移增益（刹车点头/加速抬头强度）
const LT_GAIN_ROLL = 1.8;       // 横向载荷转移增益（转弯侧倾强度）

// Roll 物理参数（真实刚体模型）
let HALF_TRACK_WIDTH = 0.8;   // 半轮距（模型加载后更新）
let CG_HEIGHT = 0.7;          // 重心高度（模型加载后更新）
let CAR_HALF_HEIGHT = 1.0;    // 车身半高（用于翻车时Y抬升）
let CAR_HALF_WIDTH = 0.9;     // 车身半宽（用于翻车时Y抬升）
let WHEELBASE = 2.5;          // 前后轴距（模型加载后更新）
const MAX_STEER_ANGLE = 0.70; // 前轮最大转角 rad（≈40°）
const ROLL_INERTIA = 4000;       // 绕纵轴的转动惯量 kg·m²（降低→更容易侧倾）
const SUSP_ROLL_STIFF = 150000;  // 悬架抗侧倾刚度 N·m/rad
const SUSP_ROLL_DAMP = 35000;    // 悬架侧倾阻尼 N·m·s/rad（高→快速收敛不振荡）
const GROUND_FRICTION_TORQUE = 30000; // 翻车触地后的摩擦阻尼（增大→翻倒后快速停）
const PITCH_INERTIA = 5000;          // 绕横轴的转动惯量 kg·m²
const FLIP_PITCH_RANDOM = 2.5;       // 翻车时注入的随机pitch角速度强度（rad/s）
const FLIP_ROLL_RANDOM = 1.5;        // 翻车时注入的随机roll额外角速度
